body:
  text: 淡齊集卷一宋李流謙撰賦龍居山人墨戲賦龍居之山有隱君子能人能天內外進矣嘗戲謂豫宇宙在其手萬化生乎身謂豫不信可以小試於是莞爾奮興矍然振袂起策老㕙如身使臂臂使指疾徐曲折惟意之止豫從旁縱觀竊味餘胾蓋其來莫禦也如川源之東赴如風雨之卒至其運而不留也如走圓於峻坂如決水於平地其致一而不失也如痀僂之蜩津人之舟郢人之斤后羿之矢其出竒而莫測如拔幟而趙窮如削木而龎殪俄而渾沌破碎衆彚錯起燕都楚壤越邑吳市山川卉木之變幻人鬼獸禽之譎詭外而蠻貊介鱗氊毳鑄鼎之所象汗簡之所志緗素之所傳墟冢之所瘞千態萬狀可愕可喜空底裏以陳露竄神姦而無所豫亦變色而作失聲而喟藝之精也一至於是子于何學而造斯妙敢問所以隱居君子投筆而對是心非手是道非技吾之始為此也嘗觀之古人矣敗縑埃漫破壁苔漬陀子道子顧陸而次竒踪祕蹟過目不記久之意若不厭求履于迹豈其得履則聞之師曰逐末者去本逺信耳者與目異萬生擾擾不一其類洪纖巨細稟自然之形流轉飛動具不說之理彼刻楮者已落第二故幹也所師帝間萬騎真龍拏空葉公失氣見似之者而喜對面千里乃觀之天地之間物物而察道實甚邇宛然胸中者皆彼成象流出筆端者乃其全體運生機於目前發妙意於象外然意終未厭此則物耳有物物者緘鐍祕嚴莫覘其際于是使離朱索之而伎窮契詬求之而心醉乃三日齊而鉏其驕色五日戒而掊其淫志觀之我心一塵不翳炯八窗之內徹紛萬象之我備獨撡其鑰乾闢坤閉其動而愈出如繭吐緒酌而不竭如海出水吾何為哉應之而已方是時也終日捉筆我不自知觀者何議豫驚曰有是哉子之妙也豫不知其他獨於文也而嘗從事徒怪夫六經以來衆伎紛蟻世祀幾傳作者幾輩雲章星藻其來亹亹孟醇莊放雄嚴荀肆屈賈之幽妍遷向之博偉韓豪柳徑異味合美豈夫與子同一經緯隱君子笑曰觀解牛者得養生見行水者知用智事固有殊途而同歸百慮而一致子何知之晚而問之不惠夫子之妙我之妙也我之妙造化之妙也復奚辨於彼此子其然乎不然倘曰天下皆疑吾獨得不疑則俟帝鴻氏起而問之五言古詩贈別水火氣類感草木臭味親君看金石交分篤均天倫朅來東川游結友輕雷陳諸君盡豪俊著我漫浪身酒斟約無算詩妙各有神人事不可知變態生逡巡一代韓荆州大木臥龍鱗客禽失危巢翩翩傍叢榛斗升何細碎朱絲恐生塵知巳淚再滴離羣恨方新去兹勝社難胸腹傷人神臨岐欲何語一味唯酸辛歲晚念裘褐幸勿忘騷人送羅制參平生願識韓一見屣履迎自揣何所持徒有汗背驚下士公盛德事賢我真情西南大幕府控制七十城自公歸奏功泰階夜光明上前論賓客豈但丞冰衡况公天人學根本敬與誠么麼見事功萬物待生成三月漲桃花鏡面江流平若為化檣烏親送帆楫行臨風默悽然一紙聊寄聲上有字加餐意重千金輕勿言暫暌闊四海如弟兄戲貽秋泉子桂椒發芳辛水泉佐澄潔風味可人哉醞藉固佳客清非伯夷隘和異柳惠褻壺子與俱來表裏清徹骨素魄吸沆瀣枯腸濯埃壒東家欲毋我漆園强齊物物我儻未融平地森劒㦸非秦亦非越有國名建德恬流不須航坦徑無轍迹笑渠秉周禮况復用蕭律聚糧適千里叱馭履九折勸君反爾轅神尻徐而疾伯倫駕豫車元亮脂我轄胚渾未兆前羲軒乃叔末病中作此苦熱日念秋秋至轉多病枯藤不得力小室同械禁形骸老翁然但未雪繞鬢秋山疊翠嶂秋月掛冰鏡朝躋間屐齒夜語閣麈柄妻孥生悵望煮藥勸屢進故人尚記存折簡時一問年來識真妄水月空萬境鬭蟻非實響杯蛇亦幻影誰于炯炯中屑金作塵眚酒盞行欲謝雲窗豈復近唯有妙蓮華勝味方雋永誰來炷爐熏佩子法王印秋懷悠悠感愁運肅肅勵素節蟾華度疏櫺蘭吹出叢薄幽蟲泣煙莎微螢映露葉百哀攻豫衷感此重忉怛庭闈餘斑衣荒壠已白骨茍生尚何聊從死恐亡益鞠凶天未悔風急鴈序拆女須冰玉質眼看沒荒域山鬼不足鄰何年反爾魄危腸盡一哭六月霜凜烈自從奪所怙殘魂慨零落虛弦已折翮况此百中鏑人生寄一世常苦不滿百血氣如微流豈禁沸鼎涸隱憂誰復訴任理寬萬一貝葉了諸妄一真無悅戚香火有昔緣從兹事朝夕浴罷性懶如嵇康不沐已三歲蟣虱擅封域汙垢為之地譬之大諸侯父死輒子繼納汙固云久用鉞豈得已朝來湯沐具縞素雪危涕決河卷塵泥崩風刮氛翳㢮擔坐茂樹未足當快意晚日瀝餘潤寸櫛導積氣蓬根入風露浮爽到肝肺却憂見斑毛引鏡不敢對彈冠一趺坐茹連豈吾事置之勿復道我醉欲眠爾鄴守以石刻屈平昭君像見惠因思大夫之忠貫白日而凌秋霜在所不論而昭君以傾國之豓擅天下之色乃不肻自同衆姬貨畫師以求媚此尤為可感者為賦此篇璇題朝曦麗椒殿春風香帶日羡寒鴉灑鹽引癡羊那知韶葩妍有此秋節剛千金非我愛所重在行藏奮然斬畫史低頭笑君王呈身由諂壬百態恐不當照影見冠佩豈不羞帷房自從到北庭幾閲紫塞霜年年鴻鴈歸不寄一字將却悲降將軍高臺望故鄉至今青冢上沙草不肻黃吾觀嬌色兒睥睨此濫觴孽閹擅國辟天地為低昂眼前殺師傅但有涕淋浪區區一女子去留係毫芒我行桃李村高髻餘舊粧負薪行汲泉不願同康莊為計盍不爾乃以美自戕初心豈其然薄命遭彼狂離騷照白日至今祖文章婉孌古稱士後先出寒鄉遺刻共想像再歌重慨慷即事畏熱客不來習懶我倦出愛間間不徹一日如兩日晚風生微凉佳月挂西壁誰為無事人共此可憐夕得小麑因戲作傾江釀斗秫未啻俗之醨向來故疏慵重此百憂罹杜門不復出出亦將從誰山氓過豫言刈樵得雛麑適我藪澤念亟買不論資斷乳無幾日疏毳未傅皮檻牢異林壑恐作南冠纍解縛非豫靳弱質叵自持罦羅竹節稠失腳悔可追泠泠溪流甘蔚蔚庭草肥人生一飽耳八荒吾庭幃我自不亂羣爾能忘土思馴狎不違性長大儻有期充庖斷勿憂巾車薄勞之南山與北澗伴我歌紫芝張陳慨中畫管鮑謬已知新交不更添歲寒端自兹數醉清秋無所為遇酒時一醉醉則遺形骸兀然外天地塵世多得失古事有興廢更復不快飲徒為亂人意屈原貴獨醒賈誼每流涕二子竟中夭惜哉且自棄蒼苔晚雨濕紅葉北風厲樂鄉聊可謀悲秋豈吾志病中禀生拙以疏俯仰人事勞煩疾乘秋至幽憂安能逃閉閣無餘欣西風晚蕭騷乃悟揚子居未曾損一毛流光背人馳歲暮不自聊安得七發賢相從觀海濤黃思忠病起作此寄之巖巖千丈松大厦不收拾已作澗壑卧更困螻蟻穴天果無意哉問龜龜不食悲歌氣填膺白虹為貫日向來亡公子後日九州伯奈何蕞爾曹乃敢觀裸浴士窮有如此於君更心惻平生治國手僅脫在陳厄三彭捃細故二豎侮明德聞之投袂起此士豈易得可無不資藥粉珠屑白玉奮髯呵不祥有神默操㦸歘然蛙腹裂還我蒼玉璧一尊欲壽君悵念風雨隔平吳固竒烈更謹盤水執君身則千金斯文但一髮勉矣加飱飯吾道係損益豫游潼川將訪魏城令君李仲明而不果作此寄之骨肉纏恩愛友朋綴情義於君若兼之何生結此契朅來東川游咫尺桃李縣引車意甚決牽衣事輒挽我如空中雲隨風出巖岫又如波上舟東西聽水手有心不能酬富貴那可必富貴吾不願此見未宜失裁詩說相思過鴈或堪託鴈能見君子嗟豫鴈不若送臺石甫出關臺君少年時盛氣不可蓋冀北駒墮地過都如厯塊未說兩石弓談詩亦堅對十年憂患繞𤣥螭伏淺瀨寶劒夜韜光蒼鷹秋折翅飄風詎終朝否極理則泰秋高氣益肅匹馬指絶塞酒闌奮袂起曉色風雨晦關頭飛將軍久矣側席待解鞍握手語意合琥珀芥去去未可知建侯萬里外兩耳熟高名邇方揖英槩頗知倜儻士別意殊憒憒贈行敢他言忠義福所介送華覺歸中巖世故翻巨浪是身如孤舟黑風半夜來掀簸卒未休誰能洶湧間輕飛逐浮鷗稽首大導師覺海名善泅請下一轉語為度厯劫憂師笑了無言此問難爾酬未可楫迎汝子歸當內求堅忍作維纜巨防截橫流中有不動者東西聽漂浮師今念故山翩然去難留相送城東隅黃葉堆別愁歸來閉閣坐念念期自修精進儻不懈針芥或有投西風白蓮開束包隨勝游元日泛舟分韻得大字春從沙際生白石映淺瀨一舟何自橫𤣥寄倐與會今日是何朝亦恐魚鳥怪曉暾破宿雨換歲無此快柂工貌間暇一篙有三昧夷猶我無心上下聽汝輩斷崖舂濤波千古意不改中流浸玻璃緑淨吾苦愛林深故疏密山逺自明晦隔江見人家短籬護畦菜蓑笠弄晚色真樂在牛背稍能薄輸征武陵豈天外吾曹二三子勿作碌碌待濤戎嘆山河塵凡纍纓佩人生富貴哉固有一事大月夜泛舟苦雨連日夜佳月遭薄蝕晚風散積靄水天忽改碧江臯放幽步露下襟袂濕劃然湖海興如驥不受勒扁舟繫枯柳漁子眠已熟喚起勿作難解纜破秋色移我坐空曠四顧竦毛骨山空木葉脫岸斷石腳出舍舟訪鄰叟醉卧不納客何必見安道意行無適莫書生亦底事忍凍犯蛟窟可憐窮事業坐恐清景失歸來定何得索酒更深酌上士不言喻下士笑局局太白下羌江蘇仙遊赤壁風流共一時作詩記今夕東巖施頭陀所隱也頭陀唐人初居郡之奉聖寺太守獨孤見之頭陀不加敬獨孤怒既去遣吏捕之頭陀以笠涉江至此山吏隨焉頭陀隱巖間兩虎守之吏駭退即其地為院昔律今禪豫昔侍親守簡數來游再到賦此詩勝地憶屢到變革非昔年律居掃積陋禪房侈舊觀老衲不可見遺事故老傳使君擅一壑憑愚妄自賢定心初不搖蚉虻卒飛前赫然漲蛙腹欲以火燎天一笠渡清波絶壁守兩斑游戲出小異褫駭飛殘魂慢敬汝則勞道力屹如山一笑置勿問爐薰裊輕煙洗盞酌石溜吻頰冰雪寒却憶飛泉句泫然思老仙從馮黎州飲梅林以山谷舊時愛酒陶彭澤今日梅花樹下僧分韻賦詩得時字巾冠墮城府桔橰無休時胸脾貯黃埃非復林壑姿涎流方外勝秦人望軒羲萬金買間日駕言一紓眉冒踏衆俊場更從百代師食魚得河魴熊蹯佐其滋靉靉煙雨村霜條出冰蕤烏鵲噪寒暝玊立山差差置樽扶疏下壽幹虬蛟馳落蘂不動塵初無犀駭雞深酌起自勸非族不在斯公行對宣溫雲霧生攀躋能來玩墟落匹馬却蓋麾蟠胸萬螮蝀區寰眇毫絲以兹接羣動白羽坐指揮笑彼豢外者組紱為之鞿他年駟馬還梅花當十圍記此黃公壚下車挽客衣未覺邈山河一醉固大竒用山谷上東坡韻與馮黎州黎州時將赴召賜履聖賢地專征翰墨場黎然本非照昏幽自䝉光醍醐有真液薝蔔無別香座當百尺樓餘子但廡廊譽毁不可劫造物能雌黃簡編熟古人見公蓋未嘗彭黥非韓敵或可噪其旁公有八紘罝就獵庸何傷鼓鏞作宫庭缶盎不能聲仙圓起瀕死乃欲進豨苓淫書有痼疾展卷自弱齡俗學或攘之正憂荆棘生孔顔共一世餘事不芥蒂跪求直指處遂了不朽計自今面其真向來獨喜似送孫隆州萬里對明光真實一字字九陛元不隔是亦父子爾我讀公車牘再拜甚歡喜玉色近昕夕王度日完粹再析山中符可以覘胸次道行國無小意甘食則㫖平生熟窺覘步步聖賢地造物寶其人華皓表斯世從軍落窮塞愁破覿清峙蝸廬僅纏軀鼓鐘日在耳何以充淹留白日不可繫長年慕道德師友別匪易躑躅南城隅竚立渺無涘不見兩朱輪但見嘉陵水上費邛州疏茅裂萬户百戰未易得一識荆州面不作半錢直朝曦明生東夜斗光炯北皎皎羣目用餘影到盆隙共在一世間能無一世傑要渠兩眼青洞此寸心赤使君絶不凡白璧生徑尺龔黃漢循吏阮謝晉人物稍稽一節趨戲從五府辟端知付兩轓乃用倡九牧春風長桑柘豚犢飽柵櫪遺秉利寡婦負戴無斑白靈河貫中國寸地沾滴瀝三公乃故事企踵榮晝接慕用吾已夙願見憂不亟聊欲寫我心敢幸康而色賓庖月照爼談閣風滿席秋霜濕征衣行李驚遽迫戀軒寄悲嘯孤恨繞華㦸權輿置身地大冶天地窄相馬不相肉剖玉莫剖石狗盜何足言囊錐有竒客馬德駿微恙既平作此勞之內寇非陰陽窮愁因緣之堅壘自却走不藥亦不龜夫子樂唐虞短褐蔭茅茨塵不上几闥何物作伺窺或丐愈風檄豈邀遣瘧詩朝來就清爽梳髮修竹墀買酒約相過勝地相扶擕人生踰四十浸與衰苶期君壯尚俘劫我怯重嗟咨問丹勾漏迂訪道弱水疲綿綿抱谷神閉門有餘師鶴病無死骨松瘦有老枝同游公玉伯氏季氏遊水陸院濯纓閣以清斯濯纓分韻賦詩得斯字積雨泥斷道扶笻將何之愁蹲寡情味竄壁如蠅癡朝暾惠新晴仙風起衰萎振衣欲有詣扣扉適相期百步得精廬一丈清泠池老木圍蕭森回風影差差向來赫然者挾冰誦昔非晤言意能消真適神不疲鱗游鳥空翔趣舍各不知我間苦枵餒吏奪君嗟咨拙巧自殊用靜躁亦異宜能來共幽曠合處或在斯夜光栖重囦草木生光輝抵鵲者誰子而况彈病鴟我有飛霞裾雲旗駕靈螭舉頭叫閶闔九萬風反低敬以贈美人嘉惠無時衰送劉文潛司業江西漕二首百為自叢拏至理在綿眇刀硎閟新穎鏡像蓄遺照吾心又不然一士欲矯矯目送雲端禽舉觴可以了始作想澄清歊暑不敢毒以兹壽慈母吾鼎愧半菽恨我如宛童失此百圍木豁然心光動千里尚相燭清明日同宋才夫王子友游秦氏園分韻得一字誰澆無邊春釀成此天色文章秖引睡茗碗不著力雖無田父邀欲到野人宅日萼鬭深妍風條舞柔碧數峯極蘊藉未到輒目逆人心有同然一樣寄岑寂茅茨破不補吾意默有適置樽小軒戶雲氣手闔闢蒼蒼萬檀欒晚吹自蕭瑟穿荒取微徑便曠從短策忽與幽興會照我兩尺璧白虹潤山木取友固多益談深近迂怪理奧煩探索鯨杯不足吞馬肝無用食玉虬蟠蜿蜒萬鱗寒縮澀餞春春未闌尚及三之一觀畫文氏園小酌而歸畫王正卿所作衝暑去何之城南水竹園發篋得祕畫筆老不見痕作者非俗士噞喁不能名王郎眼如月指㸃見本根解衣而盤薄主人固可人虛齊坐修竹一面當暑煩斜陽送暮色無數烏鳥喧漠漠芳樹暗涓涓流水渾星斗掛簷端餘影到清樽行觴令不虐捉麈語不繁不知聊爾耳佳處正難言劉林夫以諸公送行詩軸見示作此我思在何許却立望高丘手持金錯刀美人不可求此意恐蹉跎悵然生百憂嘉魚樂循渚潑潑不受鈎燥濕各天性萬生難其儔喬木懷故家日星藻皇猷吾欲徵文獻庶以充淹留鼓鐘侑大烹其樂有此不江黃預壇坫齊明盛陽秋義合在一朝如新嗤白頭和林夫讀老泉先生上歐陽公書韻倚門抹青紅過者必反顧風雨不足慿零落汙黃土斯文有正色神指亦難數兩漢僅自支崔蔡已衰暮老龍破風雷一躍空萬古賈胡貧失真而况逢其富堅車行大逵往往初必忤要知論賢愚豈在遇不遇送李德明解綿竹尉嚴生起寒瀨至今漁釣尊董賢尉三公冕黻䝉垢塵榮瘁視所挾誰以通塞論吾宗老筆墨健力河漢翻蛟蜃著甕盎鬱律氣屢吞顯名在操踐一尉衡宰輕幽求在朝邑碌碌羣兒奔一朝定大策談笑搴翳氛書生喜高論我言布帛溫別語不多吐春波銷客魂送楊文起尉溫江學海不可窮一葦子利涉宦海海更深破浪初鼓楫波濤惡氣勢鼉蜃毒吻頰帆檣託忠信維纜倚定力晏然袵席坐扣舷歌傲兀是中有神仙樓觀琢白璧羣仙謁帝罷霞佩粲成列行矣從之游贈子兩黃鵠六月十四日大雨少頃月如晝火雲忽改色大雨卷地來淝水萬貔貅一戰山嶽摧須臾天宇霽刮掃無纖埃佳月流清輝瓊瑶碎六街薄泥阻微步庭除重徘徊清坐對石友晤語修竹齊惜無名酒耳孤詠暢沖懷送宣孺攝邑古郫已作來遲遲又為去猝猝奪我佳友生悵念鬢毛白投間如我宜君則任繁劇臺府有聞知使子固選擇子男古所尊而此萬家邑郵筒即詩筒簿書有間日迎門爛桃李畫餅不可食况欲分其餘豈救饞吻濕留為別後哂聊用破孤寂數期還魯疆指日返趙璧送宇文德濟解綿竹丞陋哉紈綺習染人甚脂膏傾五湖三江未易濯穢臊冰霜竹林游糞土戎與濤富貴比貧賤所去寧一毛公家全盛時束帶轄百寮朱輪照華欀龜紫映翠貂緑幘走童奴清彈沸娥媌連牀不同夢君乎吾願交一覘鸞鶴姿頗疑出衡茅神駒足萬里威鳳心九臯夜窗四壁空抱卷燈屢挑往往出妙語遺音叶咸韶於此定不凡舉步即扶搖朅來署紙尾丞哉嘆徒勞官事竟何如亦似是馬曹置之勿復問朝爽西山高北風送征驂擾我心鬱陶判此別袂難愧彼漆與膠君去千仞岡我歸一枝巢升沉何必恨書來慰蕭條從人借馬鈍甚戲作一馬如坎蛙􅐡沙鈍無比長繩掣欲斷大箠折三四郵亭只數尺對面不能至我聞穆天子八駿日千里邀汝託後車笑云勿相戲挽家夫人雷風畫羲文藻蘋冠周篇房帷預何事聖賢論本原婉彼淑靜姿濯濯出水蓮擇歸令德配映世高名懸巳子與他子義在亦乳然簞食或見色千乘塵泥捐裙裾具此見生子豈不賢鬼神發潛光慈母令問傳當留千斛米買酒澆青山挽程子山侍講我昔先君子為公義林引論儒摘寡要太史固坐井期公非茍知力行福黎蠢螭坳千載逢鳳池一跬近獨妍當衆媸隱憂觸羣慍頗覺游梁倦終成弔湘恨聲名出寒餓圭組憎薄命綸言表厄陳衮札囊束筍傳家侈榮渥尚足破孤憤腸折八哀詩涕墮五君詠長歌餞公歸木脫西風徑挽黃思忠千章擇一木工竟不善斫不如路傍棘藩圃盜可却故友心破碎真宰竟錯莫門生有侯芭灑涕傳絶學挽沈夫人人道孝為大斯言俗之砭簪緌顙猶泚乃能出閨簾逶迤竟潛通姑慈霽霜嚴老禪入宵夢薄雲為之殲淨心正覺成妙解脫妄粘寶蓮託淨質此理遙已占君看數珠輪此句吾為拈元質偶招客飲為賦此篇曉風吹花枝曉雨濯花色裁綴為好春天公不遺力啼禽彊領解對花語移日世事豈易料搔首鬢毛白名園適幽爽韶序屬芳淑主人雅好客力能管風物酒如瀉江波紫翠映華席我友不可揀一一如圭璧逺者渺雲海近者接肘腋能來共一醉我亦有行役道中逢牧童跨牛者田空已不耕草瘦尚可齕搰搰一歲勞得此休頃刻阿童拍腹卧短箠聽驅策早晚穡事動努力進芻粒豫舊服术迂其效弃去比過臨邛䝉李丈分惠并副以詩次其韻以自警是身如芭蕉敢保金石固得生况尫陋愧彼碩且武百萬護一喘人自疑竊斧靈根著異效嘗資一溉助苦邀旦夕驗弃去悔昔誤那知百破衣豈易一線補滄溟稱微溜九仞亦拳土見彈思炙美拊手梟未許九州作秦鼎萬生入燖煮赫然一炊頃衆忿久已貯碑方嶧山夸骨作驪山腐初心欲速耳竟不守門戶吾宗活人手一諾輕季布緘詩遣分送愛我骨肉似恐為石髓凝亦防山鬼妬汲汲事服餌長謡記所自願求必世仁借秦諭其故解牛得養生持問子莊子遊護聖寺分韻得共字散員繩檢寬暇日得放縱天明風發屋飛蓋怯掀弄朋簪諾已宿駕言盍不勇幽禪逺城郭伉壯塔廟涌華鯨三擊罷僧衆肅如拱香粳撩鼻觀饞沫出流湩三生石上歌浩劫幾丘冢失腳今悔深彈指昔緣重聨裾玉連環談端豁煩壅草木自臭味雨露元一壠摩挲老瓦盆此酌宜數共已無繫日繩但有思家夢旅中客舍供朝餔旅食不知㫖取酒澆餓腸乞火伸凍指萍根託江流江自不能止傳舍貪閲人風雨亦閲爾過彌牟有擕魚過者買而放之因志以詩行役道荒戍馬行何徐徐市人捉筠籃偃然數尾魚始疑失清波殘息憊不蘇俄掉尾與鬐示之尚可圖殺戒宿所持堅盟敢渝初爾命如丘山我金若錙銖敢靳百錢惠坐視甘醢葅空籃俱置之漣漪縱縲俘旋收褫駭魄亟反清泠居僕夫亦欣然毋疑校人誣為龍未可知風雷躍雲衢田文出函關子卿反荒區骨肉一笑粲樂哉定何如人心如面然賢鄙異所趨放者尚反顧捕者已縱罦為德懲不竟護以西竺書世事豈易料聊欲明區區人羊互吞啄佛語深切膚聞聲戒肉食孟軻逺庖廚孔釋喜交戈好生理則符浪言物與人貴賤越與胡人貴當食物物固供人須此語實魔語地獄正為渠炯炯一靈光彼此亡缺餘一念偶負墮流轉乃爾殊目前怙强雄屠臠弃束芻此身寧石人竟免為物歟懸想刀几毒響應疾鼓桴天驥警鞭影蹇駑煩箠驅箠驅可致力詩宜勒盤盂自離蕪湖多阻風是日早次鴈汊風順亟駕帆以行既而稍駛落帆之半晚次雷口舟人以貪風曛暮不得泊幾危九牛可倒曳兼旬逆風裏老來硯筆衰文思每如此篙兒疲晚牽赤日汗流趾峻阪有疾圓秃羽無縱矢朝來日初亮旗腳忽西指竪帆沸羣呼劈浪輕一葦路經百家村雞豚不敢市有客訪江滸疾談幸其起過目不留瞬倐忽洲渚異一日三日程長年抃而喜敏者貴乘便拙者拱以俟齊人誚軻迂秦亦毒鞅駛吾嘗為此論誰肻味無味使帆勿盡風如食勿盡美君看赤手人重負亦俱至過大信口憶西歸録載大江渺渺忽二石山如伏猊引出水面東西對峙江形若瓢然而山乃其口然相距猶三四里則江之廣狹可見視之信然妙哉寫物之功感而賦此篇兩山如伏猊波面忽引首江形若瓢然此山乃其口往讀西歸志一一未深剖及兹親見之語巧極雕鏤妙哉寫物功萬像不藏覆當時偶然書信在三紀後臨流重吁嘆有涕泫襟袖君看連城璞豈但今不售游無為寺導師生何年人猶記此日香火緇俗會風雨神鬼集我來恰秋深迥迥原野濶羣山勢愈壯老木氣不折拄笻踏危磴小憩馬與僕屢休才及門到寺已曛黑車從如沸羔無地可插腳闍黎揖客坐意象頗猝猝㢮擔得禪房持鉢叩香積倒牀不復醒夢與仙梵接明朝沒階趨燎香望玉色丐福吾未能修敬敢不肅是身如芭蕉危脆不堅實緑髮俄素絲赭顔倐枯臘百年已長久大抵俱化易稽首不動尊向來何證得衲衣坐䝉頭萬古一交睫儻非定慧力枯骨已瓦礫物物具兹妙抱寶訴空乏伐柯則不逺內照無別法一鉢寄空巖定當擲此幘林夫有詩趣歸期次其韻答之乾坤大逆旅日月兩行客江頭垂楊樹折盡供馬策學舍如冰壑逺與簿書隔天風吹我去自哂殊役役英英君子僚妙響協竽瑟詩來促還期珠琲瑩巾帙久枵渴嘉饌積陰跂白日談為無底囊剪燭期竟夕但恐又西東捶車歎寂寂盍不歌歸來已痼烟霞疾還家吾家在何許水泉修竹林鷗鶴失間伴跂豫有遐心窗前小梅花耐霜笑吟吟小待新酒熟冷蘂勸清斟
