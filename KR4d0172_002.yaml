body:
  text: 淡齊集卷二宋李流謙撰五言古詩送李司户之官臨邛威鳳翔九霄千百但一遇蒼蠅何所來滿盤揮不去吾人一肝腸未可捨跬步摻裾輒經年把臂速炊黍譬如枝上花風裏得暫聚天果何意哉未易測其故安得三間茅藜莧同旦暮秋色如行色别語不得吐鶴峯得佳句尚足慰延佇從今夜夜月伴我照庭戶中秋玩月分韻得一字向來高樓月人境居第一天福不得再天意亦叵測濁河幸一澄威鳳乃屢出過日惜清玩草具成勝集共詠昔年詩仍是昔年客酒闌感存沒悲歡異今昔懷我盤谷翁蘂宫此何夕仰瞻雲漢章正恐翁手緝躡雲侍琅輿頗恨無此骨拭泪罷清酌覽鏡有華髮纍年中秋無月今年凡數夕有之十五日尤佳境濁常鮮愜事難獲易欣皎月當中秋覘候每倦勤扁舟泊沙岸是夕無纖雲冷侵碧琉璃又如爛鎔銀十年五年無千里萬里明對此欲不飲恐觸蟾兔嗔尊空更重看徐步長江濵大魚時撥刺宿鷺聨拳驚可無橫吹者或有琵琶人領覽此奇絶但怕添愁新頗欲從氷娥暫陪白玉輪載我到廣寒一醉羅襪塵歸來閉閣臥耿耿雞未晨顧瞻篷窗間尚餘半金盆蝨嘆得生固么陋宅體仍穢卑巢穴我襟裾食飲吾膚肌毒比蚤蚊熾類兼蚋蟻微陰幽巧相傳不知來何時殄馘未掩戈遺妖復蕃滋觀處初若無掇之或如遺捷走欲違禍深藏殆知幾竄壁尤惡啄潛沙更危機處頭與物化遂使白變緇稱臣託疵賤名官慙素尸捫摸傲逆溫梳爬厭懶嵇吉凶陋巫占彼豈能先知殊快勇夫射寧辱達士譏蚩兒厭膏粱兀坐如瓠肥屠門飫雄飱亦足飽汝饑我身如枯株但有骨附皮嘬嚙竟何得饞吻亦及之夜眠輟佳夢晝坐傷沉思往往暴醜形或為潔者嗤抑搔兩甲折掩捕雙目疲期我犯不校責人所難為湯沐猶寬恩磔裂乃所宜吏貪摩其牙巨力猶足支䑛糠及小家此豈禁鞭笞願作秋禽獮毋使蔓草滋蝨去息疴癢貪懲消怨咨仁者惡害人勿謂傷吾慈贈聽聲上官術士造化祕密藏凝然大狙宅操縱掌握間殆似不容測惟人號最靈研窮深探賾支干究生旺更以形骸索摸骨與聽聲箇中更奇特無煩覿面知禍福悉已白至理非口傳妙處從心得官君持此術行盡山水國所歷多巧中一醉天地窄秪今天下士何啻纍千百紛紛肉食鄙正須囊錐客僕僕塵埃中豈無鳯毛翮勿以朝野殊窮通理不隔上方勞夢想胡弗為指摘致君堯舜上爾術光史册若共俗人言懷抱真可惜送張時擇從楊茂州之招州閭我知君楚璞未剖初家無兩錢錐腹有萬卷書閉門飽葵莧撫兒咏唐虞兒乳腥未濯才能辨之乎巍科似拾遺却走我不如流俗校成敗往往遭揶揄豈知磻溪叟空釣寧在魚窮途有知已一笑肝膽輸羔鴈朝在門挽我不得徐鯨鯤依洪波鳳凰集修梧士貴得所託往矣膏子車忠信行蠻貊九夷聖肯居使君况儒將奧學窺盤謨小詩乃餘瀾已足吞五湖老羌弛弓刀玉帳一事無舉杯哦新篇主賓興不孤明日思君處一千里平蕪送無害弟之官并呈使君蹇丈一笑人生一飲啄大似有夙緣蔡䝉窮坤陬宦游自吾先哦松千尺下剖竹羌水邊泮宫擷芹藻我歸才一年子又盧奴去妙指按五絃識人舊魚鳥入眼昔山川子才如干將當屠橫海鱣纖鱗拾沮洳人怪我囅然火宿用彌壯鷙伏飛無前弟兄立分拆門户同仔肩老仙泉下責豈但冕與蟬别離不須悲使君直二天不敢祝翁歸氷鏡自高懸夢想五賢堂囊貯白雪篇何時見華築琬琰行當鐫一春無日不飲遂作肺嗽效樂天體生與酒俱生長與酒俱長行時酒在樽坐時酒在盎一日不舉酒一日睂不放春來身無事結客鏖勝賞南山步新堤西湖撑彩舫或飛名園蓋或祖都門帳大酌須淋漓小酌猶酣暢家山忽入夢江頭問兩槳友社惜我去共和驪駒唱劇飲連晝夜大似灌鼠壤不往愠睂須好意難棄忘平生無肺病因兹作微恙終夕勞喘呀如吹竹筒樣積痰動盈缶咽吐不停吭童奴更謁諫浸恐傷府藏萬里寄一身節宣豈宜爽芻蕘不可遺豫心默云當飲食著聖經觀頥識爻象慣習未易奪剛制乃所尚初如鍵弩牙又類遏溪漲稍稍撤觴斚久之絶悵望腸枯與吻燥但當吸瀣沆宵枕遂小康其效疾影響遽言終止之未敢保其往酒頌我文章酒徒我鈎黨有時倚危樓搔首獨惆悵大藥不可求此物足憑仗陶謝匪沉􅒬遺意覘佛倣下士聞道笑識者睂睫上更欲買黃金歸鑄杜康像送樂季和袖有禮神璧橫天射螮蝀擕持易羊皮賢士銜隱痛短檠風雪窗鼎鐘入宵夢出門雀適羿挽弓不再中九折生庭除欹輪失嚴鞚事固不可知淺者發嘲鬨磨以百艱虞吾覺此意寵蠅棘芟根株織文徹機綜如簧秪囂煩戰勝屬陰拱詰朝烏帽斜瘦馬霜鬛聳行世心愈老轉物身自重解鞍澆客垢先撥床頭甕君歸我送之我歸欲誰送送李仲信鳳巢無鵂鶹虎穴不生狸巽巖四十年名聲兒童知黃流出崑崙筆力子似之嚴兵鏖殘敵往往輒偃麾廉頗用趙人戰勝地有宜一吸空湖江兹行定英奇事功出邂逅道德為根基儻踐鐘鼎盟毋爽藜藿期請因問安際訂我言是非送仲明赴舉進退士所重視天為鼓鉦採薇北山曲濯足南澗濵高風豈不偉奈何萬蒼黔道可濟天下不必丘園尊先生一世士抱寶三家村蚤日湖海興攬鬚見霜根我嘗嘆洄洑再拜願有言釣魚須逺去沮洳無鯨鯤北風折羣木嚴駕夙在門萬里著掌間一舸氣已吞岷峩賴君重努力答山靈造物飽閲駿眼未見此人小却猶玉堂尚堪託斯文賤子惜此别贈送慙空樽唯有清夜夢相逐束南奔送吕義甫河伯矜秋浸望洋始一嘆是以太史公身行天下半可憐據坎者寸尺盡霄漢我友故英發驤首輕皂棧結束萬里游是行吾所贊榮途聽其遇丈人教不倦向來開說易一語無疏傳曰為可用者此本同世患停舟佳山水心目有奇觀更接搖麈談中夜光赫煥我方墮吏罝沮洳雜鰍蜆眼看飛鴻翔别樽恨不滿憶樂季和理邃不可商造極會其天因黥乃南面挾璧顧屢歎安有鬼一車蘊疑在目前劃然解積凍澌泮千丈淵吾嘗賞淮陰能録惡少年大勝答溪媪奇勛此輿權水激可沃焦鴆毒懷與安夫君珍所持射市吞煩冤束袂甘冥冥一穴栖鰍鱣真宰技自癢駕以風無邉背水得衆無失駒約羣還三月春已深穩下三峽船䕫門有巨艦談嬉障百川金華客五侯氣力足由緣為君誦伐木三扣臨江舷食藕芙渠固佳産其末亦奇絶此土乃物宜厥包比柚橘蔓引莖自遂泥蟠體仍潔一絲戲傀儡衆竅殞鯈忽七月陂塘秋千蓋偃寒碧俚語名帶花俗言六七月為帶花藕脆嫩若無骨如船近誑誕似玉孰追削瞿曇况真理穢淨本同出花實根相連因果非兩法君看入口處一片疑嚼雪溽暑肌如熏毒酲肺欲裂只應蕭爽時便是清涼國佛氏以蓮花喻法取花實同時猶因果之不異送孫賔老宰丹稜回也真賢哉陋巷一簞食卒然問為邦所告王者事軻亦印微言曰可禹稷配學道則愛人偃昔嘗有志他時武城絃默與聖意會聊寄莞爾笑汲深孰知底欲令誦所聞姑以割雞戲聖賢存心處萬類宅生地先生為已功及物乃糠粃十室有忠信百里吾敢鄙六經作縣譜趙張不到此春風七條絲可以馴桑雉堯舜治天下乃與治射比一朝坐廊廟用有大小爾我昔從公游頑璞不受砥經時去函丈榛棘撐腎胃朅聞衛返魯倦馬始休轡欲申趨隅問已作橫䇿起人生楦宇宙孰為不朽計著書有存亡德業亘千祀苦熱祝融職司南憑寵不遺力呀呀三足禽敗羽懸枯臘釜􅑄糜碎鱗無地此身著楚炬方烘秦湯征未自亳夢想千丈氷快踏赤兩腳少憩修竹林泉水鳴㶁㶁岸巾對颯爽汙垢亦小濯蒯通據鼎耳反唇乃幸脫叩頭祝西風駕言馬可秣危喘已强支旦夕恐不續俗情傲寒灰赴熱犬爭骨灼肌豈暇顧甘作蛾殞燭君看孟嘗客乃笑翟公雀呼兒進胡床佳月可人白一醉無渭涇舉盞新酒滑遊水陸院深居毒歊煩沸鼎遊羣魚金凉念何許頗欲膏吾車行行有佳處舍南得精廬方塘水泠泠嘉樹陰疏疏寒光四圍之氣象豁以舒清濁本相形暑去不待除赤腳踏潺湲褫帶淩空虛杯盤固草草言歸且徐徐山僧擅幽勝意輕南面孤久矣不復貴厭棄同汚渠貴人便宴安大第如清都華堂貯窈窕高門列車徒往往慕閒曠偶此樂有餘蛇蚿漫相憐鵬鷃端異趨不如聽鳴禽勸我提胡盧游安樂道院院本通悟故宅父為道士嘗使拜老君像方一拜像陷于地因成坑焉今俗號老君坑美璞出叢阜徑寸藏尺水堂堂大導師鍾靈此其地荒坑名老君故老說遺事仙佛勢不敵北面昔所試烟雲龍蛇窟風雨鬼神㑹珍重住山人淨觀愜幽邃半偈起冥晦徑欲裂冠袂同行一微囅落日姑整轡在家固出家象服何必異君看童其顛已落第二義袁季海别駕以所藏靈壁石詩軸見示為此篇諸天享備福宫殿常隨之驕王擅雄富鐘鼓具不移巨細無實相一種生幻師君家數尺峯在處供娛嬉衡嵩接兒闥岷峨入提擕只作如是解天地皆目㙠君言勿作劇丐我瓊琚詞援毫不能奇永愧嶄絶姿烹茶炷爐薰􅍶崒繚輕絲如雲出澗壑頃暫萬國滋請以小喻大人才亦如斯我無適俗韻夢想懷崟崎借渠琳琅響和我蘭荃詩明朝謝冠服雲根有茅茨法華云諸天身所在宫殿隨之秦始皇治宫室所至帷帳鐘鼓不移而具然皆未若此石之長在目中也峽中賦百韻振奇欲何夸頗疑造物者兩山擘其間放此江東㵼不知太古前宇宙孰壞冶疏鑿著夏書固自人力假巨崖切漢起入眼驚見乍影臨數州逈根插九地隘積鐡老風雹巨熖莫鎔化面惡駭䕫魖姿妍恱美奼城郭巧刻劃屏障工組畫髻鬟直高綰劔槊寒可原缺抗立擬分庭孤撑獨稱霸駢羅紛兒孫拱揖儼賔介盤空矯鸞鵠飲溪走牛馬裂絞貫鈎鎖翠項披絳帕碎礫星宿稠亂石豹熊跨錢疊蘚暈重鱗坼樹皮扯萬甓纍如甃一按平若砑寬博敞壇墠斜傾覆簷庌懸空疑崩欹叢密苦䝉絓中斷路已盡合處天無罅周遭窘漢圍赤露經秦赭怒觜忽橫出狂湍助喧罵突展壯士臂交鋒報睚眦飛瀑練垂素響溜鍾調啞嵌窟誰剜刳竅竇飽衝射陽光晝隱見雲氣曉包藉燒餘通鳥耘微缺有蝸舍婦肩頳背筐樵指虛枯槎巖葩淺深雜山木高低亞月黑吼饑虎竹深見眠麝猿捷果垂接禽輕枝倒挂往者國柄分羣雄用狙詐阻兵割方域狂心各侈哆一夫比劔閣百萬戈甲卸負固不一姓强嬴殞函華王靈今一家女織男耕稼溪魚肥入罾村醪賤可貰舳艫日下上何曾舍晝夜儒紳企榮途行有不俟駕估客聚百貨乘時沽善價載考江發源其微酌杯斚坤軸聽回斡陰機默操舍瀰漫衆流㑹灌注一門下上聲旁束狀殊窘屢曲意不暇騰涌山合沓飄濺雪飛灑峻迅出暫頃澄渟或時且積油黯覆盎征鼙浩飛瓦日月在吐納雷電生叱咤蛟黿護老湫鷗鳬狎淺汊涸澀苦窮冬漩洑怖炎夏逆遡魄自褫順涉心猶怕茫茫蒼溟浸落落洞庭野萬折期必至憤屈當一寫微官能我誘里落腐鼠嚇三年客中都唯了湖山債萬里徒往來百艱每吁唶一灘一危恐奔湍劇旋輠顛反常不持疾風閃荷蓋百丈偶絶牽刃交俄失靶山行避濤瀨竟日勞髀胯假寐易成魘驚呼亦多嗄瘦骨煩拄支垢容招嗤怪忠信固憑倚內省輒摧謝貝葉丐慈護牲牢乞神嘏深愜唯壯觀此殆天所借曩賢近交臂佳境倒啖蔗夷陵憶文宗小卻寧芥􅀢孟韓有正傳聖道識根𣲖黃牛功配姒法當祭之社輦石肆威怒斯言吾久訝秭歸傍雲岑地惡記人鮓重弔湘波魂忠言棄土苴江蘺續遺些異代稱屈賈寧胡憫國艷可忍千金賣却笑效顰女炙面不肯嫁巴東僅三户突兀著大厦一擲嘆老張豈但震盲瞶峩峩神女峯索漠古臺榭纖辭穢高仙宜誅未應赦行行到巫山風煙鬱桑柘瞿唐送殘險性命脫罟擭關頭躍馬帝炷香重再拜鄉音近嶓􅡠歸夢繞松檟韓公喜見蝎正比怒嗔蟹人情有奪移適意固暫快妻孥知我還歡呼及姻婭僮奴潔衣褠爭挈壺觴迓靈鵲占吉噪金蟲綴寒灺掃我釣魚石整我插書架棧羊撥香糈蔬畦剪霜芥萬事置勿問但辦供客炙人生尋尺地蟻宫共世界一斑僅豹窺大庖姑蚋嘬就令十年讀未勝行天下耳目異聞見襟靈豁陋寡杜陵半九州詩史入嘉話馬遷多經踐有文資博雅吾慙筆墨斐絲麻視菅蒯未能朋儔矜粗足兒童詫尚及日南杯呼春送臘蠟中秋月色甚佳病不及觀斫月如氷輪不知幾玉斧寒光十萬里餘影到牖户我病欲强出瘦骨怯風露技癢時不禁窗隙窺皓素年年到中秋此夕日夜數酒熟客不至景勝人或負燕鴻初何心亦作不相遇拊几但悲嘯看劔欲狂舞幽蟲不相干空階自言語失題學者一大事最重出與處用行舍之藏孔顔獨相許參賜地位高窺牖不得覩而况未見聖一曲株守兔入林恐不密狷者或拒户如蝸護一殼槁死竟何補營營夸毗子意常在腐鼠鐘鳴尚遲回顛沛慙末路細評誰失得未易較吳楚聖賢具成體以道為鉦鼓適時不俟駕枉已一揖去而我本來心湛如太空故先生平生學此理超聖處浮沉四十年夷險隨其遇初無周南恨內樂侈圭組名高天不掩舜聰徹幽阻門前褁輪車急急戒徒御企首洙泗上進退綽有裕富貴調兒童嗔喜狙賦芧此同伐國問何乃至君子願出有用學不朽在斯舉勾龍元應以詩送王子友從譙綿竹之招語多見及次韻奉酬取友須四方不去誰汝縶君慙棧豆戀自了非駿骨王郎惠然來車從暖寒寂鸞鵠照清泚餘子可厮役手把一紙書髯兄我重客白虹貫襟袖新詩玉剖石女須翁絶憐茂苑蘭所宅殷勤記君意倚賴耕寸筆一朝存沒異悵恨頭欲白慰眼君自足有兒况英物盤谷宗斯文向來指正脉遺藁敬相授補亡綴離析此翁不可見此壻未易得獻萬佛圖為張雅州壽博大真人哉妙諦形而上林林總雛嬰萬生同負襁赴者不可數百川納溟漲隨取即隨給孰識無盡藏勝報如所證豈特妙好相龍天至幽嚴窺覘輒稽顙開圖萬名字只作一佛想風影可捕耶變現自愡恍俯應區中緣兹願固深廣君看朱兩轓非真亦非妄化身元宰官台符更兩兩祕言出寶笈其品名壽量一絲起爐薰洗耳鐘磬響搢笏為公讀萬劫一俯仰代上閬中章使君九區混軌文正寧垂衣裳公家轉洪鈞一氣斡混茫蠻夷奉琛貢月窟東扶桑至今有遺黎盛德登樂章溢慶久愈衍丹穴俱鸞凰祖烈肖挺挺德音續琅琅尊彛琢璠璵薦廟流中黃銅符專城居健翼翕不張黼座録故家雲路登方將省寺窺步武禁闥覘翺翔相門出鼎槐八葉有前芳一樗無所材擁腫蔽道傍門户岌重大俯首慙肯堂得邑萬山間晝夜鞭跛牂斗升賴急養山海祈深藏古人重已知漆炭固未償靴板庭趨初躔宿望煌煌委身大爐冶正懼呵不祥丹鼎儻可䑛雞犬同飛揚雞冠雄雞鬭不解血濺頭上冠强顔配二妙並樹栖梟鸞綘侯資少文禮樂責所難物生宇宙內故自安其安憫農秋苗掃地盡春苗破土出尚當積陳陳那得有菜色不知終年耕未了一日食守令民父母賤士但俯默木芙蓉秋光冷如氷秋花淡無色偶見此粲者濃艷照孤寂天寒翠袖薄那得在空谷東風嬖桃李倚樹三嘆息送薛司直赴行在所供職公家樞近公名在太史氏天方濬其源沃日勢未止郎君萬金産落筆粲珠琲尚當戰韋布未可議紈綺朝家録世舊往往收瑣尾而况用才升進擢不止此邦刑託平反哀矜蓋天意持此博親歡五鼎但口體富貴君勿疑信手著囊底别君行十年再見頽髮齒眼看上雲天歸耕慰憔悴猝猝萬里别念當一把臂風雪隔異縣跛馬不就轡安得凌風翰空齊坐歔欷短章說殷勤聊用篤友義送勾龍伯秋出幕守三榮得出字雅故非今朝兩門自金石山頭墮淚碑宰木共蕭瑟幕府蓋寶府球琳琅玕璧一一不可揀於君况夙昔常愧礫與瓦照映乏顔色於菟生則斑窺牛乳尚濕其傳祗斯文餘事博懸擲嘗覘賦千字誦之當搢笏戎索贊斗樞殺氣掩劍㦸舂容凝香地功用閴無迹忽驅兩轓去驚鴻眇南北專城豈不樂所樂在母側扶輿度春風霜毛未上幘更著摩挲手一起窮山瘠中年每患别連日足悵惜方酌江上杯送君又郊陌熟思令人老只有加餐食尚餘黃髮期好語為再出題宇文叔昭閲齊齊名豫所榜也有王正卿畫四時小景乾坤萍在江日月蟻旋磨吾生與化俱反照若觀火蠻觸鏖兩鬭臼圈聽一簸射鈎仍相國嬖者死於餓種瓜乃故侯蹶張終上佐支離竟能賢青黃未足賀炷香閲兹理萬事一笑可城南有豪士豈但雄于貨麒麟夢不到林沼計未左便齊愜清閟憑几了衆夥胸中大水鏡月皎雲破墮世故自起伏一瞬奔馬過金石波空流檜杉老不挫他年觀河性依然等髫鬌我友王郎子筆墨出笑唾酒酣灑素壁埃壒不敢涴春梢有餘妍秋林氣磊砢彈指四時具轉物子亦頗此機與我同妙出一關鎖豫生拙行世泥塗笑鱉跛但存閲世眼空花已成果從今識沉冥甘作枯株坐要知無所閲到岸乃旋柂吾友黃仲秉讀枚乘七發至所謂洞房清宫命曰寒熱之媒皓齒蛾眉命曰伐性之斧感而作詩以示豫豫謂乘嘗事吳已而去之梁斯言也殆為兩君發歟賢司馬長卿長門逺矣因次韻以申其意讀書必知書枯枿不足斧隻詞詣微隱連軸皆剩語枚生老賓客筆力散雹雨吳梁兩驕王橫甚闞哮虎編須笑直前調度豈兒女刈蕭培芳蓀逺鄭進韶舞斯文豈徒然丹石起病窳操瑟走齊門託身恐非所老濞竟斧砧埋骨無塊土梁亦殞牛禍廟社幾奪主至今存遺編快讀氣屢鼓長卿素佞人清芬愧蘭杜長門賦淫僻主心侈莫禦百年校賢鄙何啻跖與禹黃郎眼如月妙義窺肺腑拈出標雅針霏屑紛落鋸枚生其伯仲犬子但牧圉彥博為偷兒妄意作詩見貽次韻奉呈士窮百不諧所向輒墻壁堂堂百代師往往遭削跡閭閻侮出胯逆旅或爭席雖然炯炯心未易屈此膝閉門師唐虞清風入吾室千古閲頃暫八荒在几榻從教厭藜莧筆端有氷雪出處雲行天得喪駒過隙元龍吾畏友萬卷破丘索抱耒耕莽蒼天民所先覺平生湖海氣脊梁硬如鐵方其抵掌時南山虎可縛向來三年淹聊以六月息自豫得此士不作肝膽隔隱然當一面堅壘雄屹屹偷兒妄窺瞰不用苦笞掠與之塵生甑定自驚失色不知破衣中照人一尺玉開門恭執贄政恐子不欲因成一笑粲莫放百憂集子敬愛氈青何如我酒緑彥博見和暑中之作殊有新功復用韻謝風雅有正宗太山視丘垤識者了珉玉不爾逺堯桀咸韶久不作日月遭薄蝕空谷閉窈窕市倡矜半額誰知三百篇學仙要仙骨二南俱賢聖展卷神已接孝子或失愛淑婦有不答微言出宛轉幽憤破蘊結側耳無絃音䇿䇿風振葉少陵乃冢嫡豈止論瓜葛涪翁異代友俱作蟬蛻殼鼓旗付後山掌股戲孟獲眼明見賢宗我欲焚破篋明珠不易得收功在勤苶一洗蛙與黽騷壇許授職次韻姚宣孺見寄作吏無好懷寧食三年艾甚陋吾安之所𨽻乃都㑹文書如罵奴吞噫不敢對兩眉或小伸獨有公等在交臂露肝膽不復事容態月沼分賸馥風軒共晴快家餐聽相挽盤筯及筍菜但苦王事迫數離每增慨豈非造物意物莫能兩大况自摻裾别至今胸憒憒歸來未黔突日月倐逾邁書往得奇報已恐責留債丈夫志逺者遑恤吠所怪醉眼天不入一飽真細碎插貂與扶耒此理本相代持以敦薄夫是事付我輩次韻勾龍元應春歸知何時庭草一尺長風軟不起塵薄日如秋陽裘葛固異宜單衣已疏凉妍紅色事人攬鏡無餘粧青山只蒼然久要自不忘枯藤引我去栗留囀幽篁濯足江無波照眼竹有光展旗三伐鼓騷壇起榛荒垂髫伏窗几抵掌談皇王持之欲何施海禽眩鏗鏘風搖薜荔屋塵集芙蓉堂升斗尚何言正比鈎餌香投老遲問道欲覔間中忙社成蓮亦花㰱血記此章偶連日食雞夜夢有截一支者頗憐之有謂豫言雞之被烹酷過於是驚覺作此詩以自警平生不喜殺殺戒宿所欽纍此多病身蔬食慙未能連日乏庖供隻雞薦肴蒸異夢發宵驚截支血霪霪旁立為咨嗟或人惠嘉音見牛未見羊盍不推此心萬生均一愛豈較人與禽君看雞遭烹楚痛甚斧砧撫枕矍然悟此豈神所針驚魂欲違幹駭汗屢灑膺內懼仍自欣小差輒相懲白璧護微疵寧非憂之深長平四十萬一掃輕蟻蠅暴殄置不問天邪匪聾喑稔惡侈後罰幽誅毒炮燖冥冥思昔愆栗栗厲素襟贖魚有前章併以警侈淫以春草碧色分韻送朱師古知雒縣得色字二年客殊方送君我鄉邑豈不念家山對此好風月何以慰羇旅眼穿離鴻翼寄聲賀父老壺漿迓郊陌令君臺閣人九霄帝不隔新書嚴入縣驅驥就轅軛手持朱絲絃欲奏南風律此意寧不佳此事未易得姑置馴桑雉先辦繞床物相顧一大笑浮我當舉白長魚隨鰍蝦枯澤未容一作盈尺驚雷忽破地起視已無迹春湖波如天酒作鵝兒色映君眉間黃領此醉勿惜明朝出門看扁舟大江側海棠未開對酒作此春以花故妍花好不辱春漫山爛桃李由求蓋具臣國艷朝衆芳此花當不名芳園麗韶景㸃撿能幾根東風未披拂萬紅藏杳冥過客白眼看遂與凡木鄰一朝吐華艷天日為之醺緑樽有醇酌及兹託殷勤君看淮陰市豈有國元勛俗情傲未然花笑當不嗔見蛛絲戲作一絲架空居巧若出杼機彌綸不知勞終日周遭馳相彼造為艱中有鴟梟詩豈獨考其室為罝陷羣飛口腹共此纍坐嘆寧以疵微我畋漁意其端詎庖犧雨過助浮妄大小出琲璣疾風輕羣脆覷隙防藩籬摩挲一寸腹吾廬正于兹
