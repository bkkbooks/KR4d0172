body:
  text: 淡齊集卷三宋李流謙撰七言古詩無害弟之官梓林伯氏無虧序送之極兄詔之義豫言贅矣姑以其意而申言之吾家老仙一世師挺特風槩老不衰平生行巳有本末世人不知其天知急流勇退人恨早纎塵恐汙白玉姿精神强健腰腳輕鬖鬖白髮明鬢髭盤谷亭前一幅巾子掖孫攜翁笑歖無官一品錢滿屋汝輩持底逃寒饑指心一㸃物非物向來所貯惟不欺殷勤寶此徵後福如印劵契火灼龜我勤朴斫爾塗堊障護風雨期勿隳庭前百拜領翁語有毫髮愧非翁兒季也才力百倍豫天之報翁或在兹得其一體敏且强遇事雹落雷電馳莫嫌掾尉官職卑正欲小試觀異時弟兄贈言出寸丹豈但趣和同兒嬉伯氏有德君子哉發言不妄如發機叙文千字炯星日是病苦者之神醫願子銘几銘盤盂驊騮萬里未易期悲莫悲於生别離鴈序可忍霜風吹丈夫逺懷在門户正使蟻聚終奚為酒闌上馬飛鳥疾我亦安能空鬱鬱陳彥博擢第後歸拜先墓作此送之霜風著林不停吹天涯有客衣征衣問客今歸有何得一株老桂和根移讀書作文四十載浪走不啻萍在池束書隨身乃封户睥睨一甑蒙蛛絲傾囊千金勸少貶掉頭一笑吾寧饑學如木水有源本朝販夕售顔忸怩市倡青紅衒㕓陌窈窕深閉無由窺清詩學自稟繩律如嚼氷雪寒肝脾平生交遊半豪俊如此人物見者稀每拈佳句對客誦謂是古作非今為吾先君子壇級尊子來談笑容攀躋我從弱嵗同硯几如今攬鏡斑鬢髭笑渠常遭俗眼白短力不得相扶持前日提筆試外省我亦薄宦初來歸口占程文問中否强弩破葉劒截泥十月十日夜漏盡小奚驚夢來打扉云有吉報可速起倒穿衣裳喘而馳賀者巳滿坐無處拍手怪我來何遲淋漓一紙見名字倉卒未省來其誰喜歡不記語雜亂但說老眼天不眵明朝再拜酌酒賀屋角一丈飛虹霓書生一第蛻骨耳排風軼電方自兹阿兄地下喚不應門户藉子扶寒衰鄉閭朋舊夸地産洗眼晝繡增嘆嘻孤童匹馬顔色異關吏偷語驚且疑到家羊肥酒亦熟山頭松檟生光輝墳前百拜謝教育持身願報父母慈盤谷亭前白雪枝春意稍稍回芳蕤尊前不可無此客花雖不言意慘悽遲君急旋共一醉青衫入手無閒時觀小兒甕戲五嵗小兒初學步絶藝亦知天所賦想見九牛可倒曵已堪赤手擒猛虎向來甕戲真偉觀儻非目擊嗤浪語器小猶須百斤重挾以壯夫端恐仆笑談拈取兩足上電轉風旋疾如許便令百試百不失父兄從傍亦矜詡市人駭嘆俱失聲我自平生未曾覩武陽盛氣蓋全燕寄區狡謀踣二虜論年固已一倍長此兒誰肯噲等伍虎變鷹揚看異時經營一飽渾細事世人禀賦有特異常理未可求其故相秦童子才毁齒說項郎君方斷乳拜歸懷中笑橘墮羣戲道傍知李苦登門巳解叙通家對客頗能嗔字父劾鼠獄詞老吏服汗簡清規乃翁沮卓識有此更驚人彼以力稱吾未與行行三十成何事但耗太倉如雀鼠憮然自笑仍自憐强說功名在遲暮人言速成當不久如我定應千萬夀文南朱使君葬其故人鈐兵李侯士大夫髙其風義作詩美之亦賦一首翻手為雲覆手雨自昔嘗聞少陵語年來雅道更蕭颯反眼朋游成越楚便當續草絶交論誰與重尋懷舊賦一洗衰風振頽敗我為使君髙此舉故人流落死未葬藁殯蕭蕭泣行路破棺露骨沙草秋紙錢號風白日暮傷心重念百年交灑涕親營一抔土送喪不煩司𨽻傳擇地當鄰烈士墓龜趺大字日星煥馬鬛新封鬼神護恩流枯胔河海深氣激頑夫金石沮漬綿髙義古所尚掛劒初心吾敢負張陳未死巳相賊笑彼安能保身後九原可作定慨然想見沾襟淚如注清溝突起驚創見繡被吹來自何許區區論報未足道此段徒能戲兒女滄溟可涸山可磨我詩自可傳千古明月篇人言明月好明月無私照海水深不測明月照無極九州浩茫茫明月無遺光誰家髙樓三百尺上有浮雲翳突兀浮雲翳月月不知樓頭美人空歎息空歎息何當赤手披雲師放出清光如白日謝宇文正甫惠硯一硯能令一生足感君投贈重金玉人言當為文字祥夜夜燈花寒吐粟提攜不到白玉除安能細碎箋蟲魚為君試草大鵬賦九萬里風生須㬰題覺庵疾痛呻呼癢搔抑人言是覺豈真覺問君非痛非癢時覺何所之了不識要知真覺無不覺如日出海照萬國雖然亦莫如是解政恐雙睛翳金屑扣庵欲覓住庵人此人此庵何地著蒲團紙帳睡未足百蟲薨薨殘月白六窗玲瓏境超廓箇中自有真消息兔走君前君不知俊鶻豪鷹差一髮張周倚下第作此唁之將軍百戰摧驕虜向來射石如射虎分封不得一丸土晚嵗功名成夢語古來志士窮者多唾壺擊碎奈命何平生道力輕羣魔巨艦豈肯搖微波大千與我俱幻爾是中無處容悲喜西方仙人不可詆破除憂患正須此送隂次公赴榮州學官撑腸萬卷不救饑書生何苦攻書為如烹太牢飲醇酒無此肝肺無由知隂侯把筆耕六籍短檠熒熒照頭白又攜束書作官去此生此債寧終極大州小州疲征輸文書急急如罵奴家無二頃歸未可泮宫水冷樂有餘使君喜士比金玉知子姓名吾所屬定當屣履迎王符勿憂廣文飯不足中秋玩月以東坡詩不擇茅簷與市樓况我官居似蓬島為韻得似字十年中秋不見月譬之去國唯喜似朝來氛翳崩厥角天公粲然一啓齒夕月可占此其祥枯龜未必知許事黃昏天宇開琉璃出雲微覘摶空勢要人故自作遲遲悵望豈知空嵗嵗玉峰一掌開喬嶽銀海千尋湧平地光吞箕斗不自持影薄魚龍無處避烟林差差鳥未定露草涓涓螢暗墜唯我心源初不動炯炯摩尼照濁水四門宏開衆隂伏六藝髙懸百家廢餘輝切勿丐老蚌尤物溺人非所貴何如美酒入詩腸化作錦囊珠字字南樓萬丈髙切雲彈壓山川據要㑹當年老子興不淺閒據胡床想風味今人未必輸古人况復我友半傑士凌晨尺紙飛羽檄一約而來羶集蟻夜如何其不須問酌盡滄溟放君起酒酣起舞踏寒影滿地瓊瑶驚破碎仙娥手拊丹桂樹裛裛天香落襟袂洞天六六我所家摩拍洪崖肩綺季霞雲不著著青衫生恐羣仙笑憔悴旁人勸我聊爾耳仙娥好意君勿阻海鯨背穩風力强看我轉頭三萬里送兄長赴蓬州職官人家栽花為春忙我家種柏求蒼蒼柏生如蓋䕃百畝癡紅騃紫無殘香常言直道我家物篋櫝于今藏手澤拈來灑涕不忍看分付伯兄金玉質去天一尺古蓬州線路雲端客自愁年來在處熬膏火翻愛此地真瀛洲同居患貧别則惡苦心害性空悽惻不及林中反哺烏日暮歸來却同集石鈞父之官火井乞詩贈行君家嶙峋兩氷柱黃塵漲天不敢汙阿雲醉卧呼不譍斷碑零落荒阡雨君今去作火井縣山中嬰兒待慈母前日一旱不堪說危喘僅存無半縷祝君到官百不問置酒先須酌田父從來和氣致豐年一笑能令粟盈庾我方投犁學為吏人言未可紙上語今人古人豈相逺力行所知心自許惟君可聞我可言明日一尊黃鵠舉送虞提宫桃花未落春水生百川合流如鏡平江神約束蛟與鰐東閣郎君將母行一帆萬里無荆越非霧非烟鎖雙闕只今手持天下柄相公身是稷與卨潭潭大府琳琅都翻翻㦸帶纒金鋪朝回坐對彩衣舞天上應有人間無相門出相古來有周公在前魯公後看君父子名一時野人甘作扶犁手池上雨漲秋池三尺水亦有秋風到池裏荷花顔色不如故零亂寒蘆并折葦鸂鶒飛來依晚紅蕩槳徐徐莫驚起擘蓬截藕尚堪餐一醉何辭碧筒美挽王隱君仁田義鉏德其種晚嵗坐看苗幪幪先生一去不可識但喜郎君實麟鳯一線微言驚道喪九鼎斯文賴君重聖門濤瀾無畔岸我嘗操舟怯奔湧中流奪魄不敢進亂流而濟渠甚勇射鼷强弩勿妄發彈雀眀珠戒輕用峩冠進之白玉堂天髙㑹借長風送細尋耒耨竟誰力銍艾猶傳掛丘壠朝來示我幽宫刻再拜整冠輒成誦乃知先生一世士學如荀楊文屈宋四邊海宴中國尊已嘆銅駝沒荒茸轉頭飲馬長城下共指先幾世爭竦竟不一官止韋布大澤深丘老梁棟􅡠江濫觴固未快末流與海爭澒洞我聞天窮不再世卜以郎君言必中九亰幽幽復何憾一杯徑往澆餘痛薤歌嗚咽不成聲但覺風乾雲亦凍挽王夫人維古女士都可見過眼絶無一佳傳客來授我一編書疾讀不知雙涕泫夫人有子鳴斯文吾從崑崙識河漢胸中能貯百卷書此豈只用裙襦看前朝大老尊夫人鬼蜮不量作兒玩寒心仰屋竊嘆語志士如今刀斫案唐安治中祿不薄十畝東湖紅爛漫輕車在門忽折軸恨如秋江盛不滿史筆在手吾宗英寧愛一詞沒彤管人生八十善可書好夢仍長不為短寄題天台臨海白鶴廟康濟泉為顔魯子少卿作將軍射虎不射石石作於菟能沒鏑翻然再控弓不力俊鶻豪鷹眼前失兩泉後先今抗行何物使之令人驚泉出在山流在地却似只從方寸生沉沉玉甃碧雙峙旱為甘霖渴為醴白鶴千年歸不歸半夜空山泣神鬼令君為政無近名天以斯泉印其清泉邊有樹仍蔽芾他日思君於此地雲月篇雲在山月在水合和二物誰遣使雲收但有千巑岏月落惟餘一清泚向來為同復為異欲說誰鉗三尺喙與君臨流共一笑影墮澄泓實相似故應拄杖偶然來那得泉中覓居士人間八月秋更老桂樹無風波不滓碧筒為樽酌清醥瓊瑶嗽腸雪氷齒江妃為豫舞凌波老鶴不眠亦孤唳酒醒忽憶三峰游目光巳在鯨魚背王夷甫言目光在牛背上豫觀夷甫之所為直牛背兒爾次韻張通甫見貽插架茫茫紛四部莫向離騷泥蘅杜文章何處如有神心手相隨鷹搦兔長卿醉死文君壚渠輩但可折簡呼淺慙入俚深入僻纎麗惡淫寒則枯欲張吾軍子可恃楚璞呈前燕石恥擘波飛去定神龍汗血牽來真驥子人物有此未易求頗將擷英泛其流朝來車從照人熱乃肯訪我投林丘詞華薄技無多道少作吾今知悔早相期聖處下工夫一念超然蠲熱惱次韻宋才夫麒麟丹青了無夢香火因緣巳成癖一堂風冷自分明誰撮虛空強摹畫蔬食鼎烹均一茹笑取菅麻視繒帛風幡自作此分别蛛掛一絲猶可惜大千元不一毫隔何處往來勞轡䇿冥鴻逺矣方控弦一筯銀絲好看客王子友示詩次其韻先生不憂窮到骨唯惜修名易埃滅平生窗几辛勤功語及雲程輒嗚咽冷曹晨炊有不續逺道相從笑回曲微言不足溫飽人羡渠著斗量珠玉風霜嵗晚念慈母黃葉翩翩積行路烹雞奉餐蔬自煮繄我獨無悲此語大厦千間要封植期君當作垂天翼朋友之樂可樂不昔人願封萬户侯送黃仲武尉青城書生一第如登天如君何啻坂走圓要知筆頭有河漢向來元未窺微瀾得官莫厭百僚底水激三千從此始白藤肩輿照路光小慰當年擇鄰意岷山勢壓西南坤霞裾風袂潛仙靈公餘有暇縱幽討為我一弔張白雲失題身長七尺面一尺眼若電光鬢若棘腰間大羽不妄發長空弦落鳥隨踣漢家天子方少年東平月窟西酒泉不須武陽兵十萬不用都尉卒五千願得君王一寸鐵斷取樓蘭獻北闕笑提金印歸去來五湖茫茫波浸月送楊嗣清國録出倅廣漢岱宗峥嶸乃為嶽丈夫可不志特達平生論人每如此楊子入眼吁可愕清班突見頎而長開口四坐薄曉霜自言磈磊不可茹正須一吐空肝腸太學黃虀了殘業又攜束書去挈挈偃㦸韜戈吾巳衰快刀斫案子甚決古人作事令人驚今人豈不如古人折枝要是不為爾長劒在手無蛟鯨楊子楊子吾所許舉杯酌君肝膽露期君直到黃髮時無使英名一塵汙書薛公肅山齊愛山仍以山名齊問山何許簷周回午窗睡足一笑起風吹市聲不到耳插貂鳴玉主人事山不撩君君自戲細思却合幽人居分我半几來讀書送楊元功判司碌碌塵埃間可能老此橫海鱣一朝雷雨插兩翰九江風髙浪如屋萬里扁舟帆一幅夢魂先繞湖山緑玉除有地容著身且為岷峨起斯文莫來憔悴隨雞羣送王總卿北風號霜脫羣木送客東門車萬軸城中人家作兒啼若為四角生華轂公今未上九天上身雖去此猶在蜀邊頭張頤萬虎兕一食不飽吼振谷况聞天驕屢窺瞰往往危機生隱伏欲寬九重宵旰念分付若人一䕫足錢如流水粟如雨指顧之間嘆神速公方攬轡使一道百吏毛寒頸仍縮隳者振職汙者澄如臨鬼神不敢瀆峩冠置之一堂上不勞折箠四夷服天生此材必此用楩楠本為渠渠屋孤生蒙庇逾嵗月况復鴒原辱甄録明年春風二三月更看枯根回寸緑送樊漕移帥瀘南金龍直嵗當𤣥冥憶公剖竹江陽城碧雞坊中駐千騎裁詩餞送雙旌行逢人到處說項斯豈賤子故唯先盟一官泮水謝推挽挾䇿仍許從諸生隻詞華衮豈易得再以薦墨光姓名一朝去我生怊悵呱呱欲作啼雛嬰向來宦海四十年白首一節無斜傾只今耆舊直可數曷不往矣司機衡詔書連年到西蜀歸田奏上羣兒驚西南夷蛋惟稽顙男耕女織鼓不鳴廟堂徹桑戒無事正以卧護煩老成遐荒雖或殊習俗悅安惡擾皆其情不須談兵但飲酒帥非爾帥乃父兄秋光如水浸行色牙纛獵獵風有聲氊褐迎道沸羣獠弓刀繞帳森千兵丈夫未遂調燮事華皓得此亦足榮觀公畜德有餘地如海既酌隨復盈晚福衮衮蓋未艾善頌何以歌簫笙更須書考二十四永與松鶴同堅清王正卿為作山水小軸作此促之王郎妙墨石剖璧正爾不從著意得十日一水五日石猶笑前人風雨疾溪藤小幅白雪光向來數筆衣不裳濁河未清子未忙但恐竟軸海變桑送丁子昭左司湖南運副昔年九轉金精熒鸞幢鵠節飛青冥偶同雞犬䑛殘粒至今未脫塵中塵平生不識紫芝面邂逅天涯欣一見安有斯人可棄捐置身只合金鑾殿急流勇退人所嘆上書屢請色不難浩然笑涉重湖去一節映照清湘寒人生分願各有賦鳩鵬何必勞相慕期君廊廟我巖壑他日氷霜同晚暮送樊眉州我先君子官于涪一時賢僚今在不唯公直節貫華皓千尺夀檜橫霜秋丈人靜聽請具陳平生契義骨肉侔簡池解組過鄉縣劇飲不去公遮留似是兄弟姓則殊此先君送眉州詩語也詩藁半破猶勤收合行使符蔡山下先後召杜騰民謳吾家萬松䕃黃土公方千騎驅華輈十年不見此邂逅窮冬雨雪寒颼飀未明投刺候門下老閽竊語來何求栁州先友一一數山陽鄰笛令人愁岷峨氣象抗湖海近日人物幾窮搜如公當置文石陛一麾乃付近古州蘇家名稱震戎夏如嵩降甫尼生丘文獻可徵况美俗黃堂坐嘯萬事休公餘兵衛繞畫㦸妙香一縷鈴齊幽神交千載尚誰可子韓子文著床頭送蘇給事出知太平州一代文章有圗籙天賜之履征九服奉牲乞盟走珠玉吳狂楚僭非此族至今人望壇坫尊風流文采被諸孫丈人似是更酷似大河一𣲖來崑崙華途不須移步到憂國憂君心日老匹馬朝行人避驄短奏宵歸自焚藁一朝倦拜青鎖門分符端欲宣上恩再拜願回批勑手却與疲瘵豐雞豚青絲絡頭甘半菽丈夫出處不碌碌我亦昨夜夢山靈苦喚西歸理松菊宣孺斫庭前蘆葦見山有薝蔔入坐中示詩次其韻扶搖何啻九萬里盍不往作蛟螭騰笑我真為折腰尉如君雅稱哦詩丞輒班下寮愧連璧屢愛新詩工琢氷斫林與山出眉目欲喚逋客招野僧晚香入簾恨悒悒坐恐瘦骨成稜稜賞幽豈足廢官事净社久冷從公興芙渠薝蔔一家耳相看未易分級層來詩云豫嘗游藕花村而舍薝蔔故云和錢大虛清映亭韻西風振槁如發蒙危亭創見心眼工融成水月一合相有似猛火烹鉛銅是時素節屬重九喚客一醉萸菊同夜深跳魚亂珂璧起舞大叫騎鯨公令君心瀾了不起摩尼返照萬事通拄頤但覺朝氣爽繞腰未羡黃金重髙情偶與幽賞㑹妙語倒㵼瓊瑰胸誰將玉笛吹曉月透袂氷濃禁不徹歸來夢想通明觀一片湖光眼中見送吳志行監稅乃翁儒林大宗匠造化為爐鑄卿相坐與文皇致太平玉骨如塵汾水上斯文未喪不須嗟仍喜郎君書起家等閒一第唾手得以此報翁其未邪判北門事首峩豸歷階而升姑少待斗米迫人成逺征雲夢胸襟何足芥霜風獵獵吹征衣登山臨水傷别離丈夫富貴恐不免萬里扶搖方自兹送王君弼寺丞出守臨邛昔人帝城願一入君今翩翩去何亟向來一念君親同夜夢倚門人髮白人生適意富貴齊况是求歸真得歸江風飽帆不可挽恰恰春好花濃時君於文字識源委筆勢逼人殊亹亹每來握臂相與言我屢㸃頭興嘆喟三年厭踏東華塵聽雞走馬常踆踆黑頭使君豈不貴腰間見綬我亦驚蜀吳相望八千里到家遙想慈顔喜上堂跪觴下堂拜應有輝光照庭戺白鶴勝峰記昔游醉墨淋漓在上頭君行有暇試尋覓不知已掃黃泥不比觀仲結諸公課會皆勍敵也行就舉南宫作此贈之文章末流乃科舉剽東掠西何等語得者矜誇失者羞其中往往分賢否一官垂涎儻不勉譬之北轅求適楚諸君堂堂萬騎將折箠自足笞狂虜收拾波瀾著盆盎却恐蛟龍愁窘步信手拈來即三昧安用區區備先具朝窗暮几不停綴寶玉牽聯鬭竒富論如過秦有古意賦擬兩都多傑句朝來次第出示我兩耳卓槊驚咸濩華歆便可置龍頭牧之豈肯居第五我駭虛弦痛方定未暇相從執旗鼓請君勿見小敵怯一戰而霸在此舉歸來净洗科場業别與斯文立門户送任漕赴召宋十一葉聖天子有臣伊皋佐其理鏖兵孽雛褫天戮手把降幡屢搖尾周宣功大心愈小盈而持之甚持水龍墀端笏拜疏言有室大競唯多士蒼蛟淵潛百鱗駭乳兕林蹲樵牧止臣舉所知匪臣私取之鄉國大瑰偉后皇曰嘻毋留行奔雷將車電搖幟先生捧詔色不動在泰拔茅以其彚向來輸寫萬瀆海人笑一蠡測涯涘古人成人責禮樂房杜頳顔諸葛死屠龍覓肝薦雕俎不如河魴甘且㫖卑之試為目睫論欲識强羸占國勢議和當有守和䇿偃兵適恐造兵耳焦頭常居曲突上有言復吞胸磊碨先生領略首屢肯懸知不作三窟計欣然拔劒為公舞舞罷颯颯回風起孤生飄零踰嵗月感慨鰍蝦共泥滓石田蝗蟊仍數熯抱耒空山欲何俟叔孫大猾誠謬妄狗監文章亦巴鄙黃金儻築燕人臺為問何如從隗始代送陳都大赴召庭前梧葉西風起三峽秋光净如洗仙帆一舸此入覲靈鼉擊鼓馮夷喜七閩山水天下竒擢秀搴英瑞斯世要知曠代乃一見鳯巢阿閣麟游畤彤庭紫闥足夷步萬里西來將使指西南榷牧古所重隂削盜資寬國計臺家選任皆偉人逺極隴秦包越嶲我公經略出咳唾凛凛霜威肅頽靡飛聲一日到冕旒四輦促還不留轡從來大材須大用豈有如公才一使東夷盟血猶未乾豺豹固應防囓噬公歸為國須逺謀平躋兩禁躐三事飄零孤翮得廣厦晨啄暮栖方竊庇驪駒清唱不忍聞東望慨然增歎喟他時黃閣未遐遺猶願登堂拜簪履送張漢州赴召詔書揮翰日邊來蜀有巨儒星杓魁胸中深博布河漢古底霹靂降霆雷先天遡流得絶𣲖大物不敢藏胚胎回薄一氣在籠絡竒神怪魃生愁哀十年縳屋蒼崖隈脫幘擲去一笑咍刺史驚呼失匕筯遮道自挽封章回先生閉門壁愈堅髙風一日興澆頽矯然輕世豈我事此學施用真難哉行止在天不在我風動水涌如挽推嗣皇繼聖登禹稷豈有此士遺蒿萊二年勞公湖上行看鵝酌酒春風臺手摩嬰雛斧貪猾蛟鰐半束角與腮古人讀易元用易羲文祕妙今寒灰漢儒妖異陷荒濶但與瞽史相喧豗子雲晚出造根極後生蜉撼輕嘲詼安樂老翁獨稽首𤣥鑰直付先生開向來緒言見編簡去去勳業看崔嵬彌綸乃是第一手下者乃取支崩摧賔閣顧豫若嗟異贈語愧乏珠瓊瑰眼看飛帆不得去天涯逐食嗟徘徊送朝子西提刑赴召君家如河出崑崙橫貫中國浮乾坤鼎彛勳績爛星斗編簡文字垂瑶琨到海喧豗勢愈壯約束蛟蜃驅鼉黿略分涓流溉下土草木蕃潤資其恩先生繡衣吹霜風一道生齒關寢飱人家春園滿桃李隨處秋社肥雞豚智效一官可能爾尚於勝處非所論胸中人物自著眼倀倀待相嗤彼昏古人過人本如此事業自是為根元我知先生在廊廟定不碌碌為澄渾頗恨未識元魯山一紙藻藉無媒援只今相送九天去風在下矣何軒軒青雲託附可無意欲兒女語吐復吞浩歌一曲豁清思援筆江海蛟龍奔寄送梁子輔赴召山嶽自髙百谷下向來無物使之者驊騮合奉鸞和車豈與黔蹄同一駕英竒絶代難小了泥滓投之輒悲咤一朝拔去不可扼震地風雷怯凌跨泮宫先生自超特鼎甲聲稱低董賈眼明奎畫照琬琰萬喙夸呼海傾瀉胡為不即天上去識者怪吁狂者罵或傳鳯篆來日邊流水為車龍即馬只應故是霄漢人腐鼠未足鵷雛嚇九江水暖桃花肥風色不驚神所借只今岷峨抗湖海貫玉編珠炯相射臺家議和不議戰太平有象須藻藉小却猶當白玉堂縱步黃扉方食蔗嗟豫骯髒每自哂蚤年謾想牛心炙一官漫浪不可說可能更索山人價五年投閒食不飽攬鏡顛毛輒生怕道塗衆鬼同揶揄口不能酬面空赭人生升沉亦何恨但喜龍虎新變化異時擊壤為幸民一犁亦願從耕稼金華夫子吾勝友接武風雲共閒暇未應厚祿絶來書寄聲紙尾煩多謝送何子應少卿赴召持竿野叟踏帝腹太史占星驚變色白衣山人侍黃衣軍中指㸃相嘆息雲龍契遇固疇曩千載一合非人力羊裘眠沙竟何補坐視生民自肥瘠功成乞身香案前歸侣松喬未為失我公學傳無盡翁束髮英名撼區域杲日潛光衆未覩公獨扶輪上霄極此時際㑹如二子鼎鉉鈞衡本公物若為流落四十年豈厭蓬壺薄瀛渤龍飛天子第一載收召耆俊誠汲汲遙知問膳大明宫論士到公先指屈追鋒一日來劒外破浪帆開矢離括朝廷未漆月支首抱戈虎旅衣生虱嫠不恤緯憂宗周寧有裙襦能念國堂堂甲兵滿胸臆可無竒謀寬旰食我故人子得深知平生一鏃未破鏑欲隨公去邈楚越恨不身邊插雙翮叔孫區區進大猾謬謂書生用奚益古來萬里知戎情何必縵胡半縫掖願公入對明光宫西南豪俊手推出我非其人敢觖望市駿千金先市骨挽李子和知縣盤谷先生壇級尊萬夫操槊輒斂魂黃堂晝嚴繞華㦸往往君來容打門髙談錯起風襲塵醉眼相視月照樽歸來拊掌此快士外無圭角中甚渾吾家宰樹巳拱把君亦荒殯生棘榛小阮弟兄吾所敬霧谷養就虎豹文銜君至恩深到骨手書盛德表九原遣奴持送急開讀字字璀爛光瑶琨兼金餽魚客何陋寶玉圍腰吾敢嗔九牛未可一毛數大壑才以半缶論嶄然二雛亦竒俊造物兩眼如許明由來孝弟動鬼神宦學所自為根源向來施設本此耳欲著吾說聽者驚春風相送緑草野為君一慟河漢翻送夔路費漕晚風酣酣吹栁花長亭送客日欲斜春草春波兩愁極雲馳千騎誰能遮先生要是世所寶大貝白璧金丹砂生當龍墀侍黃繖不爾鳯閣揮白麻州麾再把亦何事但見桃李春家家后皇顧逺食每旰一節又付䕫與巴荒山如石不可鑿要看雨露滋槁芽黃金作甌覆名字軟蒲作輪駕輕車調和元氣須此手典謨勳烈非誕夸小夫朽質謝鐫削尺寸不能供負義馬羣一顧覺差異便遣萬里奔風沙阿房變色人未信勉之霄漢參飛霞僕夫在門輒休駕揆力不足慙蟾蛙雖然此意萬鈞重自矢報稱其未邪眼看帆楫不得去縛以微官成嘆嗟他時黃闥眷簪舄猶幸姓氏塵頰牙代人上李制參生辰乾坤不許一塵隔誰倒天河濯秋色鵠鷺心性氷雪魂造物著意不倉卒星斗並煥仰斯文準繩不愆宗絶德當年只作充閭喜不知此人係邦國錦囊名章小游戲上公啓齒嘆孤出太白要是天上人少陵屢作諸侯客朝來日照黃金巵諸生登堂作生日鳯麟嫓德公厭聞丹砂續年笑無益試問公家白髮翁五千微言不老術挽安嶽李令司馬家兒何等兒家居令人撞壞之長嘯羯奴一繩縻校三十里嗟巳遲新亭收涕僅自支下者朽棟當積危君看黃髮掩面時此殆天意非人為一時埃壒埋精竒褐衣懷珍去而違老樵攜畚動嶽祗委體氊廬玉投泥向來捫虱氣吐霓元子眼膜無金箆縱狼山林血黔黎慘淡萬古關河悲先生異代論盛衰使當若時未可知指揮王謝驅羣雞狂童豈勞折箠笞中興天子周宣齊炳耀常武蒸民詩囊封未報九地歸恨無偉烈光鐘彛我思若人涕沾衣太阿不如兩錢錐魚復陳石存遺基故智猶為竪子窺斯文未泯神所持復有英雄發噓欷别臨邛知縣李允成周公山前傾蓋時再嵗通家同骨肉紫巖樓畔又從容四方上下如相逐別來每恨無見日要見夙緣償未足公來臨邛㺯鳴琴一官季氏仍寮末移將逺期為近期天遣從公恐不速尺書日夜苦相換何止已多如笋束淹留自春竟徂冬出門如物縶兩腳一朝決去水赴壑夢魂先到鶴山側下車一見開兩眼喜色分明破愁頰約我不來公即來一日不見公不樂將閒文書猛撥置喚好朋友細欵曲疾邪憤世時抵掌悵往悲今忽嚬蹙狂吞壯飲無空樽長句短章幾滿軸尊賢下士公盛德忘義忘年吾敢辱百年四海幾知巳為公悲歌起衰俗明朝翩翩隨社燕欲去暫留情最惡黃花滿頭約重來聞說床頭酒方熟
