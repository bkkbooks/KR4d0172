body:
  text: 淡齋集卷四宋李流謙撰七言古詩送才夫之成都客有可人期不來昔人抱恨長悠哉可得宦遊同一處家有如願令人猜郊東郊西踏春色醉舞淋浪花插額門前紫騮嘶東風却折垂楊供馬䇿如君豈久居塵泥好處人知天亦知我非夔才識宫羽此言欲驗須他時長橋離愁濕煙雨去日更將歸日數從今把盞與題詩故應半是思君語白雲先生魯叶殿丞交之父有隱節其居徽考所賜旁為魏髙士守一庵髙士上皇所賔禮庵亦賜地也髙士亡矣而白雲之後至食不給過之慨然為賦此篇白雲先生去何從煙霞髙人繼其蹤兩朝恩光照巖穴映墻竹柏清隂同髙人已注丹臺籍白雲子孫食不給人生有纍豈妻孥生羡金門羽衣客林夫體中不佳而能不廢翰墨且蒙以文軸見教其天性所嗜如此敬嘆不已既勿藥作詩賀之瓠肥不必緣粳核倒床鼾睡掀四壁飯山詩好自應瘦騎省賦成髮先白公子翩翩鍾鼎家宜有騷人歌錦瑟數從癯儒弄文字坐令二竪喜投隙藥褁關心始置之往往呻吟出圭璧由來物理論根種虎生則斑鷹則擊浣腸濯胃固佳手愈風却痁非此力東風吹園花正開新禽向人語磔磔疾來相就破除之萬事可拚春可惜賀王制置敷學之除太霄傑觀凌空起非霧非煙護珠蘂萬靈操戟夾危棟中有丹書并緑字走雲飛雨澤地産合璧聨珠煥宸緯堯圖羲墳共彪炳禹訓湯銘角雄偉岡陵松柏老如鐡華榜丹青新若洗論思欲侍聖天子寓直正須真學士一時盛選孰睥睨百代耆儒屬宸倚惟有我公瑞河嶽早與靈鼇爭贔屭絲綸飛藻傾兩禁弓鉞專方雄萬騎從容裘帶淨岷隴零落旗矛清筰嶲疇庸王府侈三晝告喜郵音傳一紙升華祕宇階召拜正位台符慰瞻徯妄論斯文本神物輕發其藏觸天恚開物成務非翰墨賁飾乾坤乃能事周書九誥削邪叛一品會昌夷僭詭願公亟從衮舄歸早就典謨垂萬世迂愚把筆自齠齓裂紙悲鳴蛩蚓比酸寒一尉不可説尺璧光隂分馬箠待公勳業映彛鼎勉葺巴蕪歌俊偉絲麻雖美收蒯菅尚冀風人採輿𨽻文約用韻請别作此留之并柬簽判李丈平生心知我與君餘子碌碌耳未聞相思輒命嵇吕駕醉飲仍開孟公門山城牢落情易動翻然便作思家夢笑言伏臘未一有歸辦黃虀三百甕君才何止吞四溟新詩誦過牙生津猗那清廟復在眼此作未許秦火焚吾家丈人似居易落筆成章了無諱相從更作百篇詩且盡中山千日醉留黃思忠可人如君不易致惠然而來此天意往往文字雜嘯歌兒輩倚墻吾敢訶向來邂逅無此欵曲水風流嗟未逺愛君欲留君不留一聞説歸我先愁亦知主人無德戀多情合覻青山靣况聞漲江浪翻雷轂生四角若為推留君信自非人力君雖欲去不可得壽仲秉侍郎今朝雲裾下星漢明日氷輪十分滿今朝海實薦蟠桃明日潮頭千丈髙君才與月爭澄爽君氣如潮同浩放如何不著廊廟中不是考槃巖壑樣十年立朝兒輩驚前日欲去親留行我雖流落未足恨世間那有此友生躋堂奉觴祝耆耉仙骨應須飲仙酒潮聲不斷月長圓嵗嵗來為主人壽挽張主簿嘗聞種德如種木百年培壅猶不足君看牛羊踐履地豈有寸椽撑破屋我方撮髮訪耆舊已聞定國多隂德崑峯薦璧淵出珠天敕百靈介多福後來源委誰導之刋木濬川君有力一官縛死不須説天定勝人理則必鵷雛覽輝下其庭一舉萬里羣鳥伏我耕我穫我其食夸者流涎疑者奪桃李蔭繁春不留瓊瑰夢斷月空白煌煌貂冕侈殊渥尚冀他時賁幽宅死而不忘誰者是嗚呼公乎妥沈魄青樓行踏空驕馬蹄鐡踣萬里一鞭驚滅沒青樓美人顔如花笑揭珠簾邀客入小槽珠溜紅滴滴左持瓊觴右瑶瑟得君一笑妾願足不用真珠量斗斛歌聲未闋杯未擲城上歸鴉帶寒日蒼頭進馬莫留連别院笙歌擁門立紫薇花庭前紫薇初作花容華婉婉明朝霞何人得間不耐事聽取蜂蝶來喧譁絲綸閣下文書靜能與微郎破孤悶一般草木有窮通冷笑黃花伴陶令公歸行送王顯謨我從職方究區域江漢滔滔紀南國厥田上上蓋名壤其人落落亦代出卧龍偉烈雄鼎峙雛鳯英稱冠簮盍峴山風流亘千祀鹿門隱槩輕九牧地靈不與人存亡王脈依然鍾傑特先生後出掩前哲天公著手自斫削如入宗廟識彛鼎如開武庫見矛戟早以命士戰羣士不怯小敵勇大敵三年博士嗟洄沉一等巍科登岌嶪銅符千里小遊戲瑞節三川遍揚厯欲歌德業愧蜩聒妄覘設施歎蠡測愛民如兒吏不擾以身為律人自服恩波春醲疲瘵蘇美最飈馳冕旒徹賜環成命衆聽聳總計優除羣論咽公止一方為福星公歸天下作膏澤一方天下有大小公則不校我所惜周公居東逾嵗月東人願留惜不發西人衮舄待公歸鴻飛遵渚歌九罭君子所至民父母在此無惡彼無斁我雖東人願公歸不敢自私笑其狹援毫為賦公歸行眀日羽旄風獵獵送孫逺仲知録解官歸洪雅錦官碌碌牛馬走邂逅僧廬欣握手嘗憶觀燈夜相過一時勝輩同樽酒孤雲岑絶西南陬牢落重來説舊遊不知宦情薄如紙掉頭忽作商聲謳蚤年提筆戰多士晚嵗功名夢相似底事人生真足夸華髮猶能彩衣戲霜空木脫秋山明髙風駕帆秋浪輕細雨重陽好天氣紅茰紫菊正思君用黎州梅字韻作詩送之西風舉扇揮浮埃十年水曲并山隈一朝尺一天上來臺家擇才搜偉瑰豫樟連雲誰手栽梁千尺觀崢嶸哉收拾虹霓小低徊如取萬海納一杯濟時䇿略招譏詼翳氛卷盡青天開還如調鼎須鹽梅衆星錯落環杓魁欲談近事樹頰頦旗矛委塵槍卧苔禍生冥冥戒其胎如公氣象天可回髙論疾如破山雷毋使瓶罄空耻罍笑渠佩玉救焚煨往矣急挽波之頽文約既行復作此送之登山臨水逺送君征鴻掠天不堪聞臨岐握手惜此别車已載脂僕在門驪歌未殘心欲動剪燭夜談如昨夢茂林巳掃山隂迹地黃猶注床頭甕明朝咫尺隔滄溟煙波渺渺迷羌津我亦歸來念離索孤坐手取柏子焚君絶畛畦我平易肝膽相傾無復諱春風萬斛撒金蓮遲君更作連宵醉答何積中先生古心寄玄漠老松矯矯石鑿鑿巳欣淨社得勝友更枉髙軒出竒作山林軒冕無間然造物從公意所便決科縱未吞餘子著書亦足垂千年宋文約有謁於邡江不遂而歸復用韻見貽以此答之中山老頴初得君姫姓之毛遂無聞疏封新賜管城爵待詔嘗趨金馬門胡為得此色為動引赴幽人春草夢新詩更許窺豹管淺識當憑發醯甕生平雅懷吞八溟赤腳欲踏河漢津自慚不是虎頭相未能徑取龍庭焚談今説古吾所易况值聖明初不諱快書禮樂三千言白獸先贏一樽醉宋才夫作詩自言作縣之况以冷官為可樂戲用韻答之雲霄自許當比肩豈料坎壈逢針氊求魚乃欲從沮洳吞舟見之定囅然諸生但解笑便腹好事誰肯與酒錢吹寒固自乏暖律使物又恨無神鞭君方踏筵觀艷舞我正閉戶甘草玄間忙亦復分苦樂溫醲淡泊無非緣立春日有感用彥博韻雙轂行天不停轡世間那得西流水麻姑昨夜呼我飲笑説海塵飛幾幾百年半見韶華濃不妨老子頰仍紅人生萬事有起伏緩聼髙歌酌春醁晚春有感答才夫上巳之作二首牡丹猶欲扳春住開到荼䕷春遂去黃蜂白蝶太癡生抵死嗔風復嗔雨少年世味如蜜甜邇來唯覺食無鹽只應餘習掃未盡一春病酒常厭厭劉郎愛花被花惱玄都觀裏詩應好騷人從古多間愁仍是清樽破除了禁詩如禁秋蟲鳴止酒如止長淮傾人生貴在適意爾孰知蜾螺與螟蛉宋才夫解官作此送之與君異姓如兄弟鴈塔相擕有名字西來山城始傾蓋北去塞垣仍握臂渥窪來者天馬駒八鸞六轡供皇輿朝觴瑶池夕玄圃豈願地下粒與芻三年妙旨發徽軫飽聼村村人説尹政成通籍天上去緑髮斑衣歸侍省茜袍頳蕚春怡融堂上老人雙頰紅渾家拜舞上翁壽盡捲春風入樽酒夜飲彥博家歸而作此故人留飲歸夜深銅瓶唧唧蟲微吟一燈猶照讀書眼半紙忽生懷古心亦知所貴何必用魚目驪珠自輕重人間蟻穴小差殊等是一埸間睡夢醉時謠晴輒不間間輒雨少神造物惡相阻我自意行無雨晴翻倒滄溟儘從汝青年一去不可招紫煙漠漠三山暮朝雲破峽忽歸來從君欲覔髙唐賦向來似夢此非夢轉眄仍從夢中去夜深泥滑欲歸時瘦馬遲遲堤上路七夕火金鏖攻電雷擊風從西來火折北向來勝負吾已分物極而顛勢其必露盤清濯房櫳秋氷壺冷浸乾坤骨明河指點三星橫天上靈期有幽約寒機軋軋終年思危橋納納萬山隔不知今夕果何夕洞房幽歡寸隂疾仙人與世當異馳一念蕭然證無極情之所鍾豈其然婉孌合匹此疑褻巫娥神力造化通撫摩神禹授祕䇿百靈後先相開鑿脫我蛟鰐骨再肉楚大夫玉何人哉枕茵誣之神所殛姑置是事勿復問一扇微涼萬金直有景如此可小了况復我友一世傑其文如玉雅過之共作清詩洗汙蔑兒曹瓜果羅庭除拜祈天孫巧可乞何如侑我花前樽得巧未必如得拙君看鳴鳩安鵲巢大勝狡兔營三窟喜仲明西歸半載迢迢住利州嘉陵江水日夜流安得却流關下去載我唯須一葉舟我歸未逺君隨至燕鴻相避知何意月巖四見月上弦日日江頭望行李庭柯一鵲鳴朝陽人言君歸過石岡明日拏舟入城去劇喜重上君子堂瘦骨稜稜衣表見我亦鬢毛斑太半談新説舊兩留連紅燭燒殘無一寸人生大抵如流萍忽然相值飄然分西風吹我又將去預作一場離恨新飯客鎮驛見壁間書火池事異甚荒亭舊刻書火池火從水出如燎脂五行生克謬常理異事儻恍令人疑居人只言數里近驅車欲前僕夫愠誰能博學辨癡龍寄我此詩聊一問宿永年鎮僧居風慘雲低月欲墮路上荒村愁僻左蕭條橫道屋三間傴僂迎門僧一箇夜深山鬼聲砉然恐來吹燈不敢眠明朝踏雪又西去千疊萬重山屈盤錢元質飲客月嵓前小亭酒半月上移席坐巖下四顧林塘景氣清絶眉山程進儒謂豫不可無詩因作此兩山齊起屹䨥闕一巖突出刳寒月成行松桂自昭穆入耳流泉間宫角向來妙思發天藴突兀小亭著能穩漁郎撑舟更何之不信武陵眉睫近殷勤置酒臨清夜主人不凡客殊野酒酣燭暗月初上却徙胡床坐巖下疏疏林隙半輪懸破碎寒塘萬圭璧恐有仙人海上來髣佛天風響環玦蟇頥先生有矜色索我題詩紀清絶才薄將奈此景何喚起吾家跨鯨白拜嵩次山塔向來契分膠投漆一日不見真若失那知遂作死生分屈指五年飛鳥疾詩人猶誦碧雲句老衲來尋金鎖骨亭亭孤塔蔽榛莽下馬焚香涕橫集煙林霧草不供愁坐對青山搔短髮亦知電露難把玩但聼漚泡自生滅歸來閉閣睡方美杜宇一聲山月白自登道來馬溪作朝暾拔山紅一丈露草煙林氣蕭爽出門華構照新緑並轡寶珂喧碎響僮奴尚語林薄間馬蹄勢巳青雲上琳宫百年傲風雨氣象雄深挾千嶂青山固是耐久交老檜真成丈人行山童候門驚馬嘶道士疊爻知客訪情親肯自摘嘉蔬興發更遣沽村釀未妨意行窮勝踐不用心違嘆仙賞雙峯喚我却西去穿徑縈紆轉修蟒荒橋下馬久佇立孤塔懷人默惆悵多謝山僧供湯餅腹猶果然虗雅餉只應探討盡老釋坐覺仙凡絶天壤碎礫誰參水底禪飛霓空閣雲間仗凌霄固有飛霞珮塵蒙濁骨何由往歸來閉戶省初念一炷爐香薰宿障題詩聊復紀勝遊永與名山鎮龍藏遊秦園分韻得東字愛春春淺如稚童愛晴連日無雨風閉門不出春笑儂百年容易成老翁山茶經霜尚能紅小梅吹雪香正濃盍不亟倒琉璃鍾主人好意客亦同粉箋乞句酬天公筆端有氣如白虹少年射虎南山中于今塵土蒙雕弓安得雷雨鞭蟄龍拊髀浩氣亦欲東安居道中上如躋雲下臨淵亂石當道如防賢遙看一鳥轉絶壑鳥巳煙沉吾木末晚風吹雪作雲飛山中更添一尺泥嵗華如此猶浪走梅花思人越消瘦同常和仲謁照老和仲有詩次其韻杏花一株凌曉寒刮眼創見春風還天涯作客歸未得主人好事容疏頑鳴鳩喚雨緑野淨遊絲挂空白日間祗園有僧坐隱几柱杖與子來扣關薰爐午篆轉輕縷淨瓶曉汲翻微瀾禪僧不搖月照水雄辨猝起雷破山癡兒浪説三組貴向我不博一笑歡歸來妙語出頃刻照坐綺縠紛斕斑火急為續永和帖清景一失情易闌東州行上費檢正東州十剎如西州東州幽爽西喧湫登臨在在有佳處我來無事得縱遊望川致爽兩竒特兩軒甚竒雲煙流通東與北一為清淑一曠逺清者發興逺快目城西三剎跨一牛牛頭一山有三剎五百雲堂老比丘捐金樂施到樵牧不知願力何年修鄧家名筆難再得苦愛雍熙之兩壁雍熙兩壁皆鄧隱之筆貴人摸拓不曽休真是化身千百億府公玉皇香案吏帆薄三山風輒止來蘇疲瘵十萬家卷縮靈河一杯裏野人冠服裹狙猿曵裾更欲之何門慙無杜老驚人句空負陳蕃解榻恩巖桂堂湘峯峩峩湘水碧萬古魚龍護氷魄荷衣芷佩凝秋霜欲誦遺章髮先白天生草木預何事乃與騷人同一骨今人古人共磨滅惟有芬香埋不得主人手植雙桂樹寧為嬖玩娛燕席亦知蘭鮑隨所化勉進修名比馨潔繞除霏霏風襲豫欲參靈螭駕寥閴陳辭重華弔屈賈酌以芳辛起湮鬱日暮美人期未來霧濕煙低花蔌蔌嵗庚午豫過來鳯驛觀壁間碑刻火池事嘗賦詩今嵗甲午再過用前韻東西燕鴻長差池二十五年車載脂觀河性在故應爾化鶴人歸空自疑年來於道覺差近此心頗已忘欣愠吾兒亦復能此詩鑷白老人休更問小子生於庚午慈雲壁間有楊皓明叔崇寧甲申所題詩和者甚衆浮花眩眼朱成碧關渠何事愁寂寂依舊漁竿入手來老我江湖倦遊客徑須一醉拋青春校量細故非髙人茂𢎞雅量本不爾幾箑能障西風塵自拋渡未嘗驚恐次公安舟為疾風倒吹幾不能返自江行未嘗阻風將次沙市風留三日常時拋渡如不知公安浪髙船倒吹數月江程絶無阻一舍沙頭風泊之因行逢觸發深省無事安平人不領要知憂樂自相形天馬擡頭見鞭影劉蛻唐大中時人文塜在兜率寺豫嘗讀孫樵自序其作云大中皇帝嘗有詔褒時之藝能凡三人而樵居其一曰孫樵有揚馬之文蛻既同時不應不在褒詔之列士之顯晦固有定分劉君獨未能忘此乎塜其文豫蓋疑其有激也作此弔之詔書嘗下大中朝不聞稱蛻但稱樵犧樽棄溝俱害性此理要以達觀超封文為塜嬉笑怒恚不人知防鬼妬髙岸為谷谷為陵磨滅可無千載慮向來述作等俳諧傳與不傳何有哉六經排孔諱服鄭未勝咸陽一炬灰虗名誤人箕斗爾引調狙公嗔與喜巳嗤地下有修文更笑樓成能作記涵翠亭太華峯頭花十丈十八韓翁語豪壯法華會上如車輪跨猊仙人妄與真九州芒芒置勿問萬柄秋塘插寒鏡楚人裂裳緝為衣一塵涴之色不怡孽童萬死劍斬馬何物奴言似之者觸花花恐怒且嗔悲風獵獵吹白蘋我來拊檻笑仍喟欲挽清冷濯斯穢主人囅然客罷休一醉能銷千古愁弔李允成知縣百年造化無遺力霜雪十圍豈易得盲工操斤選朴樕銅柯石根棄如擲嗚呼斯人何不淑天畀之多人則嗇白眼千百碌碌子老虎可縛蛟可馘神鋒屢染雞鶩血繞匣龍蛇夜悲泣英靈不合世間著蟻宫厯遊無半席不如收拾還山川化為球琳尚華國意氣偶合肝腸傾手栽檀欒食豫實至今斂翼蓬蒿中不與燕雀同感激霜風吹愁愁更濃屈折長虹玉三尺晨興攬衣發深省古來精誠可裂石玄堂文成許見不魚與熊掌當取一飛烏道中朝發江亭暮山驛靣顔塵埃手龜拆弟兄相逐兩浮萍一盞村醪慰愁寂髙堂老人念兒寒兒念老人不得眠殷勤祝付送書鴈為傳片字報平安飛烏與正老相值蓋十月初見之夢兆云憶得初冬忘甲子夜夢與師遊破寺明朝東望欲寄聲我在紫巖師錦水空山行役偶相逢物色看來與夢同當時夢覺疑非夢今日翻疑是夢中山口阻風舟行常有性命憂江風一動令人愁盤渦倒帆日方午又作賈胡終日留淮山隔江看細小淡掃修眉晚尤好􅡠峩行盡此江來可是愛山心未了賦壽康海棠何許園林春最釅海棠萬萬千千點不應惟是錦織成正恐更將猩血染未開半豆已欲滴爛吐一庭尤瀲灔窺月洗雨俱可玩抹霧橫煙猝難掩梓澤步障烘曉霞溫泉粉玉臨秋鑑相逢但欲酣且歌目送誰言美而艷桃花何處容靣皮欲笑春風無乃僣光翻牖戶翠堆幄濃逼須眉纈生臉裹頭朝出常苦晚燒燭夜看終未厭見不數數夢來往百斛可傾心獨欠老來世味薄如紙斬斷情根須一斂隨身鼓笛本遊戲過目埃氛亦俄暫明朝風雨未可期委地泥沙混真濫憑君但向雪落時箇裏直須勤點檢峽中重九以菊有黃華分韻得菊字江湖浪走嗟碌碌往往佳時忘記録今朝峽裏作重陽節物雖同感殊俗終日懸憂湍瀨間何人為唱黃花曲尚喜樽罍餘舊醅不然何以慰蕭索每思在家天氣好一甕床頭撥寒緑欲熟未熟喚客飲婦罵兒嘲醉不答只今那能問甜澀况是名樽難重得晚行江干見籬落小雨霏霏冒叢菊若從主人覔數枝金英未吐心亦足歸插銅瓶對清酌營度肴蔬選橙栗茱茰在手花在頭起舞狂歌忘為客人情一種無貴賤餘瀝猶能到僮僕淵明固是羲皇人腰不可折帶難束白衣大自勝督郵千古因渠重斯節我行四方亦何事此腹能須幾圭撮並頭雞鶩不自厭仰首髙飛愧鴻鵠酒闌獨誦歸來章醉靣如頳背如沃枕上聞櫓聲勸君不須下瞿唐順流從此道路長勸君早上瞿唐去遡流雖艱近家鄉我今出蜀幾寒暑催歸苦念家人語更煩舟子䇿全功疾趂鳴雞起搖櫓晚步江滸有得黿大如箕贖放之鄰叟言此家前數日巳嘗得一煮之通夕旦發盎視之黿忽引首以水噴其靣兹亦可驚異者作是詩以為好殺者之戒卷帆江臯日西斜散步聊縱腰腳麻有黿如箕誰所得繩貫四足尚喘呀偶然相值不忍去倚杖却立空咨嗟客囊雖云甚羞澀數金何惜死可賖破筐解縛置池上初猶不動如磔蛙舟人共觀各呼舞稍稍有力能爬沙須臾一躍不復覩去侣蛟鱷朋魚蝦鄰翁又傳可愕事宜志簡牘懲凶邪近嘗得一付湯鼎通夕爛煮勞薪葭黎明發盎欲下箸以水噴靣搖其牙此言聼者驚自倒小人不戒愚何加我今贖放豈為德逡巡得脫汝幸耶不須叩門問長史無用染指嗔子家祝黿好去勿浪出水有網罟陸有罝作詩快讀不能寐展轉屢見燈生花放魚溪媪雙魚入手中鬐鬛不搖猶眼紅咫尺波濤即胡越不忍觳􅑌人心同小舟自放清江側為龍何以報我德只須旱嵗活焦枯不用明珠光的皪遂寧登舟江流不知幾曲折但見逺樹合復分上灘下灘櫓聲急眠沙白鷗如不聞山行畏遲舟欲速試較里程翻詰曲都緣歸計失平章端恐青山笑人俗舟著淺御風起帆如彍矢不能萬里猶千里中流浪頭屋髙起誤入淺洲舟閣底愚公不量欲移山篙人伎窮客長嘆世言卒行好步難何如一棹夷猶間鄂渚大風萬艘相銜繫江渚夜半疾風來莫禦舟輕力孱費支拄大聲舂撞如臼杵千金應有覔壺人寃呼倉黃那忍聞吾顔死灰魚鱉喜公無渡河公不止訪楊少虞得小詩併呈才夫坐遭飛埃眯雙目不應更到琅玕腹青山為人作禦侮對靣亭亭削蒼玉公子翩翩故自佳我來空嘆駒局促抱氷嚼雪豈能清火裏芙蕖初出浴舟中夜讀蟠舟詩夜讀蟠舟詩如共蟠舟語五年别淚隔秋風萬里孤舟泊寒渚行盡諸方勘盡禪此句逢人未曽舉東坡老人喜流涎荔丹元似江瑶柱雜言二首春來無處無芳草但覺故園春更好海棠前日夢見之今日看來渾未老櫻桃紅杏相因依梅隂吐芽青滿枝世間亦有如意事酒熟正是花開時一萍無根託瀰渺分頭常多聚常少天涯碧草又傷心况是一分春巳了啼禽飛來窺酒樽樽中緑波吹鱗鱗東君可只令人瘦更在花邊冷笑人十八日同少虞才夫子友子西泛舟清江不知日夜長前日平流吹作浪得得來尋白鳥盟仍喚津人操兩槳殘紅漸稀緑漸多苦留不住如春何細看恰有三十日我醉起舞君當歌紫微玉堂九天上人非仙骨何由往舟中俱是斬蛟人洗眼待觀龍虎榜夜歸錯落北斗橫轉枕喔喔塒雞鳴一春常嗟睡不足幸無官事莫相驚次德茂湖中韻秋風早已來吹人朝數暮數唯歸程白湖粘天行未了單舸夜泊令人驚更闌剪燭共愁語酒醒彈鋏為商聲篙兒飯飽便熟睡那識懷家去國情次德茂菱花韻菱葉寒陂收曉鏡蕭蕭獨伴黃蘆暝自同香草入騷吟不羡玉臺春壓鬢三四鳬雛傍母眠盡付與秋秋亦領更看細雨出魚兒江上老翁漁未竟萬安道上逢牧者暖日平岡牛數尾短蓑破笠三四子牛飢吃草渴飲水牧兒仰卧不搖箠人牛意間俱不知笑我駐車獨移時薄暮騎牛却歸去晚煙遙見隔林炊登無為冠鰲亭分韻得山字岱嵩拆裂滄溟翻驚魂去幹呼復還故人勸我勉自寬聖貴揚名懲毁殘十生導師超物先誓言一拜蠲寃煩曉暾破霽山雲搴匹馬弄袖風翩翩解鞍投寺日幾磚莧蔬宜我詩腸酸危亭飛出峯之巔暗黎殷勤勸躋攀我飽聞之意欣然兩腳酸澀怯不前清景一失矢縱弦藜杖到手勿作難萬杉夾徑穿蜿蜒坦如康莊駕輕軿山鬼作意發天慳似求清詩藻幽妍憑欄寸目攝大千萬里碧玉圍青天逺樹如髮山如拳孤鴻滅沒昏蒼煙九關上羾須臾還以氣為馬不用鞭冠鼇榜亭固寓言亦恐蓬嶠神作遷雲旗往往來飛仙切勿投餌憂崩騫壯哉古邑雄兩川眇然下瞰乃爾孱可憐居人蟻紛闐擾擾膏火日夜煎強弱角鬭觸與蠻豈知共住一指端憑誰與此曠蕩觀定當泚顙頳厥顔向來學道窺微玄妙諦與世殊越燕空生大覺海一涓而况此境空所緣摩尼流光照八埏試將此理攻堅頑客言有句子未參一杯滿酌澆青山同馮縉雲遊無為以吾獨胡為在泥滓分韻賦詩得泥字人言躍馬妨杖藜世士不可汚丹梯人言解牛非割雞豈信截玉如截泥山林朝士弧矢睽一物異用鵠之栖妄生濤瀾分畛畦我自局狹誰排擠先生大千一手提使握鼎鉉如扶犂豈於喧寂心生翳朝驅兩輪鹿護麛暮閲千紙髮變黳痛者手摩攣者擕蚊虻膚撓夕夢迷餒蛟仄目初生羝血牙未洗遭燖刲天公付公為旱霓作三日雨徴可稽久旱公至連日得雨詰朝棧路沿澗溪籃輿軋軋勞攀躋束縛繡斧揮金鼙吏奉杖屨從小奚指點山水窮坤倪夜談隱具窺緗綈曠然冥蒙徹甕醯轉變前境塵却犀我自嘆駭失徑蹊公如大像頭小低嗟乎太倉此一稊不從公來噬其臍是山冠冕川東西二大老文光璇題公不一語意慘悽是以稽首拜馬蹄欣然傾倒珠玻璃飛天寶熖照栱枅夢中棹唱驚鳬鷖挽衣不留恨空齎悲願苦切哀黔黎早縛渾厥臣羌氐快讀大頌崖天齊把茅歸謝黃金閨收拾伊傅從阮嵇為公再歌歸來兮逰溫湯丹雛振翰栖佛屋蛟吻吐泉供客浴東華夢破軟紅飛不肯隨人到岩谷扣欄投餌魚羣喜一鱗圉圉獨去之萬里歸來狎鷗鳥青波如鏡鬢如絲七月十七日遊浮山值夜未快所觀急歸作詩田疇渺渺平一望側嶺橫峯環四向那知中有此巉巖倚天削鐡三千丈坤靈湧出薦地寶方嶠飛來憩靈仗我來暑濕未解圍薄日烘烘雲盎盎投鞭濯手趨深殿稽首虗皇注遐想黃昏食罷亟就枕殷地鼻雷翻疊嶂夜深風雨來萬騎勢欲拔山投莽蒼明朝幽徑一丈泥淺猶沒屨深沒杖仙遊咫尺邈霄漢但倚危欄默惆悵琳宫危絶何由上祕洞幽深倦探訪獨尋荒碣考嵗月更覔遺民問疇曩雲舄朝飛溪漲深玄猿夜答空山響過門初欲快雄嚼染指誰能當大饗會求靈藥插羽翮未分風帆隔崑閬詩作監盟神所臨後約有期吾敢爽
