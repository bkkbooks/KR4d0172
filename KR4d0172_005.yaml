body:
  text: 淡齊集卷五宋李流謙撰五言律詩寄張珍甫殿院五首自是清華選嘗懷宿昔期髙名推不去異産買無資一日風雲遇千年簡牘隨􅡠峩添岌嶪袖裏著安危江湖淹逺使崑閬侶飛仙豸首承恩渥龍墀接邇聨豺狼莫當道鵰鶚不空拳黯憃猶冠見驕王易縮肩巳贍經時䇿仍輕許國身攘戎先政事强本即精神禹貢山川濶堯天日月新至誠馴暴逆玉笏動嚴宸只有肝嘗露初無舌悔捫法行功罪竦令重闕庭尊盡變偷諛俗仍關侫幸門書生在蓬蓽此事付能言定勝端相屬飛鶱巳後時閲人盤谷老具眼石麟兒連茹才非匹彈冠想自癡讀書頭半白萬一故人知宿船家小舟中凡三日夜作此自昔說離亂經時足嘆吁何為來曠野端是辱泥塗相國跛男子封侯裸丈夫未須多感慨事業出艱虞遣興七首僻處便身懶閒居喜嵗豐蟲絲轉窗日鳥語度溪風疏竹斬新緑晚花隨分紅髙人莫相訪不比卧隆中柳老淵明宅蓬深仲蔚居病身須藥石閒日足圖書世念焚香了禪心隱几餘空鈎本無意誰為語游魚懷抱向誰盡窮交苦不多相期慰岑寂未厭數經過濁酒隨斟酌新詩聽講磨吾今巳三十不擬問如何倦倚枯株坐起尋微徑行魚為鑿壞遁蟬作採薇清彈指四時足閉關羣動平盡言殊未可日用本分明水竹扶疏地前人卜築勞草荒煩僕豎果熟戒兒曹穴蟻生涯陋𡨕鴻境界髙洗心觀萬物至理寓秋毫舞空三尺雪笑指玉如泥早日羞屠狗窮途悔射鼷挂心無妄念省分有幽栖舌在何須問端憂愧老妻一飽便滿意百年才轉頭可憐空不合為問亦何求黃卷仍舒卷清樽自勸酬弔湘兒輩事何地著閒愁山中遣興五首數月擕家住幽栖引興長客中容懶散夢裏過炎凉收網覺魚賤酌泉知酒香主人真好事詩債數能償爛飲無賢聖髙歌有鬼神梵書渾味著藥褁自心親朋友居山少知聞到市新孤舟怯風浪不出又經旬游宦初聊爾歸來亦暢然低回簿領縛慚愧斗升牽元亮八十日哥奴十九年人生重名節富貴疾雲烟日薄愔愔熱江渾漫漫流蟬為合尖響燕作摻裾愁棗熟成羣打禾登掃地收展眉欣一飽八月又防秋嗣聖承堯禹圖書未見之兵威輕破竹天意決占龜燕雀甘藜莠蛟龍或沼池但令無戰伐貧賤亦何辭遣興示彥博信腳隨藤杖穿林復過橋聊休讀書眼小縱坐禪腰老木成隂遍枯泉赴汲遙龍孫吾手種先我到雲霄尊酒誰相勸詩篇子可酬臨流驚老大倚杖笑窮愁雨足鳩初歇風狂蝶未休化工專一氣俯首聽沉浮可人子陳子乃祖定元龍一寸悠悠梗千章落落松暗投初未擇狂吠竟誰容堅壘自銜璧饑師不足攻雨後有月江上作雨止夜色靜漲生江浪浮碧雲度星漢明月照汀洲倐忽隂晴異蒼茫意緒秋微吟不須苦下有未眠鷗游東山軒自岧嶤稱欄因杳靄橫客魂搖鳥影醉耳入江聲失喜過門屐沾襟越席箏東山懷謝傅憂樂總關情今日如人意全家在翠微葉齊才蔽樹蔽一作庇雲近欲生衣樽酒蒲桃緑盤蔬赤莧肥不須聞杜宇作客自思歸送五八姪歸二江清霜入短褐送汝酌深杯萬事不如學千金難買才關心門戶重過眼嵗時催莫待收燈後驅車望早來上牛頭山馬首多經厯牛頭到未嘗平川成岌嶪諸剎寄微茫像設尊千古香燈走四方來陪僧粥飯此願幾時償次韻朱飾之中秋玩月因以送之君理朝宗楫吾乘上峽船此杯同此地明月又明年怕作凌晨别貪看徹曉圓眉間有黃氣知近冕旒邊送謝天竒赴淮上之招今日論形勝全淮正上流老成資畢召俊異集枚鄒共說從軍樂休歌出塞愁鄉邦饒杞梓君已拔其尤送尹仲求臨邛戶掾何必崑峯逺天球自粹溫掾曹甘蠖屈僚侣總鯨吞子去成三友公餘寄一樽滄溟有餘瀝猶幸及鴒原次韻秋日書懷官共氷雪冷身如鷗鷺閒更無人問字只有分看山莫厭蕭條裏全勝洶湧間秋來笋成束匕筯未須慳微風吹葉脫落日卷簾初蠻榼行提酒胡床卧讀書友朋元總好氣味不應踈有暇須乘興溪中足鯉魚平都山二首殷勤雪色鹿報我上空濛老鶴三山客蒼松百嵗翁洞雲浮地出池水與江通仙榼無多酌逡巡兩頰紅福地何蕭爽真祠自杳冥棟梁傳曩昔草木帶仙靈霧市朝仍合雲扉夜不扄天風吹玉磬應是誦黃庭過新津游修覺山舊聞修覺寺葦岸却維舟句法雄千古山形盡數州野寬仍據㑹江合却分流畏暑猶如此吾方事逺遊送史唐英二首藉甚聞名久惠然從我游敢云國士遇每向古人求一第娛親爾髙懷可意不咸韶亂蛙吹期子繼蘇歐隂崖隕天末朝日上團團稍覺􅡠峩近絶知湖海寬舜門元自闢蜀道未應難富貴風花耳相看在嵗寒送王景文相送復相送生憎風景殊還家疑是夢涉世誤為儒愛惜千金璧遲回一束芻亦思江海去書札寄潜夫送楊道父二首骨清殊矯矯氣老自沉沉門戶託君重江湖入夢深功名須少壯嵗月惜侵尋萬里相隨去庭闈一寸心遂決乘桴計初無判袂愁清樽聊把手弱纜已開頭懿戚今元老鄉邦子俊流等閒垂一臂談笑上瀛洲重陽前一日仲明見過留之以州㑹辭作此示之黃菊金錢小紅茰錦紐香滯留成久客邂逅作重陽勝友幾相值清尊聊共嘗吾宗慣城府幽興負滄浪允成載酒見過作此示之乘興初非約相過不作難酒寬隨量飲花好盡情看春巳無多子人誰有此歡明朝各行役塵土上征鞍離合州驛晚宿茆城驛稍喜川原豁遙看草樹明惡灘猶夢怖平地始身輕場圃收遺秉溝塍勸早耕得歸萬事好漂泊豈人情寄送石鈞父二首鳯麟元德産閲世自深根士豈無公論人宜有達尊三山聊袖手九折未驚魂瓦礫看珠貝先聲到塞垣再見非無分相逢自昔緣牛峯留滿嵗鶴嶠别經年師友今尤惜書題逺尚傳蔡山連越嶲細認落鴻邊送程叔虞監稅吾來真漫爾識靣喜周旋兩月連墻住孤帆别袂牽人生同宇宙官學各風烟把酒知何日臨流一惘然豐都驛呈任子厚詩二首三家笑荒陋十日寄蕭條破戶無人掩寒爐折竹燒青燈不廢卷白酒未空瓢伴我能於此他年定久要書壞無全牘衣濡有裂繒倦梳晨起髮祗曲晝眠肱客路行將了家山喚得譍焚香謝􅋖佛宵夢已先憑失舟前一日夢或云有佛光涌出罩惡蛇難不爾其殆不免歟書事飽飯將何適擕筇登翠微江長仍曲折樹逺欲依稀煮井未休汲田家初掩扉驚心崖路險隔岸喚船歸唯有江郊好能消畏日長晚杯荷露重午枕竹風凉溪鷺閒無敵庭萱恨易忘翩翩孤蝶意只是託幽香能閒無健羡可飽即珍烹成我耕桑計欣兒課誦聲橫戈真不武斂袂亦難平苦欲勞工宰此生無我生塞色旌旗薄邊聲鼓角喧三軍正悲憤中國固雄尊障戍爭襟險朝廷護本根古來挾䇿者談笑整乾坤陸使君祠二首山為一案峙水恰靣前流自是神靈宅非從槁殼謀風聲分井絡雲氣接瀛邱炯炯誰相領焚香髮半秋梁初奄巴蜀仍有渡瀘人汲直餘蒸簡蕭翁亦聚塵傑魂猶念沛逺夢不歸秦幻化元超忽何勞問大鈞使君咸陽人仕梁以直諌謫瀘州卒官葬於此出郊頗愛晚凉出適當秋霽初豐年田父語喬木野人廬畦稻根根直池荷葉葉疏冷官無事業歸舍了殘書晚泊薄霧初迷岸微風早繫舟山青只欲逺江濶不勝流取酒深深酌將詩緩緩謳去家萬餘里聊此散千憂送王伯董入總幕几窗纒結習翰墨録殊勛未入三山直當空萬馬羣俯眉聊緑水展腳是青雲五十頭如漆功名不放君昔為萬里别歸送北征鴻近接何曽數深期本自同逺眸眵霧嶂短箠滑霜風更說無窮樂懷中雙橘紅送王景文入制幕二首著眼分明見論心委曲知負排閶闔氣有泣鬼神詩世故從料理人材屬盛衰浮雲多變化寧憶路傍時繾綣聨名第飄零共塞垣自知此事勝更覺斯文尊欲别言尤苦相期意略存成都萬事好只合近清樽入峽聞灘聲山稠知峽近今夜聽灘聲燈映舟人語江空宿鳥驚不眠共展轉獨語記平生自覺無多愧微堪答父兄懷李仲明地曠空凝結江清悅見聞娟娟初上月漠漠未歸雲魚樂能忘釣鷗閒故念羣桂旗風不度却立詠湘君斜暉放船好晚吹得凉多星斗窺深酌魚龍答浩歌乾坤身半老湖海意如何夙昔紉蘭約遲君肯重過謁無盡墓飛動少年意如今推達尊何人窺畛域投老見根源草沒碑無字林深木有孫只須說亷藺猶足禠諛魂五百羅漢洞五百雲霞侣同胞生佛家不貪三昧酒共駕一乘車猿餽霜餘果僧烹粥後茶我來無供養唯讀妙蓮華法華皆如來為羅漢授記枕上欲問更長短江村無鼓􅎏客懷如酒病秋夜與年齊被冷失孤蝶霜清聞逺雞終年為蕩子尺紙愧山妻射洪道中二首曉色仍過雨殘鈎不掛天空霏漫野􅒯淨緑浸江鮮何自有靈鵲誰言無杜鵑倚風搔首意窈窕若為傳逺墟行藹藹滯緒豁欣欣挾翠山能潤矜晴草自薰墮鳶那及嘆飛鷺可堪羣欲共江流說滔滔故不聞仲明兄弟訪别郊居眼逺孤帆沒臨流一悵然分擕惜此日作惡驗中年惟有加飱祝仍期得句傳相看俱四十香火好因緣次懷安骨肉自簡池來㑹來往金澗道尋常不隔年異方何契濶渾舍此團圓老子風埃甚孫兒玉雪娟妻孥勞行役爭勸吸長川吳波亭相對數峯極可愛吳波波上亭一靣列山屛雨雨晴晴好朝朝暮暮青倦身無處著醉眼為渠醒便欲擕歸去全勝腰萬釘寄彥博二首聞道陳夫子年來學更工幾人曽著眼聖處已收功老驥思長路潜鯤待疾風何當問竒字載酒過揚雄世途今若此吾道竟何如學古疑無用謀身忌太疏引杯空慷慨看鏡獨躊躇千萬胸中語因人略寄書七曲祠天生絶代英夢想見儀形桂殿風凝緑苔宫雨護青雲雷通翕忽洞穴閟隂靈只有丹心苦聊將託杳𡨕䕫子岸下水作頽沙裂岸轉舟避之狂流作平地别渚轉輕橈岸斷石出沒雲虗山動搖奔湍長澒洞杯酒且逍遙可待然犀照潜鱗意自驕仲明留少城未還豫將歸矣留詩别之判袂四十日望君君不來過門先問訊立馬屢徘徊正坐牽歸夢無緣把别杯鶴山果西去㑹靣更悠哉别元質鷗輕家泛泛梗短路悠悠妙句能留客澄江可散愁長年資浩歎秋色動商謳故有先疇在歸為鴈鶩謀逺夢燈頻照羇懷酒重傾啼烏翻夕露歸鴈占秋晴此地豐魚稻如君好弟兄語離亦怊悵松檟獨關情送錢太虗同年不隔同年靣真情本弟兄人能純白備交自始終成測管才窺豹傾江試吸鯨吾言蓍蔡驗决矣看飛鳴次趙惟直韻山合失空曠江奔成溯洄陽臺鎖雲雨楚澤貯風雷白鳥背人去青帘明眼來舊醅寧得厭聊共客中杯次韻仲秉見寄二首别後年仍換詩來語更工音書恨不數魂夢却相通草木春風後關河夕照中飛鴻不可倩此意付筠筒讀書空有癖學道苦無工散䇿羣峯近穿溪小徑通此身猶客裏野性合山中春水添新浪煩君理釣筒次仲甄韻二首大用不堅壁等閒憂患侵平生知學道萬事付無心露莧鉏晨甲烟篁步夕隂陶然宇宙內魚鳥聽浮沈惻剝風枝恨若為開我顔索居詩社廢多病酒杯慳本自便三徑何曽夢九關臨溪問魚樂知我是青山益昌道中次兄長韻二首聚頭閒日月逐日信東西夜泊驚逢虎晨飱倦乞醯燈青千嶂夢月白五更雞耐老前山路長年送馬蹄木杪著郵亭山行未飽經巳成身挈挈恐失鬢青青老樹霞烘幄隂崖雪糝屏氷霜先訓在敢負舊趨庭投朝子止制置三首讀書萬卷破轉物一機神道德欣為御文章妙斫輪聖賢同一處天地要彌綸汗簡窺千古從來只數人吳甸七千里坤垠六十州宸心寬北闕老子在西樓召伯出分陜衛公歸相周衮衣人愜意重為雪山愁西南雄節制人物妙爐錘䑛鼎非無意登門獨恨遲正期雲觸石㑹見菌成芝不信酬恩事君看左顧時送查總卿三首事業參亭毒人才兆廢興百年爭鳯睹一遇慨河澄手到無盤錯旁觀有級層夜來春夢好先巳上觚稜御爐薰隔夜清蹕響凌晨對罷天顔喜朝回賜服新自期宜棟幹小却尚絲綸此論由來久周行萬搢紳臘雪千江浪春風萬里船相依身健在逺送意茫然公近此三接吾驚失一天相君如辱問願報巳歸田夜坐呈王子友無氊殊未覺有興亦難忘小雨寒微就孤燈話儘長疏凉湯煮豉淡泊菜含霜為問王夫子如何共肺腸晴山見厯厯逺水聽颼颼宇宙不知大關河空復愁孤雲游子夢滯穗野翁謳我與鴉俱息烟林晚共投晚歸漁子艤舟待山童負笈窺數峯銜日盡百丈逆灘遲去住初隨意夷猶獨誦詩不妨歸更晚正見月生時宇文氏莊觀海棠時海棠未甚開而余旦夕歸矣賦此雨猛幾終夕風狂遂徹朝眼緣春色醉魂為客愁消澤國空留滯山房恐寂寥平蕪烟一望鄉夢太迢遙即事山路仍多雨秋天最易隂呼舟亂灘響倚杖俯溪潯風力憑江橫雲容隱樹深一寒遽如許料理欲歸心錢氏隱居三首髙棲俯氛穢華屋照滄浪列岫帶修竹小池環海棠晚杯魚蟹富春筯蕨薇香涉世真無意吾今號漫郎野水瑩心碧春山入骨清去穿雲際屐來卧竹間亭鳥語風嘲哲花枝日杳冥晚來江上笛客裏不須聽逺樹髙低見清溪曲折流草眠耕後犢波泛狎餘鷗醒醉無人管登臨各自愁扁舟大如葉爛漫作春游偶失一丹瓢戲書誰取一瓢去虗勞九轉功徴杯驚羽化開畫嘆㡡空巳墮寧論甑雖亡未失弓人間閒得喪盡付緑樽中次韻德茂待仲甄巨卿未至飄零一月住日望北來船眼冷傳書鯉腸空吸露蟬夢魂孤枕側行李畏途邊堅守蒲人信嗟豫苦未賢抵家何地非吾土故鄉情未忘掀眉對兄弟酌酒話行藏拜墓色不愧逢人語更狂梅花相待發好在細思量郭及之僉判招飲雅安同僚也江來從此合我上爾東行節物驚心地主人留客情霧花搖老眼霜燭灔深觥醉恐清歌斷應須更數聲送牟孔錫之官叙南二首凌雲髙鵠峙擲地響金渾蟾窟聲名早鰲峯氣象尊十年才一試萬里正孤鶱勿說居夷陋吾師有格言得朋宦游樂不覺在山中慣住家鄉似頻過骨肉同憑欄但烟樹振袂忽霜風逺别無窮意君歸我巳東送李仁甫運判赴召三首嵩岱國之鎮鳯麟天所生有人占寶氣無耳著修名斯道自神聖爾曹聊重輕晉書定一付一代聽權衡纍嵗徴賢詔于今始一來已令人意滿更著驛書催白璧有成價娥眉無巧媒經綸夙昔事吾駕不須回瞿塘六月浪如馬亦安流舟楫魚龍喜藜蒿虎豹憂低回嗟薄宦慷慨動商謳門戶今如線非為粱稻謀江上晚眺書所見雲鎔金錯落月挂玉盤盂水退岸全缺烟陳山欲無沙晴鷗併集林暝鳥爭呼不必求摩詰分明是畫圖舟中欲買一江碧不知須幾錢舟輕故欵欵酒好但㳙㳙雲腳他州雨波光别岸天漁謳與樵唱同和小山篇小息倦征當日午小息散腰頑索酒初隨意題詩自破顔不須通姓字聊欲賞江山放蕩郊園樂于兹稍稍還贈白道人天涯隻影隨百結身上衣有術沒人買無家何處歸自言窮亦好未與道相違酌汝一杯酒醒來萬事非贈藍元一道人我聞方外士見靣照人明筆幻嵗寒友琴彈太古聲侯門知遇重真館笑談清茗碗聊相對清風兩腋生次韻宋德器春晚即事五首室空超衆止理妙契無同簾卷半規日香吹一線風草晴唯欲碧花晚尚能紅老我閒居興清應到小童久習成衰怯何方療濶疏柴車窮巷客貝葉長上聲年書每愧沾沾喜寧甘鬱鬱居蓍神吾未暇堅意聽盈虗靈明觀自已糾錯漫殊途睨柱誇完璧探懷失繫珠封侯真不願作佛尚堪圖解我無還語根塵法本粗樓迥支筇久庭閒轉榻頻松衰無直幹竹好但新筠漫仕慚逋客躬耕羡野人可能千里意端的為吳蓴柳老隂隂密榴繁灼灼明持杯了醒醉拊檻置枯榮谷曠簫笙雜江空鏡像呈澄心著老眼物物見真情元質苦留過重陽且約泛舟觀泉二首舟行十里逺山出一泉清為景尋幾遍將詩賭欲贏江清渾玩著酒好易支撑半世無功業狂歌任性情性亦作野久客相看好思歸得去不深慚楚醴設更作賈胡留嵗閏菊花早霜清竹葉秋尊前聞見在不擬說閒愁早飯白崖鋪淨果院久客諳人事身能到處安爐深紅一聚竹瘦碧千竿祗作臨深恐何辭行路難幾成晚來雪唯有不勝寒用仲秉韻貽照老來問維摩疾幽人有宿盟浮漚非實性鬭蟻是虗聲廟冷香誰爇城空賊自平老師家裏事無壞亦無成贈照老舊矣聞名熟欣然識靣初只求一轉語不用五車書出屋茶烟密臨溪樹影疏地偏吾所愛庭草不須鋤照老用韻謝復作了了三生事寥寥一念初未忘牛背約端憶籠中書塵劫空相隔交情本不疏焚香咨勝義驕色巳先鋤用前韻呈照老吏部稱文暢愚溪進浩初深慚詆佛奏更著廣交書情契逺猶合義乖鄰亦疏詫豫無騃習固自起犁鋤泛舟呈元質照老扁舟載我去身世兩悠然暝靄無窮樹春江不盡天阮嵇真酒伴李郭即神仙孤唱君須和風流漢晉前落日清江濶臨流一慨然斷鴻烟際渚雌霓雨餘天照海珠成市騎鯨客是仙輕風借帆力送我玉妃前僕盡半月之力僅得五詩而和仲落筆成十章俊哉豫所甚畏也勉作二章答和仲三章述懷庶滿其數云向來得祕藏著意國風初一字嘔心出十篇隨手書天成新句熟月煆古人疏長鎩非君敵區區恃棘鋤慷慨揮毫際倉黃展卷初少寬誅冦檄已草納降書恃勝防君失輸籌笑我疏班龍落誰手芝草費人鋤用韵答王子蒼聖道灰秦燎殘編出漢初混茫千古意破碎百家書中鏑無多語操戈亦太疏升堂得𤣥解伴子帶經鋤答李仲明仍用鋤字韻月白星稀後歌殘雅奏初剽聞先破膽欲見疾開書孔翠仙毛爛珊瑚海樹踈好詩如好畫黑瘦未容鋤李允成次彥博韻見示仍用韻答之三首花氣濃熏塢藤稍密䕃橋但須樽有酒未問印垂腰芳草晚尤碧好山晴更遙太阿真寶劍不必夜干霄吾家老仙伯白璧半錢酬杖屨窮幽地禽魚替客愁可能百世出閒却一生休念舊須公等年來嘆俗浮俯眉聊卓魯髙步故䕫龍倦翮閒霜鶚蒼稜老澗松只應安小試正自恥先容泚筆書三異他山玉可攻以雙筆贈照老用前韻三窟驅除後千毫束縛初得封才五等進位合中書炯炯銀鈎粲翩翩薤葉疏惡詩同遣贈荒類要君鋤宿離相院客到蒼苔寺僧鳴暝色鐘古檠挑熖澀疏屋透霜濃吾道元迂濶中年雅倦慵誰令背猿鶴自酌不須攻遊靈鷲院人說招提好來游稱所聞雲烟四山合草樹一溪分瘦馬催歸晚闍黎館客勤荒墳有郎宿夜夜粲天文游水東院二首暝角傳風逺昏帆到浦遲草猶矜晚翠麥正及春饑客鴈無留意殘雲有去思濁醪不禁醉聊藉晚風吹虗檻橫空濶平郊入望賖樓臺萬家邑桃李一川花雞犬非人世樵漁亦相家寺云令狐綯宅居人蓋其後云閒思十年事倚杖獨咨嗟余侍親官此今十年矣次黃仲甄峽中韻峽水清一線峽山赭千層禹力不到處蜀靈用功深蛟龍改窟穴日暮聞微吟遙想風雨夕扁舟繫楓林石洞二首春夢斷不記春游誰與同竹斜過午日池皺晚來風柳已都齊緑桃猶約略紅流鶯啼未了又過短墻東香霧團成蓋茶花白勝酥對書閒境界覔句靜工夫客信因魚得歸程約鴈俱庭前海棠樹尚及一看無送何子聞使君之行在繫舟鄰近渚索酒共清斟契濶十年事飄零萬里心大門元赫赫要路正駸駸去國吾何恨看君上禁林挽費檢正三首鈎深三古學遇合百年機垂上青雲去仍完白璧歸功名身易老豪傑意多違鼎臠留餘啖蒸青有發揮瑶墀鄰近侍華㦸老方州閉閣人無訟凝香嵗自秋凶衰乘鵩集涕淚感麟休古佛知公恨涪江不盡流憶作荆州客多慚鮑叔知蒼黃懸榻地慟絶蓋棺時映睫餘殘淚親膚有近期空山那得去倚杖鬢如絲挽張主簿百里桑麻地春風鼓舞中隨軒一犂潤折獄片言功小試巳無敵晚成應不同他年循吏傳亦足慰途窮楚楚桐孫秀願交慚不量新詩吾退舍前輩子登堂刮目鯨掀海經年驥伏箱斯言儻不驗我欲罪穹蒼挽秦國夫人鸞矜榮翠栝璇魄媚方流慶襲髙華出賢供窈窕求靈光分婺照靜質肖坤柔閨闥關何事風人美造周賚說端由帝生申未許嵩神功資錬石吉夢託占熊赫赫扶天業堂堂浴日忠芝麟昭聖瑞何力贊元工華笄諧淑配緑髮負平生桃李春如寄鷗鷴夢不驚周婺慚絶識蜀寡讓孤情口授天人學寒窗伴短檠伴渙方興日憂危未決前僞書知莽詐新厯斷周延氷作羣疑泮風從一語傳龜靈無此識上智炳機先露蓮秋沼瑩霜月曉潭空褕翟翻經外塵泡隱几中禪心安瘴嶠結習謝雲櫳五頌分明說癡人耳自聾久矣鴻飛渚翩然鴈字峯九重疏異渥萬里合幽封引柩烏銜壤馴阡鹿護松他時人下馬有子是䕫龍
