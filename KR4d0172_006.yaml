body:
  text: 淡齋集卷六宋李流謙撰七言律詩杜少陵祠赤紱銀章玉骨寒焚香再拜淚汍瀾黃花郪縣仍羞見好月鄜州只獨看可是一生長客路故應千古恨儒官蚤知涉世元如此悔不霜林斫釣竿草堂浣花溪上得間來石刻摩挲病眼開短策多時臨水立紅塵半路與風回乞靈伎薄裳為帶驚世名言海納杯相對只今真夢寐數椽茅屋老蒼苔宿魏城驛用羅江東韻懷李仲明昔年漂泊記曾遊碧樹蟬聲又帶秋滑滑泥行青嶂路翩翩風倚夕陽樓人誇馴雉碑猶在書託文鱗水漫流天遣此來相近傍伴君牢落向邊州題重興寺陌上橫流浸作泥行人步穩方一移春雲將雨繞山去社燕營巢貼地飛憩僕且須投古寺間懷猶喜論禪機中宵瞥起胡床念回首家山幾日歸遊龍角山福志院招提未到只聞名乘興來遊意最真出郭都無三十里同行恰有兩三人入門竹徑能明眼隨處禪房可著身莫怪山僧拙言語十年已不踏紅塵忠州井邑雲根一聚村尋詩來掃壁間塵此州惟有斷頭將聖世初無棄梗人楓葉晚林終日醉梅花臘嶠幾時春不愁過客當年淚尊酒黃堂是舊鄰自三池一日過靈池十五里頭宿山險盡矣壠頭停轡望龜城元有夷途似掌平厭把五更供客夢猛將一日了山程樹連新緑千林暗日轉斜紅半野明稚子别來應念我候門深喜馬蹄聲抵簡池呈元質進孺二首持此迂愚漫浪身忍慙一出竟何營枕邊客意兼寒意門外溪聲似雨聲易辦蓬蒿三畝宅可無藜莧一杯羮青衫豈是官人樣白鳥私憂説敗盟竹生稚子鶴生雛重到君家舊隱居病後苦無多酌酒别來唯有自鈔書身方逐食從飄蕩學久師心恐闊踈慚愧故人相念意欲行為我少躊躇呈德茂德茂是日收家信秋入羈懷勞我思愁兼歸夢到家遲有人來得平安字無事編成酬唱詩相伴幾經江月照同行更賞峽山奇祗應便把州麾去還有三年不見時十月十五日同黃大博出城休沐來尋九里松故因晴日覺㫪容寒餘淺水紅衣盡淡抹輕煙紫翠重倦向山僧談白葉歸從逋客醉黃封塵埃眯目成深省何處招提鳴曉鐘送張仲山守唐安二首六十専城髮未斑更於何地覔三山不妨談笑催科裏正賴清涼熱惱間到日紅梅留臘在公餘翠杓酌春慳胡床有月堪乘興客到南樓不下關客謂所薦士也南浦波輕草色微蹇驢遙路獨依依暖風旌斾春隨去細雨犁鉏麥正肥驛騎蚤聞催迅召邊屯猶未解重圍謝家父子名江左折屐行看破賊歸送崔子淵祕丞出守小益二首寶峯山下識君初豈但聲華在石渠海上三山元咫尺人生五馬少躊躇鼎鍾事業那能免丘壑情懷自覺踈安得一帆相逐去故園春雨長新蔬晉公幕府總豪英末至非才愧長卿已去化爐金尚躍更分客袂涕空橫早催劍棧迎千騎更借湖山勸一觥水自嘉陵流到海尺書應有故人情送孫賔老守三池二首自藝心田歲自收天翁兩眼月臨秋近臣薦鶚方成表吉夢逢刀遂得州吏術無多非問馬機心已盡不驚鷗三溪便是桃源路更欲武陵何處求百萬貔貅尚枕戈將軍未復舊山河非干使者徵求急正奈窮邊餉挽何頗願有言先牧養不妨自署拙催科公餘儻暇尋遺事塵鎖荒祠望刮摩送魏德源守普慈二首一毫不露見全身德覘徵符捷若神嵩岱自髙元地勢球琳非琢本天真出山聊作無心潤著物應名有腳春喚作使君猶未解豈知遊戲兩朱輪東梓名州最普州蟇頤相望氣橫秋青襟胄子迎髙朕竹馬兒童識細侯只有愛民心尚在可能憂國淚空流摩挲疲瘵無多事緑野家家劍換牛送黃仲秉侍郎出守鎮江十年朝露厭鳴珂華髮蕭蕭奈倦何鸞翮九霄穿日月龍驤萬斛飽風波古人不見吾猶夢直道能行恨亦多駟馬錦衣兒輩事只須持此答岷峨遙看北固海門秋千騎東方占上頭去國尚多憂國淚送君那免别君愁風遲宴閣清香凝月滿兜零晚穟收北府名樽天下説亦知能到故人不次黃仲甄峽中韻九江度盡惡風波峽口窺天一握多亦愛吾廬覺歸好數乘此險奈親何響迎濤瀨將愁上青惜峯巒等夢過不管行人聽不得暝猿和雨嘯雲蘿十月二十五日失舟船頭飽飯看揚舲忽作翻漿不反瓶萬死一生真是幸九江三峽未嘗經尚收棄物乾坤大薄恃陰功祖考靈憂患偶來須理遣可能為汝更星星泊采石二首何時便有此山川真宰懸知恐偶然唳鶴驚風前日事落漚斜照晚來天燬犀無用撩幽怪洗盞先應酹謫仙暝角吹殘吾欲老五陵佳氣隔踈煙江頭楊桞淺於金澤國餘寒春未深才見桃花能慰眼便同躑躅每傷心瓊枝璧月自惆悵山色潮聲無古今間訪闍黎倒戈地正應漢德有謳吟舟中一舸乘涼載夕暉晚來白汗稍停揮近人初月當頭照趂宿輕鷗直下飛江國有天須恣買岫雲無雨莫空歸新秋漸到灘頭樹先遣蓑童問釣磯月夜江上作月與清湍一樣流不妨夜色尚淹留已將船作青天坐安得江為大白浮恐有幽人釣寒渚正須橫吹起危樓年來身世無拘管便是波間一葉舟水後過淮安金堂皆非舊路向來茅屋半驚湍嘆息流亡久未還已覺重行非故道只應無恙是青山旋藍偃嶽元常事深谷為陵亦等間衲被蒙頭都莫問未當居士一分頑焦山漢末焦光隱於此是日乃其生日土人會者甚衆桂樹蘭叢藹宿薰楚辭一曲送迎神豈聞鈎黨能留漢故有桃源可避秦欲記曾來終草草多慙浪走秪踆踆却尋揚子江頭路依舊楊花愁殺人連日隂雨未及一到金焦二山病中得梁文佳句枕上吟哦不能自已復次韻雲滿長空雨漲沙金焦一望去非賖擬拋塵網尋僧舍更著煙蓑訪釣家北固江山仍壯麗南徐風物尚繁華只愁病客難登檻且待金烏出海涯再遊蔣山繫馬松門竟日留一燈深殿炯清幽杖頭猶識齊梁讖屐齒曾經王謝遊瑟瑟新毛吃老樹娟娟眯目破紅榴風鈴塔上知何語應使行人估客愁江南春晚見芳菲雪白梨花照客衣步步來求諸佛記塵塵全現祖師機不禁戰伐山河老猶説經綸俎豆非共飲名園那惜醉落紅故故傍愁飛久留蕪湖待巨卿仲甄不至吳波晴浸夕陽紅一語丁寧北去鴻頗覺淹留添髮白不妨羞澀剩囊空枕頭靠睡禁長日舸背占旗惜便風想得家山俱在夢亦應煩悶略相同蕪湖晚步迥陂積水長蒲蔣散步郊原借夕涼塵袖風巾嗟久旅稻畦柘徑似吾鄉蛙聲月色當空曠㸑火人家在莽蒼望合碧雲人未至滯留愧客問行藏遊長蘆他年天眼識褕褘千柱如今鎖夕暉笑説老禪操一葦戲呼靈媪授三歸波濤嚙岸蛟龍惡荻竹抽萌鱠縷肥曲水流觴記今日晚風直欲透人衣金陵二首龍蟠虎踞帝王州屢歎降旗出石頭不惜家居撞壞了可因歌舞破除休露桃滴滴啼宫井風桞條條絆客舟春水一江流未盡不禁更問幾多愁江城疊鼓晚停撾遊子翩翩念歲華水底乾坤浮日夜沙邊鷗鷺老煙霞漁人能説陳隋事燕子猶尋王謝家南北自分仍自合不應全殢後庭花午飯髙橋院招提下馬憩逡巡野飯親烹澗底芹二月韶華聽啼鳥百年心事信行雲不禁烈日花光薄更抹微煙草色薰老衲未知風木恨向人猶説故將軍院僧不識豫頗談先大夫之政遊虎丘次仲甄韻逢山到處為遲留行到東南第幾州終古香燈憑一作尊像教可人軒户稱山丘苔封鐵色千尋壁日麗雲章百尺樓腳底全吳何足小待將八極恣浮遊人日同諸公自馬溪登道宿無為塵埃眯目浸填胸日日青山在夢中改歲人家無一事並遊文社有諸公招提夜語驚山鬼野店春沽醉病翁緑塢紅村誰境界自憑好句占東風次韻彥博遊無為馬溪併呈孫隆州塊處無人語合頭出門猝猝又還休縛茅晚歲欣同社並轡名峯得勝遊松下一筇真可老山中五月已如秋未應斗粟全關念更為先生幾日留又次韻彥博遊無為寺二首靈蛻巋然謝垢埃焚香却立嘆竒哉自從新歲門常掩不見青山眼懶開飛觀千楹孤鳥墮齋盂萬指曉鯨催亦知空劫已前事浪説十生曾去來東風力弱未揚埃密泛叢蘭有意哉可是伸眉須酒滿只應彈指又花開吹毛句妙無人領擊鉢詩工著底催照水只愁羞冕紱勳名蓋世亦時來遊長松聞捷音十里登山訪定身衣邊猶帶簿書塵僧厨筍蕨隨齋鉢禪窟香燈話宿因便可扶犁老岷蜀已聞傳檄定咸秦家家叉釧何須惜難買堯眉一笑春次韻何子聞安靜觀翩然逸想九霞間仍是霓衣與鹿冠塵劫三山元自近神官一字固應難雲煙萬瓦虹欀壯氷雪千幢鵠輦寒堪笑木強韓吏部如何容易撮靈丹日壓茅簷醉擁蓑靜聽寒溜奏雲和深藏本自身全露瞪視元知語不多紫府地嚴須一到蒼崖文古要重磨新宫固是叢霄樣應有胎禽憶舊柯郊行至天王院郊行不欲經城市厭見塵沙漠漠黃響樹蜩螳憑晚吹繞陂鳬鶩占殘陽青山與世久相絶修竹於人未易忘下馬招提揖僧話始知塵境有仙鄉挽張雅州彥成酣飽風煙德有芽從來三戟是張家翩翩羣從同時貴落落髙門一世華人自不欺寧用忍身如可贖但空嗟路人泣指飛丹旐猶憶雙旌卷暝霞三年流落塞垣春雪屋氷廬樂藻芹司業頗知憐鄭老薛宣能不吏朱雲鶚箋重剡新如昨蟻壤髙眠喚不聞一掬壠頭知已泪霜風吹墮白楊墳自少城解職事還邑二首塵埃一出竟何為白竹依然晝掩扉只應為客重為客便欲得歸寧得歸獨鶴靜臨寒沼立遊蜂間趂落花飛東君老大人消瘦憑仗清樽一解圍胡床卯飲帶餘醒身世如天行白雲竹簡讀殘聊一嘆水沉燒盡更三薰癡心久絶臨淵羡老手唯便植杖藝自有此生須自斷豈能曲折問靈氛靈氛古之善占者送劉元圭犯寒過我喜仍驚節物峥嶸更逺程劇飲投車輕十日細談剪燭易三更故人髙義千鈞重久客歸心一夜生為語溪翁好相念時將蓑笠曬春晴弔無為照老三首彈指超然一念初從儒從佛兩蘧廬十年身走半天下萬卷人稱行袐書故自髙懷嫌入俗不妨兒輩共憎渠臨行半偈如何道裂轉虛空最起豫裂轉虛空師遺偈也記得三溪溪上春瘦筇容我夜敲門一生幾見此人物十日九從師笑言間得得來非有意冷湫湫去若為論西山第一煙雲窟好駐髙人雪月魂六尺巖巖鐵石姿可憐一病不支持荒榛半壠獨歸處暝靄數峯無見時未割塵緣聊灑涕欲尋陳迹但哦詩蕭蕭秋雨山中夜負我他年對榻期和葉六舅李杜主盟詩有聲文推韓桞著章程二三子者皆人傑五百年來並世生但見詞源倒三峽豈知武庫足千兵勉君須把分隂惜莫問紅塵雨共晴費文達除夔漕作此賀之三首分明餘潤徹眉間道德根源固曄然寶篆印泥初不著神機貫札自無前絲綸新渥榮三晝鼎鉉深知眇一涓兩禁只今誰妙手岷峨人物半吳天吉音一紙疾郵傳白帝城頭勸著鞭楚樹已沾新雨露蜀江行換好風煙政須急拯溝中瘠不用多流地上錢一節故應關象緯向來兩使動星躔刻鵠工夫愧不量弓裘遺緒可能忘一㕓未遂耕桑計半世空磨翰墨場桐燼偶收非有意璧瑕誤指亦何傷霜松不學間桃李報答東君日月長同邑寮飲望錦亭小亭挈榼共登臨濯錦城髙隔暝隂元有乾坤堪著眼却因身世苦驚心碧山已盡天猶濶黃葉欲殘秋更深已把安危屬王謝酒闌不必淚沾襟獨步凍殼藏龜太窘生驚心已覺歲峥嶸倦慵把易床頭看獨自尋梅樹下行溪面氷花寒更結屋顛雪意晚將成一生與物無深分竹葉相看合有情書事五十光隂兩歲過頭顱間處自摩挲隔籬山影誰招去滿樹梅花獨占多物色年華同我老蜂情蝶思奈渠何少時一劍明秋水放在塵中久不磨偶成早年種竹作漁竿笠澤煙波夢未闌已向塵根消縛脫猶將文字校甘酸風松自有間宫徵溪鷺初無俗肺肝最愛少遊平日語墮鳶跕跕遣心寒人生偶爾竟何須點檢間身一事無可笑戰蝸猶曳甲不妨夢蟻却分符夜涼白月誰相過酒盡清樽可更沽作箇生涯若箇是步兵不擬哭窮途離家記得臘前時吹盡飛花了不知傍枕厭聽連曉雨援毫愁賦送春詩百年直好平章看萬事仍須爛熟思臣朔不堪當世用唯應索米救朝飢獨行飽飯腹屢捫欲出未出星縱橫梅花於人逺近好月色隨我東西明香來適與鼻觀會夜久忽遣毛骨驚急須喚取陳夫子欲與平章此段清即事懶步東阡與北溪一春心賞苦多違墮紅藉藉癡蜂醉稚緑隂隂乳燕飛去國三年應自笑封侯萬里不如歸門前車馬能來否午睡醒來獨掩扉愛春未得一錢酬獨倚東風搔白頭花影入簾情苒苒竹風挨枕夢悠悠黃鸝欲下無誰語碧草相看始欲愁老大别無新伎倆只憑詩句寫風流雪巘雲林共莽然世間那有此江天曉檣攙日何時到夜柂鳴風幾夕眠間卜家書燈似粟略開旅抱酒如泉輕鷗飛下仍飛去汝在江湖是散仙仲甄見和復用韻坎止流行亦漫然斯文未喪本關天冥鴻雲外知誰報怨鶴山中不得眠連榻故人非楚越杖藜幽約在林泉盛詞終日供吟諷骨換元知久學仙即事清江與我共天涯若到滄溟始是家曉渡換舟驚宿鴈暮林繫馬散栖鴉山童老木才餘骨潮落寒汀半露沙只恐行人不著眼一川秋色在蘆花次韻楊文甫監茶名山新建學橋二首髙棟浮空插萬甍來遊誰是魯諸生規模要識鳴絃意土苴猶消擊柱爭馴壠雉驕佳氣象集林梟惡好音聲白頭老令能知此莞爾相撩意未平赤欄畫柱水光中更愛豐碑筆吐虹霧市溟濛鼇闖首雪花錯落馬行空關門近接俱天險溪水平流亦海通執朴笑渠憂詛者不知説豫坐收功元質攜客渡江飲於村店一篙寒碧碎鱗鱗數尺孤舟僅著身江水煮魚還地脈瓦盆盛酒見天真頗容老子賖間日聊與青山作主人不用樽前羅粉黛逺峯元解作眉顰招黃太博飲去嵗是日離家從來官職慣如氷便是青衫行腳僧去歲離家今日是故人招隱幾時能早衰鬚鬢逢人問太拙形模引世憎均在客中誰作伴如何不共醉騰騰夜興疲筋弱骨畏歊蒸頗欲清言濯肺膺風亂飛螢光細碎露圑幽篠醉懵騰只應愛月癡猶在更覺憎蚊忿未懲竹屋紙忩風雨夜幾時書册近青燈次韻大人江上秋興織水輕煙擘不開晚峯濃翠積成堆吹殘黃葉風猶舞飛盡青天鳥却回萬古關河空拊髀半天風雨獨持杯欲將直道干侯印政恐舟從陸地推書懷靜閲膠膠擾擾身細從物理究虧成一人譽復一人毁五鼎食仍五鼎烹怪木莫題居士字修篁合著此君名西風又起塵千斛望拜生憎白羽橫衫似荷枯嫌絆縛屋如斗大費支撑寒蔬日日同僧飯拄杖時時伴鶴行聊託蓴鱸非厚味漫言松菊本真情山中亦有間田地可惜離家久不耕次韻大人書懷萬鈞筆力等間扛占斷溪山福已龎撲鼻寒梅香樹樹照人新釀緑缸缸大嚴淨社誰投足小恕詩壇肯納降莫為不侯空嘆息將軍才氣自無雙雲翻雨覆不須論捫虱何妨坐對溫政恐移文邀俗駕可能垂箔走髙門寒松卧雪不知老脫葉經霜無幾存醉著錦袍堪一笑翰林風月我諸孫何如莫莫與休休分付煙波一釣裘心向青山貪未了夢隨白鳥去無由間雲猶閣為霖潤野水空橫濟物舟安得杜陵詩老在從渠每日醉江頭次韻程進孺書懷寸梗悠悠寄一城主人留客亦多情目窮斷鴈投空影耳著清江徹曉聲濁酒半樽心易醉逺書一字眼偏明無家更甚無魚苦付與先生好細評次韻樞相雪中之什空明無際了寒天戍堠消鋒弩絶拳平白萬方包險穢清泠一片起沉綿山登姑射欣逢歲賊破淮西欲問年更長嘉陵千尺浪春風穩送五湖船
