body:
  text: 淡齋集卷七宋李流謙撰七言律詩譙允蹈知縣和豫所作二詩復用韻答之向來沮洳懶扶竿獨有詩情久未闌把菊風流元曠蕩紉蘭氣骨自辛酸賞音定許推夔足知味寧論食馬肝勝日從公窺祕藏珠星璧月照人寒窮年斗粟亦時須清坐那能論有無洗我破樽傾竹葉覔君佳句寫桃符種瓜晚計應先定畫餅空名不擬沽辦取芒鞋山裏去羊腸縱險是夷途次大人韻二首盤礴誰知畫史真向來唯有宋元君試除學道有底事為問決科何等文棊罷玉枰收碎雹香殘金鴨轉微雲獨騎一馬悠悠去間訪江頭白鷺羣六品官資叵厭卑髙懷自不入時宜却尋清渭歸垂釣猶向鈞天憶射麋長日只慿詩遣悶暮年全藉酒扶衰早將鵩賦胸中了賈誼何憂絳灌疑又次大人韻卜築城南幾歲華滿川煙雨富桑麻武陵未用逃秦俗盤谷從來屬李家橫拓小溪通畫楫剩栽疏竹間梅花更饒一斗詩千首不信間居樂可涯遊安樂次句龍元應韻得友何妨並轡行眼明木末數峯橫真遊與世寥寥隔滯念逢僧稍稍平不復定身懷故宅空餘遺像閟荒坑莫教學道傷遲暮世路低回已半生次元尉伯言韻燭影紅餘㒒屢更不知飛霰集前榮終年客有刀頭恨半夜春從酒面生華髮風埃羞漫仕廢疇煙雨負深耕誦君好句迎新歲更醉屠酥最後觥譙丈復見貽仍次韻答之二首筆陳旗開豹繞竿敢持一鏃傍門闌朅來戲作鳬飛舄老去嫌為蚋聚酸塵土簿書慵挂眼瓊瑤文字喜雕肝寄箋閶闔誰相問九虎近人毛骨寒只得公詩百不須萬金人有此應無可容輕易秦庭璧已戒牢藏晉鄙符慣客鳬鷗迎野步及時菘韭薦村沽幽棲為問能來否朝市山林自兩途再賡佳什已致牽羊之請又辱不鄙垂教蓋大巫困小巫欲視其顛踣為戲耳輒作二章以足小成之數鱗鱗新緑漲篙竿飛鴈聲中歲已闌梅蘂尚能供冷淡酒杯那復問甜酸徴招不入幽人夢節物空驚壯士肝趁取芳菲行樂去麗詞妍唱暖春寒講摩師友我尤須此道今人已絶無頗欲相從問奇字故應未暇注隂符竹嫌影薄乘春種酒怕樽空帶雪沽杖屨往來憂不數恐公早晚躡華途宇文德濟約遊崇慶值客不果從德濟有詩次韻二首午枕風輕睡足時起來間掩竹間扉登山劇欲君聨臂出户那堪客挽衣失腳半生沈世網掀髯一笑見天機青山好去應須去蘧瑗于今已覺非跨海仙人安在哉幽尋欵欵不須催雲蘿有約遽相失杖屨幾時能獨來半日清談容易廢百年幽抱若為開新詩小慰參差恨快讀聊將勸一杯次韻楊師仁見贈鴻鴈行中接俊遊不將千户比荆州自于種種推先手可但區區放一頭揚馬不妨生絶代鄒枚未肯老諸侯天寒翠袖愁如織應念塵侵季子裘師仁再用韻復作一首室中元自有天遊海內如何止九州送老只慿書萬卷傳家不用橘千頭便當野服從逋客未暇巍冠伴沐猴一動天文兒戲耳苦煩天子訪羊裘王正卿何道夫和嘉字韻詩至數十道夫贈豫數篇晉卿亦贈一篇因次其韻凡六首從君未省涉津涯白璧明珠屢拜嘉一吸湖江真大國僅除風雨亦寒家簿書笑我忙官事筆硯饒君管物華世味可能爭臘毒餒蛟饞兕漫搖牙放浪山顛與水涯藜羔有味薦珍嘉根塵要識元非我言語懸知未到家霜渚澄波空漲潦風林脫木淨浮華公明領取休論價處事何須更作牙清言元論極邊涯南渡風流繼永嘉中散一生慵作吏淵明無日不思家悠悠官路降胸臆苒苒年光侮鬢華人説亂蛙勝鼓吹欲將藜杖比髙牙戲論無涯與有涯委心沖漠固清嘉衣裳草木元非織窟宅雲霞豈是家瞪視恐同髙長史神交宜伴老南華只應一念超塵劫安用神漿夜繞牙道夫問豫求妙通像越王飛觀插天涯小異何人識孟嘉别後文章尤造理向來學術自成家諸生薦士皆時論此道逢辰固國華行脫羇銜謝拘迫雲窗歸理萬籤牙贈晉卿洗甲傾河漸可涯北征猶記宋元嘉石劉姓字非圖籙軒嚳乾坤自我家原上鼓旗寒朔吹日邊詔令掞春華舞干元是吾皇事不必將軍號虎牙樞相遊吳園再用前韻等間驅雪作晴天夾道從公立萬弮白甚自矜梅淡佇青回稍覺麥芊綿不知今夕真何夕共説明年是好年舐鼎恐無雞犬分一江還我捕魚船任德廣通判拉遊長松以詩見貽次其韻稽首頭陀問八還揚眉應已破元關苦無骨相侯千户薄有生涯屋數間笑讀道書蒙絳帕喜澆茗碗酌青山從公一瓣薰知見谷霧無心澤豹斑鷺行鴛列幾時還虎豹何曽限九關雜沓羣公半天上婆婆老子但塵間平戎正倚二三䇿招隱休論大小山浯水斷崖磨欲盡慿君染筆續彪斑已成倦鳥不知還碌碌無奇合抱關五斗未供雞鶩飽一身長占簿書間何妨使我留東閣久自從公仰泰山佳句傳來渾舍喜亟將病目洗斕斑德廣至中途再示詩次其韻肩輿又作帶星還騎氣遙瞻晚度關已覺勝遊同夢裏不知秀色尚眉間鞭鯨浪欲浮滄海賣鶴猶堪買好山幾日褰衣扣黃閣雲腴重試鷓鴣斑次子友竿字韻百戰殘兵但揭竿每聞風鶴意先闌懷中鼠臘元非璞味外鹽梅不止酸細讀知君應掩口苦吟笑我已刳肝中天赫日臨無際一點螢飛宿草寒次韻仲甄見貽向來出處有心期未厭雲霄戢翼飛留滯兼旬空悵望逡巡半路偶同歸却欣夜語仍連榻尚憶朝回日典衣里閈齊年班又接世間如我與君希長蘆次德茂韻捲雪竒觀千丈瀾詩情撩動未應慳却收浙右三年夢仍對淮南數尺山靴板隨人元自漫田園覔去正須間風檣獨立看飛燕家在孤雲落照間送馮夏卿再見三池已舊遊向來交臂錦江頭味融實際氷河泮心印微言水月秋雖作燕鴻猶邂逅故應蓬梗合漂浮相思别後才餘夢身在刀州望梓州有感眼看燕雀閙雲間塌翼蓬榛笑孔鸞未暇持竿釣渭水却因採菊見南山床頭有酒三冬足案上無書一日間世路只今難著腳定當何地置疏頑飲文氏園是日鵲噪于庭坐上燭花無數就試者凡五人虎變龍騰各有心諸公髙宴盍朋簮爛開數對迎祥燭合噪仍來報喜禽人似月娥元自近酒名天祿莫辭深坐中五客聨登去他日華堂榜桂林次韻陳彥博梅飲之什又向疏梅檢校春乾坤浩蕩日趨新一樽樹下喚深酌數歲天涯思逺人正倚交情論晚暮直因臭味作疏親淵明嗜酒嵇康懶只覺年來此是真送李閬州二首耳熟才名四十年憂民憂國兩華顛不妨銅竹仍三剖要是金門竟九遷連歲爐錘専造化諸生岐路託飛鶱餘丹乞與間雞犬亦許身隨絳闕仙少陵曽賦閬州詩苦説城南天下稀鈴閣訟間簾半卷胡床客好麈頻揮著鞭尚及春耕勸促詔應隨曉仗歸他日遺簮猶在念端容杖䇿扣黃扉再用魏城驛韻貽白綿州多病相如故倦遊歸逢清潤麥天秋回頭漸逺將軍幕飛夢先登帝子樓磊落聲稱元古郡醉吟家世自詩流此身只擬春中老莫問君平住益州貽白綿州曽陪芍藥醉春風轉首三年似夢中誰使衝泥千里去又欣剪燭一樽同名章越好供妍唱舊學全疏愧近功莫怪分符少留滯此邦曽客少陵翁寄送張雅州二首融和盎盎上雙眉曠度真成萬頃陂岱華自髙元地勢球琳不琢本天姿地方千里我無事春滿萬家人不知預作去思無限意攀轅送處似迎時二年學舍冷如氷岌嶪龍門許屢登可但不遭官長罵只應獨愧小人乘身留紫塞天一角目斷朱輪山幾層為問何時到墻仭清宵逺夢故堪慿七夕馬逸已而獲之門外喧呼驚失馬天邊未暇問牽牛報恩不作雀銜玉快意遂為鷹脫韝他日蓋帷吾已許暮年繩勒汝應羞故知多憶橫門道定厭青絲久絡頭送魏德源倅永康晚歲從誰覔賞音浪將孤興託瑤琴聊為風月平分客莫起山林獨往心碧草但能供别恨黃花却解勸清斟我猶未制思親淚更聽離歌定不禁别趙惟直邂逅都城一笑休却來萬里共羈遊關河地迥仍分首桃李春深已放舟詩卷長留開倦目酒杯盡嚼豁離憂追風健筆兼豪氣期子蓬山更上頭秋懷次黃仲甄韻畏日全無客到門一溪間與白鷗分繞樓山色時時見抱葉蟬聲處處聞戰罷碁枰無宿恨夢回茗碗有殊勳力田尚可持門户我欲歸耕谷口雲破曉庭皋一葉風年華苒苒笑羇窮獨攜拄杖行溪曲恐有拿音出葦叢世界大千塵偶集人生三十日方中只須飽飯隨緣過矰繳何曽到塞鴻喜晴一秋今日是新晴晚稻懸知有幾分抱濕庭蕪猶靡靡傍暄溪卉欲欣欣顛風料理丹楓樹返照留連白鷺羣搖落只供騷客恨故應長倚醉醺醺重陽偶成百尺危樓倚瘦藤輕隂小令正秋深山雲洗刷供晴眺杯酒飄浮笑淺斟漠北烽煙空抵掌水南松竹每經心紅萸紫菊誇強健醉帽無人獨自簮宿髙橋懷仲明闌干投晚俯煙霏全不支梧酒力微沙鳥犯寒猶獨立林烏趁暝已先歸繚愁亦笑溪為帶障逺端疑樹合圍歲晏客天無好夢最憐清露漬人衣太平宫一馬騰騰上翠微松風瑟瑟解吹衣故宫亂後仍華壯使者年來果是非何日身能翻蘂笈只今心自託金徽兩林不到猶遺恨落照銜山勸客歸送家連父解綿竹丞猿臂將軍數自奇白頭州縣竟何為斫墁未盡成風巧測管才窺澤霧姿流水繞除空日日西山拄笏謾時時一杯相送貧無力剩有新詩説去思送計祖仁雒縣丞青青楊栁灞橋斜滿酌清樽莫嘆嗟可是因循成别緒只應咫尺便天涯未論流水千竿竹且看春風一縣花渺渺故園情最苦不知歸夢屬誰家次韻彥博中秋不見月露華浸竹冷姢姢想象嫦娥能少年萬事只堪搔短髮一杯不擬問髙天駸駸夜色投書幌的的心期在釣船可笑薄雲工料理何曽遮却一分圓學中曝御書次少虞韻晴暾煜煜眩晨光洗眼來窺雲漢章身拜玉階元夕夢手披金笈有天香風翔鳳翼尤妍媚雲捲奎躔不覆藏尚想承平間氣象從臣鵠立侍君王李花春寒怪底一分加元是東君雪作花已後殘梅矜夜魄強隨飛絮舞朝霞霜葩薦斚何人共碧實堆盤儘客誇為汝泫然應有意騷人端是感年華井上即事九陌黃塵涴客裾隨人亦恐到茅廬朝朝山色供慿檻夜夜溪聲伴讀書可要功名驚宇宙分知骨相合樵漁晚來小艇衝煙出江上有人爭賣魚挽郭敦復太少城中斂板初識公鸞鵠自清癯持心要是忠厚者遇事決非章句儒豺豹欲前終落爪參辰無地可彎弧他年白鶴同歸否猶有髯龍老未枯送王和叟赴果州芝蘭祗合在階庭公子翩翩更老成白日朱門三列戟黑頭華轂再専城一樽别酌心先醉萬里歸橈夢易驚欲問樓髙髙幾許跨渠仙鶴到瑤京晚飲趙惟直以果薦知所從來酌以一大杯猶帶枝頭淡淡黃飽經十月洞庭霜且傾蜀客千杯酒頗記吳姬三日香可得一餐逢玉屑故應百感為瓊漿此江幸自東流去何不和根移取將送張子勤九隴尉老鳳髙棲雛鳳飛山林鍾鼎各相宜出門馬首亭亭去斂板胸中落落竒頗憶濁醪過我夜正愁碧草送君時如何數日中年味恰是今朝聞子規貽長松寺慈禪師一年山色好相看欲去仍來倍黯然大士初無留客意幽人更結住山緣梨花村落清明後梅子園林五月前我已到家春亦老酒杯猶足趁流年用宇文龍圖韻贈龍華印老少年一口吸西江聖處端能走季咸淨觀清泠橫一水逺懷孤秀揖千巖溪雲卧久看頻度山日談餘訝半銜便欲瘦笻來問訊上方應恐隔仙凡再用韻送印老抖擻孤懷十日談不將幽憤託巫咸别來斷鴈虛秋信夢破驚猿憶曉巖脫葉趁風聲互答歸鴉赴日影相銜臨分半偈無多惜濁骨慿師為點凡挽楊彥序長憶君家得雋多庭前桂樹想婆娑岱雲觸石才膚寸溟浸稽天但一波頗欲弛韝觀縱擊可堪伏櫪起悲歌人生泡熖都難據惟有豐碑屹不磨閏重陽有感次宋景文公韻濛濛煙雨濕間愁往燕來鴻共逺遊引滿白醪欣再熟儘開黃菊耐深秋眼前節物重慿檻醉裏商歌緩擊甌苦愛佳名歎塵爵淵明髙興轉悠悠寄李仲明夜床風雨憶相過節物驚人奈老何只有孤鴻知我意每因明月為君歌千山夢去無由到一字書來已覺多餘耳向來真義合不知底處便容戈寄劉德父解攜仍是一年餘本自情親聽迹踈子去合登青瑣闥人言方駕短轅車向來花月空餘夢近日詩文定起豫塞鴈若知懷逺意寄書聊為問何如别費檢正二首香案前頭自乞歸歸心先逐鴈西飛豈關松菊吾身重偶託蓴鱸此意微行樂不妨千騎擁照人何必萬釘圍兒曹悵惜先生笑付與醇醪定是非主人愛客客留連敢比荆州遇仲宣親奉綺談逾十日空勞清夢隔三年未能輕去田園樂那得長居几杖前真約賞音無幾箇故應感激易澘然桃花自然穠臉與深唇一味繁紅也絶倫滄海浪傳千歲種武陵應有四時春去年崔護詩仍在前度劉郎意獨親亦要清樽相料理可能但倚筆如神即事寒食已過風日好城郭稍背郊原幽雙扉晝閉亦何事一杖攜春仍浪遊但覺桃花成老大不知楊栁尚風流霜螯蠟蟻君須醉細雨疏簾罷遣愁遊野航次元應韻三首平地坐我帆檣中翠峯出沒工為容輕鷗舞晴沙照影蒼蛟吼浪雪薄胸漁舠繫月江一曲樵斧斫雲山幾重詩翁忽來吐佳句物色才情元一宗日落未落空明中琉璃夜色開天容一江不浣清淨目百榼能平碨磊胸神山在前若可到江妃去人無數重錦袍酌酒醉起舞跨鯨仙人乃吾宗挂起西窗橫笛中白鷺亦有佳客容江風脫幘吹短髮明月入戶窺愁胸只須茅茨補疏漏安用樓觀相復重人生趣尚各天性古人願識韓朝宗遣興不於蝸角更稱兵放下諸緣即太平但有千篇足傳世不須二頃可謀生盤飱粗糲聖賢事門巷蕭條千古情緩炷爐熏引輕吹道人心念一絲橫邂逅成功一世驚不知元逐衆人耕結茅容我庇風雨識字教兒記姓名間輒吟詩真苦相醉能遣客即真情晚來溪月延微步浴鷺浮鷗俱眼明翛翛楊栁倚門斜客至遙疑靖節家半世功名間日月百年生理仰桑麻只知上將元屠狗不信通侯亦種瓜靜想升沉堪一笑清樽且趁未殘花向來穴紙笑癡蠅猶覺文章是小乘四壁圖書聊隱几半窗風雨屢挑燈卑枝早厭鳴岡鳳尺水難留跨海鵬未試屠龍一分手可能問舍愧陳登疏疏簾色映蒼苔屋角諸峯曉翠開蝶護殘花癡不去鳥爭餘食慣仍來向來棲遁初無意從古經綸别有才抱杖風前一長嘯破愁安得即時杯小窗日影轉悠悠卷盡殘書却到頭香茗半甌輕列鼎好詩千首勝封侯朱絃無復人三歎白璧空慙我屢投酒好但宜供客醉癡兒可忍換涼州楚客近添蘭九畹渭川新長竹千尋叵堪多病侵豪氣猶喜長間契宿心滿眼圖書吾事定杜門香火佛緣深海波倒立風霆峻未省鱣鯨竟陸沉
