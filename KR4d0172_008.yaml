  - {type: page-break, offset: 0, content: '', id: KR4d0172_WYG_008-1a, image: WYG1133/WYG1133-0653a.png}
body:
  text: 澹齋集巻八宋李流謙撰五言絶句詩江月二首秋江與秋月誰遣恰相和借我蓑衣着三人亦未多皎皎映澄漪千尋没到時篙師輕轉櫓可惜碧琉璃姚和中母夫人年八十二殊増獨無之嘆因遺小罌使歸為夀副以一絶舍肉増長嘆分甘助淺斟贈君椒栢酒慰我蓼莪心長灘乍脱驚濤恐猶為曲木看昔人憎勝母吾亦畏長灘雲莊耕者莘野樂堯舜谷口豈真卿自是不可掩區區非近名過東州境見耕驅牛耕側坡牛困人柰何我念田家苦東州苦更多六言絶句詩偶題小溝溶漾可渉彩舫夷猶不驚晩酌忽逢名酒當時打破愁城遙岑數寸斜日楊柳一江晩烟追恨風拘雨阻那知鴈後花前關王祠諸葛張陳已上將軍未數黥韓暝夜險途風雨令人懸想辛酸萬人傑誰可敵千載名終不磨此地晩鐘晨梵生前鐵馬金戈七言絶句詩先公三池祠室學官相傳占為公署同年李南才毅然欲復其舊貽以四絶句老僊有力在斯文廪士餘糧但一塵列屋誦絃知所自杏壇今秀幾株春末俗何由到古人傷心祠室漫名存風榱雨棟那堪說石刻汙漫像設昏一椽不得留遺愛百世寜能保奉嘗豚犢無稱益先美碎碑伐樹亦尋常一念愛親無彼此向來情義篤年家稍伸九地幽幽恨此事期君可咄嗟次韻嘲落梅代梅答二絶不是春愁减素肌從來鶴骨可能肥便將夢裏一般看恐是幽人作蝶飛吹開吹落本無心萬物自秋還自春若把穠花校枯寂本無諸妄亦無真彦博歸自劒陽其家梅已半落作詩見示因次其韻為問春從何處歸晩村烟雨細絲絲從來漏洩寃庭柳㸃檢分明是此枝杜詩云漏洩春光是柳條溪水泠泠欲雪天風鬟霧鬢不勝寒定同子美鄜州月應恨閨中只獨看愛惜濃香恐過時劉郎何事苦歸遲只應昨夜幽窻夢飛到君邊未可知梅花昨夜臨溪一樹開人言應與鴈俱囘霜葩只在寒梢上却是春風自去來殷勤蝶障與蜂遮一㸃幽香不許賒嵗嵗相逢只如此問花羞我我羞花照影月斜寒瀬淺吹香風細夜簾踈蕚縁華來誰得見借君雲珮與霞裾似嫌潔白太清寒故着㣲紅畧破顔俯仰聊同閒草木不妨游戱住人間道人一味着幽禅誰遣天花到眼邊亂插銅缾看盡日向人終是好因縁戱贈智淵師二偈芙渠元不植髙原插向紅爐色更鮮拖取門前擔糞漢滿堂金玉富熏天江北江南喧世界陪了草鞋多少錢嚇得小兒成底事何如参我竹匕禅師嘗為伍伯捨縁有以狀元紅牡丹見遺戱作一絶含笑嫣然燦曉霞龍頭一種絶諸家東風有意憐枯枿乞與佳名不乞花海棠十二仙人玉琢欄帶晴帶雨總宜看東君不許尋常見可忍狂風滿地殘二月十七日同子友過宇文氏莊觀海棠二絶漸老花羞人不羞枉因風雨結春愁意行忽欲江東去錦帳三分半未収長橋納納裊東風倒射斜陽千丈紅晩色自佳人不見青山翠霧碧波中信口十絶細雨蕭蕭懶出門爐薫消盡有餘温案頭不著閒文字時把楞嚴信手翻縛虎斷蛟空有意毁車殺馬且偷閒慿君呼我為居士一味臨流與看山漫說昭君第一人氊車萬里託羌渾君王下詔求傾國不為琵琶略斷魂只須終日醉騰騰冷看榮枯本不曾蟻子側坡逢白雨婁囉與鈍兩無慿山僧三十尚童烏危坐相看一語無沸鼎可憐魚欲爛不知眼底着氷壺園林換葉日初長竹閣蓮塘意思凉除却種花并醸酒更無一事可思量庭前幽草何人種又是縁階數尺長主管風光元要此可憐魏紫與姚黄早眠晏起從疎懶醉舞狂歌任性靈丈八虵矛胸次著人言屈子愧劉伶慕陶徴君吾本意我亦能耕妻肯鋤贏得少年腰脚健芒鞋却自勝肩輿獻玉遭刖我自笑因黥得封人未量百年相勸但飽飯從渠蟻穴自侯王絶句圍爐獨擁夜深紅已是摧頽一老翁斷簡半披還半掩如今不作蠧書蟲霜乾木脫氣堅明病骨驚寒亦强行折得梅花全未吐不應於我尚含情口占午照當窻樹影疎靜聼㶁㶁水鳴除便將一日平分了半用酣眠半讀書予客三池王正卿以四絶見寄次其韻山房鏁劒澁生塵獨鶴沙邊久念羣我有好詩誰畫得一江殘照數峯雲夢中行盡好山川照水征鴻影自寒若向紫巖樓上過為傳片紙報平安佳人望斷日平西可意相逢眼底稀漫說携家終是客開愁唯有醉淋衣我來在處說君名小軸人爭睹鳯星放却他時能致此定知阮眼為君青薛公肅訪山中偶出不值公肅留詩次其韻一舸初從帝所還綵衣照日眩斕斑今君已出雲天近我尚無錢可買山紫極朝歸謝往還新篇落筆爛彪斑烏藤拈起都閒事且看西湖處處山再次才夫韻二絶燈窻仍有巻披黄此地重來似故鄉安得清江都是酒勝金滿屋笏堆床木生殊不願青黄雨露根深無有鄉臺省從渠登衮衮未妨老子卧胡床譙令以眎堰絶句見示次其韻疲氓糠覈自能肥一箇何曽吏扣扉鳯指翠梧求友集蝗無緑野蔽天飛我瘠不妨天下肥期公他日到黄扉憫農一念通精祲定遣驚雷霹靂飛次韻立春後餘寒二首挾冷朝陽未吐光小池猶有夜來霜東君自識沈潜意誰道隂柔解變剛絳帳何時得罷開為君嘆息首空囘亦知彈鋏無人聼収拾清詩分付梅次黄仲甄峽中韻二絶衆流自作一門去老子閒為三峽游弭棹初逢雲雨舘轉帆便是帝王州連日舟横拍岸風祗應身世在疎篷旅床獨蠒皆愁緒青鏡明朝即老翁舟中販鹽賈客夜吹笛賣菱女兒朝刺船沽酒得魚能不醉幾錢堪買此江天觀漁舟晩晴吏退漫凭欄注目溪光巧映山忽見漁郎輕盪槳宛如相見在花間坐上呈葉守暝紫朝青千萬層使君衙退剰登臨東華明日軟紅裏欲看此山無處尋宿白羊二絶入得瞿塘始斂愁峽山行盡放眉頭澄江一道元如許自在身心自在舟古栁維舟帶暝隂夜寒剪剪到衣稜客中不覺年華換小市人家已試燈次樂磧客裏何曾得展眉偶逢一笑莫相違酒濃燭暗真宜醉風色蕭蕭愁欲歸濟源廟海子内有二黿人以將軍目之投餅餌則至我欲燃犀起蟄雷漫誇海蘸紙錢灰將軍不是池中物也為區區餅餌來七月十六日離鄂渚一萍泛泛幾時休昨日黄州又鄂州醉語醒來都不記小灣才轉失南樓新灘三首叢祠風俗尊滛祀灘戸生涯利客船儵忽未興酬徳意不知曽有此山川漁父長歌招屈子女兒髙髻學昭君雖存九辨欲誰繼便有琵琶那忍聞蜀船南來去未休呉船西上到沙頭人生能著幾兩屐三峽風烟替往愁小孤二絶句蜀犀無用苦犇忙百尺江心如許長無數鸕鷀巢徹頂只將險絶作尋常瑶池縹渺是吾家嘗憶清觴覆九霞霧鬢風鬟天下飾可須人世俗鈆華舟中大小孤山専絶險上中水府柄幽權行人股慄船頭拜小艇横江來覔錢㠶風不飽櫓聲遲正是波平月上時今夜不知何處泊買魚沽酒犒舟師蕪湖即事三首燒痕吹盡荻芽生江南二月春禽鳴閒倚柂樓看逺水依依楊柳故園情南人重魚長食鮮小魚棄擲不論錢老翁操網兒弄槳一家生計在漁船社風連日舟行遲社公有馬誰能騎不妨酌我盎中緑依舊離騷醉讀時𤓰歩兩絶顛風惡浪雨喧豗往事愁中一笑咍江上有人來喫酒故應虎子是瓊杯阿堅狼狽伏狸犇豈是長江觧有神猶憶當年南伐語㑹知正朔不歸人蘄歩四絶句去嵗南乗下峽舟西歸仍此聼巴謳題橋亦淺丈夫事未贖當年犢鼻羞數峯遙指峽中山漸喜􅡠峩氣象還萬里虎頭華髪將只求生入玉門闗一樽相屬慰蹉跎酒債街頭苦不多饒舌小僧休口藐年來何事不消磨燒紙船頭祭水神杯盤燈火夜青熒老巫得珓舟人喜想象靈君醉未醒偶成驕陽前日擬鎔金積雨逢秋却厭滛本自乗除無徳怨枉勞嗔旱復嗔霖小溪淺涸如焦釡一雨朝來萬馬犇舉手欄邊誇海若已無餘瀝到缾盆黄流衮衮蹴天來截岸夷洲不可裁鳬鶩疆封遽如許莫貪浩渺徑須囘畏日得凉才小愜因秋感嵗却成悲君看八萬四千刼只在爐薫起滅時爺娘把筆祝功名四十衣衫半是塵倦去引杯成獨嘯兒癡失學未須嗔未老形骸足自支唯憂多病醸成衰詩書猶作發丘將稽首竺乾真我師樂天已貴盃常把元亮雖貧飲亦豪等是逍遙吾自擇不能為白但為陶有弟書來喚我歸客情偏覺雨聲知恰當濁浪粘空際正是青山到夢時眼入平蕪隔暝霞有兄官滿未歸家三人兄弟仍三處指㸃飛鴻一嘆嗟仲明我友一肝腸愛子慇勤出妙方病後藥囊真壁壘老来貝葉是資糧過長橋予醉卧不及觀用仲甄韻長橋萬古入騷吟跕跕輕㠶巻夕隂巻一作墮醉卧不知清景失老㕙電掣笑秋鷹富池祠巻雪樓髙首重囘江東那得許人材只應漢鼎三分後便有英雄一聚來蕭何識信在逡廵此事從來妙若神不是將軍難着眼正應黄祖是凡人富池羅漢院有錢希白中大科赴信州别駕時所題詩有陳朝栢二絶句聖世能收晁董䇿孤舟來唱鄂君歌一看獻納元台表可特脩名在異科皮膚脫落餘真實須鬛蒼浪閲嵗華突兀一根叢棘裏不知幾見後庭花題富池羅漢院竹深樹老小禪關關對江淮千古山萬舶堆中江上樂時時簫鼓寺前還登寶公塔樹老巢翻鷹亦化錫飛近地鶴猶驚太平寺主今安在潮打山圍建業城三尺杖頭閒一把興亡隨分百餘年我來但愛松風好覔得僧窻一覺眠再遊蒋山寒山寺裏立斜暉只有垂楊自在垂不待新亭成灑涕向來已識寜馨兒六經豈解亡人國萬巻平生最苦辛只作卧龍嗟晩悟當年人畏近前嗔客中二絶客中有夢自難成未了風聲又雨聲二十五聲秋夜㸃誰人數得甚分明角聲定自與誰語月色不應無為明已作楊花着泥久無多心事惹愁生對月戱簡坐客夜凉溪月等閒斜半折寒蘆委雪花一葉與君從此逝松江烟雨著浮家巫山一何髙七絶巫山一何髙片片朝雲飛靈雨滿旗神女去夜月吹笙神女歸巫山一何髙積翠擁陽䑓欲向楚臣誅綺語莫問㐮王來不來巫山一何髙鸞停鵠飛舞上頭有路通紫霄正恐朝元從此去巫山一何髙山空夜寥寥我有不餐烟火句黄冠留作歩虛謡巫山一何髙羽衣飄婀娜歸寧金媪到瑶池爛熟蟠桃求一顆巫山一何髙駘蕩壺中春𤣥猿莫遣上山去偷飲仙漿醉攪人巫山一何髙曉雨發黛青癡兒休作髻鬟看浪起矛㦸生心兵詞踏莎行靈泉重陽作菊露晴黄楓霜晩翠重陽氣候偏如此異鄉牢落怕登臨吾家落照飛雲是舉扇塵低脫巾風細靈苖醫得人憔悴尊前㸃檢欠誰人惟有斷鴻知此意如夢令前題老挿黄花不稱莭物撩人且任破帽畧遮䦨嫌見星星越甚不飲不飲和取蜂愁蝶恨醉蓬萊同幕中諸公勸虞宣威酒正紅疎緑宻浪軟波肥放舟時節載地擎天識堂堂人傑萬里長江百年驕敵只笑談烟滅葭葦霜秋樓船月曉漁樵能說分陜功成沙堤歸去衮繡光浮兩眉黄徹了却中興看這囘勲業應有命圭相印都用賞元功重疊㸃檢樽前太平氣象今朝渾别小重山綿守白宋瑞席間作輕暑单衣四月天重來閒屈指惜流年人間何處有神仙安排我花底與樽前争道使君賢筆端驅萬馬駐平川長安只在日西邊空囘首喬木淡疎烟青玉案和雅守蹇少劉席上韻相知元早來何暮社鷰送秋鴻雁去春草春波愁目注酒香花韻綺譚妍唱怎不思量住虛無指㸃騎鯨路箇是騷人不凡處畫棟雲飛簾捲雨風流千古一時人物好記樽前語虞美人春懐一春不識春風面都為慵開眼荼䕷雪白牡丹紅猶及樽前一醉賞芳醲東君又是匆匆去我亦無多住四年薄宦老天涯閒了故園多少好花枝㸃絳唇徳茂生朝作一剪秋光阿誰洗得無纎滓氷壺徹底人也清如此萬里歸來著箇斑衣戱慈顔喜問君不醉更遣何人醉感皇恩無害弟生朝作萬縁壓庭柯雨晴烟潤三尺金猊麝㣲噴百花香暖醸作九霞僊醖祝君如此酒年年飲挿額漢貂垂腰蘇印趂取如今未華鬢三茅兄弟總有丹䑓名姓蟠桃熟也未教人問武陵春徳茂乃翁生朝作曉日簾櫳初破睡寶鴨宿薫濃笑指圖中鶴髪翁僊骨宛然同萬里郎官遙上壽五馬茜衫紅待挿華貂酒滿鍾仍是黒頭公謁金門四首晩春行不記貪看逺峰顰翠風約柳花吹又起故粘行客袂老大渾無懽意不為傷春憔悴茅屋數間修竹裏日長春睡美空竚立又是冷烟寒食開盡荼䕷都一色東風吹更白我是綸竿倦客道上行人不識着取蓑衣拈短笛沙鷗應認得春又晩楊柳曉鶯啼斷落盡殘紅餘片片風狂都不管作客惟嫌酒淺未敵閒愁一半人與青山誰近逺可憐春夢短山數尺江草江波同碧晩雨吹風才數滴行人心更急漠漠疎烟如織遮斷客愁不得腸斷故園無信息燈花閒手剔玉漏遲送官東南東南應眷倚當年麗絶今其餘幾雲錦飄香好在藕花十里六月長安徂暑只一雨滂沱都洗君好為携將蘇醒三呉生齒總道秦蜀謳吟但消得雍容笑談而致稍待秋風也擬買舟東逝收拾塵編蠧簡更飽看江山竒偉歌盛美還送往趨天陛滿庭芳過黄州游雪堂次東坡韻歸去來兮吾歸何處舊山閒却岷峩雪堂重到但覺客愁多來往真成底事人應笑我亦狂歌慿欄乆雲車不至舉盞酹東坡少年渾妄意斗衝劒氣雷化龍梭到如今翻羡白鳥滄波松栢皆吾手種依然烟蘂霜柯君知否人間塵事元不到漁蓑戱改殢人嬌癡本無縚悶寜有火都是你自纒自鎻髙來也可低來也可這宇宙何曾礙你一箇休說榮枯强分物我惺惺地要須識破漁樵不小公侯不大但贏取饑飱醉來便卧洞仙歌憶别雲牕霧閣塵滿題詩處枝上流鶯觧人語道别來知否痩盡花枝春不管更遣何人管取平生鷗鷺性細雨疎烟慣了江頭自來去不見鵲橋邊只為隔年翻贏得年年風露便學得無情海中潮縱一日兩囘如何慿據卜算子前題生别有相逢死别無消息說着從前總是愁只是不相憶月墮半窻寒夢裏分明識却似嗔人不憶他花露盈盈濕水調歌頭江上作江漲觧網雨衣潤熟梅天髙人何事乗興來寄五湖船才聼鼕鼕疊奏嘔軋櫓聲齊發幾别故州山轉盻青樓杪巳在碧雲端渡頭月臨晩霽泊清灣水空天静髙下相應總團團遙想吾家更好盡喚兒曹汛掃欣賞共嬋娟應念思歸客對此不成眠臨江仙江上九日即事三春都過了尋常偶到江臯水容山態兩相饒草平天一色風暖燕䨇髙酒病猒猒何計那飛紅更送無聊鶯聲猶似耳邊嬌難囘巫峽夢空恨武陵桃于飛樂為海棠作薄日烘晴輕烟籠曉春風繡出林塘笑溪桃并塢杏忒㬠尋常東君處沒他後成甚風光翠深深誰教入骨夜來過雨淋浪這些兒顔色已惱亂人膓如何更道可惜處只是無香西江月為木犀作色似臘梅渾淺香如薝蔔㣲清更張緑幄蔽輕盈巧着工夫鬭釘露葉涓涓月曉風英㸃㸃秋晴江南江北可經行夢到呉王香徑眼兒媚中秋無月作素娥作意失幽期我自不慿伊舉杯重嘆帖雲㣲笑應道人癡如今老去無情緒只有睡相宜建溪一啜木犀數剪酒醒歸時朝中措失題相思兩地費三年明月幾囘圓鷗鳥不知許事清江仍遶青山樽前歌板未終金縷已到陽關趂取臘前歸去梅花不奈春寒千秋嵗别情玉林照坐蔌蔌花㣲墮春院静烟扉鎻黛輕粧未試紅淡唇㣲破清瘦也算應都是風流過把盞對横枝尚憶年時箇人不見愁無那遶林霜掠袂嚼蘂香粘唾清夢斷更隨月色禁持我
