body:
  text: 淡齊集卷九宋李流謙撰表天申節賀表曰天下君曠代聞於間出惟仁者夀至理期於必然遙伸拜首之祈式表同心之戴中賀恭惟增光祖烈博愛生民著三紀之勤勞興九葉之系緒推成功而與子畢協謳歌體妙道以法天獨髙淵默德澤深而福備神慮淡而氣和自膺億萬之年寧俟再三之禱某身縻逺徼目接休辰渺渺彤庭莫覩漢觴之舉綿綿蒼籙獨祈周厯之延又有王者興至五百嵗以天下養何千萬年惟生商之瑞自天申之凡戴舜之人與我共此三呼耳屬八表心傾中賀恭惟誕受珍符丕昭純烈履艱難而厯三紀功光祖宗合南北以為一家仁及草木靡蹈過中之悔莫窺藏用之神方將遊四海而御飛龍如天不息故能舉一朝而棄敝屣視堯愈光知進退唯聖人得名夀必大德屬流虹之盛節激舞獸之忭悰率土莫非臣豈但華封之私祝昊天有成命固非神策之能探臣迹逺隆墀職縻遐服遙瞻閶闔阻趨九陛之深嚴近拜冕旒莫綴千官之雜遝又有王者興統實接於千嵗以天下養夢將應於九齡八極心傾三呼耳屬恭惟動天唯德守位以仁坐臻無象之太平光膺有僕之景命推成功而不處永我慶支體妙道以獨髙超然塵表德澤深而福備神慮淡而氣和殆將與造物者遊豈止於後天而老臣拘維遐徼邈逺隆墀近拜冕旒阻薦露囊之瑞遙瞻閶闔輒陳金鑑之辭又天開鳴社之祥實興寶運地震呼嵩之響俱祝皇齡幅員所同宗祏有永恭惟聖若稽古大唯則天再光赤伏之符方衍蒼姬之籙功成不處將與夫造物者遊德盛愈新豈止於後天而老當執衡之令月值繞電之休辰文軌一家戴父堯而子舜雷霆萬喙祈夀嶽而福川臣假守窮邊預聞歡頌稱觴莫遂但輸獸舞之勤望闕徒勞孰借鳬飛之便㑹慶節賀表惟天祐於一德方茂慶支夢帝與我九齡益隆景命適當盈數之月恭致後天之祈聲極嵩呼志深葵向恭惟皇帝陛下愛兼南北孝通神明有道之長開八荒之夀域無為而治得萬國之歡心丕承奕葉之燕謀將接千嵗之聖統正歸馬放牛之際運撫泰寧值流虹繞電之期祥臻震夙宜延洪於寶厯仍均福於函黎孰不來享而來王舉知善頌而善禱某謬將逺使阻綴周行俯陳金鑑之辭照臨莫及仰薦露囊之瑞舞蹈惟勤又蘿圖方永宜聖哲之挺生榖旦親逢統邇遐而胥恱合歡謡而雷動願睿算之川增中賀恭惟守位以仁動天惟德受堯天下而不泰卜周厯數而過期鳳集麟游百樂生於治國龍飛虎變萬物覩乎聖人以安四海之勤勞必享五帝之夀考況當良月允煥休辰俯察仰觀自協天人之助下動上應何煩祠祝之求臣假守窮邊遙瞻瑞闕奔趨莫及阻陪神嶽之呼舞蹈不知敬上南山之詠又誕開流渚之祥惠此中國䖍致呼嵩之禱格于皇天海宇一心聖人萬夀恭惟握符接統推澤撫民物臻時序之和德致日新之盛幽靈錫羡福蓋本於自求遐邇宅心思無有於不服休辰適值歡頌翕歸齊四大以居尊仰參天地與九齡而協夢永主神人臣假守窮邊阻趨華闕稱觴漢殿莫簉迹於簪纓注目堯雲徒傾誠於葵藿賀改元表訖精禋而肆眚施及無垠更美號以紀年義符不息郵傳至止觀聽竦然竊以元者氣之始哲王所以奉天名者實之賔聖人所以彰德白麟寶鼎庸昭迭至之祥甘露黃龍載表中興之盛事標曩牒禮協熙朝恭惟寅畏昊穹祇嚴慈訓爰因大享既流春澤之濃併易嘉名實體乾行之健凡同文軌俱極歡謡某假守偏州預覘曠舉綿綿蒼籙獨深詠於過期渺渺彤庭第阻陪於率舞謝宣賜厯日表太嵗在酉前民事以授時衆星拱辰環侯郡而奉命聿新觀聽同囿文明中謝恭惟道體泰亨德符乾健臨御九載適進業之日登敬休萬年宜與天而齊夀周畿所𨽻夏正是遵臣濫守霞城欽承日厯定時紀閏式沾堯治之雍熙治郡養民願布漢恩之寬大賀冬至表陽剛得位爻方慶於大來聖哲乘時德亦同於廣運歡均率土福集清躬中賀恭惟皇帝陛下與天後先視帝陟降盡徹羣陰之蔽廣開衆正之門君子在朝士有光亨之吉庶民䝉祉物無疵癘之傷坐觀玉燭之調安享衮衣之治臣分符有守戀闕無階瀲灧獸尊徒切涎流之望翩翻鳬舄第勞占視之勤又黃鍾應律欣迎化日之長紫極垂衣共慶縟儀之舉式均景祐溥覆函生恭惟皇帝陛下體道變通法天旋斡對四時而錫福綿億載以擁休氣肇一陽翕致晛消之喜心傾萬國益堅葵向之誠臣佐職塞垣馳神禁掖千官雜㳫阻奉萬年之觴雙闕岧嶤但極雙鳬之躍謝賜茶藥表溫檢式頒德意溥博寶奩載錫品物光華雖登受以為榮顧冒居而曷稱伏念臣守邊何補考績愈疏屢干從欲之仁將遂投閒之計低回未果黽勉獨慙豈圖蕞爾之軀上軫惻然之念寵分靈劑逺及荒陬炫私室以輝騰拊危衷而愧發此蓋伏遇乾健下濟泰亨大來申恩推造化之慈加賜重臣工之勸永惟銜荷徒極糜捐衰苶可扶或未愆於膂力勤勞是效敢有愛於微生劄子上張魏公論時事劄子三首竊謂功罪不别賞罰不立雖堯舜不能以一日治夫人之所共畏而不可强驅之前者死也然用兵則驅之死而人不敢畏者以其所畏有甚于死而死之中有不死者存而求不死者適所以速死則其於死蓋亦有欣然就之者矣何故今使士卒操戈而前兩陳之相向擊刺之相及蓋萬死而一生人孰不畏之然吾嚴立法制而明告之曰退必死進必賞彼茍進焉吾亟第其功不崇朝而賞之其退也不離跬步則誅矣彼其心必曰吾之進固有死然盡力而戰往往不死不死則歸而受賞不然一反顧白刃在後身首離矣夫如是人孰不求進未必死且有賞而甘就夫退而必死者哉古之人百戰百勝用此道也今日用兵之弊正在夫進未必賞退未必死夫進未必賞前有死道吾何苦犯之退未必死後有生路吾何為不就之夫使士卒而知進未必賞退未必死則雖太公穰苴復生不知所以為計雖然士卒畏死吾不勝其治也責在將帥今將帥亦知退不必死矣將帥之愛身尤甚于士卒故將帥而知不必死士卒不可使矣不亡何待宋文帝七年與魏戰竺靈秀以棄城伏誅二十六年垣謙之以軍敗伏誅南北之際不足言矣而猶有此焉近時周世宗親征樊徽何愛能引兵先遁即收斬之其後將帥亡有不用命者而平三關取江北諸州功冠一時實本於二將之誅然則今日之事愚謂先功罪之辨必賞刑之用而功罪之辨論賞刑之所加仍自將帥始持之不移斷以必行茍使將帥用命則士卒用命士卒用命則前無堅城進無强敵何攻而不拔何戰而不克哉竊謂天下未定國之命寄於兵兵之命寄於將故將之任於今為最重然運丈八之矛操倍尋之㦸挽纍石之弓遇城必拔遇敵必摧將也然今不患無是將患未見一禮義之將爾夫禮義之將必深明上下之分熟計逆順之宜通知古今服習法度知有君不知其身知有國不知有家謙恭而不矜亷儉而有守仁足以撫士卒義足以服强暴量足以容賢豪而不忌器足以任勳名而不驕有功即以讓其偏裨得財即以散其部曲夫如是假其英名資其威望猶足以怖强敵折悍寇而況託之征討委以克復則何攻而不取何戰而不服哉荀子論將曰天下之將通神明少陵曰安得廉恥將夫將而至於通神明可謂難矣若少陵之所謂廉恥則愚言近之昔孫權教吕䝉以讀書謂非必區區於章句之間欲其通古今明大義知尊君親上而已晉文之圗霸也先定襄王以示民義伐原以示民信其後用之卒無敵於諸侯夫士卒爾而猶使知信義而後用將帥而使不知禮義可乎今似不然矣謂之才者姑曰撫劒疾視彼烏敢當而已謂之賢者姑曰循循謹守不敢跋扈而巳一時之所謂賢與才者已萬不及古況復不賢與才者又當如何哉嗟夫以此為將何以服士卒以此使士卒何以責之北首而死敵察厥本原豈不自知禮義始唐李光弼郭子儀俱事安思順不相能至不共盤飱及祿山之變光弼頓首請死子儀下堂握手丁寧寬譬以國難主遷勸令東伐曰此豈念恩怨時乎李光顔伐蔡韓𢎞疾其功求所以撓之乃飾美姝以獻光顔集將士流涕謝而遣之裴晉公之入蔡也李訴謂此方之人久廢名分乃以節度使身屬櫜鞬講郊迓之禮晉公止之不可其意欲以風變惡俗嗟夫使當今有李郭之仇往往因事報之矣有美姝之獻往往悅而受之矣以節度之貴重雄嚴未必肯俯首道周以展尺寸之敬矣故唐雖多亂而隨亂即平者以將帥得人而將帥得人者以知禮義故耳雖然今天下之大豈無一人知禮義如三將者恐求之未至任之未専耳欲望博加搜訪茍得其人益勉以古人之事使各相策勵以共奮于功名之㑹而毋自後于昔人不亦善乎嘗謂用兵在知攻守而知攻守在將帥聽其攻守在朝廷人之言曰將在軍君令有所不受攻守何必朝廷之聽而朝廷亦何必預其事是不然將而才専之可也朝廷無問焉可也若雖才矣而猶有所未至為將者何可不聽為朝廷者何可不問然吾于此有說焉將為之朝廷議之將之所為是朝廷聽之否則禁之勿為是一說也然將之言朝廷未必盡察之則當反覆詰之詰之而盡其是非其說果非也决去之萬有一是猶將試焉漢趙充國伐先零請先事屯田朝廷迂其計璽書詰難至于數四充國亦堅持前議屹然不變朝廷卒從之而充國亦卒有功向使朝廷第守已行之詔不復更加詰難充國亦畏威迫勢輕奪已見以逢迎上旨則功之成否吾未知之日者吳璘之取德順議者不一其談或以為竭有用之力事無庸之地或以謂實扼襟要得之可以進取朝廷未嘗遣一介究問本末徒以人言萬里遙度亟詔班師大軍未旋而兵烽復滿于四郊向所得諸郡隨而淪陷兩京五路恢復愈逺至今人以為失策某書生也未能斷其是否然區區之愚私謂當璘之舉也朝廷當先賜詔書使條上攻取之宜若曰德順之為軍其地形為何如在我在敵其利害為何如得之果足以制敵失之果足以為患然後下其說集廷臣博議其說是聽之使攻其說非明告而止之或璘之說是廷臣之見未盡又使反覆其言必使詞盡理殫而後已夫如是則或攻或棄必有成謀而無輕舉妄止之失今則不然璘之欲攻德順也朝廷不知其說朝廷詔之班師也璘不知自守其說一人焉曰德順之師可罷朝廷即罷之萬一德順不可取又一人焉妄曰可取則朝廷亦輕信而取之矣夫軍之一進一退皆有大害一者老師費財二者可進而退可退而進俱失機㑹今璘舉兵頓之堅城之下亦既經時四川之財殫于供輸戰士之力憊於攻鬭一旦不問可否不究是非猝舉而棄之墮垂成之功貽未艾之悔朝廷不知其議將帥又不能自守其說以數萬姓命若一置棊之易是安得不失策雖然此已事不足追論然方用兵之際攻取之機其來不一或後有如是之比者似不可仍蹈前轍欲望朝廷用趙充國故事凡有攻取先使邊城條上朝廷熟議而後從之庶乎毋悔或曰攻取之機有一日數至者一一必先使邊人條上朝廷平章而後行得無重失機㑹曰是不然夫攻取之形勢其利害有在目前者有係根本要切者若目前利害可進即進可退即退隨宜應酬將帥専之不從中御可也若其係根本要切如趙充國之取先零璘之取德順則可不熟計深慮而後為之乎論廟事劄子竊惟七曲之神有大造於蜀蜀人事之舊矣而比年以來所在郡邑侈大祠房崇飾像設視前益嚴獨吾邑茍便荒陋未遑改築靈風蕭然神不來舍日者鄉人合議願效力焉既以告執事執事俯已從衆亦幸開可而某妄有言焉蓋舉大事必有異論止異論必有老成今兹之役革數十年之卑陋亢大而髙明之土木工徒費餘萬計化誘勸導震搖一邑可謂大事矣邑之人戴神之德之功以安樂其生孰敢不從然某之私意尚慮其間有吝財嗇力者憚而不欲為好勝護前者忌而不肯為善惑易搖者疑而不敢為合是三者黨伍相朋浮動相扇將沮敗吾事故曰舉大事必有異論雖然天下之事則有天下之老一國之事則有一國之老一鄉之事則有一鄉之老顧今爵齒俱尊邑人視儀而聽唱者孰如執事執事有意而廟成矣何則執事能損半鏹則吝才嗇力者將傾家以施執事慨然舉是役以為巳任則好勝護前者將拱手而聽執事抵龜而决持必不移則善惑易搖者秉心以服從故曰廟之成否在執事不在邑人是之謂止異論必有老成某鄉曲晚輩開口妄議則有罪然自惟其財之不足而不敢憚也知從衆人之所共欲而不敢忌也知是役之舉實當人心而不敢疑也且又以老成為可託順風請焉以來求主盟則妄議之罪可赦也日者屢有異夢非神以可託而告之也以其知老成之可托如執事者而使之言也某不言為負神神將降大戾於厥躬不可悔與汪制置劄子某才智淺短暗於事機加以耆衰迷謬滋甚屢䝉台慈貶損俯加諏采而芻牧之見終無以自效殊深愧赧然某蜀人也於蜀之利害粗所諳委欲殫陳悉數恐祇益為煩而瀆台聽姑掇其最大者一二伏幸台坐試一察焉其一朝廷和好既成此實如天之福然愚意以為使天下知和好之成必使之知和好之利而後可何謂使之知和好之利休息其力此和好之利也何謂休息其力稍撤邊屯移之近地使就食其粟而省漕運之費此休息其力之法也然此事可否在主帥而欲主帥聽從在台坐儻䝉台坐軫納溝之念俯為蜀百萬生齒不惜一紙於吳公事必濟矣萬一於吳未可輕言妄意因其入覲或通此意於廟堂若自以上意喻之計無不從果從則蜀民真受和好之利盡出台坐矣其二蜀之為國無旱乾水溢之憂者以堤堰為命爾故蜀人視堤堰修壞以為豐歉之候去年一不治農時而水不至蜀人大恐有司治官吏之罪方行整葺而水已大漲施功無所幾有荒饉之厄其為利害蓋如此某之愚欲望台慈特賜拯念修治時精擇幹吏使以時興工毋忽其事庶幾工役堅緻無後時之悔則屢豐年矣其三紙幣之行于蜀舊矣雖有聖智莫能改然其貴賤低昂亦有可論似非廛陌之人所能為蓋某嘗聞蜀故老之練達者矣以為欲其價常贏而無虧損之患唯使常用于官而不滯于私則可矣何則以一說觀之每州之春引直必虧至笋茶之出官司催驅之時則例增何也當是時盡用于官而不滯于私故爾故老練達者之言以為此乃流通紙幣之妙為今之計但常求所以用于官而不滯于私則無虧損之患矣區區三說實愚陋之見置之明鑑之下妍蚩洞然所以不避斧鉞冒昧陳述誠以台坐憂念蜀人之至求治之勤而下問之切是以敢私布之
