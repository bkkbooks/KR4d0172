body:
  text: 澹齋集巻十一宋李流謙撰書上汪制置書嘗謂霍去病號漢名將其捕虜斬級功冠一時然史臣稱其亦有天幸竊試言之天幸云者其亦有賴而後濟者哉夫天下事功竒偉卓絶固屬之才與能而使之成就建立非天幸誠有所不濟故李廣之才氣自號無雙而流落不逢結髪戰匃奴至於白首封侯賜爵反出妄校尉下想其當時視去病輩特乳臭兒曽何足睥睨彼其區區際遇當專閫之寄所向輙克因之叨竊茅土冒昧寵榮非天幸而何史臣之言誠不為過由是論之有天幸如去病猶足以顯於世無之如李廣遂至以譴死然則天幸之於人信乎其有濟也哉某不肖以世䕃得官雖甚愚極陋自期無奮㧞然所謂天幸亦若竊有其粗請姑言焉以幸執事者之一聽竊惟先君往者任於朝四海九州之廣俊傑茂異之衆而獨獲與台坐周旋其欵道徳躬奉謦咳非但途見猝遇者退而夸之䣊類告之子孫不一而足逾二十年而某乃得以屬吏趍走於節鉞之下此一天幸台坐大雅博厚又重念疇昔眷眷簮履以及其後之人某之為吏才智淺拙術略迂䟱無一長可贖百譴而台坐洪度包荒至仁藏疾略而不問使尚得偷竊斗升活其孥累而不以罪去此二天幸恭惟台坐以冠天下之文章曠百世之人物未即登丞弼相天子黜陟天下士輙從禁嚴外託藩翰凢為蜀郡邑何啻千百其有一藝一庸挈持抱負以上干化冶者亦豈能以縷數而某獨有此二天幸乃不能踴躍以前求刀圭靈劑化此凢骨不幾於得徑寸之璧夜光之珠而輕擲之歟是用忘其僣冒不韙之罪輙以蹇剥之蹤赴訴門下某前任某官通今任考第妄意可以僥倖所謂磨勘者然負丞大府凢二年其獲親奉使令於前實不能數月而攝三邑乃居其强半用是求委不肖之軀於造化之爐者常後衆人而曰二天幸者未果敬拜實惠今兹觧去賤職將遂歸耕田畆矣獨先君門户之寄一念未能忘向來漕使樊公任公嘗賜收録而邇者大叅虞公不以無似亦汙薦墨矣况平時依之於天庇之於父母又操二天幸如台坐可不汲汲焉百拜以請哉重惟先君棄世幾十五年兄弟三人埋伏選詞迄未有一人少遂尺寸之進者悼念先烈幾於委地故每食未嘗能飽而寐未嘗交睫也伏自台坐入蜀凢向之獲交於中都者盖嘗數其後之不振固未若某兄弟之甚誠亦台坐之所冝動心今者某獨幸考第粗足而薦削亦有垂成之望倘台坐一引手援之則豈惟某祗拜大賜泉下之靈重鼓舞丘山之惠矣上沈荆南書某蜀人也仕不出州縣聞東南有王城天子聖神文武如古軒羲宰相百執事皆天下選心頗慕焉於是買舟而下旣至閱都邑之浩穣睇宫闕之華壯覩宗廟百官之冨與夫禮樂文物之盛心愈加慕又思一簉迹其間而當國者不以其愚不肖使備數宫庠地寒而清實與人稱且一歳飽食安坐無所効其技加以多病思念欲歸廟堂知其終無用亦遂許之某退而伏念士幼而學學而成孰不願身極榮名極彰然屏荒區伏遐裔則求知難進為不易某幸身居中都耳目所接不相則卿少噓呵之伸臂可萬里而迺汲汲於去何哉盖某能薄不足使人知智短不能求人知性僻不能强人知至臨安時小史進曰月當一見宰執應之曰唯唯又進曰月當一見侍從臺諌應之曰唯唯而時見時不見也非某敢有所慢盖前三說實使之以是王公貴人亦昧昧相視面顔不熟於其目姓名不經於其口已而補外得請乃有謬稱之于中書王舍人者舍人欲觀其文某匿不敢進或曰徃仕于此夸矜見所長則為自媒干進于今庸何傷於是始勉强書其不腆之作一二以贄而舍人變色奨嘆以為近古作者且宛轉於廟堂使之留而某則已束擔於行人第一徃見謝其汲引奬藉之意而已恭惟某官勲業在朝廷名聲在天下方於禁林於樞筦某固嘗尾朝士間伏賔墀然朋輩列坐不出俄頃語不過寒燠相公亦泛接而茫視之初不孰何非相公不知某盖某未甞求相公之知也今者舟楫西遡再獲望棨㦸相公政成暇豫無前日機務之煩賔客造請無前日紛至沓來之擾其於某也即之為甚近察之為稍詳而某方歸守逺次將抵家繙故書理舊學時從田夫野老游無復垂涎於榮途華貫則亦無自媒之嫌干進之醜是以輙書其進退出處妄意相公之知雖然某今尚何事於知抑有以也去歳梁丞相罷相爰立之拜舉朝皆属相公以為相公肯與士類為地未幾相公超然逺引出為天子扞逺藩舉朝則大失望雖然事固有義我欲相易使人欲我之相難相公從容次輔初無一毫不滿之意而公論則爾端揆之拜殆有所不免相公歸歟爐錘在手呼吸變化士類所係相公眎寒曹冗局有能薄不足使人知智短不能求人知性僻不欲强人知或有如某者相公其肯鈎索之於隐微㧞取之於荒陋而進之否乎夫如某者而被相公之知則加于某一等與百十等者莫不被相公之知然後相公用如某者姑以長恬退抑浮競而用加於某者取其學術智畧以自輔則將見竭滄溟之波殫南山之竹不足以書相公盖代之殊庸經世之偉略也某亦欲以斐作仰玷匠目而逆旅不能具筆墨雖然觀此書亦足以略知其人矣上曽丞相書某蜀鄙人也行年五十有餘亦未甞出蜀門属神聖臨御俊哲盈廷百度修明政法具舉太平氣象恢恢復見今日於是聚糧買舟犯蛟鰐濤波之險冒昧一來夤縁忝幸偶獲備數宫庠以教育宗英為職職閒無事因得竊斗升以其暇時自學其學今且一年四閱月矣家在蜀一陬道逺貲單不能挈致孑然逆旅一影自随而又賦授孱怯多病蚤衰託身於僮奴寄命於藥石凢資生之具無一而給鄉音家信動輙經年矯首天末何啻一萍之在江海且賤室素嬰疾疢子舍又復稀少萬里邈絶兩地憂懸故自書考即欲叩廟堂丐一外闕屬郊禋倥偬不敢有言今紫壇慶成大賚四海而某亦得以霈恩追爵先世既自以身綴朝行而又澤流泉壤揆其素分易滿易足唯是顧瞻松檟夢想田園晝不能置之匕筯夕不能忘之枕席恭遇大丞相以大老聞孫當代碩悳適鼎鉉正虛遂膺爰立萬喙一語以為是魯公復出伏自秉鈞以來其所施設嚴重周宻有典有則無一不愜當人意凢百執事孰不貪庇悳宇競浴恩波以幸尺寸之進而某獨以私計迫遽如上所云雖欲逡巡門墻之下躑躅隸圉之間盖有所不可是以輙冒嚴誅仰致私請恭惟大丞相納溝之念深播物之仁廣如一元之氣散布天地若大若小無有不遂其宜而得所欲倘遂䝉推其及夫莖芥昆蟲之微者而及之哀其天涯之流落憫其仕路之邅迴又以其冒險逺不欲使之徒歸且甞簉朝紳觀國光歳稍久畀以便近一闕使竊寵光以歸某之拜墳墓則草木有光輝見親舊則僮僕有得色自惟雖疲懦然先世作吏家法具在亦能勉竭不逮牧養細民以毋負造化生成之賜某又重念近世士風不競俗尚益卑凢仕之急於進者例假恬退以為名故凢索去者皆是欲留而號為不求者盖深欲以不求求之故在上者亦厭其言忽其請某今區區之懇實出肺肝無隻辭半語敢誣鈞聼實幸大丞相察之念之某欲靣致曲折已納呼召劄子旬日未獲瞻望是以輙具短牋求通於記府仍具脚色及闕次一本仰溷上王制置書竊謂斯文神物也然自中智以下恃而取敗者有之故或指為一伎嗟乎文乎未可以一伎名之盖自書契以來聖君哲輔建立設施其微至于具道徳之要眇其博至于應事物之繁沓用而為謀謨策略陳而為典章品式著而為勲庸徳業與夫高人貞士淑女令婦峭節偉行可以軌世範俗巖巖若玉雪者非有文焉傳而述之彰其幽隐而侈其煒奕使千百世之下焯然如觀目前則視無知之氓飽腹暖軀衝衝而活泯泯而滅則何以異耶又况一人之尊九州四海之廣羣吏百僚之衆蠻夷荒服之逺敷號布令以誓以戒以訓以告而無以達其欲言之意宣暢其彰善癉惡惠利養生之心則上下漠然猶禽犢之相視嗟乎文乎未可以一伎名之堯舜三代之治至今赫然詩與書之力也渾沌既殞道之微指不可見伏羲氏以象畫之世未盡知也文王周公以辭孔子以彖象又以文言又以大傳人始得因其言以索其意而道託以不泯夫以文文治可也以文文道道之奥亦固藉於文乎而數聖人必用之則文之不可已固若此自漢唐以來非復古之所謂文然當時之人亦必用以濟於事唐徳宗涇卒之變狼狽跳奔藩侯環守而不赴將帥恬視而不驚當此時人情渙離國勢彫削天下若無唐矣及奉天一詔武夫悍卒為之流涕彼亦舍宗廟社稷之奉去宫闕陛衞之尊蹈兵戈戰伐之危歴奔迸凌逼之辱未嘗一悟及讀于公異露布鍾􅒶不移廟貎如故則泫然泣下李徳裕相武宗平澤潞功第一至謂無官可酬一時錫賚之渥除拜之寵貴震天下然徳裕不以自矜讀封敖之詞言皆予同謀不他惑則喜形於色親解玉帶遺之韓退之平淮西碑推原破賊之本㫖識憲祖任人之意專美裴度他將負戰伐譁然不服雖扑其石然度之功竟由碑以顯夫奉天之詔不烈於李晟諸將之兵建中之幽辱不减於異露布之悲楚澤潞之功無封生之詞固自若淮西之碑不出退之亦必傳於世然數君子皆汲汲於是若真不可少者豈其發明事情披剥物理足以動悟觀聽震輝古今其用果於是急乎然則名之伎亦云過矣雖然致斯言也亦有由矣淺夫獧子内無所持畋漁書傳竊其糟粕如閨䆫弱女粘綴繒翠聨績繡組璀爛目睫而誑欺童兒因偃然自以為文忘其㨿坎之陋肆行無忌以之矜巳以之敖物甚至誣天而瀆神千紀而亂法而人始不堪之迺深排痛擊曰文皆如是嗚呼疾其人併及其文人則罪矣而文何罪又况其文非吾之所謂文哉使是文也而出於君子文其可廢乎恭惟某人以高文擢上第如董如晁繼而代王言司帝制渾渾噩噩有三代之風而如常如楊者殆未足數雖其自得於聖賢閫域之妙天人精祲之微以之位兩儀育萬物者固不在是然妄論之閣下試于廷而後如董如晁者始足暴其學於多士用於王言帝制而後渾渾噩噩所以追三代者流布散傳於天下是文章於閣下不為無助文固助閣下矣然閣下以篤實之資高明博偉之學器量如海嶽聲名如日月大夫士因閣下之文愈重其人而文亦愈貴於世則閣下之助文章亦不少矣雖然閣下既以文自顯矣今以牧伯之重卧䕶諸將金城一靣又且旦夕進而坐廟堂握魁柄澤及天下然則於文也其可少乎愚謂使閣下勲業炳煥聞望流溢騰光流響於鼎彛竹帛之間其為牧伯也不愧古之方召其為宰相也不下古之䕫卨自非能言之士有筆有舌大書而侈傳之恐亦淟汨于時故愚謂閣下既以文自顯於今又當以天下之人之文而顯於後也某之先人以文名於蜀而行實稱之故教其子孫以文亦必以行某不肖竊襲箕裘於綴緝之工未也特不敢用是廢其行已孝友于家退讓于鄉誠信于朋友仕而勉于職業勤于事上庶幾操履之實毋愧其先為斯文羞使詆之者號曰一伎異時獲厠夫道古今譽盛徳入耳而不煩者之列尚足與四方英雋馳騁於門下豈勝幸甚上何少卿書竊謂賞罰國家之大柄清議聖人之微權二者均所以砥礪一世而驅之善也然而賞罰出於朝廷清議出於天下故世之論者曰賞罰重而不知清議實重何則賞罰用於治不用於亂朝廷清明百度時若賢不肖履位而各得而後善者可賞惡者可罰季末衰昏淑慝背舛顔逐而蹻升孔削而跖尊刀鋸陳前威不懾姦玉帛陳前寵不榮徳則賞罰設矣勸沮之實烏乎在是其用顧有時而窮清議則異是也慕孔顔而耻跖蹻人之本心也刼之而私沮誘之而暫勸情牽性亡清議者能以本心還皷舞之於其所甚慕激而進焉於其所深恥决而去焉使其趍避之至情油然自生而不出於強勉故人之本心不忘則天下之清議不廢是以清議於世無時而不用用於為治賞罰之助也用於衰亂賞罰之代也堯舜在上禹臯陶在下其賞也曰凱曰元孰知為天下之善則我之清議命之曰善而使賞之其罰也曰鯀曰兠孰知為天下之惡則我之清議命之曰惡而使罰之清議不興善惡不眀善惡不眀則堯舜不能以賞罰豈非所以為治之助歟春秋不淑國威外陵王柄下遷出天子者移强侯出强侯者移陪𨽻賞罰則不用矣然夫子以三代遺法起而治之隻辭銖輕有鉞有衮方其榮草野泥塗之賤弁冕車服也辱弁冕車服之貴草野泥塗也榮辱出於口而賞罰及天下故雖未聞有寸梃之傷尺繒之惠然而扶奄奄之衰王挫頟頟之悍藩裭沾沾之諛魂碎矯矯之强魄使賞罰移於王不移於周移於禮義不移於强暴豈非在衰世則為賞罰之代邪由是觀之清議視賞罰果重不為過矣雖然清議則重矣為賞罰之助愚所願也為賞罰之代非愚所願也清議代賞罰夫子則可夫子之道大中至正之道也榮非私欣辱非私愠而又忠恕之心加焉以下議上而上下之分不替以賤繩貴而貴賤之級不踰若東漢之鈎黨噓枯吹生之論僅類聖人然自賢之心勝疾邪之憤深私立號名妄相刻畫布衣而訐萬乗則疑於僣草茅而詆公卿則失之狂其剛風勁氣足以激雄心動義槩賞罰託以僅存運祚因而少安然而過亢之危行茍難之苦節適足以嬰姦鈇搏逆鼎卒於俱亡而已是則清議之末流不足貴也方今聖天子在上内而宰相羣執事外而州牧邦伯如耳目股肱之輔元首位置俱宜而致用俱適凡所動作無不諧當人意㧞一士人曰賢黜一吏人曰不肖則賞罰之公若無藉於清議然清議猶不可廢則亦曰助之云耳林野有淹滯之能壑谷有超異之哲一言助而賞之可乎州閭有淫比之氓序塾有汙僻之子一言助而罰之可乎然私聞之職賞罰者必以位任清議者必以徳位可强有徳不可勉能則清議之責又似難於賞罰自非一代偉人挾天下之重望負高世之絶識使有口者賛有心者服其孰當之恭惟某官實大丞相無盡翁之外孫學術是似文章是似氣節是似謀謨是似坐廟堂佐天子操賞罰之柄以正天下其誰不以無盡翁期之迺今從外藩賔諸侯衆不謂冝然以其所謂天下之重望高世之絶識發為清議如星煌煌如鳯儀儀使有一去取言未脫口愚恐填然躍而趍者衆矣非獨人趍之也操賞罰於上者亦將視其所予而賞之加察其所棄而罰之及是閣下雖未及操今日之柄而主今日之清議則亦是賞罰天下者也然則有志於斯道者其可不亟歸誠焉以丐一言之識㧞况某故人子而容獨後哉是用從㬰以前此生之榮辱將決之閣下而班三事位九列不足進矣詩文若干首姑以代贄頋未足以自見恐閣下欲第其殿最而後為之去取則亦庶幾焉上張和公書嘗謂師聖賢於其所聞不若師之於其所見得聖賢於言議之域不若得之於其所行盖妙道神徳藏其倪於至微括其精於至幽雖聖賢身以河漢之辯善譬巧說不能自發其難見之情不可測知之狀而况託之筆舌寓之傳聞吾獨烏乎造其極而窮其涯以為自得不疑之學篤信於心而安行於其躬必也身出乎其時目覩乎其人察其自然而觀其所止視其偶然而循其所如因歩趍也可以見道德之全體因謦咳也可以窺仁義之至情於是焉㑹以凝然之神通以寂然之感則唇未鼔而意領席未遷而觧顔雕龍千詞不及曽生一唯之要充宇萬軸不及子祀一笑之微嗚呼神乎吾於聖賢其可不師之於其所見而求之於其所行乎昔南榮趎見老子曰子何與人偕來之衆也榮趎懼而顧其後老子曰子不知吾所謂也榮趎俯而慙仰而嘆夫老子之所謂偕來者誠指何人也榮趎始而昧然終而昭然則知其為偕來者亦果何人也卒之師弟子欣然心相印許夫子講道於洙泗從之遊者三千唯回也獨見之為甚察得之為甚真盖其求之也常在於聲音目睫之間動容周旋之際而初不在于屑屑語言之粗區區義理之徼也子嘗見齊衰者冕衣裳者與瞽者見之雖少必作過之必趍回乃喟然而嘆以為仰之彌高鑚之彌堅瞻之在前忽焉在後夫敬齊衰敬冕衣裳敬瞽者何預於夫子之聖與回之所學而回於此乃矍然自以為有得而不能已至發於心聲形於嘆頌豈非以其誠一之性忠厚之心合内外而無間居造次而弗失所以為聖實寓焉而彼誠於是而得之歟不然使二人於當時非出於其所親見與得之於其所自行則苐求之道徳五千遺言何有於老子求之六經十餘萬言何有於夫子哉是故若孔老可謂善教若榮趎若回可謂善學者矣然則當今之世有斯人為榮趎為回可不急見而疾師之乎恭惟學為帝師智為帝謨見於開濟之勲經綸之業者特太倉一􅲤而太山一木耳至於承列聖之道統振千載之絶學中和之功皇極之用位天地而育萬物者盖未可以筆舌授而傳聞得也而某也幸為里人且先世䝉知遇門闌有持帚之地使其在逺猶當裹糧疾趍自比𨽻圉以幸朝夕乎其前而况萬里來歸岌嶪岱華突然臨前粲煥星斗炯然在目則求師之於其所見與夫得之於其所行頋不在兹是以輒借前說以進恭惟鈞慈倘遂哀其愚有志使得執鞭弭奉盤匜以歩趨末節謦咳微音略警誨之用開其愚進其學斥其偕來之累則某喟然之音不在俯慚仰嘆而後作也詩文一篇姑用代贄而巳而所以學不在焉惟鈞慈進退之
