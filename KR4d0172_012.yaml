body:
  text: 淡齊集卷十二宋李流謙撰啓謝類省奏名啓易地以嫌固浪戰者揭名而殿蓋危得之深惟平平之人宜在下下之列自揆過矣敢云缺然竊以科目而論人材已愧築巖釣渭之舉文章而用場屋更慙經天緯地之功然天下不皆英才故哲王為此中制比詞聨韻亦知小技之易工析句分章豈必耆儒而後可在豪傑屈首而就於兒童執筆而能自昔以來號多士之盛選由此而出半一時之偉人故凡有志於飛騰孰謂能逃於籠絡雖聖天子亦矜署刺之浮榮若才相公竟抱題名之遺恨况欲紹弓裘之習宜自勤螢雪之功念世賞之蕃醲豈妨自致顧儒科之清切亦許同升宜有異能允符清舉况試分於別所率人號為畏途城小而堅士倍於鬬水澄而游魚可數鑑靜而秋毫易分負笈引歸滔滔者皆是也援戈角逐戞戞乎其難哉欲邀一戰之勳宜有萬人之敵如某者襟靈不爽性識甚凡雖立志之似髙顧為力之弗逮佩觿從傅已妄意於古人束髮趨庭亦剽聞於緒論謂六經道之大統而三代文之正宗此有志焉是為學者愚而自信不知適楚而南轅戰則屢奔始悟干齊而操瑟叢誚罵之四至積悔慚而再思惟先世之起諸生以髙文而擢上第嘗經乙夜之覽獨䝉宸畫之褒使之無傳命曰不肖而况舉遺書而親授勤勤肯播之功責舊物之必歸切切蓋棺之語遂易絃於危柱旋更轍於通逵步趨於有司繩尺之間模倣乎時流方策之作調柔舌本約束毫端僅居莊嶽之數年粗能齊語不見阿䝉之三日非復吳人旅韋帶以偕來挾鉛刀而一割筆頭快意但知三峽之倒流紙尾綴名不覺五窮之在側本期一得寧有二言謂雋功之收豈足夸而先志之酬為可喜秦彊周弱初無蠻觸之爭王後盧前僅有唯阿之辨靜言僥冒抑有夤緣此蓋恭遇某官道極髙明器懷博大間千百年而獨出指九萬里以橫飛奉對大庭並龍頭而髙舉垂紳法從參豹尾以雄鶱勤方召於塞垣輟嚴徐於詞掖軫白駒在谷之念推緇衣好善之心梯磴險途羽翮病翼度木而遺長短元本作拳曲恐棄真材相馬而略驪黃欲收駿骨致令么瑣亦在甄鎔某敢不益勵壯圖願卒前業剗箋訓之腐說歸求本心掃綴緝之虛辭專究實用幸棘闈之遂逺欣墨飲之可逃隨意嘯歌縱口議論出入三百首豈復十二言之拘馳騁數千言不須五百字之限放蒼虬於學海馳健鶻於義天始欣學術之自由更覺語言之有味雖云薄藝猶能詠歌於聖時縱是虛名亦足報償於國士雅州到任謝宰執啓投犂作吏自知不堪剖竹為州俄出非望揣私心而若此稽公論而謂何冒昧承恩悚慚就列伏念某平平學術諓諓藝能分甘州縣之勞孰借雲霄之便進循階序已貽刺于取禾超躐等夷更召尤于褫帶始由銅墨無補黔黎當從襆被之行忽冒題輿之選霜侵鬢側已驚三徑之荒綬見腰間又竊一麾之寵雖造物未容其廢棄而揆才恐速于顛隮况郡接于荒邊且民貧于瘠壤責輸弱户懼常拙于催科仰給旁州憂每深于匱乏茍非仰託丘山之庇何以少施犬馬之勞靖求所安敬循有自此蓋伏遇某官文髙經緯道妙彌綸出佐帝王之真自有宰相之體四夷鎮服迄收銷偃之雋功多士朋來猶躬吐握之盛德旁收乂俊下逮菲葑欲共舞于泰寧乃不遺于瑣尾致兹孱懦亦預使令某敢不鞭策疲駑支扶荒憊二千石共理之嘆非曰能之十萬户蒙福之稱不敢後也謝監司雅安教官到任啓枵腹衡門已嘗嘆飯不足抗顔師席敢自謂旁無人為貧而來何挾以教竊謂學校在今日固號闊䟱置之邉城于吏員誠為冗散然餼羊本以存禮而鄉飲亦足知軍方時右文執經及介胄之士在昔柔逺入學有氊裘之徒惟政刑法制固已從宜以施若禮樂詩書夫豈因陋而廢况雅安古郡近蜀名都士靡乏茂才地未為絶徼設一官責之講論舉千里興于藝文在大農耗圭黍之儲于吾道增丘山之重稱是選者必其人哉如某初無他長謬有竒志指功名可立而待謂科舉不選而能蚤日趨庭嘗云孺子可教連年飲墨敢謂有司不眀竟從鎖闈始叨末第顧遲莫侵尋老矣念松楸付託泫然落寞渭南再嵗服弓刀之賤遲回泮水四年甘藜藿之貧俄報更書亟祗賤次拜衣冠而興嘆莫測聖涯瞻爼豆以深思粗窺禮意方幸侏儒之飽已慚弟子之嘲期效所長灑掃應對足矣必求其實析疑答問難哉唯能託蘇刺史之天乃可免鄭廣文之罵此蓋伏遇某官裔出魁紀神交昌黎學術蓋有自來述作知其少匹分殘膏賸馥以乞後輩使枯樗散櫟皆預斯文至汲引之于久閒如念骨肉仍教誨之而不倦真是父師崇篤曷加報稱無所某敢不一割代用十駕就途使方中矩而圓中規不敢任此有青於藍而寒於水方且願之庶收斆學之功少答提撕之賜靈泉謝到任啓婆娑黃卷自笑書癡傴僂青衫初投吏網雖揆才而惕若獲事大以欣然可以無饑云胡不喜竊以德充乎已乃可出以為人道濟乎時故能推而及物儻製錦之未學雖挈瓶而不能故夫子深說於漆雕而尹何切譏於子産慨古義之塵掃引澆風而蔓滋士鮮自量人多無恥用人之國而嘗試往往敗亡捨已之田而弗藝紛紛喪失宜事功之弗偉嘆人物之益卑居務退藏仕戒輕就若俯慙一尉實尾百僚粟方飽於侏儒職僅聨於游徼亦有賢者不屑居之南昌溧陽蓋當時髙尚之士渭南朝邑亦後日經綸之人豈以妄庸獲兹忝幸如某者粗知向學絶不趨時無壞襪一線之長非青錢萬中之選早承家訓稍諳稼穡之艱難初入世途頗熟人情之真僞幸遺恩之偶及愧上第之未收年長益侵貧迫不赦勉就外臺之銓擇得從蜀邑之走趨抱耒而耕甘遲回於逺次彈冠而出忽徼幸於昌期猝遽交辰凌兢就職炯炯日星之側行偕末光巍巍岱華之旁切依重鎮始求寡過敢辱深知外省登名幸少舒其偃蹇窮途得祿更省慰於啼號此蓋伏遇某官詩禮聞家簮紳奕世長才穎利人爭仰於吏師婉畫從容望蓋髙於賔幕尚抑鵬飛之勇奮姑從驥足之小馳曲加海嶽之慈罔間纎毫之善致令凡瑣得預使令某敢不視國如家以政為學一身冰潔常操弗及之心四境風清全倚不言之化上王總領啓伏審班清華於少列卓出異恩佐調度於大農盡專外計引嫌亟避申命弗移載聆演綍之音益鼓抃鰲之躍竊以更治以考由漢已然厯試而升雖舜猶爾必暴之於人而共服乃縻之以爵而無嫌自公始來凡嵗幾易巴䕫梓益轍迹之所盡經榷牧漕刑使華之所遍照朝論熟矣上心慨然入當輔豫已畀賜環之命慮不忘逺復勤扼節之留蓋鄰邦方戒於不虞而徼塞正期於有備煌煌禁槖固資衮職之忠岌岌邉防亦重宵衣之恤唯金穀豈煩於儒者然鹽鐵嘗兼於冢司以此占朝廷之心知其兆丞弼之拜依仁既久為幸可知某官聰眀疏通辨智宏達有陳元龍之豪氣負盛孝章之重名以亷能之節濯衆汙以通變之才應羣劇舉目意了著手神融豈徒用於理財皆曰可以相國岐山斜谷之運當不廢於笑談蓬萊方丈之游冝即生於羽翼某幸儒科之世襲愧學殖之天荒方剡章盡及於羣髦而賤職未書於新考彈冠徒切吹律尚遲因桃李散植之時例加披拂若犬馬未先之日願效馳驅輒介捧觴之詞併伸搖尾之祝上韓總領啓光奉渙恩榮膺晉錫仍移中臺之郎選獨專外府之計司邸音風馳歡頌雲合矧庇身于支郡宜展慶於記曹恭惟都大總領郎中才禀天資慶鍾名閥器兼包於大小知同識於宏纎凡所至赫赫而有聲顧其長鬱鬱而未盡蕃宣騰最君相之所深知榷牧書功轉輸之所同利亟須顯擢盡究偉能方窮邉萬虎兕之屯藉全蜀千舟車之運難於擇代幸兹得人當觀流地之錢豈廢發硎之刃即迎溫詔歸踐清班某假手無功素飱有靦掃門未卜莫窺數仞之墻賀厦徒勤敢致一行之敬上汪總領啓榮奉宸恩寵新使節總賦輸於全蜀佐調度於大農用當其人選協於衆恭惟總領郎中識通萬變智周百為梓杞斯眀堂之材璠璵乃清廟之器久儲羣望聿簡上心尚煩四牡之馳驅蓋奉九重之眷委惟理財正名曰義故任官必惟其賢畀付匪輕柬求益遴輟崇嚴於巨鎮專㑹計於外臺是將足國以裕民務當裒多而益寡邉方未撤困飛挽之久勞鄰好既通幸誅求之稍緩大蘇疲俗上倚仁人顧士安巧制於低昻念管子能權於輕重此吾民所深望者在君子固優為之宜一札之初頒舉四川之交慶某備員僚末屬耳郵音雖勉力於催科不敢輒忘於撫字願究心于約束亦期無負於使令實深下吏之歡肯後衆人之賀上王總卿啓伏以別德城隅鬱犬馬戀軒之恨遡風天末渺川河赴海之心雖緘縢莫寫其精微然情素或披於倣佛少回熒照俯洞寸丹某官岱華自髙球琳不琢絶一世之才而持之以道貫千古之學而通之以權覺實先民器不留物道機冥運莫鬼神之旁窺智刃略施忽電雹之交下此整頓乾坤人爾豈斂散金榖者乎然蕭何漕關中而位冠元台冦恂輸河內而功參佐命稽洪範之八政以食為先考周官之一書理財居半視今尤急舍我曷居蓋國論稍新于前聞而敵情益險於難測謂宜厚敖倉之蓄可但信平凉之盟惟公之謀必有以察微則事之至固可以應猝相天子在此行矣視廷臣何以過之某始由世賞而竊世科已在諸生之末初班吏版而託吏屬又居列邑之中方剡章遍及於羣英顧書考獨賖於數月似䝉記恤亦許甄收謹數日而得得來且順風而拳拳請念連帥誤加於論薦指盛門尤切於歸依大府崇嚴拜孤函而汗浹修途隔邈遣一介以神馳唯憐其輕千里之誠少慰其成九仞之志南風斯競大火正中祈安舍於道和益仰崇於宸渥彌深頌祝莫既編摩上楊總卿啓論一時人物之英獨勤慕用假半席儒宫之地偶托帡幪方當大幕府之開尚稽下執事之慶懼貽誅於後至輒修敬於下塵某官皎皎髙姿翹翹峻宇川流海注嬉笑怒罵成文麟游鳯儀動容周旋中禮步武昔參於霞袂姓名嘗列於瑶鐫著崑崙薄蓬萊不遇故去弭靈旗回綘節自當復來方天子坐眀堂以大臣制國用尤注意於外計府故選才於近侍臣式光九列之除爰重四蜀之寄念逺俗積貧而久困瘡痏莫瘳在仁人孰計而深圖毫髮不擾益完邦本彌結眷知蕭何之轉關中竟躋上宰冦恂之輸河內當冠元侯惟公以之在此行矣某以粃學據有若之坐無經笥解孝先之嘲託刺史天我獨有而自喜無官長罵飯不足而奚嗟屬炎候之方隆祈生經之益毖上查總卿啓省躬無似宜自置於散閒事賢有時顧奚論於蚤晚物䝉收於已屏途罷哭於將窮蓋教督於始者將以成就其終而鞭策於前者亦以警勵其後感服洪施激昻懦衷恭惟某官智光眇綿才絶等比文章孤出淵源家世之深議論橫吞土苴古人之奧天祿分杖頭之照淮西磨楯鼻之煤倦承眀直而輟獻可替否之猷屈外計府而用損上益下之義百姓足君孰不足大夫賢人皆曰賢最聞益髙驛召將邇識其大者將用於經綸開濟之中眇乎小哉豈止此斂散斡旋之際遇踴躍之金雖以不祥棄待輪囷之木或以無用收致令瑣孱終纍壞冶某賦姿不武行世多奇已再而衰實難堪於爼豆然少也賤正當任之斗筲匿垢含汙倚海山之藏息黥補劓干造化之仁不鳴之鷹念何逃於釜鬵半焦之桐尚冀加於宫徴敢不勉駑馬十駕之力庶幾及跛鱉千里之功少酬深知亦慰晚節迎靈泉楊知縣啓榮膺臺檄屈就雷封儒者臨民必惸鰥之有託善類為長宜粃拙之可逃肅迓前旌敬紓賤臆某官學無枝葉行有宫庭典刑猶及於老成橅楷共宗於宿德早飛英於太學莫齒何蕃嘗分校于外庠皆服孔子當以經術入侍乃從簿書滯留武城割雞蓋充其學道之志中牟馴雉亦推乎愛已之仁眷此邑之蕭條本厥田而荒瘠市亡列貨里乏强家撫摩使之各安談笑可以坐治即騰美最行拜寵除某以晚生綴下寮尚餘年託巨蔭鞭其駑惰或少助於催科及此宴閒願相從于講學上漢州張知郡啓瞻烏所止吾誰適歸令龜而從利有攸往蓋讀書十年不如詣習主簿而封侯萬户但願識韓荆州來何遲哉見已晚矣恭惟賦剛健之性有文眀之才身傳正宗力起絶學功剖造化之窟誠窮精祲之淵羲圖禹疇提挈宇宙元蓍虛畫包括古今方止圓行知象生數而數生理旁探順考謂人從地而地從天兼用不用之精微得元又元之奧妙變通在我何須六位之推遷應酬如神惟自一圖之指畫此足投九師於荒裔固宜號三聖之元勳既成已以自多必為人而愈有始遁世而無悶合乾之潜終與時而偕行法艮之止輒嘯歌於三徑寄游戲於一麾屬當傾否之辰正賴康屯之業豈但得其言也殆將舉而措之三年之克鬼方式資逺略七日而得婦茀行歸侵疆某於䝉貽逺實之嗟在比有後夫之悔念鶴峰之昔至曽龍坂之誤登不辱韓莊之麾許在籍湜之列接膝親授恍吞三畫於夢中倒囊畢傳笑得一編於地上慨圜跳於日月悵茅塞於心胸幸今為一㕓之氓無勞負千里之笈如臨父母敢忘君子之愛人不出户庭斯豈長者之絶子載加熏沐亟遂趨承自知為無妄之人輒期敬不速之客賜之便坐匪一肉巵酒之求指以正途欲吟風弄月而返又上雅州程知郡啓肅奉眀綸榮分左竹專地千里其志可行貽福萬家所及亦博方委躬於下吏敢修敬於記曹恭惟一代豪英兩蜀閥閲驤首八極洗凡馬而盡空遊刃三軍視全牛而不見雖名世之才間出亦盛德之後不同自應快鵰鶚於雲間久已困麒麟於地上雙旌雲卷夙聞露綬之驚呼千騎飈馳薦著搴帷之風采惟雅徼郡在昔要州夷蛋憑凌地望雄於蜀鎮蔡䝉聨亘山名紀於夏書儻付長才便為樂土况弟兄聲績之相望盛集一門宜江山氣象之更新歡騰五邑但可掃棠陰而坐嘯不妨遲芝撿之特招即躋顯嚴益究施設某久深慕藺殊幸依劉無經笥解孝先之嘲以粃學据有若之坐免官長罵飯不足而奚嗟託刺史天我獨有而自喜上虞參政啓抗一節以立朝精忠貫日鼓片帆而去國偉節摩天仰咨徒御之勤恭致記曹之問瀆尊是懼頌德惟勤某官識洞天人學兼流略應千齡而間出蓋一世以橫飛以趨庭之訓自致雲霄用學古之功發為事業長江妙畫遂標望於官聨廣廷正言亦增重於國體方九重之眷甚渥而三徑之念已深翩然來歸籍甚深望拜松檟而自愧撫猿鶴而自欣雖晉公安緑野之遊冲襟淡泊顧安石注蒼生之望輿論播騰即諧鈞軸之持永茂旗常之鏤某謭才亡取先盟未寒仰北斗泰山之髙慕用已久快白日青天之睹拘縻未皇敢因筆舌之微敬寫肝膺之悉朱眀肇啓品彚咸彰願益毖於真倪尚翕求於多祉又辭榮丞弼忘重圭疊衮之尊訪道仙真適閒館珍臺之樂人有周公居東之憤孰知孟子去齊之心屬當稅駕之初敢怠操觚之敬竊以合不合大臣視之而進退用不用天下因之而重輕有挾超世之資實當經國之任誾誾正論烈烈精忠中興以來未聞羣公于此何議泰山喬嶽本自不搖白玉美球亦復何玷徒起不容之歎獨髙易退之風唯陳平念之深何孔戣去之果神龍改窟驟驚河海之空寶鼎藏川忽失廟祧之鎮因奮髯而三歎聊引吭而自鳴某官道德生知忠義性禀以簪紱繼世而自奮於科目以學術起身而獨擅于功名賈誼少年已達國體栁渾儒者乃知戎情端欲致中行之笞蚤能辨平凉之詐卒驗靈龜之照仍收汗馬之功自古得獸不並於指蹤於今運籌仍兼於决勝憑江一戰關運祚之興亡折敵片言繫國勢之强弱此王導謝安不足者於晉公汾陽則近之持此以博謗讒眀哲不爾卷之而就閒燕聖賢亦然顧夫子反魯豈不樂哉特樂毅離燕有可慮者終遂鈞衡之拜永光彛鼎之書某夙有先盟嘗辱化冶持鉛槧頌淮西之績深愧短才操杖屨從緑野之逰又拘賤次仰企龍門之峻少伸燕厦之勤上朝待制啓演綍大庭升華次對仍即帥壇之拜式光外閫之除已建髙牙凛威名於草木凡依巨樾溢歡頌於緘縢恭惟秀禀江山器函鼎鼐胸中萬卷直謂之行祕書筆底千鈞何啻於脫吏腕薦膺宸眷超厯華途烏府擊姦聳直聲於白簡鳯池接武騰美譽於紫荷重屈鎮於藩垣旋俯司於榷牧方廟堂之謀帥欲制敵衝在禁掖以得人宜專戎索長城有託絶徼無虞緩帶輕裘燕寢適凝香之興珥貂鳴玉詔泥速飛傳之招即諧端揆之登益究經綸之業某嘗塵下列獲覘末光逖逺鳯星日寄修門之望更同燕雀遙欣大厦之成上運使鄭察院啓光奉細書寵畀華節眷四蜀之劇部莫最於斯用一時之偉人實選於衆熒躔戾止歡頌翕然敬修下吏之恭輒致記曹之問恭惟球琳不琢岱華自髙貫千古之學而通之以權絶一世之才而持之以道器不留物覺實先民烏府騰聲憸人折其牙角龍墀接武多士企其光塵佇九轉以丹成薄三山而風引雖有孤於外官之歎豈無惠此逺人之心顧窮邉萬虎兕之屯賴計府千舟車之衆必國與民之兼裕惟義理財之可為熟復訓詞仰窺臨遣之意哀矜疲俗豈專飛挽之功即疇顯庸益隆異眷受釐宣室遄聞久不見賈之思弄印廣朝當有無以易堯之召某以粃學据有若之坐無經笥解孝先之嘲託刺史天我獨有而自喜逃官長罵飯不足以奚嗟式陳賀厦之箋併致掃門之願上王都大啓伏審光奉渥恩寵更瑞節盡厯使事試愈久而愈新少留福星澤益逺而益博稍紆榮躅粗慰公言竊以易其有無意本通於邉備專其榷牧任尤劇於漕刑地盡隴岷利兼嶲莋摘煙擷露姑損埸圃之棄餘追電奔風盡致廄間之神駿裕吾國計空彼寇資蓋百年成法之具存必一代偉公之可付恩光星煥歡頌風傳某官學造道微智周物表本中庸而立德體常變以應時聲貨不搖初莫窺於畦畛肺肝洞徹能立應于事機已騰飛挽之殊庸仍著平反之美績召參未果借冦挽留新藝閣之寵名畀茗臺之重寄䝉山春草定知氣味之不凡冀北地靈益信骨毛之特異恐未移於桑蔭行促報於芝封某蹇鈍半生槁零末路備缺員于大府愧游刃於短材甘苦自分已遂陳根之棄駑駿易辨甘從下駟之收亟諧望履之榮冒致捧觴之慶又伏以宸渥便蕃從天而下使華烜赫易地則然巳䝉豹霧之沾願致龍門之賀某官濬源顯胄挺異名家智自徹於微彰用必歸於愷悌泛緑素髙於蓮幕握蘭獨粲於星躔自太守為三公未諧召拜由大州刺一道尚屈輸將仍按祥刑薦騰嘉績仁固寬於三宥獄迄亡於一人江漢東流志已宗於溟渤岷峨西望恨猶寄於周南惟摘山市駿之成規蓋足國裕民之良法春雷隱地萬芽俱出於生成血汗騰風千尾悉歸於控御即奏功於中扆行正位於台符某才無逾人職惟詰盜青衫掩骭敢興微賤之嗟白日在天將快清眀之睹
