body:
  text: 淡齋集卷十三宋李流謙撰啓上王都大啓光奉宸綸寵新使節深沃簮纓之望重增原隰之華先聲所臨歡頌惟一恭惟都大名德之後間氣所生振挺挺之祖風屹堂堂之國器蚤推材諝固已空於馬羣盡試劇繁初無傷於牛刃功髙藩翰威憺邊陲君宰深知誠出選掄之遴𣙜牧重寄遂膺臨遣之光使兩者交利於華戎在一人實寬於憂顧著在盟府未忘先正之元勛召還禁途當有後命之殊渥某凋年為郡綿力罔功仰託二天尚沾濡於霧雨遙覘數仭空馳想於門墻上張都大啓竊睇飛塵占一節之戾止遍敷和氣被列城而燠然敬修下吏之共輒貢記曹之問某官文參盤誥學究本原才細大而具宜器方圓而俱適矯矯經綸之業素蓄胸中廓廓功名之途如居掌上自清衷之妙簡宜要路之躐登旋寄平反已著空囹之譽亟司𣙜牧定髙制敵之謀方欣幕府之開遙想使華之盛山川改觀簮紱歸心墨突未黔恐已勞於夢想枚輪促駕行即踐於禁嚴某流落偏州婆娑晚景借九江之餘潤或起焦枯安一枝之窮巢幸逃顛覆上新漕何舍人啓剖竹方州已登巍最乘軺劇部就錫寵除雖有孤於外官之嗟豈無惠此逺人之意初傳成命已沸歡謡恭惟天韻粹深風華秀發侈盛名於白日振逸響於紫霞簮筆螭坳仰乾行之正健演綸鳯閣助雲漢之昭回丹九轉以將成風一帆而輒引東方千騎凌雲之遊亦佳滄海六鰲登瀛之侣故在堅艎小却飛傳亟留顧窮邊萬虎兕之屯賴外府千舟車之運必國與民之兼裕唯義理財之可為召嚴助於會稽反相如於蜀道可立待耳姑少安之寧有一時之老成久去天子之左右某不敏於伎但癡於書迫以道窮始俯從於門庇鎖其廳去亦謬綴於儒科雖從别所之奏名實自廣場之借潤窮鄉牢落竊五斗而雜鼪鼯瑞節輝煌託二天而窺星鳯莫罄染毫之祝即諧負弩之趨賀夔路費小漕啓瑞節南來服訓詞之深厚星軺夙駕侈原隰之光華威聳百城聲騰萬喙出值昌明亟赴雲龍之會居懷康濟尚淹霧豹之藏惟朝家用人無中外之殊則君子行道豈彼此之間解符握節猶嘆序遷攬轡問途疑未意愜顧巴夔之僻處介吳蜀以中居上不下遺澤欲兼被示以照臨之廣如皎日之及覆盆畀之慈惠之賢若膏雨之先稿木恐桑蔭之未徙徯芝檢之速頒佇躋禁塗永庇善類某久深蟻慕偶遂鱗攀眷弟兄同出於恩閎每多善禱况賓旅雜稱於夀斝敢緩嚴趨與綿州楊左司啓承明倦直輟鳴玉之清班便郡榮歸當分符之寵寄教條始布歡頌載馳某官人物粹融文章竒古朱霞白鶴自超出于風埃元酒太羹亦雅施于廊廟肅趨嚴召薦歷華資九轉將成俄失聲于墮竈三山在近徒興歎于引帆未捐去國之思不失為州之樂入劍南第一郡宿號名邦上越王最髙樓不妨勝賞姑少安于蠖屈仍即遂于鵬拏某疇昔講聞夢寐懷想墜函封之嘉貺重服謙勤伸舞詠之私悰獨慙簡緩謝陳僕射啓衰蹤答颯甘自屏於林丘大冶恢宏猶俯收於樗櫟春回寒谷潤借涸泉輒敷栗栗之誠仰瀆巍巍之鑒伏念某岷峨未學庠序陳人夙無經世之才粗有愛身之志早年螢雪竊科第於諸生晚嵗風埃疲精神於俗吏但拘縻於薄廪寧禆益於盛時念牛刀之非才厭從縣道望驥足之少展坐困外銓方亟訴於羇窮遽辱知於特逹榮加别乘仍冒據於要藩寵拜除書頓光華於暮景闔百口而感抃罄一心以依歸豈亡宿緣實倚大造此蓋伏遇孔顔學術伊傅事功藏諸用以難名選于衆而不及南征北伐方傳恢復之茂勳上際下蟠仍侈經綸之偉績任重而心益小體隆而德愈謙網羅天下之英亦及葑菲開拓至公之路不棄履簮致兹瑣微得預陶冶某敢不守嵗寒之松柏保餘暖於桑榆豈有風月平分之心但堅惸鰥共撫之意染毫而賦俱為頌德之言蓋棺以前皆是報恩之日賀李制置還任啓光奉制書寵還舊鎮茂隆宸眷進升延閣之華允賴壯猷全付坤維之重廷臣無出其右國人宜皆曰賢除音外騰士論交慶恭惟器資博厚局宇靖深知中庸之可能得皇極之有守春融曠度推長者於婁公玉潔清規服盛德於楊綰恪持一節光贊三朝抗疏龍墀聳危言於汲直演綸鳳閣追古制於商盤尚煩姬旦之居東蓋藉召公之分陜屬干戈之載戢當障塞之小康移師閫於便藩少緩逺輸之役歸餘財於內府式嚴經制之規更張深協於事宜委付實當於人傑庸昭偉績重穆師言恐桑蔭之未移已芝封之趣下某荷餘波之久借喜成命之初頒伏讀詔書念天子未忘於劔外遙瞻幕府祝我公無滯於周南遲劔佩之亟旋嚴櫜鞬而前迓與姚縣丞啓涓吉戒途貶尊二令聽車音於日日何來之遲問姓字於人人爭覩之快既竊為僚之幸敢稽贊善之勤恭惟號名家駒為治世鳯粲筆端之藻火爛胸次之虹霓襲簮笏於顯門初無侈習振衣冠於宦海蔚有俊稱尚遲視草之行謾起哦松之興邑真蕞爾縣異壯哉亂峯環繞於官居叢柱支撑於民屋僅一聚落豈宜君子而居之有二大人或恐賢者之樂此某頃嘗窺於半面兹遂託於下塵居切連墻方密資於河潤分深傾蓋當永結於嵗寒與宋司理啓巾車仕路早服於風聲聨袂官曹更資於河潤遽辱飛箋之貺居多溢美之慚恭惟才識疏通機鋒頴利本持心於忠厚仍抗節於亷隅獄自以不寃當侈于公之修德民可使無訟必須季路之片言行踐華途亟諧僉議某荒疏末學落莫冷曹以半生願見之心頗深慰愜有數年相從之樂未易索言上查運使啓古人之貴知已必求其心君子之重與人必以其類蓋目皮之見寧關於肺腑而蕭艾之臭自别於蘭薰此吾䣊相值之適難故斯道欲行之匪易嘗考之于千載或得之於一朝伏念某人品猥凡性靈昧陋先公老於兩蜀遺文散在四方星斗有光箕裘弗嗣蓋輪扁不能喻其子而趙括徒能讀其書姑竊場屋之餘粗酬科舉之責軍興選壯而不為用家貧仰食而無以歸渭南再嵗之凄涼泮水一官之落莫用作舟楫誰其濟之必為鏌鎁疇或冀此然當途過聼而強飾混沌方下考僅書而遽加挽推獨龍門之摩天鰍蝦尚隔恐藥籠之餘地溲渤兼收知鬷蔑者雖無俟多言經平子者始足以增重輒采王公借譽之意庶幾君子成人之心某官岱華自髙球琳不琢千簮笏之雜沓獨著修名一水鏡之清明莫窺絶識於學術得其大者故人物覘而知之捉扇折巾遂成風俗倒屣割炙便生聲光此可決終身之依歸亦將卜羣公之鑒拔一作裁薦舉之法弊矣仰公為多勸懲之道在兹非愚敢請上樊運使啓萬里造朝已錫賜環之渥十行制詔遽增攬轡之華蓋漕關中者深倚鄼侯故對宣室者少淹賈傅郵音插羽歡頌殷雷恭惟誠明自將剛大不撓學貫羣倫而弗雜才該衆務而具宜四把州麾流落有如此者一瞻黼坐掀翔若在兹乎將鼓楫於三峽之濤乃出綸於一封之傳蓋上方臨控於江南北而中實憂顧於蜀東西贊我廟謨固資碩畫足豫邊餉尤寬逺憂爰改命於輸將誠挂心於屯壘時丁艱棘固亡輕外之嗟才任安危當有康屯之業使萬旅不枵服以抗敵則兩禁將虗席以待公某先世獲耐久之朋小人逢易事之長不敢恃二天而自惰固將鞭十駕以求知負弩道周即遂迎塵之拜染箋記府徒深背汗之驚上查運使啓榮奉細書寵更華節眷四蜀之劇部莫最於斯用一時之偉人實選於衆郵音戾止歡頌翕然某官材具恢宏氣韻超拔過人學術自饒山海之儲妙世語言創見波瀾之溢夙膺簡識亟遂飛鶱班十八人咸起登瀛之嘆草三千牘嘗輸悟主之忠更髙戎帳之籌重屈計臺之遣尚稽巨用少虛巖石之瞻欲惠逺人就徙福星之照惟在彼以無惡此綽然而有餘共觀足國之規行徯富民之拜某婆娑荒郡偃服下風眷發的之初筵未知措手獲事賢之始願真足慰心正炎候之方隆祈天倪之珍護永惟頌祝莫罄編摩上查運使啓南服乘軺已登顯最西岷易節就錫寵除雖有孤於外官之嗟豈無惠此逺人之意初傳成命已沸歡謡恭惟天韻粹深風華秀發文章家固有法材器世謂無雙瀛洲十八人蚤嘗推於特選方朔三千牘蓋自結於殊知佐晉公之幕于淮西理寇恂之財於河內行道以擇地為隘用人欲盡材為難書命勸讀顧不宜哉飛芻轉粟尚或淹此然外臺之寄實耳目於人物之任猶權衡宜占一藝名寸長者所赴歸則躐兩宫登三事焉當徯祝某鎖其廳而竊第用於世而鮮能泮林氷寒慙據有若之坐燕谷春近幸庇蘇公之天睹方快於鳯凰賀敢遲於燕雀上李運使啓光奉宸綸寵新使節號部刺史顧委寄之非輕匪時顯人在選掄而曷稱屬居臨按彌激歡欣恭惟運使才稟天姿慶鍾名閥器兼包於大小智洞貫於洪纎凡所至赫赫而有聲顧其長鬱鬱而未盡剖符騰最君相之所深知乘軺觀風搢紳之所屬協斂散均而國賦羡銓擇謹而官曹清六轡載馳豈久淹於一使十行遄至當亟覲於九重某竊食儒宫棲身雲蔭厦成而燕雀賀聊展私情藥就而雞犬升敢有他望謝樊運使啓鱣廬氷冷抱蠧簡以長謡鶚剡春華偕稿株而倐奮本包荒之道廣覺冒寵之心危竊以求知之法實貴自修薦士之方亦期熟察循諸己而不足則求之為妄考諸人而無驗則薦者若輕必上下兩盡而毋慚則賓主俱賢而可紀如某退藏疑怯專直近愚妄勤慕古之心苦乏趨時之用結髮而戰多士鐵硯欲銷低頭而縛微官荷衣可笑深懼世科之弗嗣重虞家學之無傳黽勉背城夤緣拾芥再嵗渭南之落莫一官泮水之凄涼方無以解館下諸生之嘲顧何以辱當途大人之舉屬三書考妄有一言雖通籍之薦已願委身於後來而循次之遷亟用拜恩於俄頃豈期特逹遽許甄收敬窺金玉之章倍光土木之質蓋百代先盟固仰崇篤而四海知已誠嘆濶疏一作稀感徒切於鏤膺溫豈殊於挾纊此蓋伏遇器博而粹道峻而通推心待物而皆有容引舊援窮而無不至渭涇相絶固莫混於一流榱棟不侔亦各安於廣厦唯其若天地之大是以無蟲魚之遺敢不益謹踐修愈勤職業得隴望蜀尚希豫取而豫求欲魚兼熊是謂不奪而不饜輒致凌兢之謝併敷冒昧之辭别院監試費運使啓某官學造箕疇妙探羲畫藴鈎深致逺之識稟開物成務之姿剖刺史符式重分憂之寄持使者節始為持槖之階適當論士之秋分握衡文之柄責大指而衆鬨自息推赤心而羣疑卒亡封殖陳荄周旋誤墨策名而降杜牧殆非本懷逢人而説項斯具有正眼賀瀘南樊安撫啓光奉宸恩榮膺閫寄彈壓一面坐懷氊毳之徒鼓舞三軍欣得詩書之帥矧叨殊奬倍激歡忱某官易之丈人詩之元老素絲一節持身毋愧於輿評皓首兩朝被遇皆由於特選華召促還而嘗易退使軺再駕而將亟歸雖行藏舉法於聖賢顧柄用方隆於君宰少遲夫子之反魯幸其肯留載煩武侯之渡瀘資以卧護實重長城之托遂蠲逺障之憂貔虎成羣一言而衣挾纊櫜鞬擁道三令而戟生風恐桑蔭之未移又芝封之遄至某以故人子在門生中目盛舉以傾心緝愈辭而贊喜父友無幾願公享椿松之年弟兄不孤終此無葛練之感上王運副啓六轡載馳心每懷於靡及七旬遄返歎寧有於獨賢仰咨徒御之勞恭致記曹之問竊以裂海內而為諸道是分聖天子之憂寄使者以總列城蓋有古牧伯之重通下情之所不逹導上意之所欲為儻非蹇蹇匪躬之人寧有孜孜奉國之念故志澄清者歎深於攬轡而疾強禦者憤激於埋輪近世過於納汙當途重於發伏不知莠蕃而苗瘠深虞梟集而鳯衰欲收整頓乾坤之功必賴撼搖山嶽之手况三令五申而後出固非不教之誅雖小懲大戒而何傷卒付有容之德載觀施設益重歎咨恭惟性賦偉明德全正大道趨時而善應智周物以不遺更練政經小者大者之皆可淹該治體左之右之而具宜上方均內外之重輕公亦兼朝野之責任轍環三蜀身歷諸臺撫摩調護之方舉諧人欲補救彌縫之術動中事幾滌宿蠧以蔓除窮弊端而禽獮猶以耳聞之詳不如目見口教之切未若躬行擁一節以于征勞四體而弗恤家風宛在阪九折而猶驅私計未遑門三過而不入剽聞舉摘畢協羣僉風振墮偷施砭以起衰疾斧摧貪猾搏虎以救乳兒解印綬者魂去體而未歸奉約束者芒在背而尚悚凋氓吐氣逺俗興謡更因亷按之餘不廢登臨之樂雲橫大面霞佩從羣仙之遊月照峩眉寶乘登諸佛之地絢麗詞於琬琰寄逸想於浩茫是豈俗吏之能為蓋自長才之整暇屬言旋於大府方小稅於軺車壺漿紛載道之迎弩矢盛前驅之列某偶沈巖邑遙跂星光恐叛官離次之誅莫遂驅庭之願惟慕義向風之切苐輸染牘之勤上何少卿啓雍容半面夙欽道德之儀刑倣佛一斑粗覘文章之毫末蓋相知已兆於相識而所見實先於所聞輒倚夤緣敬紓悃愊某官幼傳外家學不讀非聖書浩蕩心胸探子虛雲夢之八九縱橫筆墨掩翰林風月之三千識真主於淵潛之初是誠稀遇折姦臣於鼎沸之日寧憚左遷晚起瘴鄉屈參軍事偉沖懷之自若奈僉論之謂何且一府之寄似少進焉惟九重之知當不止此恐坐席之未暖報鋒車之促還垂庇斯文陶成善類某迂愚可笑朴遫無竒竊念先君與交德友竦凌雲之傑作固自服膺喜流沫之侈言殆不容口竊侍間宴每聆品題俗駕飄零不親炙者嵗將幾稔心旌搖蕩苦遐思者日無息時天遣公來事適我願望龍門而切近得遂致恭撫蝸室以遲回又慙居後念求學有加於往教在不肖當謹於事賢是用亟懷刺字以趨塵致閽人之請一拜一起顧登堂久已虛心三沐三熏欲承教可以藉手勉傳家之基緒輒妄意於語言冒貢師墻仰塵匠目愧小子斐然之作不知所裁推先生何甚之心諒豫其進願卒留而受業敢遽覬於知音納志銘石本上何少卿啓豐碑立玉日星大墓之前妙語鏘金韶濩萬人之口冒投副墨妄冀榮觀恭惟某官造詣本原鉤探微隱得斯文正法眼藏以吾道直指人心博厚難窮端是斗山之卓爾清明易識要知天日之皎然折巾成風捉扇移俗宜隻詞之可否為四海之重輕况蒙紀其先人可以列於佳傳數之兩蜀得者幾人必期髙揭而久傳要在大書而深刻窮山伐石坐漲潦以踰期異土徴工亦淹遲而隔嵗逮兹終役粗足慰心緹襲效勤將塵下執事之聽瓜桃講報唯有先大夫之文蓋贈言者有金玉之珍而居山者無魚鱉之獻欲躬陳於几席亦久戒於車徒忙迫槐花方逐原夫之輩中輟行李阻躋君子之堂恪致斐箋肅馳賤介具宣曲折九頓首以遣之幸寬譴訶一解顔而領此賀張都督啓代顯膺詔册榮陟樞庭尺籍伍符全付本兵之柄髙牙大纛仍專督府之權喜動三軍威騰四塞恭惟智勇天稟道德生知藴命世之大才包濟時之偉略不擇夷險忠義貫於神明屢攘姦凶勳勞著於社稷自為民望人詠公歸方強敵未戮於藁街而諸將尚屯於細柳實倚大臣之重坐當一面之雄然勢均力敵則無以使人必爵崇位尊乃足以服衆况以魁名之舊固殊將鉞之常宜渙號於嚴宸特晉升於宥密悉歸督護分握機鈐兼安危注意之榮藉精神折衝之美三令而旌旗變色一言而貔虎歸心如蒼生何公豈留情於物表果吾父也敵當迎拜於馬前佇邊烽之促消企鈞衡之亟拜某欣聞異數倍激歡悰方削平禍難之秋正收召豪英之日謭才何取莫禆破敵之功薄伎可陳願上平淮之雅賀王樞密啓明詔誕敷真儒登用二樞管弼諧之寄適甲兵休偃之時宗祏鞏安蠻荒靖謐某官學博而粹道簡而文負朝董之科名藴夔龍之事業金湯一面䇿嘗驗於籌邊冠冕百工勳未參於調鼎惟黼扆眷甘盤之舊故衮衣速姬旦之歸光踐顯巖亟躋宥密已清氛祲不忘戎器之除端倚精神坐見遐衝之折彌增茂績益叶僉謀即聞夢卜之諧遂正鈞衡之拜某順風久矣聞命躍然匪私慶於門墻實交欣於中外白頭逺宦悵莫跪於賀觴黃閣深知尚辱收於墜履又進膺綸制入贊鴻樞載光耆德之求式重本兵之柄帝心特簡公論翕歸某官器質雄渾學術淵懿允矣大臣之望卓哉名世之儒妙天下之語言幾冠多士安國家之䇿略逈出古人更踐華途召還外服咸徯具瞻之拜乃從均佚之求帝學光明恩正隆於師傅樞庭嚴峻任實亞於丞疑適當鄰好之修遂絶邊烽之警偃兵耀德佐聖治於文明除器謹防敷先幾於武備益疇丕績進陟上台終大濟於含生始深愜於輿望某舊趨棨戟嘗拜履簮未能報國士之知欲進得賢臣之頌田園晚計將申丐老之章爐錘新功尚在鑄人之域代賀葉樞密啓誕告大庭延登邇輔當親決萬機之際正賴贊襄雖載戢五兵之時猶須控御必兼資文武之二者宜獨任安危於一身廟社得人黔黎蒙福竊以參預機衡之峻實亞上台攬持威柄之雄式嚴宥密允惟大柄爰付通材惟發謀決䇿深協於皇謨故禦侮折衝能張於神武邊鄙靖謐朝廷清明迄收調燮之功兼著威懷之德輿論畢與僉謀悉諧求之禁近之賢誠堪倚注行乎置郵之速共極歡呼某官植立不凡藴蓄特異淵源學術自得於聖賢之不傳敏妙才猷旁通乎事倫而莫測膺兩朝隆渥之眷冠百代超軼之才遍歷顯途愈增華問適衮鉉之虛席又疑丞之曠官四海具瞻一人熟察姑正二公之位浸為元宰之階惟國論既定於蓍龜更憑訂議顧邦基永堅於磐石端藉扶持行光彛鼎之鑱益侈衣裳之治某夙陪鴛列敬仰鳯姿豈期流落之餘獲見登庸之盛桑榆已晚固絶望於覆盆爐錘方新尚俯收於躍冶
