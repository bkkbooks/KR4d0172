body:
  text: 澹齋集卷十五宋李流謙撰記重修法明寺記偽孟帝蜀有隱者自號醋頭手擕一檠所至輒呼曰不得登登便倒未幾知祥死人讖其語嗟乎五季昏悖狐孽䑕妖乘夜嘯舞而當時狃亂怵逆視為尋常至人惻之㣲諷隱言將已之而不可今預知明慧普通大師醋頭是也師先識知來事不一書獨其抑偽叛斥狂僭有裨於世教予喜之漢州雒縣自唐有寺曰法明而治新之或傳自師始有舍利塔有塼洞以掩四衆之骨皆其手迹歲乆寺頺剝破殿赤立世尊塵埃龍象為泣前什邡南陽院住持僧慧覺始服儒衣冠慨然願祝髮於其地而興起之初亦落落不合去之數年而歸卒如其志盡撤蠱弊飾像設若門若廡若堂室庖廪凡為精廬者畢具名葺之實無異更造又築祠奉醋頭以志其本市經之為四火部者龕藏之戒其徒無輒毁易環植竹柏數百根根誦貝葉數過曰將以祝吾君如是之壽後當無敢斬伐者覺囊不貯一錢而平生喜佛事故所厯塔廟無蠧榱壞椽此為尤盡弟子純一純韞實左右之既成求予記予熟知醋頭之異而不知嘗居是寺每嘆物之隱于荒昧固難知覺學道精進其所證解非皷三尺如蛙黽者而恬陋安寂俗眼白之以予不知醋頭則亦未必知覺姑為記葺寺本末使來者有攷焉星燈記乾道三年十有二月淮安郡守廣漢張公洸與邦人修黄籙大醮于州治越三日有星現于九真位前琉璃燈上初若散徽漸如編珠芒采流煥脉理貫錯疑有躔度倐觀或無諦視愈明缸涸燼零燦爛如故已事乃隱在壇壝者莫不畢睹道人劉浩曰吾見之三夕矣平生為人作醮至此才四爾噫嘻異哉夫天逺人者也以誠求之其近乃在目睫傳曰惟徳動天信乎其能動也葢公之為是醮本以溉濯斯人之殃戾而道迎其祉貺初無私已之祝既捐俸帑裨衆施以辦具且跪起薦獻亡毫髮不自盡凡百執事謹於法象亦奔走罄竭罔有遺敬以是精意潛孚𤣥鑒昭答有此希闊祥異之應是豈茍然公命史為圖而某職在文字謂安可無記輒稽首為之記龍角山福志寺修造記僕為邑人將十年矣而未嘗知有龍角者一日山之福志院僧義祖持謁入跪而言曰山距邑二十餘里地綴大蓬葢古藍若也頺弊不葺積有年所殿寮荒壓像設翳昧山神地靈面目沮慘緇徒野陋巢栖穴藏茍安昕夕吾師悟詮自惟先業全付傳次在予儻不事事恐遂壞遺羞亡窮曉夜惴畏規逭誅責乃發大誓願開誘檀施捐金輸粟益以已資空篋倒囊毛髮不靳鳩工合材一大治之亦既卒事願丐君文揭示不朽僕初不孰何義祖唯唯而已明日以狀來條言之葢院之中佛殿建於元符四年之丙子山故饒蟹羣嬉旅游咀嚙壤土水隨入之腐木墊基殿因以壊悟詮白發其端羣喙趣和即日徙髙燥地疊石其址以屏以捍本根屹然堅壯厚實已乃澡丹堊之漫漶者更榱棟之罅脱者創塑十六大阿羅漢于其中而重飾釋迦迦葉阿難之像既又撤廊西之破屋因其地為經閣而維之以四廡創始於某年甲子月積歲累至某年甲子遂落成於是院一新矣形勢鬱盤氣象萃合游者改觀居者移氣如寠人子忽衣寶衣乘輕車從豪奴黠童疾馳於通道大都神觀舒閒光彩赫奕追思向來憔悴饑窘無聊之狀不復夢見然猶重慮其傳之不乆也將有後虞乃自課祕言金剛圓覺以千萬計將丐庇於龍天神鬼期有以覆䕶而鎮撫之噫嘻詮之有功於是院顧不偉哉原詮之苦心焦思不憚營丐服勞於已而遺人以安此固當書然僕猶不是與也葢新舊起廢亦浮屠氏之所當為而又裨以衆施相以羣力詮若無難者獨嘉其不茍近利而惟他日之憂沈思逺計至乞靈于象教以妥安後之人則其用心豈偶然者葢推而大之則從上諸聖所以斬絶彼我普度一切均是心而已矣可書之實不在是邪為之記以表休蹟尚何辭緜竹縣圃清暎亭記物生皆兩之其合也則以類照異而體不隔情違而理宜符非瞰乎𦕈緜立乎域外疇覺哉月行天水行地異且違也合為一清同一清爾而人不得以瞷其際是非有以使之類也並衣冠而處士爾士爾唯合焉引而森布班列之雖別容表差伎能殊性質然輝聨彩錯人望之自一色亦類也緜竹縣圃多閒田令君錢太虛不以植禾稻藝葩卉乃鑿池築亭以當水月之會長林屏其前迥闊超曠日入雲破暝色徐展推璇魄而貯之涵液沈漬神與形融殆不可以聲偶有會于予之説於是令君取退之月池詩二字題其顔曰清映呼客觴焉而問言于子李子子李子盡酌而對曰嘻有味哉退之之言令君知之矣其詩曰若不妬清妍却成相暎燭此葢因物會心以發異境之自然借才託諭以表善類之相得使人知自澡濯吸澄爽以盪埃胷攬晃耀以破幽昧乆而不得自翳一旦為喜事者所諜綺縠之妙辭金玉之美質鵷趨鷺翔參光而互瑩不亦有國者之華乎不然是名也喻耶實耶竟何所指也太虚名某金淵人同年進士為政有經緯人咸宜之且惜其將去予毎過之與之臨流徙倚自鑒其衰陋槁孱泚然不能為容而太虛又在旁為誦覺我形穢之語未嘗不莞爾而一笑節齋記節齋者縣治之燕齋邑大夫青城楊公命其僚廣漢李某為之名也曰節者何齋之前有竹數百竿蕭森玉立蔭暎齋几名所從也竹為德不一而獨節云又何也竹之德無美於節也寒暑之運烈矣物皆聽焉而彼曾不與之變非節之可美者乎予請言節易坎上兑下為節坎險也兑説也非險不節非説以濟險節則病焉人之情善放而易揺樂於理外而拘于律中可欲誘之淫潰四出則蕩而莫之檢非有法制程量嶄然臨之如絶壑峻淵嵓嵓在目則不能節故凡坎之險所以節也然徒險而已勢薄則悖情迫則劫非有以通之泮渙夷緩戢其所已甚而矜其所或有第措之于法制程量之間則禽攫獸搏節所為病故兑之説又所以通之而節於是得其正觀之植物松柏之不易寒暑竹畏友也然形之磥砢盤錯往往愆繩墨而缺斧斤不為榱棟之用坎之節而已惟竹也逕尺而節節有常處積其節而後摩天又中虚而圓色粹而潔有應而不留介而能通之狀故人視其翹然自拔者可敬而娟然爽媚者可愛固坎兑之節也因以名之竹其為予强名之楊公岷下夙儒令靈泉也條教簡嚴其要在於區別臧鄙裁正是否一髮而不可溷以私若坎之險而其實慈恕惠和春融日溫賓賢子民人父師之有兑之説視竹之節顙能不泚矣然則予謂竹當强有是名公獨能强辭是名哉昔之嗜竹者指王子猷子猷縱誕為名教之蟊晉人葢以是覆其國不知節者也乃曰不可一日無此君予恐竹視之則曰不可一日有此君也若曰不可無必節者而後可也予嘗暇日手擕韋編於竹之前清風徐來夭然而笑竹與君皆若為予首肻公名某字某題待鶴亭記靈泉故瘠儉舉一邑無觀遊之地獨妙通祠側有蘭若曰興福其外慿高為亭下臨綠野市井廬落雲煙草樹田疇溝塍參錯蔽虧畢陳乎其前一睇千里來登者神豁氣夷心目俱爽最為邑名勝處昔人榜之望錦以錦官城可跂而望也蘭若乆荒圯梟狐窟巢如逃屋亡家一僧衰癃無徒屬色頗凄凉故亭與之偕廢椽脱棟揺壁壞甃裂瓢囊之瘠往往舍焉環其地柏數十株老蔭壽幹亭以為勝者亦半戕於斧斤紹興壬午歲元日邑令楊公過焉顧瞻乆之曰是去真栖不一弓地汙穢乃爾其何以安歸語邑尉李某相視一嘆明日興福僧來言曰智海老不能有是亭乆矣考之舊刻亭之建不知何時崇寧改元歲在壬午宰王君者以葺祠之餘材新之今歲復壬午意者㝠數之符亭當惟祠之歸願併其地使黄冠掌焉智海本心也公曰可哉吾何敢專適某詣府遂具其事俾白大尹王公亦欣然可乃呼道士王行真付之且屬以興修之役公首捐俸粟倡其僚各輸斗石食衆工凡邑子及客子之樂施者聽而不强又親為指畫自真人殿左廡破壁為門伐翳夷阻架溪而梁之累石而上凡一百二十有二級以達于亭即亭之舊而加葺焉支補其壓漏濯洗其漫漶垢汚而徙所謂茅茨者于其後於是氣象鶱奮起拔異疇昔自廡望之横橋如畫石磴如梯空亭縹渺山顛如飛來隆岡起伏為之扶衞草木朋附若奔若迎殆與真祠素為一者祠初無客館客至無所舍至是始有託足休駕之地皆滿意焉屬役於四月而斷手於七月公休事輒來督視不啻治已之林囿臺池者未訖役某授代去既數月公書來曰亭成矣子實贊我可無一言紀歲月某曰亭之成實公意所屬徒以老仙蜀人之所尊事而是祠也臺家之所更建汲汲夤奉根極於至誠故視唾其地如唾其面精念㝠感至使闍黎自託於不能願以是歸之黄冠大尹王公躬承密㫖既克新華棟凡便於祠者亡不允可是以斯役不勞而濟此皆可書望錦舊榜於祠不類也易之曰待鶴昔仙人丁令威蘓耽皆仙去化鶴以歸舊傳殿廷之柏故有鶴來安知非老仙而莫識也於斯亭也願與諸君待之公名先進字用之永康之青城人古君子而今循吏云尉㕔二齋記尉㕔之兩隅便齋各一名其左曰友仙謂梅子真也右曰自警先君所著書目也尉居於官邸去里正徼吏僅一髮自子真為之來者例以仙名果仙者而為尉哉葢古之士遁世而不得去直若寄焉則擇其甚卑極陋者而居之不願顯也予觀子真當王氏用事京兆章以直觸誅一時士喑如寒蟬子真獨憤悱斥言不少避亦偉矣視班槐棘者亡如也顧肻居此無意哉其後莽盗國子真乂去為市門卒夫尉卑矣足自晦矣然且去之而甘於𨽻圉豈其視尉猶顯不若卒之賤愈足以放意肆志於網羅之外乎然則有道之士其不喜華寵類此尉以仙名必斯人而後可予既冒其官非若子真不逢而晦徒以丁時休明無一能自薦當投之冗散而來此爾尚友千載或庻幾乎其人友仙之名葢如此先君姿質峻厲視履不善如踐虵豕而食蠱鴆嘗以所自得與平時之所躬行著為書名之曰自警實大警我後人予兄弟惕惕奉承常恐少失墜坐譴泉户况今輩武吏職警察因念䑕盗狗偷乘夜不祥茍偵邏不密雖三户睫不得交然專倚以治晨伺夕掩力則不勝就盡得而獮之論殺丹渭水秦氏無炊火焉唯端已歛軀一以是書自警德型而恥格意誠而物化彼亦人耳當不待警而懲故凡自警者葢將以警盗也予公退坐兩齋其在友仙思子真雲霞之姿雖屈首風埃而邁往不羣之氣決不可一毫挫則亦遂忘其身之賤㣲且飄然有鞭笞鸞鳳之興在自警陳書於前嚅味義訓披窮格言思先君繩步尺趨言言玉屑者退而視其身不逮逺甚則竟日不得寧然則兩齋之益予豈但盤盂几杖之比哉若其為屋則其官其邑之陋不足書書其所以名者容庵記吾弟無害以容名庵乞予記乆矣而未暇因其之官少城也乃書所以為容者而告之凡天下之能容必其廣者大者天地之容萬物生焉山海之容百貨聚焉蝸廬蟻宮蟭螟之巢容而已矣夫人不能皆我也吾與之同處乎宇宙之間曰必我則爾容是使之南走越北走胡而後可也然吾豈能使之南走越北走胡則彼衆而我獨吾且不容于彼夫至不容于彼果能裂冠毁裳去而之山林河海不與之共斯世猶可也而又不能則是日夜焉常與仇敵處劒鴆接其前而不悟豈不危哉雖然使真能裂冠毁裳去之山林河海矣然一瓢振耳狷者忿焉則山林河海猶未免有為吾仇敵者葢惟一不容是以無適而容也於此説焉視吾身則若不可自容視物皆容之則幾矣何謂也嘗試思之吾雖賢世固又有甚賢者吾不能至彼之甚賢則猶不為所容不為彼所容吾何以自容不自容其德進矣至于人無大故皆賢也何容之難哉嗟夫以是而航諸海濟矣吾弟聰察諒直奉家法謹甚特于烏鵠之辨未忘也乃今有慕於容之説噫嘻吾之言亦畧盡矣成都大都會臺府皆貴人而同僚又一時賢雋所接士與民比他為夥容之所施用尤其地哉勉之行矣以規不以頌手足之義也既用是別且為記哦松亭記姚宣孺來丞靈泉治其屋西之小亭亭面長松暝翠曉清矜嫮千態近接几席間有可娯者名之曰哦松取韓昌黎藍田丞㕔壁記對樹二松日哦其間曰吾不必植松而山在焉屬予記之予讀記丞位偪而高例以嫌不可否事涉筆謹署非但今也古矣每妄言之人必自惟其才力之不足賴而後始能安于無事茍有銖兩之智焉皆翹然不肻自愚故凡為丞而畏偪逃嫌知署而不知可否庸則然也若才者則必其韻寄蕭爽趣尚楚潔不屑於一丞之為乃然爾觀斯立種學績文退之稱其所蓄泓涵演迤日火以肆則豈庸而黙者乃能恬視鳬鶩吏之平睨以紙尾一過目若驅童兒聽部署絶不經懷方退哦兩松之間其人葢可知矣想其吟諷之時松風颼飀笙竽滿耳落子在地可嗅可飱意從天來句與神會必振冠奮袖大樂于斯視簿書埃氛皂胥垢濁觸面逆鼻唯恐其不亟去尚何可不可之問哉故予謂退之之記非以著丞之當然特表崔君之高云爾不然長貳固共事也而何偪何嫌哉宣孺名家子好學工文辭下筆雅峭有中原氣味于事物亦無所不通其來為丞也適令敏明又邑小不足治宣孺既舉其職曰如是足矣吾可例崔君偷一餉之樂矣于是名亭以寄意焉予曰今人古人其何以相逺哉崔君之高退之能記之矣宣孺之高予獨不能記乎他日宣孺坐於亭予幅巾過焉宣孺方撫松徘徊掉頭長哦其聲若出金石顧謂予曰吾方有公事子姑去奈何宣孺曰吾不以待子遂相與一大笑宣孺名藩平陽人黙庵記天彭駱庭幹以書屬予為黙庵記予復書曰庵以黙名而求記之庵中之人可謂黙乎而予又縱言其間果可以為黙庵記乎雖然嘗試妄記之夫黙語之對也語有當愆則彼此譁然故人指黙為勝然不知巧詆竒譖者以為外鉗中非情實險幽則其召災速殃尤慘於唇頰故謂黙為勝語而足以自完猶未也易曰黙而成之不言而信存乎德行黙乎其庶矣乎葢嘗觀之乾覆坤持日星散照山川流止風雷飛動草木孕長羽鱗潛舞謂其言耶則固寂然謂其黙也則貌象闡發揭揭於外不得以自翳然人終不以非言蔽其用亦不黙議其隱豈非不言之信存乎德行者在耶今庭幹之黙也姑務求勝捷捷者而約吭袖手於沈㝠之域乎予恐巧詆竒譖者或掎之不然必勵於躬著其踐修使為德行者可望而知則雖終日言而人卒不得以言以黙而求於庭幹庭幹予姻家予知之深矣其孝友篤實信於一國而學問光華又嘗推上則固如予言予也尚何以告之為是姑以贊也若夫極黙之義而至于非德行之所能見則庭幹且不自知况予乎重修尉廨南康祠記尉廨之南康祠不治乆矣頽壁蠧椽厄以風雨像設黯晦香火衰寒過者弗莊非神則然也所宅之地然也尉之居如蟻垤如蝸廬吏卒如凍蠅尉窘悴清苦如寒蟬而神下臨之其祠之陋與廢而莫之葺理固也予之來更二十晦朔慨然欲葺之而不果今僅如志然既盡用其力亦姑補其缺壞與袚飾其舊而不能大有所更革又自秋徂冬凡數閲月始訖役其難若此嗟乎亦可憐矣既已事酌酒而告之曰督姦詰盗尉職也神不恥而宅於是亦其職也尉職明神職幽然尉不若神之靈明不若幽之察則神舉職為易尉實賴焉茍疆隅妥清凶梗遏伏尉安于明則神安于幽矣夫如是神之祠一日不葺尉何面目視神謹用書之壁以告神且以告方來之尉俾曰若予之謬猶知倚神而葺是祠其不謬於予者祠必可保其勿壞
