body:
  text: 澹齋集巻十六宋李流謙撰記重修安國寺記安國寺昔號大恩不知興建嵗月嘉祐八年賜今名天聖中為禪坊雲頂山僧元釗始居之六傳復為律嵗久屋壞予少時過焉閴然悄愴疑有鬼物輒怖而出僧道安何氏五代住持元喆之孫也慨然願葺之空十年之蓄益之檀施而東林院僧某亦悉力來助合為若干錢於是盡撤蠧大新之佛故有殿稍加治焉自門廡堂室及最後大殿則更建材粗堅可抵當百十寒暑我先君起部與邑人繪八菩薩像于殿之壁士人王訾筆也殿有轉輪藏丹碧黯晦予兄弟出泉濯洗之而屬道安之徒任其完補其經役始於紹興嵗丁夘而成於已夘道安求予記許之有年矣而未暇請滋勤其言曰蕞爾刹何記也然獨唯荒圯至吾而極茍不力則禾黍矣用是蚤夜孜孜嗇衣撙食銖毛捃收亦幸施者和附趣贊乃克濟豈我能以之哉或者一念至到有導焉者爾吾恐後人不知為之之艱而傲居之輕漏忽傾不一引手則吾志弗嗣記之期以勸也噫嘻安可謂用力勤而為慮逺矣因告之曰衰興有定縁而方來之賢否不可期賢耶適其興無記可也不賢且與衰㑹記其能已之乎安曰是則然矣而傳後之意不得不然也强書之安知其不由是勉於賢而是刹之興將無有終窮乎予曰可遂書之瓦屋山瑞像記瓦屋山在西南絶徼去郡城三百餘里與峨眉相望盖蜀之絶境也五月初一日僕自雅安擕家來游凡兩日至開善寺又兩日始達峯頂時隆暑意佛光乗日必大現至之日即雨翌日又雨連晝夜不止四巖冥冥瘴霧如翳初六日早大風從西來雨復隨之僕私念聖賢隠顯變化初不可約欲指期見之亦大癡矣將遂作禮而去日午雨忽止起盱巖際稍稍開霽頑隂若霧若有物推而納之澗下日光雲氣上下相激射天宇融怡一塵不興主巖僧道緣曰佛見矣然猶遲以晚也僕喜甚正襟危坐以俟日昳未僧率大衆登佛閣炷香諷唄以請久之雲蔽復開日出没不常衆頗憂之少頃有圓光隠嵓腹五色璀爛衆方驚視俄隠去既又復見比前益大其圍丈餘色愈光潔自是凢十三見見輒異狀有爛銀色者有金色者有火光飛馳其上者僧指曰銀色普賢也金色文殊也火光辟支迦也予逼檻注眎其銀色中髣髴若有菩薩像又白毫二旁出貫天與日不相亂文殊之現亦如之獨辟支光上火熖蓬勃繚遶而上尤分曉可辨於是觀者覩所未嘗皆彈指贊歎聲震山谷初僧之延降諸佛也皆單名特請輒隨所稱呼而應一一不紊率自為圓相不復相襲僧言所未有此尤異者予聞瓦屋之名舊矣其所傳種種變見大抵荒茫曼靡不可攷信每疑其徒誇誕增飾耀流俗以求尊其教乃今幸親見之變化恍惚不可名狀靈異如此始知諸佛慈悲願力神通妙不可思惟且重悔其狹劣淺陋聞見不博拘攣常智而果於自信果於誣理也因遂書其所見以示後之人若夫斯文之傳世之未見者復有如僕之初置疑其間出私意而輕議之安知不復為異時之悔乎王正卿楞嚴譯經像記天台智者大師聞西竺異比丘言龍勝菩薩嘗於灌頂部誦出大佛頂首楞嚴經十巻流布五天皆諸經未聞之義唯心法之大㫖五天世主持護祕嚴不妄付授智者日夜西向禱願亟傳中土開瑩晦䝉然終其身不及見唐神龍初中天竺沙門般刺蜜諦烏萇國沙門彌伽釋迦始以經至廣州時房相國融以事謫居二僧乃參譯屬以筆使授微詞宻義煥徹彰明東坡嘗稱之曰釋迦以文教其傳于中國必託於儒之能言者大乘諸經至此經則委曲精盡勝妙獨出信哉言乎學佛者不可不知也龍居王正卿得筆墨三昧嘗為安國寺僧道安為此像于寺之璧極一時之妙人物簡古竹石秀潤其執簡作談者有黙然意傳之狀援毫諦聴者有渙然冰釋之容與僧之譯房之文是三和合道安求予記之予曰正卿之為是也戲耶實耶無乃使人由是以造無所還地耶安曰殆其然哉予曰我聞慶喜墮䧟咎在心目又將以境示人得無有不著便者且圓通會中佛以熏天熾燎烹鑄聖凡而諸大弟子及大菩薩皆以悟妙聞踴躍呈露一經文殊毒眼千尺懸崖墮魂殞魄况今欲以名貎模寫繫隙中塵捕日中影使有二文殊奈何且祇洹精舍龍梵環擁緇素紛集當是時天花風飄法鼓霆擊而我佛舌傾江口布穀初無一字而説彼經彼二上人萬里西來指鹿為馬瞎却正眼對面越燕而房與正卿赴響奔聲為蛇綴足明將死水浸殺活人曷若去畫安曰子知經之經而不知非經之經宜其以畫為畫而不知非畫之畫也如子所言祇洹精舍佛初不説則今壁間之像寂然寥然月白風清實熾然説由此證入則七佛祖師雪㦸霜戈一時俱卸黄面老子金關鐡鑰信手打開予曰善哉師言我為露布有來問云何護圓通請以是對師曰可哉因書以為記祥符寺千佛記嵗在庚午大中祥符寺傳法院僧法海將造千佛像乞言于予嘗告之曰我有一佛真金色相非丹非素妙圓明心非琢非琱巍巍堂堂四衆跪遶盡大千界舉恒沙數悉同兹像衆生流浪埃蝕垢䝉對面不覿吾將表而出之香檀肖容金碧借飾自一至千羅布森列能從我者洗目刮眥咸得快覩因像生敬因敬生悟各還其家求見真佛問與此像為同為别刼火洞然請丹霞老師一判此案海得吾語遂書以乞檀施且自捐巾鉢罄竭奔走為之凡累年至紹興丁丑像始成伎精工專好相完足觀者贊嘆寺舊有普賢閣恢大傑壯即龕像置其中易其榜曰千佛人以為稱海請記之予曰向之言尚非記乎而又何求獨師積時營圖之勤與像成之嵗月則不可不紀因書以遺之使歸而刻焉嗟乎海用是可與像俱不朽矣性空寺畫阿羅漢記漢州什邡之外戍曰吉陽寺曰性空僧曰了悟嘗合衆施即寺之大殿命武信李逸為十六羅漢像逸真畫史也有名字於蜀筆墨絶不凡其為此像益工蓋斥去丹鉛金碧之飾而獨以冲澹簡古為勝奇姿異質生氣凛然水石峭潔草樹靜深燕坐經行如在天台竹林間也既成來觀者燎香頓顙却立瞻視失喜而嘔噎逸亦顧而嘆曰吾平生未嘗有也久之里人楊宏病瀕死家人環泣計莫之出宏神爽昧昧忽見阿羅漢像十六見于前命禱于寺俄而獲愈又任師古大疫醫巫束手謝不能夜夢老僧入寺啜茶於堂上且以心經授之覺而大汗病旋脱去明日至寺謝焉見降龍尊者蓋夢中人也悚然感嘆由是里人夸誦侈説爭事之唯謹嗟乎異哉夫逸之畫畫耳非阿羅漢之慈力固無以彰其神無以致殊驗於二子然則阿羅漢也逸也二子也其緣之冥契數之嘿符蓋所謂啐啄同時者非耶噫其自今使聞二子之事者知敬阿羅漢敬阿羅漢者知敬逸之畫億萬斯年無有窮巳則悟之為功可量也哉因其求記筆以遺之贊十六羅漢畫像贊一尊者須眉雪垂持杖而坐一髽童執經倚石睡其一以􅀈刺其鼻霜眉雪顱扶杖諦視髽童捉經倚石鼾睡或觸其鼻戲發其嚏夢本自覺經亦無字一尊者持貝葉作説法手前有篆盤一胡人捧香二蠻奴從跪至地一擎手作禮貝葉未展篆縷未焚已説法竟孰聴孰聞老胡捧香兩奴慇懃各為佛事或跽或擎一尊者左手執經巻右手爬癢小童碾茶一僧拂茶具兩臂不用一機自奔爬者非癢執者非經童僧薦茗器潔泉清借甘露爽濯海鮑腥一尊者前有蛟吐珠童承之以盤有虬特角吐珠陸離婉彼奇女以盤承之我寶無量獻此何為汝用自照蠲忿反慈一尊者慿几前有三鶴其雛盤旋于下隱几嗒然三鶴振羽雛者墮地能和其父有曲無名我歌汝舞勿乘衛軒甲者嗔汝一尊者小童自嵓間架竹引水灌蓮沼有僧持琉璃小瓶有龍在焉水性滿空不擇所赴架筠導之下溉蓮浦琉璃貯龍其細如縷大則垂天小固如許一尊者前有龍一鬼波間捧書萬里一跬千家一鉢莫鷙者龍香供夙設擘波跪函有足其捷汝未反命我饌已徹一尊者前有國王發櫝中舍利以杖挑之爛然有光尊者與其徒皆作禮五色有爛三昧所熏祕櫝孰啓天球並珍委最後属住未滅身曷不肅雍其人其人一尊者瞑坐喬木庵中上有應供化身持鉢飛錫前有僧擊磬雲錫飛游龕木燕瞑為二為一㒺兩問影真有心哉闍黎擊磬汝未見我孰起此定一尊者有二王孫一捧芙渠人立以獻一跪而納屦王孫可憎或出非類擷花人立納屨胡跪飛空挽葛同一游戲反彼初念毛革立蛻一尊者抱膝坐山數峯水出其下一童一僧皆以手障面如怖狀豈水有怪乎翠巘岌嶪清波渺瀰抱膝危坐旋盤不移彼怖者何匪蛟匪螭汝師在此可摩可騎一尊者支頥坐前有盤盛果拄頥汎觀如器聚蚓自止自作孰非正性異果貯盤浮華淨盡如我所證不復凋殞一尊者捧手爐前有淨瓶出雲氣中有數峯㠝岏維山晻曖維雲幻耶寔耶出此淨瓶目眚既空河山不存尊者執爐居士證明一尊者前有一虎我自怡怡汝何耽眈豚犢滿前莫戢其貪我有鐡牛八珍肥甘搖牙無所弭耳應慙一尊者前有鹿面之尊者若為之説法溪流泠泠豐草滿野飢齕渴飲中有般若皆吾佛子具大悲者舉指為説語絶意謝一尊者有狻猊二大者扳其左膝小者繞其右尊者一一視之兩猊髬髵維壯維稚繞床齧膝左撫右眎方其吼時却走彪兕玩吾股掌直家狗耳銘無為長老月公塔銘臨濟之傳至五祖演公如河出崑崙放乎中國沃日蕩空其浸益大有大弟子曰圓悟勤道愈光顯能師天人其所證可皆龍象傑特若佛性泰大慧果固已焯焯表著而平日執巾盂操杖屨一作錫旦暮乎其側微言宻㫖得于耳目之所染濡去而聞于時者尚多有之今無為山無為禪院主持僧道月者盖其一也方勤坐昭覺道場自卿公穹嚴無不折勢貎尊事而衲子得一容足地略覘顏色亦自謂祇林鷲峰親授記莂師是時已為其侍者則亦固可見矣師甘氏漢州德陽人父槐老書生終右修職郎廣安軍録事㕘軍師少有奇志樂空寂不喜服儒衣年十三依縣之東山龍居院僧自樂祝髪既授具戒往見正法明咨决大事明器之與語未契適圓悟歸自東吳遂往從焉其始至也自以未越户限已豁然省圓悟印之自是以心法相付未幾圓悟即世師巻包南下盡行諸方遇名德老衲皆刮眥相視一作待曰是法窟中來龍種鳳雛也師不自厭更從其掊擊而其豁然者卒無以異也久之西還掛錫昭覺太師蕭公振命主保福地雜賈區煩穢中師居之如在山林越五年謝去再住長松未閲朔㑹有無為之招無為為刹望西南人爭得之席一夕虚凡青赤之服者輒涎流波道師獨以太師王公剛中迫出之予時尉靈泉得檄日一再皆督予禮遣之者時師方領徒丐食旁縣故逗留不樂去山中之逆者至彷徨近境彌旬無所歸予譬曉諄數乃强行居七年而寺赫然其最巨麗瓌壯若客閣阿羅漢閣尤雄一山師則曰彼豈我事哉使吾師慧命不斷如系吾當任斯責彼豈吾事哉乾道三年春得脾疾七月六日忽索筆書四句偈端坐而化夀六十五臘四十七茶毗得舎利數十分其骨一葬冠鼇山下一葬龍居之受業院度弟子法然等凡十六人師儒家子喜讀書有俠氣遇急難勇往不顧黨類道未振孳孳掖起之間出一二偈章清圓可愛大丞相魏國張公數貽書奬嘆且常祝其為山中留也性剛不可屈在保福時有連牆拓其巢幾侵寺之半人謂是額額不可與校師毅然升堂鳴鼓數之即去茶使許公尹攝府事聞之亟追還歸以地而謫侵者後數年邑之吏假牛車于寺寺厭苦却之吏恚笞主寺僧師曰彼何罪逐我可哉遂徑去不復返帥王公愈髙之故長松無為皆公特招師住山有方畧而禁戒嚴峭人心服之丈室所須皆取諸褚中一錢不以累常住夜漏盡三鼔猶履聲跫然燎香行道未休故其徒相視亦不敢惰以嬉自號栗蓬庵主蓋誌其所得云予於師里人丁丑秋始識之於保福師傾蓋相契往往語以佛法大意有貴公解金剛經嘗舉而問之師笑曰是鉗鎚不妙吾恐使人之不能脱然也予始試吏年壯褊心遇觸輒不堪師曰子有朗徹靈明者待之有餘矣予每愧嘆其言既葬法然師行五百里持甘君鎮所次狀來請銘曰師之遺意予不敢辭因按狀併以所親聞見者足之而為之銘銘曰闍黎三昧何者是栗棘全吞不遺滓堂堂大用誰抵當水為逆流山卓峙住山非住去非去老木十圍蜩甲蜕魔强法羸臂相紾翳途衝衝顙應泚轉陶家輪幻佛界有妙莊嚴尚其細不知其人視其師演公之孫勤之子雅安報恩寺井銘雅安環報恩北落皆無水人飲諸江病逺汲長老法輝指寺之庚曰是有美泉鑿之而信因甃為巨井觱沸澄冽亢燎自如於是綆缶係道逺近給足郡文學掾廣漢李流謙為作銘銘曰五大物功周施坎心亨兆其倪利生人配重離環精廬壊瘠衰焦釜甗勤蠒胝坤含珍龜吐之鑿鮮原出澄漪甃堅深隳無時往艱汲人其咨取諸隣孰不怡溉濯滌炰燔炊求口實當觀頥來維新注益滋願進德比于斯
