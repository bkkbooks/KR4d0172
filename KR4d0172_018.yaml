body:
  text: 淡齊集卷十八宋李流謙撰雜文雅安榜州學文雅於西南未為下州蘇氏三先生大名蓋宇宙而皆濫觴於此或者乃藐之甚者以為鮮士學校之官可廢噫雅何以得此聲於搢紳大夫士哉僕來備員雖固陋頗願為邦人湔此羞且學宫亢壯甲兩蜀士游其間講習磨礱亦天下之至樂比觀堂試程文有足嘉者特几案之功踈師友之博約未至爾繼自今願與諸君進於是日新又新異時人物粲然一變而與通都大邑等使藐之者內慙曰衆不可蓋則諸君所以起蔡䝉之頽當在此僕以教名官而實諸生也諸君有善願受教愚幸一得亦無隱乎爾況賢使君在垂意學校諸君之藝能不患不達曷為而不勉若夫舍是不為而但倡為不根之論講無益之是非則所謂不心競而力爭雖有鋭意於學然不知求見聞以自廣亦恐有孤陋之嘲至於惰游不勤徒數晨昏之撾以待哺使人指學舍為餔啜之地則諸公必不其然然亦非僕之所望云諸廟祈晴百穀之成秋陽實堅之連月灌注糜腐林畝念何以卒此嵗舍神不告則將何施敬趨祠房盡出苦辭惟神排蕩雨風披搴氛翳賜以十日之晴農事畢矣則神之賜敢或忘之又天作霖雨彌旬月不已其大害稼賊苗將有卒嵗之憂涎則斷道漲江為商旅之病官吏惶懼靡所寧止太守在此有日政之弗善有以干戾和氣神當譴之而毋以此灾加之民也願録苦言亟斂翳氛推日轂於天衢四野赫然勿使嘆后土何時而乾實繄神賜再拜齊房敬以為禱迎白龍文龍之靈著於邑久矣旱傷稼龍所當恤若無聞知使一喘可舒吏豈能廢其職躋危歷險以來惟龍所經原野如灼怨嗟如啼吏不敢瀆以詞惟視其如灼如啼則不可不旋踵而救之矣送白龍文龍之來距邑三里許風興雲湧衆駭曰是即雨矣至邑而漠然駭者以疑後數日忽於西南突霧排煙爪鬛可辨邑人聚觀羣呼合噪是夕大雨翌日又雨農告沾餘而疑者復大喜嗟乎龍之神豈故為是使人或駭或疑或喜哉潜躍以時彼固不茍然也雖然其德不可不報而靈不可不著也於其歸敢書以告春祀文春陽嘉亨嵗事伊始躬率佐屬敬修菲奠於邑之神惟神歆其不腆之酌而畀以惟新之祉閭里和樂獄訟消息實繄神休吏亡以報唯奉法循理是效庶幾乎神茹之而不吐又春氣發生東作兹始凡我封內悉賴神休豆觴不腆實舉彛章薦以潔蠲神其勿吐又東作之始萬彚亨奮敬修祀事於境內之神惟神歆此微享報我以福室家寧止田野康樂亡有灾戾神食於民豈有窮已祝以誠告尚其鑒之又禮嚴四時之祭而春為首神以庇民之德著在祀典適兹仲月萬物發生躬詣祠房式修菲奠惟神鑒我忱悃屏妖黜凶使此邦之人毋有禍灾則神永有斯享名蒲二子說蒲伯永以其二子來乞名名之曰好仁字以安之曰好德字以舉之夫出於中心之所願欲之為好然好有美惡雞鳴同起而善與利不同故在所擇仁人之安宅未有舍其室廬傍徨轉徙而得存其身者故知安於仁則能好仁德足乎已無待於外俯而取之其輶如毛故知舉是德則能好德咨爾安之謹厚持心推以及物毋専已以自豐則近乎仁咨爾舉之果行率理動應規繩日進於君子之域則近乎德夫如是仁之報為壽德之報為福二子其尚勉之書馬俌蟠舟賦後右馬俌德駿蟠舟賦其文要眇幽竒如藏山隱海之靈物沉沙栖陸之瑋寶卒然見者神眩精搖而不能名然心識其非世俗之常玩豫始得而讀之如墜洞穴𡨕行深入逶迤翳晦不見徑蹊欲前而若阻之欲旋而若挽之逮窮其力而徹焉則豁然琳琅之都而璇玉之館也噫斯可謂天下之竒文因之以窺其胸懷本趣則德駿固亦天下之竒士余嘗告之文至於蛻其骨畢矣然蛻而不留孑立孤峙矯乎而莫與鄰則人有自崖之嘆或者却轡反轅紓光遺采使人得倣佛君於羅縠之間而可乎德駿曰豫猶未免遇靈物瑋寶而不能名墮洞穴而不得出者遂相與一笑得通鑑一綱目一發明管見各一歡忭而書文章雖有義理茍無綱紀條貫終不免錯雜厖亂讀之使人厭倦茫昧卒不見夫正道大路之歸向京師都㑹之止泊何謂綱紀條貫易詩書春秋是也失聖經不刋之㫖錯雜厖亂者自司馬遷始後世踵訛習陋莫之能改司馬溫公復春秋編年之法井井貫貫正羣史之綱紀削羣史之冗長統之有宗㑹之有元不重出不互見不參不紊提綱挈領而衆目襟幅昭布森列一代之始終治亂安危一君之得失美惡羣臣之邪正是非民俗風化之醇疵厚薄卷帙既終不必互相參考厯厯有章麟經之後無出此書之右者朱晦翁藉菑畬之成功已精而求其益精大綱而細目之直示褒貶議論醇粹實事增廣浮辭淨盡謹嚴簡潔求其義則善無妄與惡無濫誅閲其文則豐而不餘一言約而不失一辭又通鑑之氷清也歟河北以不得是書為恨今嵗併得二本自兹秋涼當與通鑑對讀玩味二先生去取不同之㫖又得綱目發明讀史管見以殿後雖駑鈍不前不能如密國公之二十五通亦當三數而止祭陳左相文自赤伏中天克奠龜鼎主如宣光實哲實聖誰其翊之冦鄧魏邴殊庸顯勳相望挺挺有奕其光莫嫓厥盛惟公具道全粹成德備順浩為河江屹為嶽鎮遺大投艱躬履獨任旁觀栗栗談笑以定孰如我公掩逺絶近敵彊而驕勦棄乃命大舉入邊有盟不信投鞭斷流氣無堅陳公震疊之不缺一刃倒戈內潰彪兕股振瑶圖曼延父堯子舜握璽授受穹旋壤運實大典禮孰贊其朕扶日在天公目不瞬皇德感神敵悔禍釁我有人焉弭凶斂橫奉盤乞盟若兵在頸毒霧妖氛一灑淨盡公尸其成四方日靖惟此駿功叢委疊併有萬筆舌曷窮嘆詠匪國方昌匪命方永公盍為生帝心豫忖謂耆其年山立朝廷身為律度以繩以凖神物不戒禍出漏頃方對楓宸俄委夕槿怛焉帝衷有涕屢殞頽山壓梁匪公不幸公實仙去上下倒景維邦及民罹此凶閔某白頭湮埋簿書衮衮壞蟻穴蚓孰汲孰引公有大造起仆擢僨遂攀尋丈僅自尺寸知我者鮑恩等天性未效銖報遽承諱問莫撫其疾莫視其殯慙負已知胸填悲憤一觴往奠縻此符印萬里神徂或遇溟涬薄辭告哀尚其鑒聽祭二叔父文嗚呼痛哉吾門鮮佑積罹凶殃伯姊及姑連嵗殞亡淚未洗睫痛猶割腸叔又繼之根株益僵四海甚廣生物茫茫非我骨肉胡越相望自先君子跨箕髙翔諸孤􅑏然叔為巨防祝以耆艾白髮髙堂猶父之存奉几薦觴雖此莫諧何辜彼蒼唯叔平生願實謹詳不諂不曲不迎不將裕亦弗泰窘亦弗傷唯有直心金渾玉剛言行於家德齒於鄉以敬以宗愧者汗芒薄疢何厲投隙披猖數殫不支非汝之強訃來及門驚疑欲狂審知不誣腎胃如戕反袂以思年非不長愛之欲生雖夀猶殤一官繫匏去留倣徨有解紱者適還梓桑天固遣之往奠厥喪一慟幾絶孰收其滂尚其享之肴馨酒香祭十姑文吾父兄弟三人季為吾姑姑剛嚴不可犯誠敬不欺先君友之意篤情純吾家先世不年至叔祖佛性禪師始七十有五先君七十有二而姑齊之不可言短矣萬化俱盡逹者以為常而某有不能置者姑嫁吾舅舅家燠姑方壯時動作舉如意及舅不幸生事稍落姑已不賴猶二子之足恃也嵗戊寅其季子死一女嫁沈氏沈亦死姑撫亡豫之子而念亡壻之女悲憂亡聊某兄弟過其家輒苦口寬譬姑若少寬未幾兄弟俱官於外某在洋川某在靈泉某在臨邛相距各數百里姑病不得問死不得哭弔銜痛負恤殞裂而已嗚呼所為不能置者其不在兹歟雖然一觴之奠將致其不能置者而姑尚能享之否搏膺一慟淚血俱殞
