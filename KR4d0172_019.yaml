body:
  text: 附録行狀李益謙撰弟諱流謙字無變姓李氏其先漢州德陽縣人曽祖唐臻不仕曽祖妣楊氏祖景聞纍贈朝議大夫祖妣秦氏纍贈太恭人父良臣故任朝請大夫纍贈宣奉大夫妣任氏纍贈淑人奕世名德皎然兹得以略弟幼敏悟絶人不好弄九嵗從外傅羣弟子中輩行髙者狎其少以長凌之弟盛氣觥觥不肯少下長者竟莫能屈嵗丁已先君擁召莭而南弟時年十五以序送別反覆四五百言其末援祁奚舉午之事先君官冊府㑹學士輩因語及之學士輩皆欲觀焉出以示之悉詫曰李氏有子哉嘗夢至一處榜曰玉溪居之者自云唐王孫賀郎而與之語既寤以文記之傳録者雜然中外皆知其不凡自是文日益進尤酷嗜詩盡取唐以來迄今名輩之作採其句之傑偉者類而集之名詩林摘竒觀者皆歎其刻意於詩如此三嵎喻公迪聖以文豪一世重許可先君取弟所作摘句一二以嘗之喻公愕然曰此殆唐人之作審之一再語如初應之曰乃小子戲言也喻公惘然若有失由是詩名益振視一時舉子之文為不足道漫不加意先君勗之曰此士所繇進之路獨奈何不之鄉耶盍俯習之弟受教唯謹未幾所作皆合程屢試諸鄉不利先君嘗賜之詩曰士恥無名字吾兒早振聲卒章曰勿貽麟楦誚千古愧公卿所期者又豈但科第而已哉先君捐館遺言弟若擢第休致之澤因以畀叔之子既免喪愈益淬斂要以仰償先志舉又不利人皆為之恨惜卒以䕃補將仕郎調成都府靈泉縣尉試漕臺薦名以類闈親嫌試别所奏名當之官廷對不果秩滿調雅州教授雅先君舊治也士無老少卒歡趨之㑹元樞虞公宣撫全蜀招致之幕下其所以密贊婉畫為多典刑旁郡縣以獄上者多所􅊭反人推其恕通前任資考關升從政郎雅州秩滿以資考將改宣教郎新制例當作邑雅不欲也親䣊勉譬之曰子祕其所藏久而不發豈吾䣊所望哉上國之光盍往觀焉發其所藏俾吳兒知之此而不遇退未晚也弟然之眀年至吳名稱籍甚親䣊在要津者皆力引於朝除諸王宫大小學教授宗室子孫灑然以得師為愜休沐則杜門却掃非其時不見達官貴人面既久諸公交口薦譽之而心已倦游力丐補外朝士皆惜其去力挽之不可相視嘆息以實厯磨勘循奉議郎除通判潼川府朝受命夕問途浩歌而西所過厯名迹勝境率賦咏以自娛次峽中賦百韻極其勝致將至家豫逆之於南門之外勞萬里之歸叙三嵗之別握手一笑尋風雨之􅉀不覺年餘以貧而出弟送之郊分㩦惘然久之書來以病告日幾其愈也未幾以訃聞方食上不能舉匕箸哀哉痛哉而謂弟止於斯乎弟享年五十四娶錢氏封孺人子廉矩女孫一人文若干卷長短句若干卷題跋若干卷講義若干卷雜篇若干卷皆自刪類命廉矩手編之標為淡齊集蓋將永厯世之傳也廉矩卜以某年某月某日葬綿竹仁賢鄉某里豫少拙魯視弟非所及每同立侍旁激昻慷慨論說談笑先君為之解顔豫竊愧之中年以後於釋典尤所篤意先君少嘗許修八菩薩儀晚年始克成弟披閲寶藏紬繹本末商榷比次久晦之典一朝煥然其力也嘗謂弟之於豫雖曰兄弟其實德友也少相好長相推期以白首相始終乃先棄我而去豫束於官守病不得致其問死不得視其斂手足之痛追何及矣惟是平生懿德景行有不可掩者詎容沒而不書其孤欲乞銘於當世立言之君子以為不朽之傳所圖未即遂葬有日矣豫先掇其出處大略著於狀庶幾四方來觀者有所考焉跋淡齊集後先君少知名大父賦詩賜三子至先君云士苦無名字吾兒早振聲大父蜀大老重許可此詩一出於是家人姻䣊知有先君矣大父守三池一日喻公迪聖相過燕閒論文因取先君所為數詩示之因問公誰之作公曰殆晚唐諸人之作既而大父笑曰此小子某戲言也公為失色久之此言既出於是蜀人又知有先君矣後以諸公薦引游東南攝職宫庠杜門以文字為樂不一見貴人面既得請補外前丞相王公淮見先君所為文賞嘆不已乃曲留先君而先君歸意已決眀日遂去國朝中名勝知與不知皆為嘆息於是吳楚間亦知有先君矣重念先君平日致大名如此所厯止此可為一歎平生所為文章嘗自詮次及百餘卷先君賴此名為不朽計家素貧無力刋而廣之既男廉矩泣血手自覆校誠為精審僅得八十九卷壻張君極甫痛念及此乃率學生坤謙同力為之今幸巳成編薦之家廟不特貽我子孫之藏永永不墜先君之名亦與之無窮矣嘉定甲戌書雲前一日男廉矩百拜謹書
