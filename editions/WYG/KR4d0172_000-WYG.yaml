body:
  text: 提要澹齋集十八巻别集類三宋臣等謹案澹齋集十八巻宋李流謙撰流謙字無變漢州徳陽人父良臣登政和五年進士紹興中授館職為尚書郎晚出守簡池二州以終流謙少以父䕃補將仕郎授成都府靈泉縣尉秩滿調雅州教授㑹虞允文宣撫全蜀置之幕下多所賛畫尋以薦除諸王宫大小學教授力丐補外改奉議郎通判潼川府事其事迹不見於宋史惟其兄益謙所作行狀尚具見其始末所著文集宋史亦不著錄惟焦竑國史經籍志黄虞稷千頃堂書目俱載有澹齋集八十一巻是明世尚有傳本今已湮沒無聞厲鶚撰宋詩紀事僅從成都文類中蒐得梅林分韻一首其文亦與本集頗有異同又以流謙為綿竹人與行狀不合知鶚未覩本集故傳聞異詞也流謙以文學知名其父良臣嘗出張浚門下為所論薦集中分陕志專為頌浚勲徳而作鋪張太甚殊不免門户之私其詩文邉幅稍狹間傷淺俚亦未能盡臻醇粹然筆力峭勁不屑屑以雕琢為工視後來破碎苶弱之習較為勝之宋代遺集大半散佚若流謙者固不妨存備一家矣謹就永樂大典所載抄撮編次釐為十八巻其益謙行狀及其子亷榘刋集原䟦並附錄於末以備考証焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:82d1d05f9c1ea00669bf1d988a54b69c56bf69fc6622a5b583a74edf338229a9
