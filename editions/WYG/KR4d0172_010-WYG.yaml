body:
  text: 澹齋集巻十宋李流謙撰書上樊運使書古道不振乆矣平時號耐乆朋盃酒接慇懃詡詡言笑相徴逐出肺肝指天日誓不相負一旦反眼不相識爭小利害甚於㓂讎况其人身没已乆嵗月荒遠墓木幾中梁柱金蘭情義宜愈益渙離豈復一掛胷臆乃欲望庇䕶其後人起之於堙阨而援之於衰寒使有不孤之嘆不亦難哉雖然古道非亡也人自不由也居今世而以是自任則古道固宛然也豈得以凢常齪齪之見遂誣一世之士恭惟台坐於先君子真耐乆朋也其同僚其交承世尚有之而近時同僚至于反目交承至於攘臂豈必端以是為契好哉所貴於兩公者盖精神心術之㝠符而操踐趣向之相似雖别體異軀不啻一人殊宗各姓殆如一家宜其投分之深締交之篤不但汲汲於生前而尤切切於身後用能回古道於萬鈞挽一髪之時使頑薄之夫為之興起噫嘻不亦盛哉是以勾龍某先君之子壻也而台坐愛之如其子壻舍弟某既辱驅使又辱論薦凢所以借之齒牙傅之羽翼者無所不用某之拜台坐於金堂也巳二十年前而台坐毎見待遇尤寵某之注此闕也以為淹遠則為嘆其求之官也則極力推挽使亟就賤次懇惻之愛愈於父兄稠疊之惠暖於布帛仰惟台坐一世偉人凢擁帚門闌置身爐錘無非名流而某親戚兄弟顧何脩而聨裾屬袂以得此此無他以先君子故爾非以先君子故以古道所存故爾然則某今也有區區至情不於執事焉布之尚何之哉某前任某官兩考今任展就四考通前為六則有磨勘之望此一段恩施固已專歸之台坐矣而台坐視一道吏屬之賢與能雖非某所敢望不應後之而先某然獨持向者之說妄僥冀焉台坐果若有意此已為犯不韙之罪竊非分之寵矣尚復何求然猶未免於無厭之請此盖當在誅絶之域者姑冒昧言之而聼可否焉盖台坐以父師臨之而獨可不一輸其子弟之情乎某今年某月日已得三考初意止俟一考至明年作四考以年勞闗陞不敢多妨賢路而竊公器適篋中偶存何舍人一削而張使君既許以改官状収録又憐其坎軻流落欲其亟遂寸進乃復先以職状畀之今闗陞文字遂僥倖有其二若遽舍之必俟一年後年勞之語似深可惜於是始萌妄意欲更得埀成一削就今年三考先圖闗陞旁徨四顧無所依投唯有歸赴門下可冀萬一伏望台慈赦其狂謬未賜誅責以兩削弃去為可惜而不以後日再求出門下為無厭以一職令状先次陶鎔使早獲放散然後重以京削成就使闗陞磨勘二者盡出乾坤之造比他僚屬受恩者若差異則某所効報亦不敢自同於他人而已恭惟盛徳大雅曠然有容而氷鑑之明物無遁照其於某察之深知之熟盖不在與羣吏比肩並髀趋走奉事之際某之駑鈍尚何所言獨以論契好而求薦近於私一之謂甚而欲再焉近於不知足然希闊之逢特逹之舉昔人難之日中必暳操刀必割此為投機者言也某方負門户之託急百指之養有未能遠引髙舉者故敢援此說以獻上張雅州書甞謂天下幸㑹有如是哉生乎其鄉沐浴濡潤則有枌社之好先世於其一門羣從號平生交芝蘭臭味異根同氣則有乆要之義兄弟出仕弟之為尉則在寮末兄之備數泮宫則為吏屬借庇託䕃俱得以斗升活其孥累積是數者求之於古竊其一猶足以藉手而况併有而兼得之西方之人以為縁法而智者以為機㑹不肖者以為忝冒噫某何脩而得之其必有相之者矣然則使其或有哀懇不於門下焉布之尚将奚之某前任靈泉尉兩考今任展就四考通前為六則有磨勘之望此一段恩遇固巳專歸之台坐矣而台坐視諸僚之賢與能雖非某所敢望不應後之而先某然獨持向者之說或庶幾台坐一動心焉此巳犯不韙之罪矣然又有無厭之請焉其初止欲更一考用年勞闗陞而篋中偶存何舍人一削樊使者亦許陶鎔輙萌妄意欲先望台坐以職令状収錄使足有三早諧寸進然後徐以京削成就之使首尾二年兩拜丘山之賜而闗陞磨勘盡出門下比他僚屬受恩者若差異則某求所効報亦不敢自同他人而巳恭惟盛徳大雅曠然有容而氷鑑之明物無遁照其於某察之深知之熟盖不在與羣吏比肩並髀趋走奉事之際某之駑鈍尚何所言夫論契好以求見近於私一之謂甚而欲再焉近於不知足然希濶之逢特逹之舉昔人難之日中必暳操刀必割此為投機者言也某方游乎人間世敢援此說以獻與鄭擇可辨屬字書某愚陋不學掌教大邦日從瑰偉傑特之士游雖未熟接語言然觀其文詞覘其状貌盖平生歴游名勝之場耳目所未聞見者固已心服而意降又䝉時出規誨箴其不逮尤所嘆佩如日者屬字之誤遽欲指摘以為諱字乆謬積訛一朝泮解此則哲父察兄教其子弟者顧某何以得此宜亟奉教無異詞矣然頑鄙終有不自釋者盖非好勝求以盖其失亦問以辨之之義是以前日甞援引律文并考證經史音義以丐指南矣退而思之疑卒不解盖自有文章以來未有若東坡先生者也其人非特雄於翰墨忠義之節勁果之氣横絶古今觀其立朝尊君親上之心根于天性然獨在神廟哲考時其所為文章喜使此字盖是時固諱之乆矣而公獨不避且以燕閒之作歌詩記引或在所畧猶可也乃今皆用之君上施之朝廷埀之典䇿者此何理哉将盡數之不能悉試舉其槩其作趙清獻神道碑云州郡以酒食相饋餉破家相屬也温公碑云官其親屬十人范蜀公碑云令宗室屬踈者補外官又云時公巳屬疾夫二三公皆元老大臣其碑之成必經乙夜之覽而後著之金石公以肆然落筆何哉又其自上皇帝書云陛下誠欲富國擇三司官屬又云廣置官屬又云賈誼請為屬國元豐中乞療病囚状云若無親屬雖有而在遠元祐中繳楚建中詞頭云近者起文彦博天下屬目又奏廵捕鄭永崇状云並來簾前告屬又述災沴及脩河事云舉酒以屬羣臣又論周穜擅議宗廟事云無非天下公議所屬且自敵以下名人之先為之子孫者猶且不堪公以人臣納忠于君埀紳搢笏成誦於冕旒之前乃斥其祖考之諱至于六七而不少忌此則甚矣然又有甚焉其在詞林作温公祭文云社稷之衛中外所屬又賜韓絳詔云卿徳望之重中外所屬又賜大遼人使口宣云屬此方春之旦又賜孫固乞致仕不許詔云屬任之意又賜皇叔生日口宣云卿屬尊望重又奉安神宗御容導引詞云腸斷屬車音夫制詞乃王言詞臣特代之耳如上所云乃是天子自稱其祖考之諱夫以祖考所諱而號令天下于理順乎且東坡先生非不學者也非不辨字之音義者也非素悖慢犯上者也今若此愚誠不知其說豈其偶失於此當時淹該博辨者所不敢正留以待後之若足下者乎此未敢以為然也然東坡不見正於當時之淹該博辨者傳幾百年而得足下雖東坡先生亦曠然發䝉而况僕乎願卒聞金玉之音以幸誨我不宣上王直閣書紹興嵗戊午先君為尚書郎甞獲拜台坐於臨安退而誦其文歌舞其徳於搢紳士大夫以為一時之榮遇又退而手書其姓氏於牘詔子若孫謹誌之勿忘曰後将大庇汝曹迄今嵗已卯凢二十二寒暑矣先君不幸既即世而台坐凌厲華貫超躐顯羙未即相天子澤天下廼埀翼于蜀而某始獲以疵賤不肖之軀唐突化爐因記異時之言嘆曰先君其神乎夫誦其文歌舞其徳以為榮遇固也至於書姓字詔子孫使勿忘意者其巳知台坐今兹之來蜀而某獲在下風也歟然則其今之得見固非茍然者雖然此猶私也某甞讀易至比之上六䝉之六四觀之六二未甞不廢巻而嘆以謂士求表植於世而其才其行不足以自逹則必求一代巨公委身扳附冀有以發然後晦斯光窒斯通無慙於小人之歸不然日月在前自蔽其目咸韶在御自覆其耳則愚益愚庸益庸終於偕犬豕之胔而俱叢枿之腐顧不重可惜哉是以比之時皆以比輔為吉後夫㓙而上六獨後焉故有無首之戒䝉之時皆以闇期明柔期剛而六四獨遠之故有困䝉之吝觀之時盛徳顯臨衆目睽睽而六二寡所鑒見僅同管窺故有女貞之醜豈非介於賢而不知事隣於徳而不知擇故聖人憫焉因六畫以顯義而指其所之乎恭惟某官徳盛業備是固易之大人盖甞妄論之其宗主一時人物而為羣衆之所爭附則固易之比其剖扶晦昧而為暗者之所扣擊則固易之䝉其光赫盛大而為卑陋淺狹者之所徯屬則固易之觀使某於此不早求自託焉則無首之戒困䝉之吝闚觀之醜将萃於厥躬而貽無窮之悔矣是以既援其私而又取易之說以獻庶幾台坐或有取焉而不敢必也所業若干篇謹以代贄先世業是子孫不敢不勉誅之貸之俯以竢命上王提刑書甞謂天以永祚遐福畀其國使億萬斯年無有終極固其君積仁累徳大簡帝心以有是熾昌厖艾之報亦其臣左右介助先後弼賛遂濟登兹故其君既享有是報則福之所被臣亦復預享之宜其子若孫蕃衍盛大條森葉布與國同休晉王氏謝氏唐蕭氏最號顯門晉享國二百年唐享國三百年而三家文獻相承簮冕相屬世居盛位而執要權與兩國廟社幾為終始其間異才輩出又皆軒磊超㧞雋功殊庸震赫一代若不專以閥閱裔胄取重於時尤斯人喜稱而樂道之者本朝以揖遜撫運僊源廣深聖子神孫堯仁舜慈一冶所範熾昌厖艾之福如川方至眎晋唐幅員狹陋圖厯褊促直漏刻頃故當時朝廷之上碩儒魁士巨公耆老類能以格天事業盖代勲績出佐盛明既自躬襲休榮備受祉福而叢慶所覃蟠固宏厚又間鍾竒産代為世瑞至于今奕然而愈光若宣徽王公固其卓越著見書在盟府炳如日星者盖公自是絳闕真品丹臺僊吏跌足人世殆若戱然故能以丱嵗决科遂冠天下盡歴顯羙安處崇華方承平盛際真主在上四海一家中國一人禮制樂調内恬外肅而公以棟榦大臣股肱哲輔如山如嶽如虎如龍天下之所注想四方之所偃服譬之河出崑崙横貫地軸浸天沃日其來無際是宜𣲖流之長萬里一道滔滔汨汨至于海而未巳顧晋王氏謝氏唐蕭氏殆蹄涔淺澁溝澮猝暴立涸可竢何足多談故愚甞謂天之昌宋若無終極則其昌王氏亦何有終極乎恭惟某官宣徽公之令孫而當世之傑士也學博而精道峻而容英果之識足以决疑滯穎利之才足以剸叢劇固自濡染不凢賦禀特異如渥洼馬墮地必千里如丹穴鳯振羽必五色伏自剖符名邦政績彰徹聲揺烏臺聨封合章引致華近雖未即召除巳屬宸眷寓直寳閣按刑劇部竊惟􅄃轡以來振起惰偷興殘補漏勤民勷國之念如切膚肌條教風飛禁令霜肅郡縣奉行疾於郵傳村落林野稚耋鼓舞如對公面如接公語飽食酣卧無有一吏傍門喘咳兹又輕觸畏景肅驅軺駕親按列城玉節所臨當暑森竪噫嘻凢人具是賢智羙善雖出小家寒鄉猶使人抵掌矜詫不能已已而况濟以大老故家之盛則其頌詠夸述是豈單詞所能彷髴某妄男子始以世䕃得官夤縁鎖試遂竊名第方拏舟南下賤闕偶及饑來驅之徑就寸廪踈庸謬愚亦幸書考邑荒職冗如在深穽仰睇崇臺何啻霄極春初䝉大帥號召以職事留府城是時適值台坐擁節入境某尾吏屬一再瞻奉固用欣快今又以弩矢在車塵之間其於覿徳差近熒躔因伏念國家之永祚遐福未艾若此而台坐實與之俱又其賢智羙善如上所云其之獲在吏屬與夫數覘顔色非幸而何是用忘其固陋輙持是說并以斐文若干為獻庶幾台慈或鑒其愚而與之進上宰相書甞謂天地之大海為大若為乎其大也我知之矣盖不在於彌亘六合并包宇宙上浸乾緯下溉坤軸淵乎其深浩乎其長乃在乎受衆水而容之雖勺潤涓流微波線溜凢行乎地中者往焉而海納之如納大川是以水得其赴各安其所歸無泛逆淫潰之灾方其赴海水而巳矣及其至海無復水名窮天際地惟一海爾海之為海是則為大若夫河之貫中國江之發岷陬濟控山東淮奄吳甸其蟠據之廣九州而四分之非不曰巨浸也然河有河而巳不得而有江也江有江而已不得而有河也曰濟曰淮亦莫不然盖其受氣於天地其分量固有底止源脉既殊𣲖流亦别故可以大一方不可以大天下况海之大乂容是大者則豈可同日語哉故為水計者當之海不當之是四者非於是四者有不服之心盖茍非其類則有時而不我容誠不若是大者之不以類而必能容我者某不肖盖水之勺潤涓流微波線溜者也澤物無斗升之功負舟無針芥之力然獨知以海為歸乆矣今雖遠焉萬折必東之心未甞一息而巳也試畢其說某之先人登政和五年第其試南省也傅崧卿為之冠先人在十人之列程文例進呈獨先人之文徽廟親洒宸翰褒之儒林以為寵其後為館職為尚書郎盖紹興七年也晚作簡二冊以終而遺澤及其不肖之嗣初某之未命也先人責以不復世科屬纊言益苦某不能力竟負先訓最後兄弟受身後之澤然日夜感勵抱此巨恨思有以自贖巳而夤縁鎖試偶登科目若粗酬九地之望者家貧急禄不果祗奉大對例恩天恩賜以名第初任備員成都之靈泉尉今年二月書兩考薦者僅如格更一考可闗陞而代者亟來即日解去将再赴外銓望一闕方在天上而口腹之養旦暮為急因伏念先人以儒起家而不肖嗣勉讀其書亦僥倖復収舊物乃今一飽不繼将有溝中之虞盖水之失其性而泛逆奔潰者是雖極甚么陋然在大者固将有所不忍弃也是以某寜不之江之河之濟之淮而惟海之赴方其赴之之難也雖衆浪激之而不亂大山大石觸之而不沮蛟鰐魚龍震揺之而不駭必求逹於所至而後巳實以海之大有以容我非若江若河若濟若淮擇水而後受也恭惟某官盛徳大業元勛偉烈其所以吞吐一世灌注千古無適而不為海其間明珠之璀璨大貝之錯落珊瑚火齊之珍竒固其文章之足貴也洪濤巨浪之噴激懸流湍瀬之騰涌固其威望之足聳也千斛之舸萬斛之舟如浮一葉固其氣量之足載也霞裾雲旗之往來靈宫仙島之出没固其髙嚴祕邃之足慕也適丁休明遂建上宰凢所施設人莫知其涯涘以蠡測之但見夫加之以隆名大位而夷然不欣猶納之以萬川而不溢也凌之以彊兵大敵而鼎然不動猶洩之以尾閭而不减也鯤鵬之大既安於飛躍蝦蟹之細亦樂於游泳此其所以不辭萬折險艱辛苦而必赴之伏惟鈞慈重察其懇廹之誠推夫納大川者納之而不弃容蝦蟹者容之而不拒則某歸赴之心粗若小慰某今所合入闕云云茍於是數者妄意或畀其稍近之次使竊一飽之計則其又若鶠䑕之飲於河滿腹而止豈復有所觖望哉上張建康書甞謂人情之去就離合未甞不在於榮瘁廢興之際而慨然可以感念亦未甞不在於存沒死生之間盖當塗巨公方其操利逹之柄制富貴之命吁呵生風雷叱咤移海嶽當是時凢具血氣心識茍思有以致其身求遂其尺寸之望孰不知填然躍而趨之一旦時有消息運有泰否車音在其耳而所謂伺候門墻者逺矣頌詠功徳者往往變為䜛且謗矣指日誓天願以身狥者反眼不相識矣此非他勢使然也獨有人焉秉志益堅信道益篤不以榮瘁興廢易其守曰吾主若人若人榮瘁即吾之榮瘁若人興廢即吾之興廢也吾曷為而輕於去就哉嗟乎是人也雖不逮古人實今之古人固疾風之草嵗寒之松矣俄而所主者復進而在上瘁而榮矣廢而興矣而是人乃不幸溘先朝露埋骨朽壤不得復依休光潤澤以伸其積年之憤視墜簮破履反得再登君子之堂則其慨然可感念豈不動仁人長者之心乎某不佞試畢其說先君工部以鄉曲之舊辱鈞坐不世知遇自登法從薦以自代夫薦之代已此豈細事在他人以為文具而鈞坐實出推賢揚善之本心巳而出使川陜又置之賔幕其還朝則載之俱當國則召而用凢所以培植長養灌溉成就者不啻父兄之於子弟古人所謂知已所謂恩遇豈能過此在先君當如何報不幸薄佑數竒上累生成栖託未幾鈞坐適去國于時先君之身雖留于朝而心實惟鈞坐之從鈞坐之去未乆也趙丞相屢遣人致意願見先君曰吾主張公公去席未寒吾以么麽進取輙望之而游他門可乎卒不往趙相為人言吾知某甚賢而文特未甞過我亦大佳意若慊公之不來也巳而栢臺以為言班列以為言先君迹暌以危乃力丐補外除漕東梓時吕本中舍人當制意有所不快曰是雖優於儒學財計非長宜試以郡廟堂遣人調䕶欲易以憲吕又不可乃授小壘以歸其後蜀士有薦先君於秦氏者秦曰此豈非某氏客邪卒不報秦用人最為不次於其同年之好尤篤持節把麾者猶其粗也獨先君當其時閒廢以老然先君毎欣然不以芥蔕甞曰張公有大勲勞於天下天下實父母之雖公欲自逸天下其庸釋焉彼鬼蜮不量豈能乆蔽日月旦夕行相矣吾未死尚及以晚景累公藉不幸而死吾有子可持門户公茍念我不忘必惠吾子吾豈可進退出處以辱公巳而先君不幸果死迨今十年鈞坐始以天下不能庸釋之故再登用将入相天子盡鈞陶天下之士某因伏念去就離合於榮瘁廢興之際先君若無負而其存沒死生可感可念者妄意鈞坐或以動心先君素不治産薄田之入不足以餬口兄弟三人奉家法惟謹今尚同居解官合食即有不足之嘆兄長某某官非乆替罷舍弟某某官尚待遠次某備貟某官再書考薦者幸如格更一考可以闗陞而代者廹之去銓部難得闕求一茍禄地未知所向唯廟堂特逹陶鑄一闕乃可贖食而療饑地寒人微無以自謀伏自惟念非鈞坐惠顧求疇昔録先君去就離合之際不茍於門下若此而其存沒死生誠若可念特以丘山大惠重卹其不肖之孤假一字之寵於廟堂庶幾得合入一近闕以濟旦暮之急則某廹切之懇尚何所赴雖然此救焚溺之計也至於願展薄伎仰備使令則日夕企望鈞坐歸踐冡司當亟叩黄閣以干識察凢先君之所以欲報鈞坐而未果者將盡效焉蠛蠓之軀不敢愛也所業一篇非所以學姑藉手以干是正脚色闕目併塵小史之聼伏幸采覽
