body:
  text: 澹齋集巻十二宋李流謙撰啟謝類省奏名啟易地以嫌固浪戰者揭名而殿盖危得之深惟平平之人宜在下下之列自揆過矣敢云缺然竊以科目而論人材已愧築巖釣渭之舉文章而用塲屋更慙經天緯地之功然天下不皆英才故哲王為此中制比詞聨韻亦知小技之易工析句分章豈必耆儒而後可在豪傑屈首而就於兒童執筆而能自昔以来號多士之盛選由此而出半一時之偉人故凡有志於飛騰孰謂能逃於籠絡雖聖天子亦矜署刺之浮榮若才相公竟抱題名之遺恨况欲紹弓裘之習宜自勤螢雪之功念世賞之蕃醲豈妨自致顧儒科之清切亦許同升宜有異能允符清舉况試分於別所率人號為畏途城小而堅士倍於鬬水澄而游魚可數鑑静而秋毫易分負笈引歸滔滔者皆是也援戈角逐戞戞乎其難哉欲邀一戰之勲宜有萬人之敵如某者襟靈不爽性識甚凡雖立志之似髙顧為力之弗逮佩觿從傅已妄意於古人束髪趨庭亦剽聞於緒論謂六經道之大統而三代文之正宗此有志焉是為學者愚而自信不知適楚而南轅戰則屢奔始悟干齊而操瑟叢誚罵之四至積悔慚而再思惟先世之起諸生以髙文而擢上第嘗經乙夜之覽獨䝉宸畫之褒使之無傳命曰不肖而况舉遺書而親授勤勤肯播之功責舊物之必歸切切盖棺之語遂易絃於危柱旋更轍於通逵步趨於有司繩尺之間模倣乎時流方策之作調柔舌本約束毫端僅居荘嶽之數年粗能齊語不見阿䝉之三日非復吴人旅韋帶以偕来挟鉛刀而一割筆頭快意但知三峡之倒流紙尾綴名不覺五窮之在側本期一得寧有二言謂雋功之收豈足夸而先志之酬為可喜秦彊周弱初無蠻觸之争王後盧前僅有唯阿之辨静言僥冒抑有夤縁此盖恭遇某官道極髙明器懐博大間千百年而獨出指九萬里以横飛奉對大庭並龍頭而髙舉垂紳法從參豹尾以雄鶱勤方召於塞垣輟嚴徐於詞掖軫白駒在谷之念推緇衣好善之心梯磴險途羽翮病翼度木而遺長短元本作拳曲恐棄真材相馬而畧驪黄欲收駿骨致令么𤨏亦在甄鎔某敢不益勵壮圖願卒前業剗箋訓之腐説歸求本心掃綴緝之虛辭專究寔用幸棘闈之遂逺欣墨飲之可逃隨意嘯歌縱口議論出入三百首豈復十二言之拘馳騁數千言不湏五百字之限放蒼虬於學海馳健鶻於義天始欣學術之自由更覺語言之有味雖云薄藝猶能詠歌於聖時縱是虛名亦足報償於國士雅州到任謝宰執啟投犂作吏自知不堪剖竹為州俄出非望揣私心而若此稽公論而謂何冒昧承恩悚慚就列伏念某平平學術諓諓藝能分甘州縣之勞孰借雲霄之便進循階序已貽刺扵取禾超躐等夷更召尤扵褫帶始由銅墨無補黔黎當從襆被之行忽冒題輿之選霜侵鬢側已驚三徑之荒綬見腰間又竊一麾之寵雖造物未容其廢棄而揆才恐速扵顛隮况郡接扵荒邊且民貧扵瘠壤責輸弱户懼常拙扵催科仰給旁州憂毎深扵匱乏茍非仰託丘山之庇何以少施犬馬之勞靖求所安敬循有自此蓋伏遇某官文髙經緯道妙彌綸出佐帝王之真自有宰相之體四夷鎮服迄收銷偃之雋功多士朋来猶躬吐握之盛徳旁收乂俊下逮菲葑欲共舞扵泰寧乃不遺扵𤨏尾致兹孱懦亦預使令某敢不鞭策疲駑支扶荒憊二千石共理之嘆非曰能之十萬户蒙福之稱不敢後也謝監司雅安教官到任啟枵腹衡門已嘗嘆飯不足抗顔師席敢自謂旁無人為貧而来何挟以教竊謂學校在今日固號闊䟱置之邉城扵吏員誠為冗散然餼羊本以存禮而鄉飲亦足知軍方時右文執經及介胄之士在昔柔逺入學有氊裘之徒惟政刑法制固已從宜以施若禮樂詩書夫豈因陋而廢况雅安古郡近蜀名都士靡乏茂才地未為絶徼設一官責之講論舉千里興扵藝文在大農耗圭黍之儲扵吾道増丘山之重稱是選者必其人哉如某初無他長謬有竒志指功名可立而待謂科舉不選而能蚤日趨庭嘗云孺子可教連年飲墨敢謂有司不眀竟從鏁闈始叨末第顧遲莫侵尋老矣念松楸付託泫然落寞渭南再嵗服弓刀之賤遲囘泮水四年甘藜藿之貧俄報更書亟祗賤次拜衣冠而興嘆莫測聖涯瞻爼豆以深思粗窺禮意方幸侏儒之飽已慚弟子之嘲期效所長洒掃應對足矣必求其實析疑答問難哉唯能託蘇刺史之天乃可免鄭廣文之罵此蓋伏遇某官裔出魁紀神交昌黎學術蓋有自来述作知其少匹分殘膏賸馥以乞後軰使枯樗散櫟皆預斯文至汲引之扵久閒如念骨肉仍教誨之而不倦真是父師崇篤曷加報稱無所某敢不一割代用十駕就途使方中矩而圓中規不敢任此有青於藍而寒於水方且願之庶收斆學之功少答提撕之賜靈泉謝到任啟婆娑黄巻自笑書癡傴僂青衫初投吏網雖揆才而惕若獲事大以欣然可以無饑云胡不喜竊以徳充乎已乃可出以為人道濟乎時故能推而及物儻製錦之未學雖挈缾而不能故夫子深說於漆雕而尹何切譏於子産慨古義之塵掃引澆風而蔓滋士鮮自量人多無恥用人之國而嘗試往往敗亡捨已之田而弗芸紛紛䘮失宜事功之弗偉嘆人物之益卑居務退藏仕戒輕就若俛慙一尉實尾百僚粟方飽於侏儒職僅聨於游徼亦有賢者不屑居之南昌溧陽盖當時髙尚之士渭南朝邑亦後日經綸之人豈以妄庸獲兹忝幸如某者粗知向學絶不趨時無壊襪一線之長非青錢萬中之選早承家訓稍諳稼穡之艱難初入世途頗熟人情之真偽幸遺恩之偶及愧上第之未收年長益侵貧迫不赦勉就外臺之銓擇得從蜀邑之走趨抱耒而耕甘遲回於逺次彈冠而出忽徼倖於昌期猝遽交辰凌兢就職炯炯日星之側行偕末光巍巍岱華之旁切依重鎮始求寡過敢辱深知外省登名幸少舒其偃蹇窮途得祿更省慰於啼號此盖伏遇某官詩禮聞家簮紳奕世長才穎利人爭仰於吏師婉畫從容望盖髙於賔幕尚抑鵬飛之勇奮姑從驥足之小馳曲加海嶽之慈罔間纎毫之善致令凡𤨏得預使令某敢不視國如家以政為學一身冰潔常操弗及之心四境風清全倚不言之化上王總領啟伏審班清華於少列卓出異恩佐調度於大農盡專外計引嫌亟避申命弗移載聆演綍之音益鼔抃鰲之躍竊以更治以考由漢已然厯試而升雖舜猶爾必暴之於人而共服乃縻之以爵而無嫌自公始来凡嵗幾易巴䕫梓益轍迹之所盡經榷牧漕刑使華之所徧照朝論熟矣上心慨然入當輔予已畀賜環之命慮不忘逺復勤扼節之留盖隣邦方戒於不虞而徼塞正期於有備煌煌禁槖固資衮職之忠岌岌邉防亦重宵衣之䘏唯金穀豈煩於儒者然鹽鐵嘗兼於冢司以此占朝廷之心知其兆丞弼之拜依仁既久為幸可知某官聰眀䟽通辨智宏達有陳元龍之豪氣負盛孝章之重名以亷能之節濯衆汙以通變之才應羣劇舉目意了着手神融豈徒用於理財皆曰可以相國岐山斜谷之運當不廢於笑談蓬莱方丈之游冝即生於羽翼某幸儒科之世襲愧學殖之天荒方剡章盡及於羣髦而賤職未書於新考彈冠徒切吹律尚遲因桃李散植之時例加披拂若犬馬未先之日願効馳驅輙介捧觴之詞併伸揺尾之祝上韓總領啟光奉渙恩榮膺晉錫仍移中臺之郎選獨專外府之計司邸音風馳懽頌雲合矧庇身扵支郡宜展慶於記曹恭惟都大總領郎中才禀天資慶鍾名閥器兼包於大小知同識於宏纎凡所至赫赫而有聲顧其長鬱鬱而未盡蕃宣騰最君相之所深知榷牧書功轉輸之所同利亟湏顯擢盡究偉能方窮邉萬虎兕之屯藉全蜀千舟車之運難於擇代幸兹得人當觀流地之錢豈廢發硎之刄即迎温詔歸踐清班某假手無功素飱有靦掃門未卜莫窺數仞之墻賀厦徒勤敢致一行之敬上汪總領啟榮奉宸恩寵新使節總賦輸於全蜀佐調度於大農用當其人選協於衆恭惟總領郎中識通萬變智周百為梓杞斯眀堂之材璠璵乃清廟之器久儲羣望聿簡上心尚煩四牡之馳驅盖奉九重之眷委惟理財正名曰義故任官必惟其賢畀付匪輕柬求益遴輟崇嚴於巨鎮專㑹計於外臺是将足國以裕民務當裒多而益寡邉方未撤困飛輓之久勞鄰好既通幸誅求之稍緩大蘓疲俗上倚仁人顧士安巧制於低昻念管子能權於輕重此吾民所深望者在君子固優為之宜一札之初頒舉四川之交慶某備員僚末屬耳郵音雖勉力於催科不敢輙忘於撫字願究心于約束亦期無負於使令實深下吏之懽肯後衆人之賀上王總卿啟伏以別徳城隅欝犬馬戀軒之恨遡風天末𣺌川河赴海之心雖緘縢莫冩其精㣲然情素或披於彷彿少回熒照俯洞寸丹某官岱華自髙球琳不琢絶一世之才而持之以道貫千古之學而通之以權覺實先民器不留物道機㝠運莫鬼神之旁窺智刄略施忽電雹之交下此整頓乾坤人爾豈歛散金榖者乎然蕭何漕闗中而位冠元台冦恂輸河内而功參佐命稽洪範之八政以食為先考周官之一書理財居半視今尤急舍我曷居盖國論稍新扵前聞而敵情益險於難測謂宜厚敖倉之蓄可但信平凉之盟惟公之謀必有以察㣲則事之至固可以應猝相天子在此行矣視廷臣何以過之某始由世賞而竊世科已在諸生之末初班吏版而託吏屬又居列邑之中方剡章徧及於羣英顧書考獨賖於數月似䝉記卹亦許甄收謹數日而得得來且順風而拳拳請念連帥誤加於論薦指盛門尤切於歸依大府崇嚴拜孤函而汗浃修途隔邈遣一介以神馳唯憐其輕千里之誠少慰其成九仞之志南風斯競大火正中祈安舍於道和益仰崇於宸渥彌深頌祝莫既編摩上楊總卿啟論一時人物之英獨勤慕用假半席儒宫之地偶托帡幪方當大幕府之開尚稽下執事之慶懼貽誅於後至輙修敬於下塵某官皎皎髙姿翹翹峻宇川流海注嬉笑怒罵成文麟游鳯儀動容周旋中禮步武昔參於霞袂姓名嘗列於瑶鐫著崑崙薄蓬莱不遇故去弭靈旂回綘節自當復来方天子坐眀堂以大臣制國用尤注意於外計府故選才於近侍臣式光九列之除爰重四蜀之寄念逺俗積貧而久困瘡痏莫瘳在仁人孰計而深圖毫髪不擾益完邦本彌結眷知蕭何之轉闗中竟躋上宰冦恂之輸河内當冠元侯惟公以之在此行矣某以粃學據有若之坐無經笥觧孝先之嘲託刺史天我獨有而自喜無官長罵飯不足而奚嗟屬炎候之方隆祈生經之益毖上查總卿啟省躬無似宜自置於散閒事賢有時顧奚論於蚤晚物䝉收於已屏途罷哭於将窮盖教督於始者将以成就其終而鞭策於前者亦以警勵其後感服洪施激昻懦衷恭惟某官智光𦕈綿才絶等比文章孤出淵源家世之深議論横吞土苴古人之奥天祿分杖頭之照淮西磨楯鼻之煤倦承眀直而輟獻可替否之猷屈外計府而用損上益下之義百姓足君孰不足大夫賢人皆曰賢最聞益髙驛召将邇識其大者將用於經綸開濟之中𦕈乎小哉豈止此歛散斡旋之際遇踴躍之金雖以不祥棄待輪囷之木或以無用收致令𤨏孱終累坏冶某賦姿不武行世多奇已再而衰實難堪於爼豆然少也賤正當任之斗筲匿垢含汙倚海山之藏息黥補劓干造化之仁不鳴之鷹念何逃於釜鬵半焦之桐尚冀加於宫徴敢不勉駑馬十駕之力庶幾及跛鱉千里之功少酬深知亦慰晚節迎靈泉楊知縣啟榮膺臺檄屈就雷封儒者臨民必惸鰥之有託善類為長宜粃拙之可逃肅迓前旌敬紓賤臆某官學無枝葉行有宫庭典刑猶及於老成橅楷共宗於宿徳早飛英於太學莫齒何蕃嘗分校扵外庠皆服孔子當以經術入侍乃從簿書滯留武城割雞盖充其學道之志中牟馴雉亦推乎愛已之仁眷此邑之蕭條本厥田而荒瘠市亡列貨里乏强家撫摩使之各安談笑可以坐治即騰美最行拜寵除某以晚生綴下寮尚餘年託巨蔭鞭其駑惰或少助於催科及此宴閒願相從扵講學上漢州張知郡啟瞻烏所止吾誰適歸令龜而從利有攸往盖讀書十年不如詣習主簿而封侯萬户但願識韓荆州来何遲哉見已晚矣恭惟賦剛健之性有文眀之才身傳正宗力起絶學功剖造化之窟誠窮精祲之淵羲圖禹疇提挈宇宙元蓍虚畫包括古今方止圓行知象生數而數生理旁探順考謂人從地而地從天兼用不用之精㣲得元又元之奥妙變通在我何湏六位之推遷應酬如神惟自一圖之指畫此足投九師於荒裔固宜號三聖之元勲既成已以自多必為人而愈有始遯世而無悶合乾之潜終與時而偕行法艮之止輙嘯歌於三逕寄游戲於一麾屬當傾否之辰正頼康屯之業豈但得其言也殆將舉而措之三年之克鬼方式資逺畧七日而得婦茀行歸侵疆某於䝉貽逺實之嗟在比有後夫之悔念鶴峰之昔至曽龍坂之誤登不辱韓荘之麾許在籍湜之列接膝親授恍吞三畫於夢中倒囊畢傳笑得一編於地上慨圜跳於日月悵茅塞於心胷幸今為一㕓之氓無勞負千里之笈如臨父母敢忘君子之愛人不出户庭斯豈長者之絶子載加熏沐亟遂趨承自知為无妄之人輙期敬不速之客賜之便坐匪一肉巵酒之求指以正途欲吟風弄月而返又上雅州程知郡啟肅奉眀綸榮分左竹專地千里其志可行貽福萬家所及亦博方委躬於下吏敢修敬於記曹恭惟一代豪英兩蜀閥閲驤首八極洗凡馬而盡空㳺刃三軍視全牛而不見雖名世之才間出亦盛徳之後不同自應快鵰鶚於雲間久已困麒麟於地上雙旌雲巻夙聞露綬之驚呼千騎飈馳薦著搴帷之風采惟雅徼郡在昔要州夷蜑憑凌地望雄於蜀鎮蔡䝉聨亘山名紀於夏書儻付長才便為樂土况弟兄聲績之相望盛集一門宜江山氣象之更新歡騰五邑但可掃棠陰而坐嘯不妨遲芝撿之特招即躋顯嚴益究施設某久深慕藺殊幸依劉無經笥觧孝先之嘲以粃學据有若之坐免官長罵飯不足而奚嗟託刺史天我獨有而自喜上虞參政啟抗一節以立朝精忠貫日鼓片㠶而去國偉節摩天仰咨徒御之勤恭致記曹之問瀆尊是懼頌徳惟勤某官識洞天人學兼流畧應千齡而間出盖一世以横飛以趨庭之訓自致雲霄用學古之功發為事業長江妙畫遂標望於官聨廣廷正言亦增重於國體方九重之眷甚渥而三徑之念已深翩然来歸籍甚深望拜松檟而自愧撫猿鶴而自欣雖晉公安綠野之㳺冲襟淡泊顧安石注蒼生之望輿論播騰即諧鈞軸之持永茂旂常之鏤某謭才亡取先盟未寒仰北斗泰山之髙慕用已久快白日青天之睹拘縻未皇敢因筆舌之㣲敬寫肝膺之悉朱眀肇啟品彚咸彰願益毖於真倪尚翕求於多祉又辭榮丞弼忘重圭疊衮之尊訪道僊真適閒館珍臺之樂人有周公居東之憤孰知孟子去齊之心屬當税駕之初敢怠操觚之敬竊以合不合大臣視之而進退用不用天下因之而重輕有挟超世之資實當經國之任誾誾正論烈烈精忠中興以来未聞羣公扵此何議泰山喬嶽本自不揺白玉美球亦復何玷徒起不容之歎獨髙易退之風唯陳平念之深何孔戣去之果神龍改窟驟驚河海之空寶鼎藏川忽失廟祧之鎮因奮髯而三歎聊引吭而自鳴某官道徳生知忠義性禀以簪紱繼世而自奮於科目以學術起身而獨擅扵功名賈誼少年已達國體栁渾儒者乃知戎情端欲致中行之笞蚤能辯平凉之詐卒騐靈龜之照仍收汗馬之功自古得獸不並於指蹤於今運籌仍兼於决勝憑江一戰闗運祚之興亡折敵片言繫國勢之强弱此王導謝安不足者於晉公汾陽則近之持此以博謗讒眀哲不爾巻之而就閒燕聖賢亦然顧夫子反魯豈不樂哉特樂毅離燕有可慮者終遂鈞衡之拜永光彛鼎之書某夙有先盟嘗辱化冶持鉛槧頌淮西之績深愧短才操杖屨從綠野之逰又拘賤次仰企龍門之峻少伸燕厦之勤上晁待制啟演綍大庭升華次對仍即帥壇之拜式光外閫之除已建髙牙凛威名於草木凡依巨樾溢讙頌於緘縢恭惟秀禀江山器函鼎鼐胷中萬巻直謂之行祕書筆底千鈞何啻於脱吏腕薦膺宸眷超厯華途烏府擊姦聳直聲於白簡鳯池接武騰美譽於紫荷重屈鎮於藩垣旋俯司於榷牧方廟堂之謀帥欲制敵衝在禁掖以得人宜專戎索長城有託絶徼無虞緩帶輕裘燕寝適凝香之興珥貂鳴玉詔泥速飛傳之招即諧端揆之登益究經綸之業某嘗塵下列獲覘末光逖逺鳯星日寄修門之望更同燕雀遥欣大厦之成上運使鄭察院啟光奉細書寵畀華節眷四蜀之劇部莫最於斯用一時之偉人實選於衆熒躔戾止懽頌翕然敬修下吏之恭輙致記曹之問恭惟球琳不琢岱華自髙貫千古之學而通之以權絶一世之才而持之以道器不留物覺寔先民烏府騰聲憸人折其牙角龍墀接武多士企其光塵佇九轉以丹成薄三山而風引雖有孤於外官之歎豈無恵此逺人之心頋窮邉萬虎兕之屯頼計府千舟車之衆必國與民之兼裕惟義理財之可為熟復訓詞仰窺臨遣之意哀矜疲俗豈專飛輓之功即疇顯庸益隆異眷受釐宣室遄聞久不見賈之思弄印廣朝當有無以易堯之召某以粃學据有若之坐無經笥觧孝先之嘲託刺史天我獨有而自喜逃官長罵飯不足以奚嗟式陳賀厦之牋併致掃門之願上王都大啟伏審光奉渥恩寵更瑞節盡厯使事試愈久而愈新少留福星澤益逺而益博稍紆榮躅粗慰公言竊以易其有無意本通於邉備專其榷牧任尤劇於漕刑地盡隴岷利兼嶲莋摘煙擷露姑損埸圃之棄餘追電犇風盡致廐閑之神駿裕吾國計空彼㓂資盖百年成法之具存必一代偉公之可付恩光星煥歡頌風傳某官學造道㣲智周物表本中庸而立徳體常變以應時聲貨不揺初莫窺於畦畛肺肝洞徹能立應扵事機已騰飛輓之殊庸仍著平反之美績召參未果借冦挽留新芸閣之寵名畀茗臺之重寄䝉山春草定知氣味之不凡冀北地靈益信骨毛之特異恐未移於桑蔭行促報於芝封某蹇鈍半生槁零末路備缺員扵大府愧游刄於短材甘苦自分已遂陳根之棄駑駿易辨甘從下駟之收亟諧望履之榮冒致捧觴之慶又伏以宸渥便蕃從天而下使華烜赫易地則然巳䝉豹霧之沾願致龍門之賀某官濬源顯胄挺異名家智自徹於㣲彰用必歸於愷悌泛綠素髙於蓮幕握蘭獨粲於星躔自太守為三公未諧召拜由大州刺一道尚屈輸將仍按祥刑薦騰嘉績仁固寛於三宥獄迄亡於一人江漢東流志已宗於溟渤岷峨西望恨猶寄於周南惟摘山市駿之成規盖足國裕民之良法春雷隠地萬芽俱出於生成血汗騰風千尾悉歸於控御即奏功於中扆行正位於台符某才無逾人職惟詰盗青衫掩骭敢興㣲賤之嗟白日在天将快清眀之睹
