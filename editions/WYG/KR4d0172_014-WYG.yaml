body:
  text: 澹齋集卷十四宋李流謙撰序送李仲明司户序紹興辛酉我家君以尚書郎出守簡池而君之墳墓在焉今君官于漢予則竊一㕓于封内而為氓契好舊矣况姓則同術業則又同而予之妻黨又有姻于君者其相與之厚豈必其親父子兄弟耶舜有傲弟周公有狠兄堯有悖子所謂親父子兄弟者果何如耶韓文公叙送何堅謂韓何同姓為近且為故人同業復同道予之視君將堅云乎哉君官滿受代去矣韓之餞堅文非所及也慕其意云耳往在簡君嘗以諸生謁入袖文巻贄我家君予時竊寓目焉其文嚴勁簡古非若近時舉子陳腐冗陋姑以決得失於有司者予固已驚嘆曰是將砥柱斯文一第陋哉未幾果以里選冠逢掖相繼上第晝錦而西矣子曰我言小驗尚非所以期君者自君來漢清謹潔亷持身益恪涖官益肅毫末設施如牛山之木寸萌拔地已有撓雲撑空之勢葢聞之途人有黠胥以事持君君實不知胥將訴于府先出記示君恐之兾祈其意後得以肆君震怒叱出即駕詣府白其姦府亦怒致胥于辟同僚駭曰仁者之勇如是乎且謹厚小心者所以大吾氣也又當途有重親至府者官約迓之君曰我王官也有守相而已歛板卑趨吾不嫌他非所敬也卒不出嗟乎君姿和易與人交簡穆粹温春風熙融襲人襟袖其遇事輒發雷雹俱下不以物挫乃如此豈非賢哉予前日特以文期君爾今又將期以事業盖推其束制狡童不震不揺則異時不畏彊禦者也推其睥睨勢要介挺自立則異時不枉名義者也富貴鼎來君又何辭哉予婿于簡嵗歸婦家至必先謁君把盞賦詩宴笑諧謔惟君之從相得懽甚自君來漢予至簡無復前日之懽矣然漢吾邦也距予所居邑不百里置吏踵相躡所欲言者數得以尺紙相聞間至郡必得見則君在漢猶在簡也今君去我而歸矣道里逺矣音問不時得矣然予自是歸簡則前日之歡可再是君在簡猶在漢也故君雖有簡漢去來之倦予初不失相從之樂則今日之别不足惜也雖然是可期者也風雲勃興鵬摶鯤躍指南溟而上九萬里而一息予方宛轉汙池友蛭螾而侣魚鰕當是時也見君其何期退之留孟東野詩曰吾願身為雲東野化為龍四方上下逐東野雖有離别無由逢退之之意予之意也敢酌酒敬誦以為君别送張珍父序蜀士之不登于朝也乆矣或曰朝廷薄蜀士嘻是何言歟予見朝廷之厚蜀士未見其薄也往者有布衣持一紙書投北闕下即日官之有庶僚單舸逰京師未朞年躐登華貫當是時蜀人夸焉三吳之人慕焉而薄于何有然自是則若稍稀矣累十年除書不至劔外搢紳大夫士視官中都者雖騶役之賤不得一與之齒冝無怪其疑以為薄而不知有故焉抑未之思則疑以為薄者猶妄也夫銳用之于前日而驟黜之于積年造物之意獨安出哉予恐其于吾人必有不言之誨使退求焉而黙識之顧其初心則未嘗一日忘蜀也奈何不是思而反疑以為薄哉今吾子以妙齡掇巍科名撼一時于吾人乆廢積窮之中獨見召擢聲光煒煜閭里赫然人皆曰是將再起蜀士夫豈知造物以其不言之誨隂試吾人于兹乆矣意其間必有飜然自厲異前之為者曰我終棄之是棄蜀也則遂選擇其尤穎異者以觀焉而吾子實當之然則是行也子之責深矣予見蜀士之賢否占于子其積年不振之辱伸于子而其用舍進退决于子子其有以處此耶靖重篤實勿競勿揺泰山而維焉則前日不言之誨子為得之造物將進子無已也自是彬然而立于朝者皆蜀士也昔嫠不恤其緯而憂宗周之㣲人或笑之今予也不惟其身之饑寒之虞而區區焉私為蜀士之慮其可笑也夫其亦友朋之義所當告也夫送㳺公玉序吾䣊之合何為其合也善相推所以相勸也未至而相告欲其進而至于是也非是則不合矣㳺君公玉予同年友也捷敏有異材能詞章皆出人數等又矯矯自持將赫然一世者来官吾鄉予始識之而定交焉公玉于予亦傾倒展盡然予與之處知其善心輒慕之說于人吃吃不離口不自嫌其謟也及其自托于不能咨所未至亦殫言無隠不自疑其訐也故公玉以予稱其善則親之以予告其所未至則敬之是以待予也亦然仕再周嵗又攝邑三閱月予不一毫干之非懼其却我也懼其責我曰爾何等告我而私溷我則平日與我言諤諤者信乎哉故予與公玉交自謂無愧公玉今解去予戚戚于懐葢公玉之義子稱之常不足而告所未至僅千百而一焉故公玉可無予若予則一善不聞而其不肖非常有若公玉者旦旦其側一一而磨切之則恐放而底于戾是以其去則重惜之雖然公玉臺閣人詎肯為予留哉别樽既酌姑書其所以與公玉合而惜其去者為送行序振古義而篤交道將不在是夫送汪制置序善言天者髙耶大耶曰固也必知其所以髙且大而非髙且大則知天矣何哉公是也惟天為公惟公能髙且大位兩儀行四時運日星驅雷霆融河川結山岳鼓飛潛皆公也不公天自為一物其髙自髙大自大夫孰髙孰大之老聃氏荒唐人也其言得罪于吾道然有曰公乃王王乃天其言非得罪于吾道愚謂自古知天惟此一人今夫奄九有而有之天也代行其事于下者亦天也天之天不可不公人之天其可不公乎人之天不可不公代行其事者不公其可乎主上剛健睿明無一而不如天其于公也非以為公而為之也由而行之也故自臨莅以來薄海内外跂行喙息無不䝉被上恩及於東西曰我天也及于南北曰我天也天無東西南北而東西南北各一天非天也公也噫人之天如天之天斯人何其幸耶獨代其事者吾私有疑也中原壤土未反於職方氏前日一家今二焉主上不忍一矢相遺推至仁兼愛之不以淪汙䧟逆棄也葢其公又非特施于吾域中也夫其公非特施于吾域中而于吾域中乃自為疎親决不爾也然吾蜀猶有少觖望不滿其大者某不知也如銓選擬官必優内地磨勘限員亦狹川人推此類言之大抵皆若有輕重于其間果何也此非天也代行其事者過也故天亦厭之邇臣朝聞而夕更焉俄而鼎席虛先生召也先生行矣天之公待先生而成也先生至公人也某何以知之知之蜀也先生鎮吾蜀四年蜀之民困于虛額不得休息而不能自言先生為言而蠲除之蜀士有寸長銖能閉蟄蟠鬱不能自伸于上先生為薦引而推用之是先生愛蜀之民猶愛先生之鄉之民待蜀之士猶待先生之鄉之士也非至公其孰能之然則今日之行非但人之天知之天之天實知之其欲使夫代行其事者恐先生不得免矣是公也將見又推之天下而為天者益髙益大矣故于其南也輒書以為序送虞宜樞序南北果可合乎難言也主上睿明天縱神武震疊呼吸指顧山夷嶽翻曷為而不可然徵以往事揆之天理妄有見焉方金人大舉萬艘慿江投鞭斷流意無堅陣當是時北幾合乎南相公白羽一揮邉塵立浄而南復南其後用師符離督以元老靈壁虹縣之捷聲動河南當是時南幾合乎北浮言沮揺廟謀疑奪卒無成功而北復北由是觀之以南北為不可合殆非耶以為可合愚亦未見其易故曰難言雖然在時亦在人孰愈曰俱天不欲生靈久遭塗炭故生相公使及是時適與之遇而拯捄之此人與時偕符離之舉則天未定焉爾宜小緩而速故無攸利然而使北不得以合南乃天之本意使南未得以合于北則非天之本意盖若小稽期運留此全勲以待相公相公入相南北合矣愚又聞之不亟不徐相時而動度我之可舉與彼之可以舉則幾矣茍以為中原之地將有負之而趨宜不終朝而急圖之則愚不敢知内修政事外固邊圉此古盧扁之方願相公一誦之可乎送何少卿序某不肖異時侍庭闈先君曰孺子可教賜之詩士苦無名字吾兒早振聲交㳺資直諒議論斥縱横一第真拈取羣經素講明勿貽麟楦誚千古愧公卿已而棄諸孤則又書小紙付之曰某若登第當以遺澤畀叔之子某手澤刻之石至今爛然而某姿駑命剥戰輒衂竟隳光誨負此以茍生赧如也日者數數進見自惟無以代奉雉之䞇則書其平日不腆之作塵汙函丈幸而先生一見亦以為可教借龍門一尺地使得厠𨽻圉于前溲渤賤凡遂登藥籠且又惜其與碌碌者比每見輒以科第相淬勗盛意愷惻見于顔面惟是破帆逆風倍費挽曳􅏝蹄蹶石不任箠策因私念憂之而欲以世所甚榮者成其名父子至情則然秦人則無與也而先生期待若與先君同一肺肝豈非録其纎能而忘其陋視之固猶子歟嗟夫某得此于門下不知所以報矣先生小休武信武信非先生居也衮舄奕奕纛節煌煌先生歸矣而某妄有言焉昔者先君之勉以科第也且戒之曰汝以孝弟忠信為學問則不予羞以根本淵源為文章則不予羞能之科第將踵門求汝汝且以為凂不然汝凂科第雖得之不榮某百拜服其言私識其意曰先訓有大焉者乎比者先生面誨亦曰子文不陳腐然非科第無以發身豈先生所期固亦有先君之所謂大者而特欲以科第發之歟某當敬受教自今愈益求勉于埸屋之文庶幾萬一獲竊千佛一號然後退而盡力其大者以毋忝先君毋羞先生夫先君父也先生師也人而不惟其父其師之從將誰從岷峩之靈實證兹言故于先生之東也謹書以請達于馬首靈異集序紹興庚辰安静觀既落成邑令仙井何君令望謂邑尉廣漢李某曰真人之竒靈卓異衆矣惜不盡傳况今親逢休明孝通隠邈肇新祠宫而連帥王公又肅于承詔不閱嵗役遂奏功實一時傑特事獨此未滿意子盍併書之吾將刻石為耐久計某曰唯唯因退而考圖記削其陋諏耋艾訂其實得若干事再拜以授令令為横碑十許即日戒工鑱而䧟之壁仍以唐史真人隠逸傳冠焉虚其餘俟來者某因妄論之曰真人在時卻竇長史之餽而瞪眎髙長史疑厭世若溷然所立髙矣至其隠去扶危葯傷卹窘奔乏汲汲乃如此則又若未忘物者葢至人妙士其所自持固邈乎霞外一塵不得嬰若其以有生為一體俛而同其憂患則純念㝠感赴于不約者彼亦終欲寂然而不可雖然謂其真在是則猶攬劔光而執月也令于新宫號盡力力且及此政亦綽綽矣故某不敢以固陋辭且序而題其首送兄長之官洋川叙先君三男子皆奉家法惟謹而性小異伯氏静重簡黙埋鏟不彰讀書千巻如未嘗挾策者落紙數十百言如未嘗執簡者人視之昩然或疑其晦季氏明决敏銳遇事輒了先君才之毎稱其雖細故薄物著手諧人意然姿峭潔皎皎自䕶忿奸嫉邪不能葢一疵人視之狷然或疑其亢獨予淺孱浮露不能如伯氏懦柔疑畏不能如季氏而人不譽不毁之居以是媿夕惕晨省有以自厲故嘗用伯氏之静重簡黙以養其徳以季氏之明决敏銳以佐其智弟兄之間相為師友庶乎其寡過季氏先吾二人而仕予與伯氏同時調官予尉靈泉伯氏出闗千五百里主洋之興道簿將行予不勝離羣之悲而歎師友之逺因言曰静重簡黙盛徳也然有而不示昔人已謂焚梓毁璞伯氏其剖光發翳少自見可乎明决敏銳而又峭潔端士也然警愚明汚或至不容季氏其刓方就圓少自同可乎夫予不肖知以伯季自厲矣斯言也伯季其亦頷之否其然耶譽將盡赴之誰其疑豈但若予者不譽不毁于世而已也于伯氏之行故書送馮提刑赴召序紹興八年敵來議和上皇厭兵意向之而大臣力主其議異說者不罪則逐當是時冠劔塞庭迎風靡然無一妄咳者獨公起下國以孤臣昌言黼座之前謂敵不可信和必不久徒屈帝尊削國威非策之便質難究詰凛凛如兵在頸不小挫陛衛震焉已而和議成不言兵者幾二十年天下若向安皆曰和是于公言益疑之甚者詆之未幾敵果無故棄盟首建兵端上皇始思公言促召公天下亦始大服是時敵釁方萌昩者習久安茍幸無事猶冀敵意之還也公亟上牋以敵為必来兵為必不可不用且言國家謙損過中浸成卑弱弱形著見故彊敵生心今當赫然發憤移蹕建康示天下有為以著其彊形嗟乎此探端揣本之言賈少傅陸宣公議論學術者也其後邉患復發卒如公言某嘗論天下事不難于知之而難于知其㣲不難于知其㣲而難于言之而必用夫歴世之治忽衆矣然方其根蘖未嘗不有其形亦未嘗無一人焉先事而言幸而用故治安不幸忽焉而敗亡顛隮至矣當公初召對其言亟用則必不與敵和不與敵和則無前日卑損凌蔑之辱以賂戎之力足以養兵以事戎之勤足以治國天下庶可為也當公再上牋使其言又亟用及敵未噬使者驕悖于庭斬其首懸諸國門正敵罪明告而顯絶之然後圖回吾所以備禦控捍之術則敵氣必挫國威必少張失是不為流禍至于今日國家幾于寒而索裘公徒有曲突徙薪之歎也雖然病者之求醫必于其嘗騐者葢知之察而信之篤也公醫驗矣宜病者之亟求是役也公不得辭矣某故人子可無一言自昔國于江東者莫弱于晉而尤甚于孝武是時苻秦舉天下之大而有其八既取蜀又取襄漢晉僅有江表一丸土然淮肥之戰秦以回山倒海之力而困于白靣少年數人秦卒以亡而晉存何哉有謝安桓冲為之臣也夫安冲之賢非特晉人倚之秦之大舉也其心膂帷幄之臣亦未嘗不變色以為言夫有臣焉而使國人倚之而使敵人變色以為言則無怪乎晉之失蜀失襄漢而能以一丸之土乆立而不亡也厥今形勢大扺晉若也然蜀我有襄漢亦我有比晉有餘矣然自用兵再踰寒暑尺地寸疆既得復失敵縦横自如無少憚畏譬之兩力相角弱者先仆而吾貲力易殫策畫未定反有可虞之形凡此豈吾之所恃與敵人之所畏未有若謝安桓冲者乎夫安冲固一時偉人然予竊料之使當往者議和之初及日者之將叛其絶識懸鑒未必能如公之逆知其㣲瑰言宏論切中事機彼所以成名者特用耳今公亦用也吾人所恃敵人所畏不在是乎安冲何足道夫醫一也善診者不必善用藥人才一也善談者不必善集事馬謖與孔明論兵孔明心服之用之街亭衂焉夫孔明之心服必其說之過人也而成敗乃爾則謖善診而不善于用藥也惟盧扁能具是二者故公前日之言其于醫葢診者今用藥焉刀圭未下咽病隨去矣天下之盧扁非公尚誰屬之雍資州送行詩序雍侯堅孺雅恬于進其有寵召也辭甚苦終不獲命始勉而南既至對便朝開陳治道皆古義而實切時用上偉之將留焉明日即上章丐還廟堂持不可侯懇益力大丞相誠之至以侯心熏憂患果于白去上乃聴以資中付之于是蜀之仕于中都者勇侯之退而榮其歸也合飲以餞之以屢薦不入官一麾乃出守分韻賦詩張某君玉陳某光祖黄某仲甄胡某巨卿范某西叔王某君弼楊某似清堅孺亦自占韻以示無言不酬之意張某季長以告不預集而願有賦合某為十適章某徳茂至自蜀坐客也别出一章附于軸而屬某書其首予謂侯于進退出處耀矣薦不入官非君相遺侯自伸其初志然亦足以砭世之倀倀于衢路而不知止者故諸作雖竒藻遞發大音各奏大抵皆述此意顧某菲陋亦竄其間而又引焉頑石在上巨鼇當有不靈之嘆奈何送虞參政序邊患烈矣自南渡以來聖君賢相偲偲然日惟攘却控禦之備而卒不果一犂其庭控其縦横之勢以大慰我祖宗之靈以快我臣民之憤以發舒我中原之氣故戰不足而和和不成而戰其戰也無定畫其和也無堅盟是以敵人視我如玩嬰雛無一毫忌憚此無他咎在謀議者不足以深識敵情而徒為膚理之見跳踉突蕩弄兵以挑我則不得巳而與之戰戰既乆兵連禍結我力既耗敵意亦怠則又不得巳而與之和和與戰常若循環而天下卒無一定之期嗟夫為天下國家者豈果無長策逺計以至是哉于此有說焉必有超世葢代者其風聲威望素足以震讋荒遐而又髙識獨照有以深探敵情而内强吾國茍得斯人濟斯事戰可也和亦可也其戰敵人以為威其和敵人以為徳吾嘗操此二柄以為制敵之術而不使敵反操以制我若是焉天下事大定矣尚安有前日紛紛擾擾之患哉恭惟某官以道徳忠義結主知而以恢復功業為已任方其使敵則逆知其詐于未敗盟之前迨夫臨敵則迎挫其銳于方張不制之際大功數十焯焯暴著國家倚為長城重鎮者入贊機務將正鼎席乃推逺榮名退安閒寂偃然若不嬰于物者冲懐雅尚固以激懦而興頑然子房赤松之逰在秦項已平之後而裴相國緑野之放乃穆敬不用之時今敵詐可虞是秦項猶在也宸眷方渥是堯舜親逢也此而遽欲追赤松之逺逰而蹈緑野之髙致其如蒼生何其如社稷何此尺一之詔所以亟下而舍人裝不得頃暫留也某故人子再世竊濡潤于仙舸之南也不能鼓槳枻以相行役獨知和戰之說如前而知今日一大事非鈞坐有不足辦者敬書以為序分陜志總序嵗在戊子大丞相仁夀虞公以宥宻宣威井絡之區故大丞相魏忠獻張公之猶子利州路提㸃刑獄某告公曰叔父往當屯難之初總諸使保釐陜蜀有大勛勞于時嵗月荒老其事滅沒不著志士為之䀌然今公以偉烈殊庸實踵英躅名徳後先煒煜相望願裒其遺績庶有紀焉以詔後之人公曰是吾志也亟命其屬李某使為之某既受命即退而諏諸耆舊訪之老校退卒皆僅有存者而莫能端倪又求之于腐簡破牘晝窻夕燈繙繹究索卒不見畦畛葢戎幕屢遷年所多歴脫亡淪散文缺不具或一嵗粗存數月或一事僅涉梗概既不可以日月繫次又不可以本末首尾相發明含毫吁嘻亡所措手私所震惕大懼無以塞責于是隨搜閱所獲一二掇拾凡切軍民大計闗邦國至謀悉以類從別為十門門各叙其大凡為二十巻起建炎三年夏六月終紹興三年夏四月取公制詞有曰分陜宣威方重専征之寄又曰周東征而宅洛葢資分陜之雄名之分陜志雖紀載芒畧論述蕪鄙未足以鋪張揚厲萬一然異時或有見聞之博或逢編簡之遺増闕補殘往往可為全書因妄論之自海東之窺覷中原凡吾號天下勁兵處憑固負阻鬼不得窺而長㦸臨之四靣瓦解當是時敵之横行吾國中如㳺其園觀林囿掠吾城邑如探囊物振槁枿而仆敗屋獨至于蜀殫其彊悍之力磨牙揺螫期于必取然終不能以一毫得志卒之摧衂挫敗覆軍殺將而去蜀之為蜀鼎然不動而三吳近甸禁籞不驚亦倚我上流之重疇庸第勞顧將誰屬不有我忠獻公乆矣其不國矣某嘗夷攷其粗大抵公忠義根于天性智鑒絶于人羣視敵之不殄除兩宫之不旋翠華之不復輿地之不歸如飢不食渇不飲親戚骨肉之䧟乎水火而不救是以雖一身孤危隔絶萬里之外而雄心義概愈乆愈確觀其勇于敵愾力于衛上明于料敵果于制勝善于任使勤于聴納寛于撫士卒仁于愛百姓至控扼險阻綏集流散招徠叛亡奬激忠義隄制邊陲整治器械經理財賦地非一所事非一目治非一人而公精神之所旋斡心慮之所周營朝飱失箸夜寐推枕葢無不用其至雖深畧秘畫長籌逺筭所以克復神州再造王家不容覘而竊議獨措之事為其勤過于周公葢如此使當時少假漏晷必如公志則枹罕醢木燔老上之庭返故都之駕唾手為之矣方公以便㫖行事事有因時制宜者公初不以為成制譬之芻犬既陳樵蘇隨之然今姑存不去亦欲著公所以用蜀有不得已昔文中子稱諸葛孔明曰使亮而無死禮樂其興乎夫孔明于蜀其身未嘗一日不在兵間其設施未嘗一日不在軍旅文中子何用知其興禮樂葢以蜀觀孔明則不然以孔明觀孔明則然也吾嘗論公亦云嗟乎當孔明時荆州入于吳其後渭南之屯亦落落不合然司馬仲達觀其營壘嘆其竒才至今論三代之佐必歸之夫知論孔明則知論天下士矣某之先君子實出忠獻之門而某鈆槧伎薄猥辱相國虞公之所委屬仰惟公䕶蜀之功與忠獻匹休今又以格天事業光明一時誦古今譽盛徳者雜然陳前乃推美于前哲大老不忍其故實刓落將有以發揮表掲之而付之蕞爾生顧某何敢以不腆辭是用薫沐纂次且再拜而為之序使事經始公建炎三年四月以復辟元勲自尚書禮部侍郎知樞宻院事五月除川陜宣撫處置使其冬至陜初公被㫖以便宜行事事皆専决不中御其撫臨既廣而權寄優重又今昔所無葢其金石一心精貫日月上無嫌猜下絶謗疑故能以一身任天下之重展盡忠力幾成克復之勲然當大將鼓旗初建必有恢拓宏逺之規模鼓舞震驚之號令書之策牘以備採擇而脫畧散遺不具彷彿今姑得其入疆之始所行下諸路約束録之為使事經始仍以臨遣詔書冠其首其詳則見之逐門督勵勤王傳曰求諸侯莫如勤王當敵人方張不制噬嚙四出天子為之犇幸于吳于越而清蹕所至敵則隨之戈鋋之氣烽燧之烟幾於憑陵翠華熏逼黄屋而犬鼠蜂蟻投隙窺便又乗之而奮當是時九廟之辱萬乗之危殆一髪如也公擁重兵邈在萬里之外警堠一聞背不帖席慷慨憤發糾督戎旅即日于邁先聲飈馳敵為奪氣葢其以身狥國不偕敵存素志然也易曰王臣蹇蹇匪躬之故公之謂歟今録其事為督勵勤王振舉軍政陜西諸路號勁兵處其騎射驍捷擊刺犀銳實冠天下自公仗鉞専征盡獲諸將前茅始憩一號令之旌旗變色于是紀律之不張法制之不嚴器械之蠱敝不飾事藝之閱習不精諸屯虚額之不充疲癃懦怯之未汰公皆篤意繕治勵精謹敕責訓練則程式可稽課勤惰則賞刑必行又遴擇將帥屬之兵權授以成筭如吳玠等雄鷙沉毅忠義體國策畧兼人名萬人敵皆公首自甄識拔之裨伍以卒成大功其間伉扈難制或委甲棄軍亦隨以剪馘不復顧惜拊摩士卒不啻子姓藥傷補敗第功次勞常若不及故能以一隅全力抗堂堂大國此則公馭軍拊衆之大畧也初川路禁軍無將領統𨽻公始創為四將俾之専意練習又山前所屯多為西兵邊遽俄至則盡甲而出故自利以南蕩無藩籬公命于成都潼川等戍守東兵及廂軍逓鋪并弓兵料簡少壯分屯結隊以嚴備禦既又招填弓箭手復其征徭賦其土田授其鞍馬又増置諸縣弓卒又勸募土丁鄉豪使自為戰其他名額有號勇毅有號赤心雪恨報讐子悉團結有法廪給有程至于不吝金帛市馬西陲以足戰騎皆公用力于戎旅其概可得而紀者因總之為振舉軍政講析貨源公初為茶鹽𣙜酤法其奏札云臣到興元取㑹四川見管金帛錢物除建炎三年上供并應副陜西河東衣賜物帛見行拘催其已前年分積下錢物縁建炎元年朝廷催促諸路併綱起發赴永興軍鳯翔府下缷准備緩急支用去春金人殘破盡數失䧟後來収簇到錢王􅊛駐軍興元半年之間支過一百二十餘萬成都帥臣盧法原差楊可弼充都統制五月之間支過八十餘萬可弼乞罷續差利路鈐轄李君陳代之四月之間支過五十餘萬自建炎三年節次承朝廷指揮支撥應副陜西諸路糴米等計川錢一百三十餘萬及陜西節制軍馬王庶曲端王似共取撥過四百餘萬因此儲積無幾今屯兵十萬日費浩瀚道路阻逺東南財賦既不可調運解池未復商賈不通臣見行措置茶鹽𣙜酤講究利源為經久之計公之奏牘如此其後臣僚札子亦云川陜初用兵時調度費出悉仰公帑是時所用者州縣之綱運常平之儲積而摠領財賦司又為酒法鹽法増錢引之法佐之取給于此而已不及于民也其後費用稍廣總司之法綱運之物嵗入如舊始不得已而取于民于是有對糴以稅米輕重為率有激賞絹以和買多寡為率有折納和買布以市值為率有増敷役緡以加倍為率某嘗竊觀二劄因以考向之征輸賦徭凡所増名色誠非得已葢邊屯如雲張頤仰哺一夫不飽狼拏蛟搏變且不測如之何而坐視然當是時百姓知官用其力還以衛之亦樂輸亡少靳又公建置約束初不以為永制形之剡章著之號令人户知之葢其本志將期混一之後盡取而復除之惜乎其不遂也今取自公以來凡經理財賦等類録之以為講析貨源若糴買運漕事實繁勞不可不著而間于科調有所蠲放以示寛恤亦公䕶念吾民之至者並附于篇控禦阻隘敵自入吾中國其順利駛捷之勢不啻髙屋之建瓴水凡形勝地若太行之險濁河之悍平時有國者恃以為固一旦半夜失之如寐如醉天下由是土分瓦解矣嗟乎斯亦可謂一時之彊也及其垂頭秦雍睥睨梁益雍容嘻笑意謂功在晷刻然盡智殫力玩嵗淹辰終不能盡如其志雖初志僅伸亦繼以撓敗夫何故葢以精神折其衝以策畧制其命而又下収芻蕘善任帥牧凡敵宻謀秘計意所從入皆先機臨控盡得其要如室鼠之穴塞蟻之封使不得肆是以雖縦横衝突左瞰右睨卒亡所措而遁傳曰聖人有金城夫金城豈地形之謂哉若公者其足以當之矣今姑録當時所以扞蔽蜀門者為控禦阻隘課誘耕墾食足則兵彊穀粟富則食足然穀粟非天雨而鬼輸之也由乎土之滋殖而已曠土未盡闢則廥庾無見糧取之它境費倍而力艱然豈無術以濟此乎籍不耕之田而課之耕盡地利之入佐飛輓之乏逺邇不病公私俱給此匪策之上耶闗外之地自經敵人蹂踐居者渙離千里膏沃鞠為莽榛師屯十萬仰食三川漕舟相銜填溢江流蜀固不勝其困矣公憫然念之垂意穡事將有以少紓其力于是選信使擇才吏而分屬之優假耕夫貸其種糧資以牛具且掲賞格以督守令薄斂入以裕貧民未幾人争慕向執耒耜者雲集于南畝荒疇廢壤盡入墾鉏向之蒿藜之場彌望皆黍稷矣噫公于兵食可謂知所先務顧獨無紀可乎今録之為課誘耕墾奬激忠義死人之所難死于國有義且有名為尤難當敵燄熏灼金石為摧孰有以甚愛不貲之軀而横當之志士仁人執志堅擇善明遇所不幸不暇有所回恤視破頭顱抉支體殆飲食談笑事然非在上者别異而甄明之則傑魄壯魂終亦埃滅澌盡顧何以慰已往而勸方來故公于死事尤懇懇致其情既已顯寵其身矣又廪其家録其孤嵗時奠祭其墓大者則廟貌而奉嘗之猶未厭也又命幕府裒其功狀列其姓氏而登載之時我先君起部實秉筆初得九人記而刋之石矣又以效忠者衆前刻未盡嗣為集記其所以昭著武功掲示英節與夫推明公無徳不酬之意粲然備具今録其事為奬激忠義且列兩記于前云招納畔渙梟狐不祥喜乗暝昏蜂蠆有毒忽出懐袖自昔運丁否剥釁生仇鄰干戈相㝷四海横潰坤維乾紐解弛決裂則必有叢凶嘯妖投間竊起或睢盱藪澤或倔强城池因之騷動一方魚肉赤子又叛𨽻亡將去順効逆助桀吠堯迷不知復其間雖有専地中立隂拱坐觀然未深明去就尚暌皇化于時將震以威角以力豈惟重傷且自新路絶盍若推赤心布大信與之更始㤙柔惠來指以新路材者縁以自助下者使復齒于平人涵育之仁孰大于此此公所以於盗賊亡畔専意綏集初不以殺戮為事用是道也今録為招納畔渙若西南裔夷時方艱虞往往或肆猖獗于防制之道尤宜汲汲今亦附篇末紀載雋功自昔成事濟功決于一勝楚以鉅鹿漢以昆陽吳以赤壁晉以淝水或用覊諸侯或既興墜緒或因之鼎立或不遂衰亡和尚原蜀之喉衿葢吾恃以為險資之立國方敵銳意深入雷轟電驅勢不留行而公委任名將逡廵却之尸其渠首殱其朋類暴骸積甲㡬若丘山葢自其内侮以來摧折破敗未有若此之甚發舒義士之憤摧敗强敵之氣鏗鍧偉績震耀一時梁益奠枕餘四十年皆公之力故制勝克敵他尚多有而係蜀存亡實在兹舉當時幕府有原上紀功碑又朝廷加公亞保及吳玠筞勲贊書具在今皆列于篇葢以侈公休烈使蜀人知今日生養食息之恩爰自公始不其偉歟割𨽻郡邑天下郡邑建置有成法封域有常守掌在職方莫或易之屬當紛攘地形之所臨制軍師之所出入昔非扼塞者今往往為重鎮要區列戍分屯有不可以仍舊要當因時度宜割部屬以便控禦故有升小為大易彼隸此大抵率從權制非刻舟膠柱者可與共議因録之為割𨽻郡邑
