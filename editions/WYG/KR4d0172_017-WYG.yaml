body:
  text: 澹齋集巻十七宋李流謙撰誌銘宋運使墓誌銘先是起部嘗書故中散大夫宋公墓言公天賦剛直自初筮仕氣象已不可撓折論事權貴前慷慨奮厲及析郡符持使節威令必行彈治撃搏當之輙潰官吏無貴賤凡在百執事之列與夫奔走往来操朱墨以需指顧者率望風披靡剪落牙距誓滌清濁穢束身三尺中於是豪右屏氣侵漁道絶而閭閻細民始獲以有生為樂至今人猶能誦之後二十有六年公之子朝請郎致仕諱誨字彦伯以疾不起遺言戒毋為墓道之詞諸子震悼不忍以謂匿美善以自翳盛徳也論撰之使後有考人子之事也於義皆適遂援先製以其婿從事郎四川制置司凖備差使李君嘉謀所次来乞銘予不敢辭宋氏封於周三十六傳為楚所滅及偃王失邦子孫因國為氏自漢而上居西河更魏晉始居廣平隋唐間又散居京兆其後獨廣平京兆為顯姓公世居京兆九世祖玘為壁州牙推生某仕唐為僖宗諫官以直觸閹寺出為緜州團練副使因家焉某生某徙居成都仕蜀為太子舍人生某為壁州推官生某號無為先生先生生士修太常博士致仕贈左正議大夫即公之髙祖曾祖諱球登慶厯進士第以左朝議大夫致仕贈通議大夫祖諱光朝請大夫致仕贈特進考諱昌宗右中散大夫華陽縣開國男食邑三百户致仕贈宣奉大夫即吾先君所書墓者也母陳氏繼文氏李氏皆碩人宋氏自得姓蟬聫數百年蒔祥播慶乆益昌衍公幼爽悟彊于學年十三侍宣奉官京師任膳服牋記如成人宣奉性方嚴持衆如官府嵗時朝服坐堂上家人歛躬側行羅拜就列無咳者子孫吏而歸必先課以績業如素所教勅即賜食遣之否則頓顙謝退而跼蹐不自容故孝謹之風蜀人慕之公以欽宗覃恩補將仕郎主眉之彭山簿用賞循從政郎辟瀘州録事㕘軍又辟知永康之青城郫之酒人一年諸臺交剡知嘉州峩眉縣權眉州福化酒稅改宣教郎知緜州羅江縣未赴丁宣奉憂除䘮再辟青城擬丞邛之依政遷通直郎丁李夫人憂免䘮知劍州普安縣轉奉議郎賜五品服除成都府路鈐轄司幹辦公事用上即位恩轉承議郎磨勘轉朝奉郎通判劍州未赴改知隆州未滿除嘉州踰年擢潼川府路轉運判官丐祠主管台州崇道觀遂致其仕以諸子升朝恩封朝請郎又六年而終享年八十公之為青城也邑瀕大江隄遏控扞率遵用吕汲公故事工堅而役均吏不能為奸學圯於水兩丁釋奠寓他舍公喟然撤廢寺亟新之堂宇齋廬皆宏肆華整由是邑始有學知峩眉虚恨蠻求互市邉吏不能禁公曰是其責也彼自反不足故必内怯蠻窺其私遂乗之因以虚聲揺州縣而肆其侮即採問嘗為其所畏者擢任之蠻讋不敢動後易其人竟失邉和羣哨攻掠不可制憲臺不知所出乃與約盡還所擄則遺以鹺茗繒綵已而歸不能二三嵗乃傍前言責償時公知嘉州截然不與蠻亦不敢復請在福化水夜暴至民倉皇升屋乞命屋且壊公集近岸船多出泉帛約載十人者與若干所全活無數知隆州雍國虞公自政府就第公事之以禮不為謬諂曲敬虞公面嘆其有守鹽井耗涸民負課破家霈恩許蠲弛為錢二干九百萬計司難之公抗論益堅轉運使直之遽命以本司鹽代起一嵗公復具奏始得免嵗戊子蜀荒民聚而剽勢張甚公戮魁酋而寛其餘或勸盡殱之公曰彼饑求食爾獨忍乎哉在東蜀治益進譽處益休大抵身為律度人自法象之不敢為非以負公摩撫尫瘵撿覈幣庾準程嵓嵓吏拱手受成無一錢横出納燕饋無名以例来盡謝不受又惡其著也則私緘鐍之去而後返之其不近名如此棄仇録瑕有古君子長者之風初在瀘大吏以㫖意喻獄公不從思有以中傷之會囚逸遂按罷之蹭蹬十餘年委分不校後其孫適𨽻屬部公聞其才而薦之事繼母以孝聞援給親䣊舉産以繼絶家恩恵隆洽娶宇文氏封安人淑配也先公二十六年卒男五人長述朝奉大夫知雅州次适宣教郎亦先公卒次逌今為奉議郎僉書榮州判官㕔公事次運登進士第今為奉議郎知蜀州江源縣次遇未仕而卒諸子天姿雅馴而又積染名義所臨率有顯稱甚似其祖若父予往在宣幕屬當受訟詞有兵訴非罪編竄謂雅州君嘗讞復之而不得行為白虞公公曰即如是經宋君又何疑遽命釋兵其執正不詭既去使人引以自白而得脫罪豈非賢哉榮州嘗與薦為雒縣予傍邑子稔其政如父兄而江源令君予同年生又嘗為寮篤學而贍於文在嚴道每適田野問尹說者常在口􅗪江政尤美要途巨人未識面争羅致或迎剡薦函此皆予親見聞者女三人長適某人次適狀公之行者孫男七人挺掞抃搢㨗拂撝抃㨗以雅州及公告老恩補官曾孫男祖禹以雅州郊霈補官公之卒以淳熙二年某月日以明年某月日𦵏某縣某鄉宣奉公塋之側竊嘗論事唯卓然有所見而後能執之固行之果不以世之訾譽得失為軒輊厯觀公平生操踐與推之政治見之家庭無一不盡義而中禮便法而當情人視以為不可及而公非有意為之曰吾見若爾不知其他是以華皓一槩絶無毁憎誠孚而類應徳熟而寵来其為州為部刺史不由拔引皆聲最流聞臺家所授凡除書下人懽呼抃躍市酒肉以相慶如得父母故除漕訓詞有豈弟兩邦之政循良一時之稱盖實録云銘曰宋封於周後氏以國遥遥百年代襲冕笏始無異蹊邁種曰徳木老則壯披華食實允顯維公柔恵且直明義秉法有斧有鉞剛吾四支豈不在骨恂恂近懦亢亢近激不激不懦公執其極意承有耀下逮燕翼我無傑詞侈此偉特尚耆其傳以報回慝朝奉大夫知嘉州孫公墓誌銘公諱觀國字賓老姓孫氏綿之羅江人後徙彰明曾祖某祖某父某以公貴贈朝散大夫大夫公篤義好學傾意士黨昬暮叩門無不得所欲聲揺一鄉公幼機悟未冠入太學從臨邛趙雍學易遂同薦已而再薦再黜志愈勵盡置家事囊書舎佛屋會復詞賦為之如素習因以冠能書試外省馮給事檝識其文擢殊等解褐為彭州司理参軍兵夜直其婦死于家兵就鞫惨楚將誣服公疑訪於外乃得婦姦嘗與夫反目知為自戕兵始得脫有與娼狎而或約同死娼斃其人不殊輿至獄懵不能白一日牽其衣見字股間具道所以為者讞笞之其平反多類此除遂寧府教授改秦州丁母憂服除調文州曲水令將武人喜漁奪牛羊視人公不為撓除彭州教授公在彭固喜以文字指授諸生其再至也尤勸趨之守相相䦧隂掩伺公揭試題聖人為腹不為目以諷丁大夫公憂免喪利州提㸃刑獄路彬辟其屬未㡬路召還太尉楊政挽留之楊豪健貴嚴獨於公盡禮以為至誠不欺可託腹心者軍政聽而後行公随事規糾一軍肅然知眉州丹稜縣以治稱知除州慶符未赴路公登法從首薦之除簡州其詞云學有根源行無缺玷人謂惟公足以當之簡素無事公亦以無事治之葺貢闈新城譙皆舉其未舉者待游士最有恩意解組造朝對便殿首論藝祖皇帝受天眷命混一區宇廟謀宸􅈫雖發自淵衷而當時腹心大臣相與從容謀議挺身任責洞然不疑者惟趙普一人今日之勢正如二人對奕技等則相持一勝則一負要在當局者知已知彼􅈫無遺策乃可保其必勝而今不足者正在謀臣上矍然是之語聞在事者不恱人為寒毛久之除隆州陛辭或曰少卑之公慨然列前奏且曰陛下比以冬雷黜鼎輔中外既已震懾英斷願及今圗任真相以慰人望上愈開納而人亦始服公論事有體隆壤瘠而民貧士衆而多顯家公撫民以不擾接士以無倦而待顯家以不諂知嘉州病已侵然猶自力於治竟不起將絶書遺戒一筆不亂實乾道某年某月日也享年若干積官至朝奉大夫其轉朝奉郎也以上即位恩母楊氏贈宜人娶景氏封安人四男子廷玉登進士第終從事郎眉州防禦判官振玉嘗名賢書以公致仕恩補將仕郎朝玉業進士鳴玉先公卒三女適士人王逺之王㻛儒林郎成都府教授劉燾孫男女若干人振玉等以是年十二月𦵏公於魏城縣某鄉藏玉谷公為人有常徳練世故達人情寛裕而善持深博而有謀几經所裁訂重輕亟徐皆應衡石尤篤於孝愛大夫公舉晚息嘗恐不以子數公識其意親撫抱且名之繋譜牒大夫公見而恱甚教弟康國亦得舉宗人有争耕犁者買而分遺之皆愧悔族若鄉之婚𦵏及窮無歸必公之赴公亦任之如疾痛疴癢在已不家有亡之卹也少學於魏城閻公實閻死公市田以塟手植松檟嵗時奠祭而字其孤平居寡言笑對客危坐終日往往無一語至辨析是否論人物賢鄙湜湜不茍學子所在如市公子弟誨接之占一善口之不置或畔繩檢亦顯刺盡言故其門多成立者政平易然必已出耨姦鉏惡有仁者之勇秦丞相檜當國公投之書言當時征歛之弊曰昔者以法取次猶以術取今㡬於白取矣又曰惡吏侵掠細民禁之誠善矣然使出緡曰免行則是職之官吏取之公上此何理哉秦不為忤更畀以美闕性疾妖幻有神降其土自託於金仙氏作文字倣浮屠所行道場軌儀法愚人趣和之日夜列薰炬撞鐘伐鼓如狂公亟以告郡君火其書笞逐其徒晚與其子居綿竹邑人無貴賤與均禮窮閻小家停車候門必得見乃去人推其盛徳及其死知與不知皆為流涕自號齪翁文集七十巻游吳録二十巻龍川筆録十巻藏于家其文不事斵削而自合尤喜詩而亦工於詩予嘗論世之為士者類藩飾表襮釣浮譽而掠世資為吏者又争以敏銳刻給相髙取速功疾驗以梯顯羙公獨退然不競為所當為求不愧不怍而已然居鄉名長者在官名循吏徳禮足以馴强暴恵利足以及孤惸三佩刺史之章諸子楚楚惟肖年逾耆艾沒而祭于社不知為士為吏者當如是耶或彼之可慕也公之塟振玉以彭州教授陳大臨彦博所次行實来乞銘曰乃翁屬纊時語也予母外家公之族而先君子平生待公如師友彦博與予又少從公游故以是屬彦博紀叙有法予姑為之銘銘曰晰晰其中不媟以形也言言其立不賈以名也徳足儀其家也政足善其民也尚論之中庸之君子易之丈人也閟斯銘夸薄者朂沈厚者進俗之崇也徳興縣尉曾修職墓誌銘某自海内徙合江家弟鎬渠陽判官罷歸道湘中留合江踰絫朔舂容及里中老縷數至蘭溪曾積臣則喟曰鎬親家也不幸越世子壻三益書来必以墓未識為大戚且曰今名信有徵者宜莫兄若敢以累直筆某曰坐狂瞽獲咎瀕死有言不信汝姑待又三年當上之三十一年某蒙自便恩還里適家弟將官章貢諗曰鴈城之言不可寒某頷之而未暇也既三益偕其季三復相踵扶服以請且出左迪功郎新夷陵主簿謝君諤狀某無以為解則覈其行實叙而銘之公諱遜敏積臣字也其先金陵聞宋五季亂有辟地至吉之吉水者家焉曾大父曰孝先大父曰君彦皆以隠聞父曰光庭寛厚長者嘗主東安簿攝令零陵靖康初湖南發民兵勤王毅然攘襼問路無難色人多其勇于義以請老授右文林郎公自丱無童心其起居進退綽有成徳性嗜學葄枕圗史未嘗一日廢書不觀長益狷介植立雖喜為詞章畧鞶帨故屢擢㦸舉塲輙北然不以失得易其所禀曰吾自與時左非不偶也癸亥春復太學趨虞廪者麇至公以親弗忍去交㳺强之行乃挟書走轂下吐語不媚持以求合若肝膽然㑹親黨有當途者以雅故力請官之作而言曰親老矣敢數禄而仕遂補右廸功郎参軍象州司法重逺膝下不行得漕臺轉輸以勞循右修職郎尉饒之徳興縣有大姓骫法至十數年租不入官椎埋敓攘往往而是令若丞噤不敢究切率受垢藏疾不則煩言蠭起卒以譴去公獨切齒盡去根株弗少寛貸令行禁止豪强重足吏畏而民愛其僚有嗛公䜛於守者人皆危慄或勸白其事公曰吾奉公守職獲謗鑠死且不朽終不白而守亦不能疵瑕嵗在丙子十有二月七日終于官舎之寢其孤奉其䘮以歸越明年十月庚申𦵏于里之金牛原公娶陳氏男二人三益三復女一人適士人董世夔癸酉秋三益三復同偕計明年見黜于南宫公恚曰工挟刃度材吾未見其弃翹薪也謂有司不我知黜而宜乃知我矣咎將誰執二子退自克學益力後三嵗郡又以三復薦將行公捐館服除會賓興三益以經術再舉偕試春官而三復遂中進士第調左廸功郎主贑簿士豔其榮初零陵府君築硯廬以教子號曰槐堂公踵其規橅治之則已無侈前度遴簡師友古人與稽故子姓皆酌古有得弟敏修早世撫襁褓之孤逾已子至其男鬌女笄傅姆之教惟謹且先其子以畢嫁娶委禽反馬之禮有加公家素饒衍或說以廣田宅則笑曰何以多為秪賈禍耳且遺所不知何人前哲不取也所居多勝槩嵗時昆弟姻賓以觴詠自適嘗自賛其真曰華僊醉客竹溪愚叟靣目有相心胷無垢華僊館名竹溪橋名也嗚呼如公平生云為如此宜得位與夀而位卑無年天其于是安郵耶銘曰参孝聞魯偉忠顯漢厥緒是承小試縣掾芒刃不頓豪猾已驚撫季幼穉過于已子友愛著稱埋辭匪溢盖撮其實千古之徵陳履道墓誌銘君姓陳氏諱大方字履道劍之浦城人其系自唐拾遺居射洪其徙浦城自七世祖曾大父諱思賢父諱某君童時父死毁如成人母知不凡讀父書長而授之君感勵刻意劬甚母更憂其疾數休之不能新學黜春秋史君獨嗜之未㡬貢京師歸而告其母天下自此多事矣後三年兵起方調歛猝興居者麕驚争迯去或怵與俱君曰去將安之吾又母老會邑部夫願䕶以行令曰士也而辱此乎君行不顧於是當遣者皆趣發無敢留其後逋徙者還盡墟其家始服君有識晚以恩授建州助教君為人孝敬醇潔以不逮事父事母篤至垂髫日記數千言終身不忘雖間行田圃書未嘗去手入夜炷不續往往挟策與月光上下兄難事事之得其心女弟幼孤撫育嫁遣恩甚篤曰如是而後能使之忘其孤平時恂恂常恐傷人遇事白黑之嶻嶪可畏善食酒至斗餘不亂過華山愛其竒秀反輿而觀之㡬三十里路人指為狂家近水竹嘗欲並溪縛屋多釀以待客而貧不果其趣向可見紹興庚辰某月日以疾卒于家享年若干娶鄭氏再胥氏四男子栗槩紹棐栗槩有學行而槩對集英有鯁言擢上第授蓬州教官以歸女長亡次嫁某人季在室文集十巻詩名物辨四巻書訓雜録三巻兩漢史評二十巻藏于家栗等以今年某月日某甲子將舉君之䘮塟于邑之某里某山之麓以家傳求銘于予予於君季父彭門學官彦博耐久交也彦博每與余言其宗之賢多及君今按傳皆合是以為之銘銘曰質以根之學以昌之而命仇之亦既晦之而後烜之固及其定耶嘻仲結章君墓銘章仲結予三十年故人與之游如踐芳蓀之畦香菲菲来襲人如酌醇醪竟日陶然而不知醉至其陳義秉法壘壁孤峭則亦一矢不可犯故予愛之重之自其云亡思之過時而悲將塟其子璪先期来問銘予執書以泣曰子宜請我宜銘君諱綬仲結字也其先出齊太公封于鄣去邑為氏家于閩有令梓潼者徙綿之神泉又徙漢之綿竹曾大父諱彚學行髙尤邃于易與楊元素宇文公南友善一試禮部不第退而結廬紫㣲山下號知退處士部使者以遺民上就加將仕郎守本州助教大父諱某父諱騭特試策第一賜進士第終左奉議郎君蚤慧事繼母孝侍奉議公官閬中太守梁激山東名儒見其詩大嗟賞目為千里駒查匪躬不妄可人自童時亦喜稱君於是始以詩名紹興初復詩賦學於胡敢義夫義夫盖學於李褒聖予於是又以賦名試石室數右諸生嵗丁卯遂以冠州里之士然君于書無所不讀他文章醇深婉約有作者風不但衣逢掖從有司以一藝稱性介靖於物無忤而亦不為媚承大門顯家未嘗有履迹親朋在仕不通一字或病其狷弗卹也誨誘後生多所就家有亡不問而獨淫於書毎相過談燕彌日鑿鑿皆文義始吾先君子晚而家紫嵓士凑問學其傑然尤異先君許以斯文僅數人君在其間然再薦遂死君雖不以自懟亦可哀矣丁亥閏七月旦起盥濯如平時衣冠將出坐小憇忽鼻息殷床家人怪之亟扶入眎之蛻矣嗟乎恬于化君固有道者彼毫末得失尚得窺其藩乎享年若干娶楊氏同邑人干牛衛大將軍楊公羽權七世孫有賢行姑趙姿嚴事之歡治家可法象使其夫不奪于學而諸子有立其力也後君一年亦卒生四男子璪􅚇琛琬璪嘗冠能書二女嫁進士某某孫若干人其𦵏以某年月日其地在某鄉秦仲山楊夫人祔焉詩文五十巻藏於家銘曰紫㣲鈎深如玉如金及孫而興不迄于登豐于能藹于稱報于兹耶視瞢瞢厚而憑積而升不其逺之在繩繩費府君墓誌銘君姓費氏系出大費世江夏人其先有諱能者仕至御史中丞廷暉者至監察御史徙蜀居邛之沙渠曽祖某祖某父某俱業儒母鮮于氏故通議大夫鵬之女君諱某字某生而爽悟年十四試鄉校以易冠諸生既登賢書同族兄歸州使君某㳺太學歸州粹於易與君語勝處輙相拊掌故相范公宗尹諫大夫宋公某某官熊公彦詩編修趙公雍皆名輩待君加等君慷慨有竒志喜商㩁古今論議宏博嘗奏疏言利病㡬數萬言不報未㡬中國有邉患又上牋陳十事其後朝廷所更革多合其說遇楊君希仲于途識其不凡希仲竟為類闈舉首居京師時客于叅政陸公佃胡公世將帥蜀問人陸以君對抵蜀首致之有宗室子憙學令安人以師友遇君君為鳩纂厯代百官遺事以補職林成書百餘巻喜赴人之急有冒鹺禁者袖金乞援君盡力營解擲其金四試禮部退而歎曰讀書徒為利禄計耶作詩以見志清風明月如相許共老沙湍一釣竿乃並溪築亭榜之江月盖将老焉紹興丁卯某月日以疾不起享年若干娶詹氏生五男子皆學者女嫁某某生孫男若干人其𦵏也以紹興某年月日某甲子其地在某鄉祖塋之次既塟諸孤求予為墓中之文予宗盟也知君哀其學成而窮卒以布衣死慨然而為之銘銘曰世不學之鄙學成而躓寧躓勿恚既羸其志江空月明鷗鶴夜驚尚其来游蕭然幅巾
